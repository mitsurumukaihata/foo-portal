name: Daily Industry News

on:
  # schedule停止: Claude Code経由の手動投稿に移行（2026/04/07）
  # Anthropic API課金を削減するため、スケジュール自動配信を停止。
  # 必要時はworkflow_dispatchで手動実行可能。
  workflow_dispatch:
    inputs:
      news_type:
        description: 'ニュースタイプ (tire/transport/dealer/all)'
        required: true
        default: 'all'

jobs:
  transport-news:
    if: github.event_name == 'workflow_dispatch' && (inputs.news_type == 'transport' || inputs.news_type == 'all') || github.event.schedule == '45 21 * * 0,2,4'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Post transport news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          NEWS_TYPE: transport
        run: node .github/scripts/post-news.mjs

  dealer-news:
    if: github.event_name == 'workflow_dispatch' && (inputs.news_type == 'dealer' || inputs.news_type == 'all') || github.event.schedule == '57 21 * * 0,2,4'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Post dealer news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          NEWS_TYPE: dealer
        run: node .github/scripts/post-news.mjs

  tire-news:
    if: github.event_name == 'workflow_dispatch' && (inputs.news_type == 'tire' || inputs.news_type == 'all') || github.event.schedule == '10 22 * * 0,2,4'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Post tire news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          NEWS_TYPE: tire
        run: node .github/scripts/post-news.mjs
