name: Weekly Indeed Analysis

on:
  # schedule停止: Claude Code経由の手動投稿に移行（2026/04/07）
  workflow_dispatch:

jobs:
  indeed-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Post Indeed analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          NEWS_TYPE: indeed
        run: node .github/scripts/post-news.mjs
