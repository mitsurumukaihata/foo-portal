<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>📊 分析ダッシュボード | f.o.o</title>
<style>
  :root {
    --bg: #fdf6ec;
    --surface: #fff;
    --surface2: #faf2e5;
    --border: #ead7bd;
    --text: #3d2c16;
    --muted: #8a6a3e;
    --accent: #f0a500;
    --accent2: #d18800;
    --green: #2e7d32;
    --red: #c62828;
    --blue: #1976d2;
    --purple: #7b1fa2;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, 'Hiragino Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
  }
  header {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    padding: 16px 24px;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  header h1 { margin: 0 0 4px; font-size: 20px; }
  header .sub { font-size: 11px; opacity: 0.9; }
  .container { padding: 20px; max-width: 1400px; margin: 0 auto; }
  .hero {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .hero-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .hero-card.accent {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border-color: transparent;
  }
  .hero-card .lbl { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .hero-card.accent .lbl { color: rgba(255,255,255,0.85); }
  .hero-card .val { font-size: 26px; font-weight: 900; color: var(--accent); }
  .hero-card.accent .val { color: #fff; }
  .hero-card .sub { font-size: 10px; color: var(--muted); margin-top: 4px; }
  .hero-card.accent .sub { color: rgba(255,255,255,0.9); }

  section { margin-bottom: 32px; }
  section h2 { font-size: 16px; margin: 0 0 12px; color: var(--text); }
  section h2 .sub { font-size: 11px; font-weight: 400; color: var(--muted); margin-left: 6px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.03);
  }
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }

  table.data {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  table.data th, table.data td {
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    text-align: left;
  }
  table.data th {
    background: var(--surface2);
    font-weight: 700;
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
  }
  table.data td.num { text-align: right; font-family: 'DM Mono', monospace; }
  table.data tr:hover { background: var(--surface2); }

  .bar-chart {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }
  .bar-row .label { width: 120px; flex-shrink: 0; }
  .bar-row .bar {
    flex: 1;
    height: 18px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }
  .bar-row .fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .bar-row .value {
    width: 80px;
    text-align: right;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
  }

  .heatmap {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 2px;
  }
  .heatmap-cell {
    aspect-ratio: 1;
    border-radius: 2px;
    background: var(--surface2);
    font-size: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: transparent;
  }
  .heatmap-cell.lvl1 { background: rgba(240,165,0,0.15); }
  .heatmap-cell.lvl2 { background: rgba(240,165,0,0.35); }
  .heatmap-cell.lvl3 { background: rgba(240,165,0,0.55); }
  .heatmap-cell.lvl4 { background: rgba(240,165,0,0.75); }
  .heatmap-cell.lvl5 { background: var(--accent); color: #fff; font-weight: 700; }

  .insight {
    background: rgba(240,165,0,0.08);
    border-left: 3px solid var(--accent);
    padding: 10px 14px;
    border-radius: 4px;
    font-size: 12px;
    color: var(--text);
    margin-bottom: 10px;
  }
  .insight .icon { margin-right: 6px; }
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--muted);
  }
  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .action-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    color: var(--text);
  }
  .action-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
</style>
</head>
<body>

<header>
  <h1>📊 f.o.o 分析ダッシュボード</h1>
  <div class="sub">D1 直接SQL × 高速集計 ··· <a href="index.html" style="color:#fff;">ポータルに戻る</a></div>
</header>

<div class="container">

  <!-- 年度切替 -->
  <div class="actions">
    <span style="font-size:12px;color:var(--muted);align-self:center;">期間:</span>
    <button class="action-btn" data-range="month">今月</button>
    <button class="action-btn active" data-range="fy">今年度</button>
    <button class="action-btn" data-range="last_fy">前年度</button>
    <button class="action-btn" data-range="2year">過去2年</button>
    <button class="action-btn" data-range="all">全期間</button>
  </div>

  <!-- Hero Metrics -->
  <div class="hero" id="hero"></div>

  <section>
    <h2>📈 月別売上推移<span class="sub">月別の合計金額と伝票件数</span></h2>
    <div class="card" id="monthly-trend"></div>
  </section>

  <div class="grid-2">
    <section>
      <h2>🏆 得意先ランキング TOP20</h2>
      <div class="card" id="customer-ranking"></div>
    </section>
    <section>
      <h2>🛞 タイヤサイズ別売上 TOP15</h2>
      <div class="card" id="size-ranking"></div>
    </section>
  </div>

  <section>
    <h2>💎 粗利分析<span class="sub">月次の売上・仕入・粗利率</span></h2>
    <div class="card" id="profit-analysis"></div>
  </section>

  <div class="grid-2">
    <section>
      <h2>🏭 仕入メーカー別</h2>
      <div class="card" id="maker-ranking"></div>
    </section>
    <section>
      <h2>😴 休眠顧客（6ヶ月無取引）</h2>
      <div class="card" id="dormant-customers"></div>
    </section>
  </div>

  <section>
    <h2>🗓 曜日×時期ヒートマップ<span class="sub">売上パターンの可視化（週別件数）</span></h2>
    <div class="card" id="heatmap"></div>
  </section>

  <div class="grid-2">
    <section>
      <h2>🚚 車両関連サマリ</h2>
      <div class="card" id="vehicle-summary"></div>
    </section>
    <section>
      <h2>💰 入金状況</h2>
      <div class="card" id="payment-status"></div>
    </section>
  </div>

  <section>
    <h2>✨ AI自動インサイト<span class="sub">SQLから自動抽出した注目ポイント</span></h2>
    <div class="card" id="insights"></div>
  </section>

</div>

<script>
const WORKER = 'https://notion-proxy.33322666666mm.workers.dev';
let currentRange = 'fy';

function yenShort(n) {
  if (n === null || n === undefined) return '—';
  const abs = Math.abs(n);
  if (abs >= 100000000) return '¥' + (n / 100000000).toFixed(1) + '億';
  if (abs >= 10000) return '¥' + (n / 10000).toFixed(0) + '万';
  return '¥' + Math.round(n).toLocaleString();
}
function fmtNum(n) { return (n ?? 0).toLocaleString(); }
function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function sql(q, params=[]) {
  const res = await fetch(WORKER + '/d1/sql', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ sql: q, params })
  });
  return await res.json();
}

function getDateRange() {
  const today = new Date();
  const y = today.getFullYear();
  const m = today.getMonth() + 1;
  const fyStart = m >= 4 ? y : y - 1;
  switch (currentRange) {
    case 'month': return [`${y}-${String(m).padStart(2,'0')}-01`, '2099-12-31'];
    case 'fy': return [`${fyStart}-04-01`, `${fyStart+1}-03-31`];
    case 'last_fy': return [`${fyStart-1}-04-01`, `${fyStart}-03-31`];
    case '2year': {
      const ago = new Date(today); ago.setFullYear(today.getFullYear()-2);
      return [ago.toISOString().slice(0,10), '2099-12-31'];
    }
    case 'all': return ['2023-04-01', '2099-12-31'];
  }
}

async function loadHero() {
  const [from, to] = getDateRange();
  const r = await sql(`
    SELECT
      (SELECT COUNT(*) FROM 売上伝票 WHERE 売上日 BETWEEN ? AND ?) AS 伝票件数,
      (SELECT COALESCE(SUM(税込合計),0) FROM 売上伝票 WHERE 売上日 BETWEEN ? AND ?) AS 売上合計,
      (SELECT COALESCE(SUM(税込合計),0) FROM 仕入伝票 WHERE 仕入日 BETWEEN ? AND ?) AS 仕入合計,
      (SELECT COUNT(DISTINCT 請求先ID) FROM 売上伝票 WHERE 売上日 BETWEEN ? AND ?) AS 取引顧客数
  `, [from,to,from,to,from,to,from,to]);
  const d = r.results?.[0] || {};
  const 粗利 = (d.売上合計 || 0) - (d.仕入合計 || 0);
  const 粗利率 = d.売上合計 ? Math.round(粗利 * 100 / d.売上合計) : 0;
  document.getElementById('hero').innerHTML = `
    <div class="hero-card accent"><div class="lbl">💰 売上合計</div><div class="val">${yenShort(d.売上合計)}</div><div class="sub">${fmtNum(d.伝票件数)}伝票</div></div>
    <div class="hero-card"><div class="lbl">🛒 仕入合計</div><div class="val">${yenShort(d.仕入合計)}</div><div class="sub">税込</div></div>
    <div class="hero-card"><div class="lbl">💎 粗利</div><div class="val">${yenShort(粗利)}</div><div class="sub">粗利率 ${粗利率}%</div></div>
    <div class="hero-card"><div class="lbl">👥 取引顧客</div><div class="val">${fmtNum(d.取引顧客数)}</div><div class="sub">アクティブ数</div></div>
  `;
}

async function loadMonthlyTrend() {
  const [from, to] = getDateRange();
  const r = await sql(`
    SELECT substr(売上日,1,7) AS ym, COUNT(*) AS 件数, SUM(税込合計) AS 合計
    FROM 売上伝票 WHERE 売上日 BETWEEN ? AND ?
    GROUP BY ym ORDER BY ym
  `, [from, to]);
  const rows = r.results || [];
  if (!rows.length) { document.getElementById('monthly-trend').innerHTML = '<div class="loading">データなし</div>'; return; }
  const max = Math.max(...rows.map(r => r.合計));
  document.getElementById('monthly-trend').innerHTML = `
    <div class="bar-chart">
      ${rows.map(r => `
        <div class="bar-row">
          <div class="label">${r.ym}</div>
          <div class="bar"><div class="fill" style="width:${(r.合計/max)*100}%"></div></div>
          <div class="value">${yenShort(r.合計)}</div>
        </div>
      `).join('')}
    </div>
    <div style="font-size:10px;color:var(--muted);margin-top:8px;text-align:right;">${rows.length}ヶ月分 · ${fmtNum(rows.reduce((s,r)=>s+r.件数,0))}伝票</div>
  `;
}

async function loadCustomerRanking() {
  const [from, to] = getDateRange();
  const r = await sql(`
    SELECT c.得意先名 AS name, COUNT(s.id) AS 件数, SUM(s.税込合計) AS 金額
    FROM 売上伝票 s
    LEFT JOIN 得意先マスタ c ON s.請求先ID = c.id
    WHERE s.売上日 BETWEEN ? AND ?
    GROUP BY s.請求先ID
    ORDER BY 金額 DESC
    LIMIT 20
  `, [from, to]);
  const rows = r.results || [];
  if (!rows.length) { document.getElementById('customer-ranking').innerHTML = '<div class="loading">データなし</div>'; return; }
  const max = rows[0].金額;
  document.getElementById('customer-ranking').innerHTML = `
    <table class="data">
      <thead><tr><th>#</th><th>得意先</th><th class="num">件数</th><th class="num">売上</th></tr></thead>
      <tbody>${rows.map((r, i) => `
        <tr>
          <td>${['🥇','🥈','🥉'][i] || '#'+(i+1)}</td>
          <td>${esc(r.name || '(未紐付け)')}</td>
          <td class="num">${fmtNum(r.件数)}</td>
          <td class="num"><b>${yenShort(r.金額)}</b></td>
        </tr>
      `).join('')}</tbody>
    </table>
  `;
}

async function loadSizeRanking() {
  const [from, to] = getDateRange();
  const r = await sql(`
    SELECT d.タイヤサイズ AS size, COUNT(*) AS 件数, SUM(d.数量) AS 本数, SUM(d.税込小計) AS 金額
    FROM 売上明細 d
    LEFT JOIN 売上伝票 s ON d.売上伝票ID = s.id
    WHERE d.タイヤサイズ != '' AND s.売上日 BETWEEN ? AND ?
    GROUP BY d.タイヤサイズ
    ORDER BY 金額 DESC
    LIMIT 15
  `, [from, to]);
  const rows = r.results || [];
  if (!rows.length) { document.getElementById('size-ranking').innerHTML = '<div class="loading">データなし</div>'; return; }
  document.getElementById('size-ranking').innerHTML = `
    <table class="data">
      <thead><tr><th>サイズ</th><th class="num">件数</th><th class="num">本数</th><th class="num">金額</th></tr></thead>
      <tbody>${rows.map(r => `
        <tr>
          <td><b>${esc(r.size)}</b></td>
          <td class="num">${fmtNum(r.件数)}</td>
          <td class="num">${fmtNum(r.本数)}</td>
          <td class="num">${yenShort(r.金額)}</td>
        </tr>
      `).join('')}</tbody>
    </table>
  `;
}

async function loadProfitAnalysis() {
  const [from, to] = getDateRange();
  const r = await sql(`
    WITH s AS (
      SELECT substr(売上日,1,7) AS ym, SUM(税込合計) AS 売上 FROM 売上伝票 WHERE 売上日 BETWEEN ? AND ? GROUP BY ym
    ),
    p AS (
      SELECT substr(仕入日,1,7) AS ym, SUM(税込合計) AS 仕入 FROM 仕入伝票 WHERE 仕入日 BETWEEN ? AND ? GROUP BY ym
    )
    SELECT s.ym, s.売上, COALESCE(p.仕入,0) AS 仕入, s.売上 - COALESCE(p.仕入,0) AS 粗利
    FROM s LEFT JOIN p ON s.ym = p.ym ORDER BY s.ym DESC LIMIT 24
  `, [from,to,from,to]);
  const rows = (r.results || []).reverse();
  if (!rows.length) { document.getElementById('profit-analysis').innerHTML = '<div class="loading">データなし</div>'; return; }
  document.getElementById('profit-analysis').innerHTML = `
    <table class="data">
      <thead><tr><th>年月</th><th class="num">売上</th><th class="num">仕入</th><th class="num">粗利</th><th class="num">粗利率</th></tr></thead>
      <tbody>${rows.map(r => {
        const rate = r.売上 ? Math.round(r.粗利 * 100 / r.売上) : 0;
        const color = rate >= 30 ? 'var(--green)' : rate >= 20 ? 'var(--accent)' : 'var(--red)';
        return `
        <tr>
          <td><b>${r.ym}</b></td>
          <td class="num">${yenShort(r.売上)}</td>
          <td class="num" style="color:var(--muted);">${yenShort(r.仕入)}</td>
          <td class="num"><b>${yenShort(r.粗利)}</b></td>
          <td class="num" style="color:${color};font-weight:700;">${rate}%</td>
        </tr>`;
      }).join('')}</tbody>
    </table>
  `;
}

async function loadMakerRanking() {
  const [from, to] = getDateRange();
  const r = await sql(`
    SELECT d.メーカー AS maker, COUNT(*) AS 件数, SUM(d.税込小計) AS 金額
    FROM 仕入明細 d LEFT JOIN 仕入伝票 s ON d.仕入伝票ID = s.id
    WHERE d.メーカー != '' AND s.仕入日 BETWEEN ? AND ?
    GROUP BY d.メーカー ORDER BY 金額 DESC
  `, [from, to]);
  const rows = r.results || [];
  if (!rows.length) { document.getElementById('maker-ranking').innerHTML = '<div class="loading">データなし</div>'; return; }
  const total = rows.reduce((s,r)=>s+r.金額, 0);
  const max = rows[0].金額;
  document.getElementById('maker-ranking').innerHTML = `
    <div class="bar-chart">
      ${rows.map(r => {
        const pct = Math.round(r.金額 * 100 / total);
        return `
        <div class="bar-row">
          <div class="label"><b>${esc(r.maker)}</b></div>
          <div class="bar"><div class="fill" style="width:${(r.金額/max)*100}%"></div></div>
          <div class="value">${yenShort(r.金額)} (${pct}%)</div>
        </div>`;
      }).join('')}
    </div>
  `;
}

async function loadDormantCustomers() {
  const r = await sql(`
    SELECT c.得意先名 AS name, MAX(s.売上日) AS 最終, COUNT(s.id) AS 総件数
    FROM 得意先マスタ c
    LEFT JOIN 売上伝票 s ON s.請求先ID = c.id
    WHERE c.有効 = 1
    GROUP BY c.id
    HAVING (MAX(s.売上日) < date('now', '-6 months') OR MAX(s.売上日) IS NULL)
       AND COUNT(s.id) > 0
    ORDER BY 最終 DESC
    LIMIT 20
  `);
  const rows = r.results || [];
  if (!rows.length) { document.getElementById('dormant-customers').innerHTML = '<div class="loading">該当なし（全員アクティブ）</div>'; return; }
  document.getElementById('dormant-customers').innerHTML = `
    <table class="data">
      <thead><tr><th>顧客名</th><th>最終取引</th><th class="num">総件数</th></tr></thead>
      <tbody>${rows.map(r => `
        <tr>
          <td>${esc(r.name)}</td>
          <td style="color:var(--red);">${r.最終 || '—'}</td>
          <td class="num">${fmtNum(r.総件数)}</td>
        </tr>
      `).join('')}</tbody>
    </table>
    <div style="font-size:10px;color:var(--muted);margin-top:8px;">📞 営業フォロー候補: 過去6ヶ月取引なし</div>
  `;
}

async function loadHeatmap() {
  const r = await sql(`
    SELECT substr(売上日,1,7) AS ym, COUNT(*) AS 件数
    FROM 売上伝票
    WHERE 売上日 >= date('now', '-24 months')
    GROUP BY ym ORDER BY ym
  `);
  const rows = r.results || [];
  if (!rows.length) { document.getElementById('heatmap').innerHTML = '<div class="loading">データなし</div>'; return; }
  const max = Math.max(...rows.map(r => r.件数));
  const levelOf = n => n === 0 ? 0 : Math.min(5, Math.ceil(n / max * 5));
  document.getElementById('heatmap').innerHTML = `
    <div style="font-size:10px;color:var(--muted);margin-bottom:8px;">色が濃いほど件数多</div>
    <div class="heatmap" style="grid-template-columns:repeat(${Math.min(rows.length,12)},1fr);">
      ${rows.map(r => {
        const lv = levelOf(r.件数);
        return `<div class="heatmap-cell lvl${lv}" title="${r.ym}: ${r.件数}件">${r.件数}</div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:14px;margin-top:10px;font-size:10px;color:var(--muted);">
      ${rows.slice(-6).map(r => `<span>${r.ym}: ${r.件数}</span>`).join('')}
    </div>
  `;
}

async function loadVehicleSummary() {
  const r = await sql(`
    SELECT
      (SELECT COUNT(*) FROM 車両マスタ) AS 総車両数,
      (SELECT COUNT(*) FROM 車両マスタ WHERE 顧客ID != '') AS 顧客紐付き,
      (SELECT SUM(本数) FROM 車両マスタ) AS 総タイヤ本数,
      (SELECT COUNT(DISTINCT 顧客ID) FROM 車両マスタ WHERE 顧客ID != '') AS 顧客数
  `);
  const d = r.results?.[0] || {};
  document.getElementById('vehicle-summary').innerHTML = `
    <table class="data">
      <tbody>
        <tr><td>🚚 総車両数</td><td class="num"><b>${fmtNum(d.総車両数)}</b></td></tr>
        <tr><td>🔗 顧客紐付き</td><td class="num">${fmtNum(d.顧客紐付き)}</td></tr>
        <tr><td>🛞 総タイヤ本数</td><td class="num">${fmtNum(d.総タイヤ本数)}</td></tr>
        <tr><td>🏢 管理顧客数</td><td class="num">${fmtNum(d.顧客数)}</td></tr>
      </tbody>
    </table>
  `;
}

async function loadPaymentStatus() {
  const r = await sql(`
    SELECT ステータス, COUNT(*) AS 件数, SUM(税込合計) AS 金額
    FROM 売上伝票
    WHERE 売上日 >= date('now', '-6 months')
    GROUP BY ステータス
  `);
  const rows = r.results || [];
  if (!rows.length) { document.getElementById('payment-status').innerHTML = '<div class="loading">データなし</div>'; return; }
  document.getElementById('payment-status').innerHTML = `
    <table class="data">
      <thead><tr><th>ステータス</th><th class="num">件数</th><th class="num">金額</th></tr></thead>
      <tbody>${rows.map(r => `
        <tr>
          <td>${esc(r.ステータス || '(未設定)')}</td>
          <td class="num">${fmtNum(r.件数)}</td>
          <td class="num">${yenShort(r.金額)}</td>
        </tr>
      `).join('')}</tbody>
    </table>
    <div style="font-size:10px;color:var(--muted);margin-top:8px;">直近6ヶ月の状況</div>
  `;
}

async function loadInsights() {
  const insights = [];

  // 前月比
  try {
    const r = await sql(`
      SELECT
        SUM(CASE WHEN substr(売上日,1,7) = strftime('%Y-%m', 'now') THEN 税込合計 ELSE 0 END) AS 今月,
        SUM(CASE WHEN substr(売上日,1,7) = strftime('%Y-%m', 'now', '-1 month') THEN 税込合計 ELSE 0 END) AS 前月
      FROM 売上伝票 WHERE 売上日 >= date('now', '-60 days')
    `);
    const d = r.results?.[0];
    if (d && d.前月) {
      const diff = d.今月 - d.前月;
      const pct = Math.round(diff * 100 / d.前月);
      const icon = pct >= 0 ? '📈' : '📉';
      insights.push(`${icon} <b>今月の売上は前月比 ${pct > 0 ? '+' : ''}${pct}%</b> (${yenShort(d.今月)} vs 前月 ${yenShort(d.前月)})`);
    }
  } catch(e) {}

  // TOP顧客集中度
  try {
    const r = await sql(`
      WITH tot AS (SELECT SUM(税込合計) AS s FROM 売上伝票 WHERE 売上日 >= date('now','-1 year')),
      top5 AS (SELECT SUM(税込合計) AS s FROM (
        SELECT 請求先ID, SUM(税込合計) AS 税込合計 FROM 売上伝票 WHERE 売上日 >= date('now','-1 year')
        GROUP BY 請求先ID ORDER BY 税込合計 DESC LIMIT 5
      ))
      SELECT ROUND(top5.s * 100.0 / tot.s, 1) AS pct FROM tot, top5
    `);
    const pct = r.results?.[0]?.pct;
    if (pct) insights.push(`🏆 <b>上位5得意先で売上の ${pct}%</b> を占めています（過去1年）`);
  } catch(e) {}

  // 仕入先ランキング
  try {
    const r = await sql(`
      SELECT s.仕入先名 AS name, SUM(p.税込合計) AS amt
      FROM 仕入伝票 p LEFT JOIN 仕入先マスタ s ON p.仕入先ID = s.id
      WHERE p.仕入日 >= date('now','-1 year')
      GROUP BY p.仕入先ID ORDER BY amt DESC LIMIT 1
    `);
    const top = r.results?.[0];
    if (top) insights.push(`🏭 <b>最大仕入先: ${esc(top.name)}</b> (${yenShort(top.amt)}/年)`);
  } catch(e) {}

  // 車両抽出成果
  try {
    const r = await sql(`SELECT COUNT(*) AS c FROM 車両マスタ`);
    const c = r.results?.[0]?.c || 0;
    insights.push(`🚚 <b>管理車両 ${c.toLocaleString()}台</b> — Notion時代は300件しか見えていませんでした`);
  } catch(e) {}

  // 今月の営業日
  try {
    const r = await sql(`
      SELECT COUNT(DISTINCT 売上日) AS 営業日 FROM 売上伝票
      WHERE substr(売上日,1,7) = strftime('%Y-%m', 'now')
    `);
    const d = r.results?.[0];
    if (d) insights.push(`📅 今月 <b>${d.営業日}営業日</b> 売上記録あり`);
  } catch(e) {}

  document.getElementById('insights').innerHTML = insights.map(i => `<div class="insight">${i}</div>`).join('');
}

async function loadAll() {
  document.querySelectorAll('.card').forEach(c => c.innerHTML = '<div class="loading"><div class="spinner"></div></div>');
  try {
    await Promise.all([
      loadHero(),
      loadMonthlyTrend(),
      loadCustomerRanking(),
      loadSizeRanking(),
      loadProfitAnalysis(),
      loadMakerRanking(),
      loadDormantCustomers(),
      loadHeatmap(),
      loadVehicleSummary(),
      loadPaymentStatus(),
      loadInsights(),
    ]);
  } catch(e) { console.error(e); }
}

// イベント
document.querySelectorAll('.action-btn').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.action-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentRange = b.dataset.range;
    loadAll();
  };
});

loadAll();
