<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>自動発注 | Tire Manager f.o.o</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #18181f; --s1: #101015; --s2: #1e1e26; --s3: #26262f;
  --border: #2c2c38; --border2: #3c3c4a;
  --text: #f0f0f2; --muted: #68687a;
  --accent: #f0a500; --accent2: #f5be40;
  --green: #22c55e; --red: #ef4444; --blue: #3b82f6;
  --yellow: #f59e0b; --purple: #a855f7;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #fdf6ee; --s1: #ffffff; --s2: #fdf0e4; --s3: #f5e6d4;
    --border: #e8d8c4; --border2: #d8c4a8;
    --text: #1a1208; --muted: #a08060;
    --accent: #e07000; --accent2: #c05800;
    --green: #1a9e4a; --red: #dc2626; --blue: #2563eb;
    --yellow: #d97706; --purple: #9333ea;
  }
}
[data-theme="dark"] {
  --bg: #18181f; --s1: #101015; --s2: #1e1e26; --s3: #26262f;
  --border: #2c2c38; --border2: #3c3c4a; --text: #f0f0f2; --muted: #68687a;
  --accent: #f0a500; --accent2: #f5be40; --green: #22c55e; --red: #ef4444;
  --blue: #3b82f6; --yellow: #f59e0b; --purple: #a855f7;
}
[data-theme="light"] {
  --bg: #fdf6ee; --s1: #ffffff; --s2: #fdf0e4; --s3: #f5e6d4;
  --border: #e8d8c4; --border2: #d8c4a8; --text: #1a1208; --muted: #a08060;
  --accent: #e07000; --accent2: #c05800; --green: #1a9e4a; --red: #dc2626;
  --blue: #2563eb; --yellow: #d97706; --purple: #9333ea;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans JP',sans-serif; min-height:100vh; max-width:480px; margin:0 auto; }

/* ── Header ── */
.header { background:var(--s1); border-bottom:0.5px solid var(--border); padding:14px 20px 10px; position:sticky; top:0; z-index:100; }
.header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:2px; }
.header-brand { font-size:10px; color:var(--muted); letter-spacing:0.12em; text-transform:uppercase; }
.header-title { font-size:17px; font-weight:900; letter-spacing:-0.02em; }
.header-title span { color:var(--accent); }

/* ── Nav ── */
.nav { display:flex; background:var(--s1); border-bottom:0.5px solid var(--border); }
.nav-btn { flex:1; padding:10px 4px 8px; background:transparent; border:none; border-bottom:2px solid transparent; color:var(--muted); font-size:11px; font-family:'Noto Sans JP',sans-serif; cursor:pointer; transition:all 0.15s; }
.nav-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

/* ── Page ── */
.page { display:none; padding-bottom:40px; }
.page.active { display:block; }
.content { padding:16px 16px 0; }

/* ── Summary ── */
.summary-bar { display:flex; gap:8px; margin-bottom:12px; }
.summ-card { flex:1; background:var(--s2); border:1px solid var(--border); border-radius:10px; padding:10px 8px; text-align:center; }
.summ-num { font-size:22px; font-weight:900; font-family:'DM Mono',monospace; line-height:1; }
.summ-lbl { font-size:9px; color:var(--muted); margin-top:3px; }

/* ── Notice ── */
.notice-box { background:rgba(245,158,11,0.08); border:1px solid rgba(245,158,11,0.3); border-radius:8px; padding:8px 12px; font-size:11px; color:var(--yellow); line-height:1.6; margin-bottom:12px; }

/* ── Section header ── */
.wh-section { display:flex; align-items:center; gap:8px; padding:10px 0 6px; font-size:10px; font-weight:700; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; border-top:0.5px solid var(--border); margin-top:4px; }
.wh-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

/* ── Alert card ── */
.alert-card { background:var(--s2); border:1px solid var(--border); border-radius:12px; margin-bottom:8px; overflow:hidden; cursor:pointer; transition:border-color 0.15s; }
.alert-card.critical { border-color:rgba(239,68,68,0.4); background:rgba(239,68,68,0.04); }
.alert-card.warning { border-color:rgba(245,158,11,0.35); background:rgba(245,158,11,0.04); }
.alert-card-inner { display:flex; align-items:center; gap:10px; padding:11px 12px; }
.alert-dot-big { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.alert-info { flex:1; min-width:0; }
.alert-pattern { font-size:14px; font-weight:700; font-family:'DM Mono',monospace; }
.alert-meta { font-size:13px; font-family:'DM Mono',monospace; color:var(--text); font-weight:700; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.alert-meta.sub { font-size:10px; font-family:'Noto Sans JP',sans-serif; color:var(--muted); }
.alert-stocks { display:flex; gap:0; flex-shrink:0; }
.st-cell { text-align:center; padding:0 8px; border-left:0.5px solid var(--border); }
.st-num { font-size:15px; font-weight:700; font-family:'DM Mono',monospace; line-height:1; }
.st-lbl { font-size:8px; color:var(--muted); margin-top:2px; }
.alert-bar { height:3px; }
.alert-bar-fill { height:100%; border-radius:0 0 0 0; transition:width 0.4s; }

/* ── Tags ── */
.tag { font-size:9px; font-weight:700; padding:2px 7px; border-radius:10px; display:inline-block; }
.tag-toyo { background:rgba(240,165,0,0.12); color:var(--accent); border:1px solid rgba(240,165,0,0.3); }
.tag-bs { background:rgba(59,130,246,0.12); color:var(--blue); border:1px solid rgba(59,130,246,0.25); }
.tag-cat { background:var(--s3); color:var(--muted); }

/* ── Buttons ── */
.btn-primary { width:100%; background:var(--accent); border:none; border-radius:10px; padding:14px; color:#fff; font-size:14px; font-weight:700; font-family:'Noto Sans JP',sans-serif; cursor:pointer; margin-top:10px; transition:opacity 0.15s; }
.btn-primary:disabled { opacity:0.4; cursor:default; }
.btn-secondary { width:100%; background:transparent; border:1.5px solid var(--border2); border-radius:10px; padding:12px; color:var(--text); font-size:14px; font-family:'Noto Sans JP',sans-serif; cursor:pointer; margin-top:6px; font-weight:500; }
.btn-danger { width:100%; background:transparent; border:1px solid var(--red); border-radius:10px; padding:11px; color:var(--red); font-size:13px; font-family:'Noto Sans JP',sans-serif; cursor:pointer; margin-top:6px; }

/* ── Loading ── */
.loading-wrap { text-align:center; padding:60px 20px; }
.spinner { width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { font-size:13px; color:var(--muted); }

/* ── Error ── */
.error-box { background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.25); border-radius:8px; padding:12px 14px; font-size:12px; color:var(--red); line-height:1.6; margin-bottom:12px; }

/* ── Order entries ── */
.order-section-head { display:flex; align-items:center; justify-content:space-between; padding:8px 0 5px; border-top:0.5px solid var(--border); margin-top:4px; }
.order-section-lbl { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; font-weight:700; }
.order-count-badge { font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px; }
.order-entry { background:var(--s2); border:1px solid var(--border); border-radius:10px; padding:10px 12px; margin-bottom:6px; display:flex; align-items:center; gap:10px; }
.order-entry.deselected { opacity:0.4; }
.order-checkbox { width:20px; height:20px; border-radius:5px; border:1.5px solid var(--accent); background:rgba(240,165,0,0.1); display:flex; align-items:center; justify-content:center; flex-shrink:0; cursor:pointer; }
.order-checkbox.off { border-color:var(--border2); background:transparent; }
.order-check-icon { width:11px; height:11px; background:var(--accent); border-radius:2px; }
.order-info { flex:1; min-width:0; }
.order-pattern { font-size:13px; font-weight:700; font-family:'DM Mono',monospace; }
.order-detail { font-size:13px; color:var(--text); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:700; font-family:'DM Mono',monospace; }
.qty-wrap { display:flex; align-items:center; gap:6px; }
.qty-btn { width:26px; height:26px; border-radius:6px; border:1px solid var(--border2); background:var(--s3); color:var(--text); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-family:'Noto Sans JP',sans-serif; flex-shrink:0; }
.qty-num { font-size:16px; font-weight:700; font-family:'DM Mono',monospace; color:var(--accent); width:30px; text-align:center; }

/* ── Supplier toggle ── */
.supplier-toggle { display:flex; gap:0; background:var(--s2); border:1px solid var(--border); border-radius:12px; padding:3px; margin-bottom:14px; }
.supplier-btn { flex:1; padding:10px 8px; border-radius:9px; border:none; font-size:12px; font-weight:700; font-family:'Noto Sans JP',sans-serif; cursor:pointer; transition:all 0.2s; background:transparent; color:var(--muted); display:flex; align-items:center; justify-content:center; gap:6px; }
.supplier-btn.active-toyo { background:rgba(240,165,0,0.15); color:var(--accent); box-shadow:0 1px 4px rgba(240,165,0,0.15); }
.supplier-btn.active-bs { background:rgba(59,130,246,0.15); color:var(--blue); box-shadow:0 1px 4px rgba(59,130,246,0.15); }
.supplier-btn .sup-count { font-size:10px; font-weight:700; padding:1px 6px; border-radius:8px; background:rgba(255,255,255,0.1); }
.supplier-btn.active-toyo .sup-count { background:rgba(240,165,0,0.2); }
.supplier-btn.active-bs .sup-count { background:rgba(59,130,246,0.2); }

/* ── PDF options ── */
.pdf-options { display:flex; gap:8px; margin-bottom:12px; }
.pdf-opt-btn { flex:1; padding:11px 8px; border-radius:10px; font-size:12px; font-weight:700; font-family:'Noto Sans JP',sans-serif; cursor:pointer; transition:all 0.15s; }
.pdf-opt-toyo { background:rgba(240,165,0,0.1); border:1.5px solid var(--accent); color:var(--accent); }
.pdf-opt-history { background:var(--s2); border:1.5px solid var(--border2); color:var(--muted); }

/* ── Success box ── */
.success-box { background:rgba(34,197,94,0.07); border:1px solid rgba(34,197,94,0.25); border-radius:10px; padding:12px 14px; font-size:12px; color:var(--green); line-height:1.7; margin-bottom:10px; }

/* ── History ── */
.history-row { background:var(--s2); border:1px solid var(--border); border-radius:10px; padding:10px 12px; margin-bottom:6px; }
.history-row-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
.history-date { font-size:11px; color:var(--muted); }
.history-status { font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px; }
.st-new { background:rgba(245,158,11,0.12); color:var(--yellow); }
.st-ordered { background:rgba(240,165,0,0.12); color:var(--accent); }
.st-done { background:rgba(34,197,94,0.12); color:var(--green); }
.st-cancel { background:rgba(239,68,68,0.1); color:var(--red); }
.history-row-body { font-size:12px; color:var(--text); }
.history-row-meta { font-size:10px; color:var(--muted); margin-top:3px; }

/* ── Delivery fields ── */
.delivery-fields { background:var(--s2); border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:12px; }
.df-row { display:flex; gap:10px; margin-bottom:8px; }
.df-row:last-child { margin-bottom:0; }
.df-field { flex:1; }
.df-label { font-size:10px; color:var(--muted); margin-bottom:4px; letter-spacing:0.04em; }
.df-input, .df-select { width:100%; background:var(--s3); border:1px solid var(--border2); border-radius:7px; padding:8px 10px; font-size:13px; font-family:'Noto Sans JP',sans-serif; color:var(--text); outline:none; transition:border-color 0.15s; }
.df-input:focus, .df-select:focus { border-color:var(--accent); }
.df-input::placeholder { color:var(--muted); }
.df-select { appearance:none; }

/* ── Divider ── */
.divider { height:0.5px; background:var(--border); margin:10px 0; }

/* ──────────────────────────────────────
   印刷用スタイル（発注書PDF）
─────────────────────────────────────── */
@media print {
  body { background:#fff !important; color:#000 !important; font-family:'Noto Sans JP',sans-serif !important; max-width:none !important; }
  #main-app { display:none !important; }
  #print-sheet { display:block !important; }
}
#print-sheet { display:none; }

.print-page { padding:24mm 20mm; min-height:100vh; background:#fff; color:#000; }
.print-header { border-bottom:2px solid #e07000; padding-bottom:10px; margin-bottom:16px; display:flex; justify-content:space-between; align-items:flex-end; }
.print-company { font-size:11px; color:#666; margin-bottom:4px; }
.print-title { font-size:22px; font-weight:900; color:#e07000; letter-spacing:-0.02em; }
.print-date { font-size:11px; color:#666; text-align:right; }
.print-to-section { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
.print-to-block { }
.print-to-label { font-size:9px; color:#888; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:3px; }
.print-to-val { font-size:14px; font-weight:700; }
.print-meta-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
.print-meta-item { background:#f8f3ee; border-radius:6px; padding:8px 10px; }
.print-meta-label { font-size:9px; color:#888; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:2px; }
.print-meta-val { font-size:13px; font-weight:700; }
.print-table { width:100%; border-collapse:collapse; margin-bottom:12px; }
.print-table thead tr { background:#e07000; color:#fff; }
.print-table th { padding:7px 10px; font-size:11px; font-weight:700; text-align:left; letter-spacing:0.04em; }
.print-table tbody tr:nth-child(even) { background:#fdf6ee; }
.print-table td { padding:8px 10px; font-size:12px; border-bottom:0.5px solid #e8d8c4; }
.print-table td.mono { font-family:'DM Mono',monospace; }
.print-table td.qty-col { text-align:right; font-weight:700; color:#e07000; font-family:'DM Mono',monospace; }
.print-table tfoot tr { background:#fdf0e4; }
.print-table tfoot td { padding:8px 10px; font-size:13px; font-weight:700; }
.print-total-row td:last-child { color:#e07000; font-size:16px; font-family:'DM Mono',monospace; }
.print-footer { border-top:0.5px solid #e8d8c4; padding-top:10px; margin-top:16px; display:flex; justify-content:space-between; align-items:flex-end; }
.print-footer-note { font-size:10px; color:#888; line-height:1.6; }
.print-sign-area { text-align:right; }
.print-sign-label { font-size:9px; color:#888; margin-bottom:20px; }
.print-sign-line { width:120px; height:1px; background:#ccc; margin-left:auto; }
.print-notice { background:#fef3cd; border:1px solid #e07000; border-radius:6px; padding:8px 12px; font-size:10px; color:#7a4000; line-height:1.7; margin-bottom:12px; }
</style>
<script>
(function(){
  const t = localStorage.getItem('foo_portal_theme') || 'auto';
  if (t !== 'auto') document.documentElement.setAttribute('data-theme', t);
})();
</script>
</head>
<body>
<!-- ══ 発注プレビューオーバーレイ（静的DOM）══ -->
<div id="order-preview-overlay" style="display:none;position:fixed;inset:0;z-index:9999;background:var(--bg);flex-direction:column;">
  <!-- ヘッダー -->
  <div style="background:var(--s1);border-bottom:0.5px solid var(--border);padding:13px 16px;display:flex;align-items:flex-start;gap:10px;flex-shrink:0;">
    <button id="opo-back-btn" onclick="closeOrderPreviewOverlay()" style="background:transparent;border:none;color:var(--accent);font-size:22px;cursor:pointer;line-height:1;padding:0 4px;font-family:inherit;flex-shrink:0;margin-top:2px;">‹</button>
    <div style="flex:1;min-width:0;">
      <div id="opo-title" style="font-size:14px;font-weight:900;">発注書プレビュー</div>
      <div id="opo-subtitle" style="font-size:11px;color:var(--muted);margin-top:1px;"></div>
      <div style="display:flex;align-items:center;gap:4px;margin-top:6px;">
        <input id="pdf-filename-input" type="text" value=""
          style="flex:1;min-width:0;background:var(--s3);border:1px solid var(--border2);border-radius:6px;
                 padding:5px 8px;font-size:10px;color:var(--text);font-family:'DM Mono',monospace;outline:none;box-sizing:border-box;">
        <span style="font-size:10px;color:var(--muted);flex-shrink:0;">.pdf</span>
      </div>
    </div>
  </div>
  <!-- プレビュー -->
  <iframe id="order-preview-frame" style="flex:1;min-height:0;border:none;width:100%;background:#fff;" title="発注書プレビュー"></iframe>
  <!-- フッター -->
  <div style="background:var(--s1);border-top:0.5px solid var(--border);padding:12px 16px;flex-shrink:0;position:relative;z-index:10000;">
    <div id="order-preview-error"></div>
    <div style="display:flex;gap:8px;margin-bottom:8px;">
      <button id="order-confirm-btn" onclick="confirmAndSaveOrder()" style="flex:3;background:var(--green);border:none;border-radius:10px;padding:13px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:0.02em;">
        発注確定 → Notion保存
      </button>
      <button id="opo-cancel-btn" onclick="closeOrderPreviewOverlay()" style="flex:1;background:transparent;border:1.5px solid var(--border2);border-radius:10px;padding:13px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">
        修正
      </button>
    </div>
    <button id="opo-print-btn" onclick="printOrderPreview()" style="width:100%;background:var(--s3);border:1px solid var(--border2);border-radius:8px;padding:9px;color:var(--text);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;">
      🖨️ PDF保存
    </button>
  </div>
</div>


<!-- ── 印刷用発注書（画面には非表示、印刷時のみ表示） ── -->
<div id="print-sheet">
  <div class="print-page" id="print-content">
    <!-- JS で動的生成 -->
  </div>
</div>

<!-- ── メインアプリ ── -->
<div id="main-app">
  <div class="header">
    <div class="header-top">
      <div class="header-brand">Tire Manager f.o.o</div>
      <a href="https://mitsurumukaihata.github.io/foo-portal/" style="display:flex;align-items:center;gap:4px;color:var(--accent);font-size:14px;font-weight:700;text-decoration:none;padding:4px 0;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        ポータル
      </a>
    </div>
    <div class="header-title">自動<span>発注</span></div>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="switchTab('alert')">在庫アラート</button>
    <button class="nav-btn" onclick="switchTab('order')">発注確認</button>
    <button class="nav-btn" onclick="switchTab('history')">発注履歴</button>
    <button class="nav-btn" onclick="switchTab('threshold')">しきい値</button>
  </div>

  <!-- 在庫アラートページ -->
  <div class="page active" id="page-alert">
    <div class="content" id="alert-content">
      <div class="loading-wrap">
        <div class="spinner"></div>
        <div class="loading-text">読み込み中…</div>
      </div>
    </div>
  </div>

  <!-- 発注確認ページ -->
  <div class="page" id="page-order">
    <div class="content">
      <div style="padding:8px 0 4px;">
        <div style="font-size:9px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;">発注内容の確認・調整</div>
      </div>

      <!-- 担当者・希望納期 -->
      <div class="delivery-fields">
        <div class="df-row">
          <div class="df-field">
            <div class="df-label">担当者</div>
            <select class="df-select" id="order-tantou">
              <option value="">選択してください</option>
              <option value="向畑 充">向畑 充</option>
              <option value="岡崎 由美">岡崎 由美</option>
              <option value="矢島 明和">矢島 明和</option>
              <option value="大田 健">大田 健</option>
              <option value="中川 颯">中川 颯</option>
            </select>
          </div>

// keyを安全なDOM IDに変換（btoa非対応文字の回避）
function keyToSafeId(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(31, h) + str.charCodeAt(i) | 0;
  }
  return 'k' + Math.abs(h).toString(36);
}

// 発注管理表から未入荷（発注済・発注中・新規発注）のレコードを取得し、パターン|サイズ|倉庫→合計数量のマップを返す
async function fetchInFlightOrders() {
  const map = {}; // "パターン|サイズ|倉庫短" → 合計数量
  try {
    let hasMore = true;
    let cursor = undefined;
    while (hasMore) {
      const body = {
        filter: { or: [
          { property: 'ステータス', select: { equals: '発注済' } },
          { property: 'ステータス', select: { equals: '新規発注' } },
        ]},
        page_size: 100,
      };
      if (cursor) body.start_cursor = cursor;
      const res = await notionAPI('POST', `/databases/${HACCHU_DB}/query`, body);
      (res.results || []).forEach(page => {
        const p = page.properties;
        const pattern   = p['パターン']?.select?.name || '';
        const size      = p['サイズ']?.select?.name || '';
        const warehouse = p['納入予定場所']?.select?.name || '';
        const qty       = p['数量']?.number || 0;
        if (pattern && size && warehouse && qty > 0) {
          const key = `${pattern}|${size}|${warehouse}`;
          map[key] = (map[key] || 0) + qty;
        }
      });
      hasMore = res.has_more;
      cursor = res.next_cursor;
    }
  } catch(e) {
    console.warn('発注中データ取得失敗（アラートには影響なし）:', e);
  }
  return map;
}

async function loadAlerts() {
  const el = document.getElementById('alert-content');
  el.innerHTML = '<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">在庫データを取得中…</div></div>';
  await new Promise(r => setTimeout(r, 30));

  try {
    // しきい値DBから全データ取得（しきい値タブ用にsnapshotCacheも保持）
    snapshotCache = await fetchAllSnapshotsWithThreshold();

    // しきい値が1件もDBに設定されていない場合→初回マイグレーション
    const hasAnyThreshold = Object.values(snapshotCache).some(s => s.threshold > 0);
    if (!hasAnyThreshold) {
      el.innerHTML = '<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">初回設定中… しきい値をDBに書き込んでいます</div></div>';
      await migrateDefaultThresholds(snapshotCache);
      snapshotCache = await fetchAllSnapshotsWithThreshold();
      return loadAlerts();
    }

    // しきい値が設定されているカテゴリを特定
    const catsNeeded = new Set();
    for (const [key, snap] of Object.entries(snapshotCache)) {
      if (snap.threshold > 0) catsNeeded.add(key.split('|')[0]);
    }

    // 各カテゴリからリアルタイム在庫を取得
    el.innerHTML = '<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">リアルタイム在庫を計算中…</div></div>';
    const realStockMap = {};
    for (const cat of catsNeeded) {
      const dbInfo = CAT_DB_MAP[cat];
      if (!dbInfo) continue;
      const stockDbId = dbInfo.stockId || dbInfo.id;
      const kurikoshiDate = await getKurikoshiDate(stockDbId);
      const catStockMap = {};
      await fetchStockForCat(cat, dbInfo, catStockMap, kurikoshiDate);
      for (const [k, v] of Object.entries(catStockMap)) {
        realStockMap[`${cat}|${k}`] = v;
      }
    }

    // 発注管理表から「発注中」「新規発注」の数量を取得（二重発注防止）
    const inFlightMap = await fetchInFlightOrders();

    // アラート判定（リアルタイム在庫 vs しきい値）
    const allItems = [];
    for (const [key, snap] of Object.entries(snapshotCache)) {
      const threshold = snap.threshold;
      if (!threshold || threshold <= 0) continue;

      const [cat, pattern, size, warehouse] = key.split('|');
      const stockData = realStockMap[key];
      const realStock = stockData?.actual ?? 0;
      const prepQty   = stockData?.prepQty ?? 0;

      if (realStock >= threshold) continue;

      const shortWh = warehouse === '五日市倉庫' ? '五日市' : '志和';
      const inFlightKey = `${pattern}|${size}|${shortWh}`;
      const inFlight = inFlightMap[inFlightKey] || 0;
      const needed = threshold - realStock - inFlight;
      if (needed <= 0) continue;

      const maker = guessMaker(pattern);
      allItems.push({
        pageId: snap.pageId,
        kijunId: key,
        pattern, size, category: cat, warehouse,
        threshold, realStock,
        actualStock: realStock, prepQty, orderInFlight: inFlight,
        orderQty: needed,
        selected: needed > 0 && SUPPLIER_CONFIG[currentSupplier].makerKeys.includes(maker),
        maker,
      });
    }

    alertItems = allItems;
    window._skippedCats = [];
    renderAlertPage();
    renderOrderPage();

  } catch(e) {
    el.innerHTML = `<div class="content"><div class="error-box">エラーが発生しました<br><small>${e.message}</small></div><button class="btn-secondary" style="margin-top:8px;" onclick="loadAlerts()">再試行</button></div>`;
  }
}

// デフォルトしきい値をDBに一括書き込み（初回のみ）
async function migrateDefaultThresholds(snapMap) {
  const tasks = DEFAULT_THRESHOLDS.map(row => {
    const key = `${row.cat}|${row.pattern}|${row.size}|${row.warehouse}`;
    const snap = snapMap[key];
    if (!snap || !snap.pageId) return null;
    return notionAPI('PATCH', `/pages/${snap.pageId}`, {
      properties: { 'しきい値': { number: row.threshold } }
    }).catch(() => null);
  }).filter(Boolean);
  await Promise.all(tasks);
}

// スナップショットDBから全レコードを取得（在庫数＋しきい値＋ページID）
// 戻り値: { "カテゴリ|パターン|サイズ|倉庫": {pageId, stock, threshold} }
async function fetchAllSnapshotsWithThreshold() {
  const map = {};
  let cursor;
  let pageNum = 0;
  while (pageNum < 10) {
    pageNum++;
    const body = { page_size: 100 };
    if (cursor) body.start_cursor = cursor;
    const res = await notionAPI('POST', `/databases/${SNAPSHOT_DB}/query`, body);
    if (res.object === 'error') throw new Error('スナップショット取得エラー: ' + res.message);
    for (const page of res.results) {
      const p = page.properties;
      const catName   = p['カテゴリ']?.select?.name || '';
      const pattern   = p['パターン名']?.rich_text?.[0]?.plain_text || '';
      const size      = p['サイズコード']?.rich_text?.[0]?.plain_text || '';
      const warehouse = p['倉庫']?.select?.name || '';
      const stock     = p['在庫数']?.number ?? 0;
      const threshold = p['しきい値']?.number ?? 0;
      if (catName && pattern && size && warehouse) {
        map[`${catName}|${pattern}|${size}|${warehouse}`] = {
          pageId: page.id, stock, threshold
        };
      }
    }
    if (!res.has_more) break;
    cursor = res.next_cursor;
  }
  return map;
}

// 後方互換（updateSnapshot等で使用）
async function fetchAllSnapshots() {
  const full = await fetchAllSnapshotsWithThreshold();
  const map = {};
  for (const [k,v] of Object.entries(full)) map[k] = v.stock;
  return map;
}


async function fetchKijunForCat(catName, kijunDbId) {
  // 1時間キャッシュ
  const cacheKey = 'kijun_cache_' + kijunDbId;
  try {
    const cached = JSON.parse(localStorage.getItem(cacheKey) || 'null');
    if (cached && cached.ts && Date.now() - cached.ts < 3600000) {
      return cached.rows;
    }
  } catch(e) {}
  try {
    const res = await notionAPI('POST', `/databases/${kijunDbId}/query`, { page_size: 100 });
    if (res.object === 'error') {
      console.warn('[' + catName + '] スキップ: ' + res.message);
      return [];
    }
    const rows = (res.results || []).map(page => {
      const p = page.properties;
      return {
        id: page.id,
        pattern: p['パターン名']?.select?.name || '',
        size: p['サイズコード']?.rich_text?.[0]?.plain_text || '',
        warehouse: p['倉庫']?.select?.name || '',
        threshold: p['しきい値']?.number ?? 0,
      };
    }).filter(r => r.pattern && r.size && r.threshold > 0
                && (r.warehouse === '五日市倉庫' || r.warehouse === '志和倉庫'));
    try { localStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), rows })); } catch(e) {}
    return rows;
  } catch(e) {
    console.warn('[' + catName + '] スキップ: ' + e.message);
    return [];
  }
}

async function fetchStockForCat(cat, dbInfo, stockMap, kurikoshiDate) {
  const info = dbInfo || CAT_DB_MAP[cat];
  if (!info) return;
  const stockDbId = info.stockId || info.id;

  const warehouseField = info.wField;
  const whFilter = {
    or: [
      { property: warehouseField, select: { equals: '五日市倉庫' } },
      { property: warehouseField, select: { equals: '志和倉庫' } },
      { property: '区分', select: { equals: '発注中' } },
    ]
  };
  // 繰越ベースラインには準備・発注中は含まれない（二重計上防止のため）。
  // そのため準備・発注中レコードは日付に関係なく常に取得する必要がある。
  const filter = kurikoshiDate
    ? { and: [ whFilter, { or: [
        { timestamp: 'created_time', created_time: { on_or_after: kurikoshiDate } },
        { property: '区分', select: { equals: '発注中' } },
        { property: '区分', select: { equals: '準備' } }
      ]}]}
    : whFilter;

  let all = [], cursor;
  let pageNum = 0;
  while (pageNum < 20) {
    pageNum++;
    const body = { filter, page_size: 100 };
    if (cursor) body.start_cursor = cursor;
    const res = await notionAPI('POST', `/databases/${stockDbId}/query`, body);
    if (res.object === 'error') throw new Error(res.message);
    all = all.concat(res.results);
    if (!res.has_more) break;
    cursor = res.next_cursor;
  }

  all.forEach(r => {
    const p = r.properties;
    const pattern = p['パターン名']?.select?.name || '';
    const size = p['サイズコード']?.select?.name || '';
    const qty = p['数量']?.number || 0;
    const kubun = p['区分']?.select?.name || '';
    if (!pattern || !size) return;

    if (kubun === '発注中') {
      const allKey = `${pattern}|${size}|__order__`;
      if (!stockMap[allKey]) stockMap[allKey] = 0;
      stockMap[allKey] += qty;
      return;
    }

    const warehouse = p[info.wField]?.select?.name || '';
    if (!warehouse) return;
    const key = `${pattern}|${size}|${warehouse}`;
    if (!stockMap[key]) stockMap[key] = { actual: 0, prepQty: 0 };

    const sign = KUBUN_SIGN[kubun] || 0;
    stockMap[key].actual += sign * qty;
    if (kubun === '準備') stockMap[key].prepQty += qty;
  });
}

function guessMaker(pattern) {
  const p = (pattern || '').toUpperCase();
  // BS系: Wシリーズ, Rシリーズ, G539, 及び BS専用Mパターン
  const BS_PATTERNS = new Set(['M888','M899','M801','M746','M804','R225','R241','G539','W910','W900S','W911','W970','W999','R207','W989','LV01','K370','R710','V600','W300']);
  if (BS_PATTERNS.has(pattern)) return 'BS';
  if (p.startsWith('W') || p.startsWith('G539') || (p.startsWith('R') && !p.startsWith('RT'))) return 'BS';
  if (p.startsWith('RT')) return 'BS'; // 再生タイヤ
  if (['LT01','SV01','VAN01','SPLT50','SPLT21','SPLT22'].includes(p) || p.startsWith('SP')) return 'DUNLOP';
  if (pattern === 'XJE4' || pattern === 'XDW') return 'MICHELIN';
  return 'TOYO';
}

function switchSupplier(sup) {
  if (sup === currentSupplier) return;

  renderAlertPage();
  renderOrderPage();
}

    <div class="summ-card"><div class="summ-num" style="color:var(--yellow);">${warning}</div><div class="summ-lbl">不足</div></div>
    <div class="summ-card"><div class="summ-num" style="color:${supColor};">${activeCount}</div><div class="summ-lbl">${cfg.label}要発注</div></div>

    html += '<div style="text-align:center;padding:48px 0;color:var(--muted);font-size:14px;">在庫基準を満たしています ✓</div>';
    html += '</div>';
    el.innerHTML = html;
    return;
  }

  html += `<div class="notice-box">準備中・発注中の在庫も加味した<strong style="color:var(--yellow);">実質在庫</strong>で判定しています</div>`;

  // スキップされたカテゴリの警告

    html += `<div class="notice-box" style="border-color:rgba(239,68,68,0.4);color:var(--red);">⚠️ 取得できなかったカテゴリ: ${window._skippedCats.join(' / ')}<br><small style="opacity:0.8;">Notionの接続設定を確認してください</small></div>`;
  }

  // 倉庫別グルーピング（選択中の仕入先でフィルター）

    const items = alertItems.filter(i => i.warehouse === wh && isCurrentSupplierItem(i));
    if (!items.length) return;

    html += `<div class="wh-section"><div class="wh-dot" style="background:${dotColor};"></div>${wh}</div>`;

    items.sort((a,b) => (a.realStock/a.threshold) - (b.realStock/b.threshold));
    items.forEach(item => {
      const pct = Math.round((item.realStock / item.threshold) * 100);
      const cls = item.realStock === 0 ? 'critical' : 'warning';
      const dotColor2 = item.realStock === 0 ? 'var(--red)' : 'var(--yellow)';
      const numColor  = item.realStock === 0 ? 'color:var(--red)' : 'color:var(--yellow)';
      const barColor  = item.realStock === 0 ? 'var(--red)' : 'var(--yellow)';
      const makerTag  = item.maker === 'TOYO'

        : item.maker === 'BS'
        ? `<span class="tag tag-bs">BS</span>`
        : `<span class="tag tag-cat">${item.maker}</span>`;

      let stockInfo = `実在庫 ${item.actualStock}本`;
      if (item.prepQty > 0) stockInfo += `（うち準備中 ${item.prepQty}本）`;
      if (item.orderInFlight > 0) stockInfo += ` + 発注中 ${item.orderInFlight}本入荷予定`;

      const globalIdx = alertItems.indexOf(item);
      const checked = item._skipChecked ? 'checked' : '';

        <div class="alert-card-inner" onclick="showItemHistory(${globalIdx})">
          <div class="alert-dot-big" style="background:${dotColor2};"></div>
          <div class="alert-info">
            <div class="alert-pattern">${item.pattern} &nbsp;${makerTag}</div>
            <div class="alert-meta">${item.size}</div>
            <div class="alert-meta sub">${item.category} ／ ${stockInfo}</div>
          </div>
          <div class="alert-stocks">
            <div class="st-cell">
              <div class="st-num" style="${numColor}">${item.realStock}</div>
              <div class="st-lbl">実質在庫</div>
            </div>
            <div class="st-cell">
              <div class="st-num" style="color:var(--muted);">${item.threshold}</div>
              <div class="st-lbl">しきい値</div>
            </div>
          </div>
        </div>

          </label>
          <div style="font-size:10px;color:var(--muted);">タップで履歴 ›</div>
        </div>
      </div>`;
    });

  // 「発注書なしで発注済にする」ボタン
  const skipItems = alertItems.filter(i => i._skipChecked);
  if (skipItems.length > 0) {
    html += `<button class="btn-primary" onclick="submitSkipOrders()" style="background:var(--orange,#e67e22);margin-bottom:8px;">
      ✓ チェック済み ${skipItems.length}品目 を発注済にする（発注書なし）
    </button>`;
  }

  const supItems = alertItems.filter(i => isCurrentSupplierItem(i) && i.orderQty > 0);
  const supBtnColor = currentSupplier === 'BS' ? 'background:var(--blue);' : '';
  html += `<button class="btn-primary" onclick="goToOrderTab()" style="${supBtnColor}" ${supItems.length ? '' : 'disabled'}>
    ${cfg.label} 発注対象 ${supItems.length}品目 を確認する →
  </button>`;
  html += '<div style="height:16px;"></div>';
  html += '</div>';
  el.innerHTML = html;
}

  alertItems[idx].selected = !alertItems[idx].selected;

function changeQty(idx, delta) {
  alertItems[idx].orderQty = Math.max(1, alertItems[idx].orderQty + delta);
  const el = document.getElementById(`qty-${idx}`);
  if (el) el.textContent = alertItems[idx].orderQty;
}

async function submitSkipOrders() {
  const items = alertItems.filter(i => i._skipChecked);
  if (!items.length) return;
  if (!confirm(`${items.length}品目を「発注済」にします（発注書なし）。\nよろしいですか？`)) return;

  // ボタンを無効化
  const btns = document.querySelectorAll('.btn-primary');
  btns.forEach(b => b.disabled = true);

  try {
    const today = new Date().toISOString().split('T')[0];
    const creator = (currentUser || '向畑　充').replace(/ /g,'　');

    // 1. 発注管理表にレコード作成（ステータス=発注済、注文方法=口頭 等）
    await Promise.all(items.map(item => {
      const titleText = `${item.pattern} ${item.size} ${item.warehouse}`;
      const props = {
        'タイヤサイズ': { title: [{ text: { content: titleText } }] },
        'パターン':     { select: { name: item.pattern } },
        'サイズ':       { select: { name: item.size } },
        '数量':         { number: item.orderQty },
        '仕入先':       { select: { name: SUPPLIER_CONFIG[item.maker === 'TOYO' ? 'TOYO' : 'BS']?.notionName || item.maker } },
        'タイヤメーカー': { select: { name: ({'BS':'BRIDGESTONE','TOYO':'TOYO','DUNLOP':'DUNLOP','MICHELIN':'MICHELIN'})[item.maker] || item.maker } },
        '種別':         { select: { name: 'タイヤ' } },
        'ステータス':   { select: { name: '発注済' } },
        '納入予定場所': { select: { name: item.warehouse === '五日市倉庫' ? '五日市' : '志和' } },
        '注文担当':     { select: { name: creator.includes('岡崎') ? '岡崎' : '向畑' } },
        '発注日':       { date: { start: today } },
        'サイズコード': { rich_text: [{ text: { content: item.size } }] },
        '備考欄':       { rich_text: [{ text: { content: '発注書なし（アラートから直接発注済）' } }] },
      };
      return notionAPI('POST', '/pages', { parent: { database_id: HACCHU_DB }, properties: props })
        .catch(e => { console.error('発注済レコード作成失敗:', item.pattern, e.message); return null; });
    }));

    // 2. 在庫DBに「発注中」レコード作成（foo-common.js 共通関数使用）
    const stockBatchItems = items.map(item => ({
      category:  item.category,
      size:      item.size,
      pattern:   item.pattern,
      warehouse: item.warehouse,
      qty:       item.orderQty,
      creator:   '自動取込',
    }));
    const stockResult = await fooCreateStockOrdersBatch(stockBatchItems);
    if (stockResult.errors.length) {
      console.warn('在庫DB発注中レコード作成エラー:', stockResult.errors);
      alert('⚠ 在庫DB「発注中」の一部登録に失敗:\n' + stockResult.errors.join('\n'));
    }

    // 3. アラートリストから除外して再描画
    alertItems = alertItems.filter(i => !items.includes(i));
    renderAlertPage();
    renderOrderPage();

    // 成功メッセージ
    const el = document.getElementById('alert-content');
    const msgDiv = document.createElement('div');
    msgDiv.className = 'success-box';
    const stockOk = stockResult.ok;
    const stockMsg = stockResult.errors.length ? `（⚠ 在庫DB: ${stockOk}/${items.length}件成功）` : '（在庫DB発注中も登録済）';
    msgDiv.style.cssText = 'margin:8px 0;padding:10px 14px;background:var(--green-dim,#e8f5e9);border:1px solid var(--green,#4caf50);border-radius:10px;font-size:13px;color:var(--green,#2e7d32);';
    msgDiv.textContent = `✓ ${items.length}品目を「発注済」にしました（発注書なし）${stockMsg}`;
    el.prepend(msgDiv);
    setTimeout(() => msgDiv.remove(), 8000);

  } catch(e) {
    alert('エラー: ' + e.message);
  } finally {
    const btns2 = document.querySelectorAll('.btn-primary');
    btns2.forEach(b => b.disabled = false);
  }
}

  try {
    const iframeDoc = frame.contentDocument || frame.contentWindow?.document;
    const htmlContent = iframeDoc?.documentElement?.outerHTML || '';
    if (htmlContent) {
      const printWin = window.open('', '_blank');
      if (printWin) {
        printWin.document.write(htmlContent);
        printWin.document.close();
        printWin.document.title = fname;
        printWin.onafterprint = () => printWin.close();
        setTimeout(() => { printWin.focus(); printWin.print(); }, 300);
        return;
      }
    }
  } catch(e) { console.warn('新ウィンドウprint失敗、iframe fallback:', e); }
  // fallback: iframe直接print
  frame.contentWindow?.focus();
  frame.contentWindow?.print();
}

async function confirmAndSaveOrder() {

  if (!pending) return;
  const { selectedItems, tantou, nouki, biko, method } = pending;

  const btn = document.getElementById('inline-confirm-btn') || document.getElementById('order-confirm-btn');
  if (btn) { btn.disabled = true; btn.textContent = '保存中…'; }
  const errEl = document.getElementById('inline-order-error') || document.getElementById('order-preview-error');

  try {
    const createdPages = await createHacchuRecords(selectedItems, tantou, nouki, biko, method);
    // 発注書（送付用）DBにもレコードを作成 → 発注書未発行バッジを解消
    const pageIds = createdPages.filter(p => p && p.id).map(p => p.id);
    if (pageIds.length > 0) {
      const supName = SUPPLIER_CONFIG[currentSupplier]?.notionName || 'TOYO';
      await createHacchuSheetRecord(pageIds, supName);
    }

    // 3) 各在庫DBに「発注中」レコードを作成（foo-common.js 共通関数使用）
    const stockDbBatch = selectedItems.map(item => ({
      category:  item.category,
      size:      item.size,
      pattern:   item.pattern,
      warehouse: item.warehouse,
      qty:       item.orderQty,
      creator:   '自動取込',
    }));
    const stockDbResult = await fooCreateStockOrdersBatch(stockDbBatch);
    if (stockDbResult.errors.length) {
      console.warn('在庫DB発注中レコード作成エラー:', stockDbResult.errors);
      alert('⚠ 在庫DB「発注中」の一部登録に失敗:\n' + stockDbResult.errors.join('\n'));
    }
    console.log(`在庫DB「発注中」レコード ${stockDbResult.ok}/${stockDbBatch.length}件 作成完了`);

    // オーバーレイを閉じる（開いている場合）
    const overlay = document.getElementById('order-preview-overlay');
    if (overlay) overlay.style.display = 'none';
    window.removeEventListener('popstate', _onPopStateOrder);

    // プレビューを隠してボタンを戻す
    document.getElementById('order-pdf-preview').style.display = 'none';
    document.getElementById('order-normal-btns').style.display = 'none';

    // 発注済みアイテムをリストから除外（二重発注防止）
    alertItems = alertItems.filter(i => !selectedItems.includes(i));
    window._pendingOrder = null;

    // 発注確認タブの表示を更新
    const actEl = document.getElementById('order-actions');
    actEl.innerHTML = `<div class="success-box">
      ✓ ${selectedItems.length}件 を「発注済」としてNotionに保存しました
    </div>
    <button class="btn-secondary" onclick="switchTab('history');loadHistory();">発注履歴を確認する</button>
    <button class="btn-secondary" onclick="loadAlerts();">在庫アラートを再チェック</button>`;

    // 在庫アラートと発注確認ページを再描画
    renderAlertPage();
    renderOrderPage();

  } catch(e) {
    if (errEl) errEl.innerHTML = `<div class="error-box" style="margin-bottom:8px;">エラー：${e.message}</div>`;
    if (btn) { btn.disabled = false; btn.textContent = 'この内容で発注確定 → Notionに保存する'; }
  }
}

async function createHacchuRecords(items, tantou, nouki, biko, method) {
  method = method || '自動';
  // 並列で作成 → 各レスポンス(ページ)を返す
  const pages = await Promise.all(items.map(item => {
    const warehouseLabel = item.warehouse === '五日市倉庫' ? '五日市' : '志和';
    const titleText = `${item.pattern} ${item.size} ${item.warehouse}`;
    const props = {
      'タイヤサイズ': { title: [{ text: { content: titleText } }] },
      'パターン':     { select: { name: item.pattern } },
      'サイズ':       { select: { name: item.size } },
      '数量':         { number: item.orderQty },
      '仕入先':       { select: { name: SUPPLIER_CONFIG[item.maker === 'TOYO' ? 'TOYO' : 'BS']?.notionName || item.maker } },
      'タイヤメーカー': { select: { name: ({'BS':'BRIDGESTONE','TOYO':'TOYO','DUNLOP':'DUNLOP','MICHELIN':'MICHELIN'})[item.maker] || item.maker } },
      '種別':         { select: { name: 'タイヤ' } },
      'ステータス':   { select: { name: '発注済' } },
      '納入予定場所': { select: { name: warehouseLabel } },
      '注文担当':     { select: { name: tantou.includes('岡崎') ? '岡崎' : '向畑' } },
      '発注日':       { date: { start: new Date().toISOString().split('T')[0] } },
    };
    if (nouki) props['納期予定日'] = { date: { start: nouki } };
    if (biko)  props['備考欄'] = { rich_text: [{ text: { content: biko } }] };
    props['サイズコード'] = { rich_text: [{ text: { content: item.size } }] };
    // 注文方法チェックボックス
    if (method === '電話') props['電話注文済'] = { checkbox: true };
    if (method === '口頭') props['口頭注文済'] = { checkbox: true };
    return notionAPI('POST', '/pages', { parent: { database_id: HACCHU_DB }, properties: props });
  }));
  return pages; // 作成されたページ情報を返す
}

// 発注書（送付用）DBにレコードを作成し、発注行をリレーションで紐づける
async function createHacchuSheetRecord(pageIds, supplierName) {
  const today = new Date().toISOString().split('T')[0];
  const sheetName = `自動発注_${supplierName}_${today}`;
  const props = {
    '発注書名': { title: [{ text: { content: sheetName } }] },
    '仕入先':   { select: { name: supplierName } },
    '作成日':   { date: { start: today } },
    '発注行 1': { relation: pageIds.map(id => ({ id })) },
    '送付確認': { checkbox: true },
  };
  return notionAPI('POST', '/pages', { parent: { database_id: HACCHUSHEET_DB }, properties: props });
}

async function _fetchAndInjectPending() {
  // iframeが描画された後を待つ
  await new Promise(r => setTimeout(r, 300));

  const iframe = document.getElementById('order-inline-frame') || document.getElementById('order-preview-frame');
  if (!iframe) return;

  const TH = (w='') => `padding:2px 3px;font-size:5pt;font-weight:bold;text-align:center;background:#1a4a80;color:#fff;border:0.3px solid #b8cfe8;white-space:nowrap;${w?'width:'+w+';':''}`;
  const tdS = (i,ex='') => `padding:2px 3px;font-size:5pt;text-align:center;border:0.3px solid #b8cfe8;${i%2===1?'background:#f0f5fc;':'background:#fff;'}white-space:nowrap;${ex}`;

  try {
    // 現在の仕入先に合わせてフィルター
    const supNotionName = SUPPLIER_CONFIG[currentSupplier]?.notionName || 'TOYO';
    const body = {
      filter: { and: [
        { or: [
          { property: 'ステータス', select: { equals: '新規発注' } },
          { property: 'ステータス', select: { equals: '発注済' } },
        ]},
        { property: '仕入先', select: { equals: supNotionName } },
      ]},
      sorts: [{ property: '発注日', direction: 'descending' }],
      page_size: 100,
    };
    const res = await notionAPI('POST', `/databases/${HACCHU_DB}/query`, body);
    const records = res.results || [];

    const fmt = s => s ? s.replace(/-/g,'/') : '—';

    // 発注日（古い順）→倉庫（五日市→志和）→カテゴリ（LTL TB→LTS→バン）
    const WH_ORD  = ['五日市','志和'];
    // 仕入先×パターンからカテゴリを推定
    const TOYO_LTL = new Set(['M646','M676','M125','M317','M323','M319','M320','M619','M626','M929','M919','M966','M920','M939']);
    const TOYO_LTS = new Set(['M634','M135','M134e','M131','M804','M935','M937','M934']);
    const BS_LTL   = new Set(['M888','M899','M801','M746','R225','R241','G539','W910','W900S','W911','W970','W999']);
    const BS_LTS   = new Set(['R207','W989','LV01','LT01']);
    const VAN_PAT  = new Set(['V03e','V02e','K370','R710','V600','W300','M935','VL10A','VAN01','SV01']);
    const RT_PAT   = new Set(['RTM810','RTM804','RTM807','RTM81C-170','RTM890','RTW910','RTW911','RTW970','RTG610','RTM919']);
    function getCatOrder(r) {
      const pat = r.properties['パターン']?.select?.name || '';
      if (RT_PAT.has(pat)) return 4;
      if (VAN_PAT.has(pat)) return 5;
      if (TOYO_LTL.has(pat) || BS_LTL.has(pat)) return 0; // LTL TB
      if (TOYO_LTS.has(pat) || BS_LTS.has(pat)) return 2; // LTS
      return 6;
    }
    records.sort((a, b) => {
      const da = a.properties['発注日']?.date?.start || '';
      const db2 = b.properties['発注日']?.date?.start || '';
      if (da !== db2) return da < db2 ? -1 : 1;
      const pa = a.properties['納入予定場所']?.select?.name || '';
      const pb = b.properties['納入予定場所']?.select?.name || '';
      const wa = WH_ORD.indexOf(pa), wb = WH_ORD.indexOf(pb);
      if (wa !== wb) return (wa===-1?99:wa) - (wb===-1?99:wb);
      const ca = getCatOrder(a), cb = getCatOrder(b);
      if (ca !== cb) return ca - cb;
      return (a.properties['パターン']?.select?.name||'').localeCompare(b.properties['パターン']?.select?.name||'');
    });

    const pendingRows = records.map((r, i) => {
      const p = r.properties;
      const pat    = p['パターン']?.select?.name || '—';
      const size   = p['サイズ']?.select?.name || p['サイズコード']?.rich_text?.[0]?.plain_text || '—';
      const qty    = p['数量']?.number ?? '—';
      const place  = p['納入予定場所']?.select?.name || '—';
      const nouki  = p['納期予定日']?.date?.start || '';
      const odate  = p['発注日']?.date?.start || '';
      const recv   = p['受注者']?.rich_text?.[0]?.plain_text || p['担当者']?.select?.name || '—';
      const tantouR= p['注文担当']?.select?.name || '—';
      const memo   = p['備考欄']?.rich_text?.[0]?.plain_text || '';
      const isPhone = p['電話注文済']?.checkbox === true;
      const isVerbal = p['口頭注文済']?.checkbox === true;
      const meth   = isPhone ? '電話' : isVerbal ? '口頭' : '自動';
      return `<tr>
        <td style="${tdS(i)}">${pat}</td>
        <td style="${tdS(i)}">${size}</td>
        <td style="${tdS(i,'font-weight:bold;color:#e07000;')}">${qty}</td>
        <td style="${tdS(i)}">${place}</td>
        <td style="${tdS(i)}">${tantouR}</td>
        <td style="${tdS(i)}">${recv}</td>
        <td style="${tdS(i)}">${meth}</td>
        <td style="${tdS(i)}">${fmt(odate)}</td>
        <td style="${tdS(i)}">${fmt(nouki)}</td>
        <td style="${tdS(i,'color:#888;white-space:normal;text-align:left;')}">${memo}</td>
      </tr>`;
    }).join('');

    const totalPending = records.reduce((s,r) => s + (r.properties['数量']?.number || 0), 0);

    const pendingHtml = records.length === 0 ? '' : `
<div style="font-size:4pt;font-weight:bold;color:#2563a8;margin-bottom:2px;">■ 未入荷（既発注分）</div>
<table style="width:100%;border-collapse:collapse;table-layout:fixed;"><thead><tr>
  <th style="${TH('10%')}">パターン</th><th style="${TH('13%')}">サイズ</th>
  <th style="${TH('5%')}">本数</th><th style="${TH('7%')}">納入場所</th>
  <th style="${TH('6%')}">発注者</th><th style="${TH('6%')}">受注者</th>
  <th style="${TH('6%')}">注文方法</th>
  <th style="${TH('10%')}">発注日</th><th style="${TH('10%')}">納期予定</th>
  <th style="${TH('27%')}">備考</th>
</tr></thead><tbody>${pendingRows}</tbody></table>
<div style="text-align:right;margin-top:2px;padding-top:2px;border-top:0.5px solid #e0dcd6;font-size:3pt;color:#666;">
  未入荷合計：<span style="font-size:6pt;font-weight:bold;color:#1a1a18;">${totalPending}本</span>
</div>`;

    // iframeのcontentDocumentのDOMを直接書き換える
    const iframeDoc = iframe.contentDocument || iframe.contentWindow?.document;
    if (iframeDoc) {
      const el = iframeDoc.getElementById('pending-section');
      if (el) {
        el.innerHTML = pendingHtml;

      }
    }

  } catch(e) {
    console.warn('未入荷データ取得失敗:', e.message);
    const iframeDoc = iframe.contentDocument || iframe.contentWindow?.document;
    if (iframeDoc) {
      const el = iframeDoc.getElementById('pending-section');
      if (el) el.innerHTML = `<div style="font-size:4.5pt;color:#e07000;">未入荷データ取得失敗: ${e.message}</div>`;

  }
}
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadHistory() {
  const el = document.getElementById('history-content');
  el.innerHTML = '<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">発注履歴を取得中…</div></div>';
  try {
    const res = await notionAPI('POST', `/databases/${HACCHU_DB}/query`, {
      filter: { property: '種別', select: { equals: 'タイヤ' } },
      sorts: [{ property: '発注日', direction: 'descending' }],
      page_size: 50,
    });
    renderHistory(res.results || []);
  } catch(e) {
    el.innerHTML = `<div class="content"><div class="error-box">取得エラー：${e.message}</div><button class="btn-secondary" onclick="loadHistory()">再試行</button></div>`;
  }
}

let hacchuHistoryRecords = [];

function renderHistory(records) {
  hacchuHistoryRecords = records;
  const el = document.getElementById('history-content');
  if (!records.length) {
    el.innerHTML = '<div style="text-align:center;padding:48px 20px;color:var(--muted);font-size:14px;">発注履歴がありません</div>';
    return;
  }
  const STATUS_CLASS = {
    '新規発注': 'st-new', '発注済': 'st-ordered', '納入済': 'st-done', 'キャンセル': 'st-cancel'
  };
  const STATUS_COLOR = {
    '新規発注': '#f59e0b', '発注済': '#3b82f6', '納入済': '#22c55e', 'キャンセル': '#6b7280'
  };
  const MAKER_GROUPS = [
    { key:'TOYO',       label:'TOYO TIRE',   color:'var(--accent)' },
    { key:'BRIDGESTONE',label:'BRIDGESTONE', color:'var(--blue)' },
    { key:'DUNLOP',     label:'DUNLOP',      color:'var(--purple)' },
    { key:'その他',     label:'その他',      color:'var(--muted)' },
  ];
  const grouped = {};
  records.forEach((r, i) => { r._hIdx = i; const sup = r.properties['仕入先']?.select?.name || 'その他'; const g = MAKER_GROUPS.find(m => m.key === sup) ? sup : 'その他'; if (!grouped[g]) grouped[g] = []; grouped[g].push(r); });

  let html = '<div style="padding:12px 0 0;">';
  MAKER_GROUPS.forEach(mg => {
    const rows = grouped[mg.key];
    if (!rows || !rows.length) return;
    html += `<div style="display:flex;align-items:center;gap:6px;padding:8px 0 5px;border-top:0.5px solid var(--border);margin-top:2px;">
      <div style="width:7px;height:7px;border-radius:50%;background:${mg.color};flex-shrink:0;"></div>
      <span style="font-size:10px;font-weight:700;color:${mg.color};letter-spacing:.06em;text-transform:uppercase;">${mg.label}</span>
    </div>`;
    rows.forEach(r => {
      const p = r.properties;
      const title   = p['タイヤサイズ']?.title?.[0]?.plain_text || '—';
      const status  = p['ステータス']?.select?.name || '—';
      const qty     = p['数量']?.number ?? '—';
      const nouki   = p['納期予定日']?.date?.start || '';
      const place   = p['納入予定場所']?.select?.name || '—';
      const tantou  = p['注文担当']?.select?.name || '—';
      const pattern = p['パターン']?.select?.name || '';
      const dateStr = r.created_time ? new Date(r.created_time).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'}) : '—';
      const stCls   = STATUS_CLASS[status] || 'st-new';
      const stColor = STATUS_COLOR[status] || '#6b7280';
      const noukiStr= nouki ? new Date(nouki).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'}) : '—';
      html += `<div class="history-row" onclick="openHacchuDetail(${r._hIdx})" style="cursor:pointer;border-left:3px solid ${stColor};transition:background 0.15s;" ontouchstart="this.style.background='var(--s3)'" ontouchend="this.style.background=''">
        <div class="history-row-head">
          <div class="history-date">${dateStr} 登録</div>
          <span class="history-status ${stCls}">${status}</span>
        </div>
        <div class="history-row-body">
          ${pattern ? `<span style="font-size:13px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text);margin-right:6px;">${escHtml(pattern)}</span>` : ''}
          <strong style="font-family:'DM Mono',monospace;">${escHtml(title)}</strong>
          &nbsp; <strong style="color:var(--accent);">${qty}本</strong>
        </div>
        <div class="history-row-meta">納入先：${place} ／ 担当：${tantou} ／ 希望納期：${noukiStr}　<span style="font-size:9px;color:var(--muted);">タップで詳細 ›</span></div>
      </div>`;
    });
  });
  html += '</div>';
  el.innerHTML = html;
}

// ─── 発注履歴 詳細モーダル ───────────────────────────────────
function openHacchuDetail(idx) {
  const r = hacchuHistoryRecords[idx];
  if (!r) return;
  const p = r.properties;
  const ps = (name) => {
    const v = p[name];
    if (!v) return '—';
    if (v.type === 'title') return v.title?.[0]?.plain_text || '—';
    if (v.type === 'rich_text') return v.rich_text?.[0]?.plain_text || '—';
    if (v.type === 'select') return v.select?.name || '—';
    if (v.type === 'number') return v.number != null ? String(v.number) : '—';
    if (v.type === 'date') return v.date?.start || '—';
    return '—';
  };
  const status = ps('ステータス');
  const STATUS_COLOR = { '新規発注': '#f59e0b', '発注済': '#3b82f6', '納入済': '#22c55e', 'キャンセル': '#6b7280' };
  const stColor = STATUS_COLOR[status] || '#6b7280';
  const d = r.created_time ? new Date(r.created_time) : null;
  const dateStr = d ? `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}` : '—';

  const row = (label, value, hl) => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);">
      <span style="font-size:12px;color:var(--muted);min-width:90px;">${label}</span>
      <span style="font-size:13px;font-weight:${hl?'700':'500'};color:${hl||'var(--text)'};text-align:right;">${value}</span>
    </div>`;

  const statusOpts = ['新規発注','発注済','納入済','キャンセル'].map(s =>
    `<option value="${s}" ${s===status?'selected':''}>${s}</option>`
  ).join('');

  let modal = document.getElementById('hacchu-detail-modal');
  if (!modal) { modal = document.createElement('div'); modal.id = 'hacchu-detail-modal'; document.body.appendChild(modal); }
  modal.style.cssText = 'position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;padding:20px;';
  modal.innerHTML = `
    <div style="background:var(--bg);width:100%;max-width:420px;border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
      <div style="background:color-mix(in srgb,${stColor} 15%,var(--bg));padding:20px;text-align:center;border-bottom:1px solid var(--border);">
        <span style="display:inline-block;font-size:13px;font-weight:700;color:${stColor};background:color-mix(in srgb,${stColor} 18%,transparent);padding:4px 16px;border-radius:20px;">${status}</span>
        <div style="font-size:16px;font-weight:800;color:var(--text);margin-top:10px;font-family:'DM Mono',monospace;">${ps('パターン')} ${ps('タイヤサイズ')}</div>
        <div style="font-size:28px;font-weight:800;color:var(--accent);margin-top:4px;">${ps('数量')}本</div>
      </div>
      <div style="padding:4px 20px 8px;">
        ${row('仕入先', ps('仕入先'))}
        ${row('タイヤメーカー', ps('タイヤメーカー'))}
        ${row('納入予定場所', ps('納入予定場所'), '#f59e0b')}
        ${row('注文担当', ps('注文担当'), '#3b82f6')}
        ${row('サイズコード', ps('サイズコード'))}
        ${row('納期予定日', ps('納期予定日'))}
        ${row('登録日', dateStr)}
      </div>
      <div style="padding:0 20px 8px;">
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">ステータス変更</div>
        <select id="hacchu-st-select" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border2);background:var(--s3);color:var(--text);font-size:13px;font-family:inherit;">${statusOpts}</select>
      </div>
      <div id="hacchu-detail-error" style="padding:0 20px;"></div>
      <div style="padding:8px 20px 16px;display:flex;gap:8px;">
        <button onclick="saveHacchuStatus(${idx})" id="hacchu-save-btn" style="flex:2;padding:12px;background:var(--accent);border:none;border-radius:10px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;">保存</button>
        <button onclick="archiveHacchu(${idx})" id="hacchu-archive-btn" style="flex:1;padding:12px;background:transparent;border:1.5px solid var(--red);border-radius:10px;font-size:12px;font-weight:600;color:var(--red);cursor:pointer;font-family:inherit;">取消</button>
        <button onclick="document.getElementById('hacchu-detail-modal').style.display='none'" style="flex:1;padding:12px;background:var(--s3);border:none;border-radius:10px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;font-family:inherit;">閉じる</button>
      </div>
    </div>`;
  modal.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
}

async function saveHacchuStatus(idx) {
  const r = hacchuHistoryRecords[idx];
  const newStatus = document.getElementById('hacchu-st-select').value;
  const btn = document.getElementById('hacchu-save-btn');
  btn.disabled = true; btn.textContent = '保存中…';
  try {
    await notionAPI('PATCH', `/pages/${r.id}`, { properties: { 'ステータス': { select: { name: newStatus } } } });
    r.properties['ステータス'] = { type:'select', select:{ name: newStatus } };
    document.getElementById('hacchu-detail-modal').style.display = 'none';
    renderHistory(hacchuHistoryRecords);
  } catch(e) {
    document.getElementById('hacchu-detail-error').innerHTML = `<div style="color:var(--red);font-size:11px;padding:4px 0;">${e.message}</div>`;
    btn.disabled = false; btn.textContent = '保存';
  }
}

async function archiveHacchu(idx) {
  const r = hacchuHistoryRecords[idx];
  const title = r.properties['タイヤサイズ']?.title?.[0]?.plain_text || '';
  if (!confirm(`この発注を取り消しますか？\n\n${title} ${r.properties['数量']?.number||0}本\n\n※Notionのゴミ箱に移動します`)) return;
  const btn = document.getElementById('hacchu-archive-btn');
  btn.disabled = true; btn.textContent = '処理中…';
  try {
    await notionAPI('PATCH', `/pages/${r.id}`, { archived: true });
    hacchuHistoryRecords.splice(idx, 1);
    document.getElementById('hacchu-detail-modal').style.display = 'none';
    renderHistory(hacchuHistoryRecords);
  } catch(e) {
    alert('取消エラー: ' + e.message);
    btn.disabled = false; btn.textContent = '取消';
  }
}

function switchTab(tab) {
  const tabs = ['alert','order','history','threshold'];
  document.querySelectorAll('.nav-btn').forEach((b,i) => {
    b.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  if (tab === 'history') loadHistory();
  if (tab === 'threshold') loadThresholdPage();
}

// しきい値変更（±ボタン）→ 即座にNotionに保存
async function changeThreshold(key, delta) {
  const snap = snapshotCache[key];
  if (!snap || !snap.pageId) return;
  const newVal = Math.max(0, (snap.threshold || 0) + delta);
  snap.threshold = newVal;
  const safeId = keyToSafeId(key);
  const el = document.getElementById(`th-num-${safeId}`);
  if (el) el.textContent = newVal;
  try {
    await notionAPI('PATCH', `/pages/${snap.pageId}`, {
      properties: { 'しきい値': { number: newVal } }
    });
  } catch(e) {
    console.error('しきい値保存エラー:', e);
  }
}

async function saveNewThreshold() {
  const pattern = document.getElementById('th-pattern-input').value.trim() || thSelPattern;
  let   size    = thSelSize;
  const cat     = thNewCat;
  const wh      = thNewWh;
  const val     = thNewQty;
  const errEl   = document.getElementById('th-save-error');
  const btn     = document.getElementById('th-save-btn');

  // サイズが未選択の場合、入力欄の値をそのまま使う
  if (!size) {
    size = document.getElementById('th-size-input')?.value.trim() || '';
    thSelSize = size;
  }
  if (!size || !cat) { errEl.textContent='サイズとカテゴリを選択してください'; errEl.style.display='block'; return; }
  errEl.style.display = 'none';
  btn.disabled = true; btn.textContent = '保存中…';

  const key = `${cat}|${pattern}|${size}|${wh}`;
  const snap = snapshotCache?.[key];

  try {
    if (snap && snap.pageId) {
      // 既存レコードのしきい値を更新
      await notionAPI('PATCH', `/pages/${snap.pageId}`, {
        properties: { 'しきい値': { number: val } }
      });
      snapshotCache[key].threshold = val;
    } else {
      // スナップショットに新規レコード作成
      const name = pattern ? `${pattern}|${size}|${wh}` : `${size}|${wh}`;
      const res = await notionAPI('POST', '/pages', {
        parent: { database_id: SNAPSHOT_DB },
        properties: {
          'Name':       { title: [{ text: { content: name } }] },
          'パターン名': { rich_text: [{ text: { content: pattern } }] },
          'サイズコード':{ rich_text: [{ text: { content: size } }] },
          'カテゴリ':   { select: { name: cat } },
          '倉庫':       { select: { name: wh } },
          '在庫数':     { number: 0 },
          'しきい値':   { number: val },
        }
      });
      if (snapshotCache) snapshotCache[key] = { pageId: res.id, stock: 0, threshold: val };
    }
    btn.textContent = '✓ 保存しました';
    setTimeout(() => {
      snapshotCache = null;
      loadThresholdPage();
    }, 800);
  } catch(e) {
    errEl.textContent = '保存エラー: ' + e.message;
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Notionに保存する';
  }
}

// ─── 入出庫履歴モーダル ─────────────────────────────────────────────────────
async function showItemHistory(idx) {
  const item = alertItems[idx];
  if (!item) return;

  const dbInfo = CAT_DB_MAP[item.category];
  if (!dbInfo) { alert('DBが見つかりません: ' + item.category); return; }

  // モーダル生成
  let modal = document.getElementById('history-modal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'history-modal';
    modal.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);display:flex;align-items:flex-end;justify-content:center;';
    document.body.appendChild(modal);
  }
  modal.style.display = 'flex';
  modal.innerHTML = `
    <div style="background:var(--bg);width:100%;max-width:480px;max-height:80vh;border-radius:16px 16px 0 0;overflow:hidden;display:flex;flex-direction:column;">
      <div style="padding:16px 20px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="font-size:15px;font-weight:700;color:var(--text);">${item.pattern} ${item.size}</div>
          <div style="font-size:11px;color:var(--muted);">${item.category} · ${item.warehouse}</div>
        </div>
        <button onclick="document.getElementById('history-modal').style.display='none'" style="background:var(--s3);border:none;border-radius:8px;padding:6px 14px;font-size:13px;color:var(--text);cursor:pointer;">✕</button>
      </div>
      <div id="history-modal-body" style="flex:1;overflow-y:auto;padding:12px 20px;">
        <div style="text-align:center;padding:30px 0;color:var(--muted);font-size:13px;">読み込み中...</div>
      </div>
    </div>`;

  // 背景タップで閉じる
  modal.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

  try {
    // 在庫DBから該当パターン/サイズの履歴を取得（繰越除外）
    const stockDbId = dbInfo.id;
    const wField = dbInfo.wField;

    const res = await notionAPI('POST', `/databases/${stockDbId}/query`, {
      filter: { and: [
        { property: 'サイズコード', select: { equals: item.size } },
        { property: 'パターン名', select: { equals: item.pattern } },
        { property: wField, select: { equals: item.warehouse } },
      ]},
      sorts: [{ timestamp: 'created_time', direction: 'descending' }],
      page_size: 40,
    });

    // 繰越はクライアント側で除外（DBにオプションが無い場合APIエラーになるため）
    const records = (res.results || []).filter(r => r.properties['区分']?.select?.name !== '繰越').slice(0, 30);
    const body = document.getElementById('history-modal-body');

    if (!records.length) {
      body.innerHTML = '<div style="text-align:center;padding:30px 0;color:var(--muted);font-size:13px;">履歴がありません</div>';
      return;
    }

    const kubunColor = (k) => {
      if (k.includes('入庫') || k.includes('返品（倉庫')) return '#22c55e';
      if (k === '準備') return '#f59e0b';
      if (k.includes('出庫') || k.includes('返品（メーカー')) return '#ef4444';
      if (k === '発注中') return '#3b82f6';
      return 'var(--muted)';
    };

    // 履歴データを保持（詳細表示用）
    window._historyRecords = records;

    let html = `<div style="font-size:11px;color:var(--muted);margin-bottom:8px;">直近 ${records.length} 件の入出庫履歴（タップで詳細）</div>`;
    records.forEach((r, i) => {
      const p = r.properties;
      const kubun = p['区分']?.select?.name || '';
      const qty = p['数量']?.number || 0;
      const creator = p['作成者']?.select?.name || '';
      const shukkoSaki = p['出庫先']?.rich_text?.[0]?.plain_text || '';
      const d = new Date(r.created_time);
      const dateStr = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      const sign = KUBUN_SIGN[kubun] ?? 0;
      const signStr = sign > 0 ? '+' : sign < 0 ? '-' : '';
      const signColor = sign > 0 ? '#22c55e' : sign < 0 ? '#ef4444' : 'var(--muted)';
      const kColor = kubunColor(kubun);

      html += `<div onclick="showHistoryDetail(${i})" style="background:var(--s2);border:0.5px solid var(--border);border-left:3px solid ${kColor};border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:background 0.15s;" ontouchstart="this.style.background='var(--s3)'" ontouchend="this.style.background='var(--s2)'" onmousedown="this.style.background='var(--s3)'" onmouseup="this.style.background='var(--s2)'">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:11px;font-weight:600;color:${kColor};background:color-mix(in srgb,${kColor} 12%,transparent);padding:2px 8px;border-radius:4px;">${kubun}</span>
          <span style="font-size:10px;color:var(--muted);">${dateStr}</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;">
          <span style="font-size:15px;font-weight:700;color:${signColor};">${signStr}${qty}本</span>
          <span style="font-size:11px;color:var(--text);opacity:0.7;">${creator || ''}</span>
        </div>
        ${shukkoSaki ? `<div style="margin-top:4px;font-size:12px;font-weight:600;color:#f59e0b;">▸ ${shukkoSaki}</div>` : ''}
      </div>`;
    });

    body.innerHTML = html;
  } catch(e) {
    document.getElementById('history-modal-body').innerHTML = `<div style="color:var(--red);padding:20px;font-size:13px;">取得エラー: ${e.message}</div>`;
  }
}

  modal.style.cssText = 'position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;padding:20px;';
  modal.innerHTML = `
    <div style="background:var(--bg);width:100%;max-width:400px;border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
      <div style="background:color-mix(in srgb,${stockColor} 12%,var(--bg));padding:20px;text-align:center;border-bottom:1px solid var(--border);">
        <div style="font-size:15px;font-weight:800;color:var(--text);">${item.pattern}</div>
        <div style="font-size:13px;color:var(--muted);margin-top:2px;font-family:'DM Mono',monospace;">${item.size}</div>
        <div style="display:flex;justify-content:center;gap:20px;margin-top:12px;">
          <div style="text-align:center;">
            <div style="font-size:24px;font-weight:800;color:${stockColor};">${item.realStock}</div>
            <div style="font-size:10px;color:var(--muted);">現在庫</div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:24px;font-weight:800;color:var(--muted);">${item.threshold}</div>
            <div style="font-size:10px;color:var(--muted);">しきい値</div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:24px;font-weight:800;color:var(--accent);">${item.orderQty}</div>
            <div style="font-size:10px;color:var(--muted);">発注数</div>
          </div>
        </div>
      </div>
      <div style="padding:4px 20px 8px;">
        ${row('カテゴリ', item.category)}
        ${row('倉庫', item.warehouse, '#f59e0b')}
        ${row('メーカー', item.maker || '—')}
        ${row('実在庫（準備含む）', item.actualStock != null ? item.actualStock + '本' : '—')}
        ${row('うち準備', item.prepQty != null ? item.prepQty + '本' : '—')}
        ${row('発注中（未納入）', item.orderInFlight != null ? item.orderInFlight + '本' : '—')}
      </div>
      <div style="padding:4px 20px 16px;display:flex;gap:8px;">
        <button onclick="document.getElementById('order-item-detail').style.display='none';showItemHistory(${idx})" style="flex:2;padding:12px;background:var(--accent);border:none;border-radius:10px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;">入出庫履歴</button>
        <button onclick="document.getElementById('order-item-detail').style.display='none'" style="flex:1;padding:12px;background:var(--s3);border:none;border-radius:10px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;font-family:inherit;">閉じる</button>
      </div>
    </div>`;
  modal.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
}

function showHistoryDetail(idx) {
  const r = window._historyRecords?.[idx];
  if (!r) return;
  const p = r.properties;
  const kubun = p['区分']?.select?.name || '-';
  const qty = p['数量']?.number || 0;
  const creator = p['作成者']?.select?.name || '-';
  const createdBy = p['作成者１']?.created_by?.name || '';
  const shukkoSaki = p['出庫先']?.rich_text?.[0]?.plain_text || '-';
  const memo = p['メモ']?.rich_text?.[0]?.plain_text || '-';
  const warehouse = p['倉庫']?.select?.name || p['出庫倉庫']?.select?.name || '-';
  const pattern = p['パターン名']?.select?.name || '-';
  const sizeCode = p['サイズコード']?.select?.name || '-';
  const d = new Date(r.created_time);
  const dateStr = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  const editD = r.last_edited_time ? new Date(r.last_edited_time) : null;
  const editStr = editD ? `${editD.getFullYear()}/${editD.getMonth()+1}/${editD.getDate()} ${String(editD.getHours()).padStart(2,'0')}:${String(editD.getMinutes()).padStart(2,'0')}` : '-';
  const sign = KUBUN_SIGN[kubun] ?? 0;
  const signStr = sign > 0 ? '+' : sign < 0 ? '-' : '';
  const signColor = sign > 0 ? '#22c55e' : sign < 0 ? '#ef4444' : 'var(--muted)';

  const kubunColor = (k) => {
    if (k.includes('入庫') || k.includes('返品（倉庫')) return '#22c55e';
    if (k === '準備') return '#f59e0b';
    if (k.includes('出庫') || k.includes('返品（メーカー')) return '#ef4444';
    if (k === '発注中') return '#3b82f6';
    return 'var(--muted)';
  };
  const kColor = kubunColor(kubun);

  let detail = document.getElementById('history-detail-modal');
  if (!detail) {
    detail = document.createElement('div');
    detail.id = 'history-detail-modal';
    detail.style.cssText = 'position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;padding:20px;';
    document.body.appendChild(detail);
  }
  detail.style.display = 'flex';

  const row = (label, value, highlight) => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);">
      <span style="font-size:12px;color:var(--muted);min-width:80px;">${label}</span>
      <span style="font-size:13px;font-weight:${highlight?'700':'500'};color:${highlight||'var(--text)'};text-align:right;">${value}</span>
    </div>`;

  detail.innerHTML = `
    <div style="background:var(--bg);width:100%;max-width:400px;border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
      <div style="background:color-mix(in srgb,${kColor} 15%,var(--bg));padding:20px;text-align:center;border-bottom:1px solid var(--border);">
        <span style="display:inline-block;font-size:13px;font-weight:700;color:${kColor};background:color-mix(in srgb,${kColor} 18%,transparent);padding:4px 16px;border-radius:20px;margin-bottom:8px;">${kubun}</span>
        <div style="font-size:28px;font-weight:800;color:${signColor};margin-top:8px;">${signStr}${qty}本</div>
      </div>
      <div style="padding:4px 20px 12px;">
        ${row('パターン', pattern)}
        ${row('サイズ', sizeCode)}
        ${row('倉庫', warehouse)}
        ${row('出庫先', shukkoSaki, shukkoSaki !== '-' ? '#f59e0b' : '')}
        ${row('入力者', creator !== '-' ? creator : (createdBy || '-'), '#3b82f6')}
        ${row('メモ', memo)}
        ${row('登録日時', dateStr)}
        ${row('最終更新', editStr)}
      </div>
      <div style="padding:0 20px 16px;">
        <button onclick="document.getElementById('history-detail-modal').style.display='none'" style="width:100%;padding:12px;background:var(--s3);border:none;border-radius:10px;font-size:14px;font-weight:600;color:var(--text);cursor:pointer;">閉じる</button>
      </div>
    </div>`;

  detail.onclick = (e) => { if (e.target === detail) detail.style.display = 'none'; };
}

// ─── オーバーレイボタンのイベントリスナー登録
window.addEventListener('load', () => {
  document.getElementById('opo-back-btn').addEventListener('click', closeOrderPreviewOverlay);
  document.getElementById('order-confirm-btn').addEventListener('click', confirmAndSaveOrder);
  document.getElementById('opo-print-btn').addEventListener('click', printOrderPreview);
  document.getElementById('opo-cancel-btn').addEventListener('click', closeOrderPreviewOverlay);
});
</script>
