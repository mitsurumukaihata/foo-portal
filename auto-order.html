<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>自動発注 | Tire Manager f.o.o</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #18181f; --s1: #101015; --s2: #1e1e26; --s3: #26262f;
  --border: #2c2c38; --border2: #3c3c4a;
  --text: #f0f0f2; --muted: #68687a;
  --accent: #f0a500; --accent2: #f5be40;
  --green: #22c55e; --red: #ef4444; --blue: #3b82f6;
  --yellow: #f59e0b; --purple: #a855f7;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #fdf6ee; --s1: #ffffff; --s2: #fdf0e4; --s3: #f5e6d4;
    --border: #e8d8c4; --border2: #d8c4a8;
    --text: #1a1208; --muted: #a08060;
    --accent: #e07000; --accent2: #c05800;
    --green: #1a9e4a; --red: #dc2626; --blue: #2563eb;
    --yellow: #d97706; --purple: #9333ea;
  }
}
[data-theme="dark"] {
  --bg: #18181f; --s1: #101015; --s2: #1e1e26; --s3: #26262f;
  --border: #2c2c38; --border2: #3c3c4a; --text: #f0f0f2; --muted: #68687a;
  --accent: #f0a500; --accent2: #f5be40; --green: #22c55e; --red: #ef4444;
  --blue: #3b82f6; --yellow: #f59e0b; --purple: #a855f7;
}
[data-theme="light"] {
  --bg: #fdf6ee; --s1: #ffffff; --s2: #fdf0e4; --s3: #f5e6d4;
  --border: #e8d8c4; --border2: #d8c4a8; --text: #1a1208; --muted: #a08060;
  --accent: #e07000; --accent2: #c05800; --green: #1a9e4a; --red: #dc2626;
  --blue: #2563eb; --yellow: #d97706; --purple: #9333ea;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans JP',sans-serif; min-height:100vh; max-width:480px; margin:0 auto; }

/* ── Header ── */
.header { background:var(--s1); border-bottom:0.5px solid var(--border); padding:14px 20px 10px; position:sticky; top:0; z-index:100; }
.header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:2px; }
.header-brand { font-size:10px; color:var(--muted); letter-spacing:0.12em; text-transform:uppercase; }
.header-title { font-size:17px; font-weight:900; letter-spacing:-0.02em; }
.header-title span { color:var(--accent); }

/* ── Nav ── */
.nav { display:flex; background:var(--s1); border-bottom:0.5px solid var(--border); }
.nav-btn { flex:1; padding:10px 4px 8px; background:transparent; border:none; border-bottom:2px solid transparent; color:var(--muted); font-size:11px; font-family:'Noto Sans JP',sans-serif; cursor:pointer; transition:all 0.15s; }
.nav-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

/* ── Page ── */
.page { display:none; padding-bottom:40px; }
.page.active { display:block; }
.content { padding:16px 16px 0; }

/* ── Summary ── */
.summary-bar { display:flex; gap:8px; margin-bottom:12px; }
.summ-card { flex:1; background:var(--s2); border:1px solid var(--border); border-radius:10px; padding:10px 8px; text-align:center; }
.summ-num { font-size:22px; font-weight:900; font-family:'DM Mono',monospace; line-height:1; }
.summ-lbl { font-size:9px; color:var(--muted); margin-top:3px; }

/* ── Notice ── */
.notice-box { background:rgba(245,158,11,0.08); border:1px solid rgba(245,158,11,0.3); border-radius:8px; padding:8px 12px; font-size:11px; color:var(--yellow); line-height:1.6; margin-bottom:12px; }

/* ── Section header ── */
.wh-section { display:flex; align-items:center; gap:8px; padding:10px 0 6px; font-size:10px; font-weight:700; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; border-top:0.5px solid var(--border); margin-top:4px; }
.wh-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

/* ── Alert card ── */
.alert-card { background:var(--s2); border:1px solid var(--border); border-radius:12px; margin-bottom:8px; overflow:hidden; cursor:pointer; transition:border-color 0.15s; }
.alert-card.critical { border-color:rgba(239,68,68,0.4); background:rgba(239,68,68,0.04); }
.alert-card.warning { border-color:rgba(245,158,11,0.35); background:rgba(245,158,11,0.04); }
.alert-card-inner { display:flex; align-items:center; gap:10px; padding:11px 12px; }
.alert-dot-big { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.alert-info { flex:1; min-width:0; }
.alert-pattern { font-size:14px; font-weight:700; font-family:'DM Mono',monospace; }
.alert-meta { font-size:13px; font-family:'DM Mono',monospace; color:var(--text); font-weight:700; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.alert-meta.sub { font-size:10px; font-family:'Noto Sans JP',sans-serif; color:var(--muted); }
.alert-stocks { display:flex; gap:0; flex-shrink:0; }
.st-cell { text-align:center; padding:0 8px; border-left:0.5px solid var(--border); }
.st-num { font-size:15px; font-weight:700; font-family:'DM Mono',monospace; line-height:1; }
.st-lbl { font-size:8px; color:var(--muted); margin-top:2px; }
.alert-bar { height:3px; }
.alert-bar-fill { height:100%; border-radius:0 0 0 0; transition:width 0.4s; }

/* ── Tags ── */
.tag { font-size:9px; font-weight:700; padding:2px 7px; border-radius:10px; display:inline-block; }
.tag-toyo { background:rgba(240,165,0,0.12); color:var(--accent); border:1px solid rgba(240,165,0,0.3); }
.tag-bs { background:rgba(59,130,246,0.12); color:var(--blue); border:1px solid rgba(59,130,246,0.25); }
.tag-cat { background:var(--s3); color:var(--muted); }

/* ── Buttons ── */
.btn-primary { width:100%; background:var(--accent); border:none; border-radius:10px; padding:14px; color:#fff; font-size:14px; font-weight:700; font-family:'Noto Sans JP',sans-serif; cursor:pointer; margin-top:10px; transition:opacity 0.15s; }
.btn-primary:disabled { opacity:0.4; cursor:default; }
.btn-secondary { width:100%; background:transparent; border:1.5px solid var(--border2); border-radius:10px; padding:12px; color:var(--text); font-size:14px; font-family:'Noto Sans JP',sans-serif; cursor:pointer; margin-top:6px; font-weight:500; }
.btn-danger { width:100%; background:transparent; border:1px solid var(--red); border-radius:10px; padding:11px; color:var(--red); font-size:13px; font-family:'Noto Sans JP',sans-serif; cursor:pointer; margin-top:6px; }

/* ── Loading ── */
.loading-wrap { text-align:center; padding:60px 20px; }
.spinner { width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { font-size:13px; color:var(--muted); }

/* ── Error ── */
.error-box { background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.25); border-radius:8px; padding:12px 14px; font-size:12px; color:var(--red); line-height:1.6; margin-bottom:12px; }

/* ── Order entries ── */
.order-section-head { display:flex; align-items:center; justify-content:space-between; padding:8px 0 5px; border-top:0.5px solid var(--border); margin-top:4px; }
.order-section-lbl { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; font-weight:700; }
.order-count-badge { font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px; }
.order-entry { background:var(--s2); border:1px solid var(--border); border-radius:10px; padding:10px 12px; margin-bottom:6px; display:flex; align-items:center; gap:10px; }
.order-entry.deselected { opacity:0.4; }
.order-checkbox { width:20px; height:20px; border-radius:5px; border:1.5px solid var(--accent); background:rgba(240,165,0,0.1); display:flex; align-items:center; justify-content:center; flex-shrink:0; cursor:pointer; }
.order-checkbox.off { border-color:var(--border2); background:transparent; }
.order-check-icon { width:11px; height:11px; background:var(--accent); border-radius:2px; }
.order-info { flex:1; min-width:0; }
.order-pattern { font-size:13px; font-weight:700; font-family:'DM Mono',monospace; }
.order-detail { font-size:13px; color:var(--text); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:700; font-family:'DM Mono',monospace; }
.qty-wrap { display:flex; align-items:center; gap:6px; }
.qty-btn { width:26px; height:26px; border-radius:6px; border:1px solid var(--border2); background:var(--s3); color:var(--text); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-family:'Noto Sans JP',sans-serif; flex-shrink:0; }
.qty-num { font-size:16px; font-weight:700; font-family:'DM Mono',monospace; color:var(--accent); width:30px; text-align:center; }

/* ── PDF options ── */
.pdf-options { display:flex; gap:8px; margin-bottom:12px; }
.pdf-opt-btn { flex:1; padding:11px 8px; border-radius:10px; font-size:12px; font-weight:700; font-family:'Noto Sans JP',sans-serif; cursor:pointer; transition:all 0.15s; }
.pdf-opt-toyo { background:rgba(240,165,0,0.1); border:1.5px solid var(--accent); color:var(--accent); }
.pdf-opt-history { background:var(--s2); border:1.5px solid var(--border2); color:var(--muted); }

/* ── Success box ── */
.success-box { background:rgba(34,197,94,0.07); border:1px solid rgba(34,197,94,0.25); border-radius:10px; padding:12px 14px; font-size:12px; color:var(--green); line-height:1.7; margin-bottom:10px; }

/* ── History ── */
.history-row { background:var(--s2); border:1px solid var(--border); border-radius:10px; padding:10px 12px; margin-bottom:6px; }
.history-row-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
.history-date { font-size:11px; color:var(--muted); }
.history-status { font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px; }
.st-new { background:rgba(245,158,11,0.12); color:var(--yellow); }
.st-ordered { background:rgba(240,165,0,0.12); color:var(--accent); }
.st-done { background:rgba(34,197,94,0.12); color:var(--green); }
.st-cancel { background:rgba(239,68,68,0.1); color:var(--red); }
.history-row-body { font-size:12px; color:var(--text); }
.history-row-meta { font-size:10px; color:var(--muted); margin-top:3px; }

/* ── Delivery fields ── */
.delivery-fields { background:var(--s2); border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:12px; }
.df-row { display:flex; gap:10px; margin-bottom:8px; }
.df-row:last-child { margin-bottom:0; }
.df-field { flex:1; }
.df-label { font-size:10px; color:var(--muted); margin-bottom:4px; letter-spacing:0.04em; }
.df-input, .df-select { width:100%; background:var(--s3); border:1px solid var(--border2); border-radius:7px; padding:8px 10px; font-size:13px; font-family:'Noto Sans JP',sans-serif; color:var(--text); outline:none; transition:border-color 0.15s; }
.df-input:focus, .df-select:focus { border-color:var(--accent); }
.df-input::placeholder { color:var(--muted); }
.df-select { appearance:none; }

/* ── Divider ── */
.divider { height:0.5px; background:var(--border); margin:10px 0; }

/* ──────────────────────────────────────
   印刷用スタイル（発注書PDF）
─────────────────────────────────────── */
@media print {
  body { background:#fff !important; color:#000 !important; font-family:'Noto Sans JP',sans-serif !important; max-width:none !important; }
  #main-app { display:none !important; }
  #print-sheet { display:block !important; }
}
#print-sheet { display:none; }

.print-page { padding:24mm 20mm; min-height:100vh; background:#fff; color:#000; }
.print-header { border-bottom:2px solid #e07000; padding-bottom:10px; margin-bottom:16px; display:flex; justify-content:space-between; align-items:flex-end; }
.print-company { font-size:11px; color:#666; margin-bottom:4px; }
.print-title { font-size:22px; font-weight:900; color:#e07000; letter-spacing:-0.02em; }
.print-date { font-size:11px; color:#666; text-align:right; }
.print-to-section { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
.print-to-block { }
.print-to-label { font-size:9px; color:#888; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:3px; }
.print-to-val { font-size:14px; font-weight:700; }
.print-meta-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
.print-meta-item { background:#f8f3ee; border-radius:6px; padding:8px 10px; }
.print-meta-label { font-size:9px; color:#888; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:2px; }
.print-meta-val { font-size:13px; font-weight:700; }
.print-table { width:100%; border-collapse:collapse; margin-bottom:12px; }
.print-table thead tr { background:#e07000; color:#fff; }
.print-table th { padding:7px 10px; font-size:11px; font-weight:700; text-align:left; letter-spacing:0.04em; }
.print-table tbody tr:nth-child(even) { background:#fdf6ee; }
.print-table td { padding:8px 10px; font-size:12px; border-bottom:0.5px solid #e8d8c4; }
.print-table td.mono { font-family:'DM Mono',monospace; }
.print-table td.qty-col { text-align:right; font-weight:700; color:#e07000; font-family:'DM Mono',monospace; }
.print-table tfoot tr { background:#fdf0e4; }
.print-table tfoot td { padding:8px 10px; font-size:13px; font-weight:700; }
.print-total-row td:last-child { color:#e07000; font-size:16px; font-family:'DM Mono',monospace; }
.print-footer { border-top:0.5px solid #e8d8c4; padding-top:10px; margin-top:16px; display:flex; justify-content:space-between; align-items:flex-end; }
.print-footer-note { font-size:10px; color:#888; line-height:1.6; }
.print-sign-area { text-align:right; }
.print-sign-label { font-size:9px; color:#888; margin-bottom:20px; }
.print-sign-line { width:120px; height:1px; background:#ccc; margin-left:auto; }
.print-notice { background:#fef3cd; border:1px solid #e07000; border-radius:6px; padding:8px 12px; font-size:10px; color:#7a4000; line-height:1.7; margin-bottom:12px; }
</style>
<script>
(function(){
  const t = localStorage.getItem('foo_portal_theme') || 'auto';
  if (t !== 'auto') document.documentElement.setAttribute('data-theme', t);
})();
</script>
</head>
<body>
<!-- ══ 発注プレビューオーバーレイ（静的DOM）══ -->
<div id="order-preview-overlay" style="display:none;position:fixed;inset:0;z-index:9999;background:var(--bg);flex-direction:column;">
  <!-- ヘッダー -->
  <div style="background:var(--s1);border-bottom:0.5px solid var(--border);padding:13px 16px;display:flex;align-items:flex-start;gap:10px;flex-shrink:0;">
    <button id="opo-back-btn" onclick="closeOrderPreviewOverlay()" style="background:transparent;border:none;color:var(--accent);font-size:22px;cursor:pointer;line-height:1;padding:0 4px;font-family:inherit;flex-shrink:0;margin-top:2px;">‹</button>
    <div style="flex:1;min-width:0;">
      <div id="opo-title" style="font-size:14px;font-weight:900;">発注書プレビュー</div>
      <div id="opo-subtitle" style="font-size:11px;color:var(--muted);margin-top:1px;"></div>
      <div style="display:flex;align-items:center;gap:4px;margin-top:6px;">
        <input id="pdf-filename-input" type="text" value=""
          style="flex:1;min-width:0;background:var(--s3);border:1px solid var(--border2);border-radius:6px;
                 padding:5px 8px;font-size:10px;color:var(--text);font-family:'DM Mono',monospace;outline:none;box-sizing:border-box;">
        <span style="font-size:10px;color:var(--muted);flex-shrink:0;">.pdf</span>
      </div>
    </div>
  </div>
  <!-- プレビュー -->
  <iframe id="order-preview-frame" style="flex:1;min-height:0;border:none;width:100%;background:#fff;" title="発注書プレビュー"></iframe>
  <!-- フッター -->
  <div style="background:var(--s1);border-top:0.5px solid var(--border);padding:12px 16px;flex-shrink:0;position:relative;z-index:10000;">
    <div id="order-preview-error"></div>
    <button id="order-confirm-btn" onclick="confirmAndSaveOrder()" style="width:100%;background:var(--green);border:none;border-radius:10px;padding:13px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:6px;">
      この内容で発注確定 → Notionに保存する
    </button>
    <div style="display:flex;gap:6px;">
      <button id="opo-print-btn" onclick="printOrderPreview()" style="flex:1;background:var(--accent);border:none;border-radius:10px;padding:11px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">
        🖨️ PDF保存
      </button>
      <button id="opo-cancel-btn" onclick="closeOrderPreviewOverlay()" style="flex:1;background:transparent;border:1px solid var(--border2);border-radius:10px;padding:11px;color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit;">
        修正する
      </button>
    </div>
  </div>
</div>


<!-- ── 印刷用発注書（画面には非表示、印刷時のみ表示） ── -->
<div id="print-sheet">
  <div class="print-page" id="print-content">
    <!-- JS で動的生成 -->
  </div>
</div>

<!-- ── メインアプリ ── -->
<div id="main-app">
  <div class="header">
    <div class="header-top">
      <div class="header-brand">Tire Manager f.o.o</div>
      <a href="https://mitsurumukaihata.github.io/foo-portal/"
        style="font-size:11px;color:var(--muted);text-decoration:none;padding:3px 8px;border:0.5px solid var(--border);border-radius:20px;">
        ← ポータル
      </a>
    </div>
    <div class="header-title">自動<span>発注</span></div>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="switchTab('alert')">在庫アラート</button>
    <button class="nav-btn" onclick="switchTab('order')">発注確認</button>
    <button class="nav-btn" onclick="switchTab('history')">発注履歴</button>
    <button class="nav-btn" onclick="switchTab('threshold')">しきい値</button>
  </div>

  <!-- 在庫アラートページ -->
  <div class="page active" id="page-alert">
    <div class="content" id="alert-content">
      <div class="loading-wrap">
        <div class="spinner"></div>
        <div class="loading-text">読み込み中…</div>
      </div>
    </div>
  </div>

  <!-- 発注確認ページ -->
  <div class="page" id="page-order">
    <div class="content">
      <div style="padding:8px 0 4px;">
        <div style="font-size:9px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;">発注内容の確認・調整</div>
      </div>

      <!-- 担当者・希望納期 -->
      <div class="delivery-fields">
        <div class="df-row">
          <div class="df-field">
            <div class="df-label">担当者</div>
            <select class="df-select" id="order-tantou">
              <option value="">選択してください</option>
              <option value="向畑 充">向畑 充</option>
              <option value="岡崎 由美">岡崎 由美</option>
              <option value="矢島 明和">矢島 明和</option>
              <option value="大田 健">大田 健</option>
              <option value="中川 颯">中川 颯</option>
            </select>
          </div>
          <div class="df-field">
            <div class="df-label">希望納期</div>
            <input class="df-input" type="date" id="order-nouki">
          </div>
        </div>
        <div class="df-row">
          <div class="df-field">
            <div class="df-label">備考（任意）</div>
            <input class="df-input" type="text" id="order-biko" placeholder="特記事項があれば…">
          </div>
        </div>
      </div>

      <div id="order-list-content">
        <div style="text-align:center;padding:32px 0;color:var(--muted);font-size:13px;">
          在庫アラートタブで発注対象を確認してください
        </div>
      </div>

      <div id="order-actions" style="display:none;">
        <div class="divider"></div>
        <div id="order-error"></div>
        <!-- プレビューエリア -->
        <div id="order-pdf-preview" style="display:none;margin-bottom:10px;">
          <div style="font-size:11px;color:var(--muted);margin-bottom:6px;">発注書プレビュー — 内容を確認してください</div>
          <iframe id="order-inline-frame" style="width:100%;height:500px;border:1px solid var(--border);border-radius:8px;background:#fff;"></iframe>
          <div style="display:flex;gap:8px;margin-top:8px;">
            <button class="btn-primary" id="order-confirm-btn" onclick="confirmAndSaveOrder()">
              この内容で発注確定 → Notionに保存する

async function notionAPI(method, path, body) {
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => reject(new Error('タイムアウト(25秒): ' + path)), 25000);
    fetch(WORKER + path, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined,
    })
    .then(r => r.json())
    .then(data => { clearTimeout(timer); resolve(data); })
    .catch(e => { clearTimeout(timer); reject(e); });
  });
}

// keyを安全なDOM IDに変換（btoa非対応文字の回避）
function keyToSafeId(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(31, h) + str.charCodeAt(i) | 0;
  }
  return 'k' + Math.abs(h).toString(36);
}

async function loadAlerts() {

    // しきい値が設定されているレコードでアラート判定

      const threshold = snap.threshold;
      if (!threshold || threshold <= 0) continue; // しきい値未設定はスキップ
      const realStock = snap.stock ?? 0;
      if (realStock < threshold) {
        const [cat, pattern, size, warehouse] = key.split('|');

          pageId: snap.pageId,
          kijunId: key,
          pattern, size, category: cat, warehouse,
          threshold, realStock,
          actualStock: realStock, prepQty: 0, orderInFlight: 0,
          orderQty: needed,
          selected: needed > 0 && maker === 'TOYO',
          maker,
        });
      }
    }

    // しきい値が1件もDBに設定されていない場合→初回マイグレーション

// デフォルトしきい値をDBに一括書き込み（初回のみ）
async function migrateDefaultThresholds(snapMap) {
  const tasks = DEFAULT_THRESHOLDS.map(row => {
    const key = `${row.cat}|${row.pattern}|${row.size}|${row.warehouse}`;
    const snap = snapMap[key];
    if (!snap || !snap.pageId) return null;
    return notionAPI('PATCH', `/pages/${snap.pageId}`, {
      properties: { 'しきい値': { number: row.threshold } }
    }).catch(() => null);
  }).filter(Boolean);
  await Promise.all(tasks);
}

// スナップショットDBから全レコードを取得（在庫数＋しきい値＋ページID）
// 戻り値: { "カテゴリ|パターン|サイズ|倉庫": {pageId, stock, threshold} }
async function fetchAllSnapshotsWithThreshold() {
  const map = {};
  let cursor;
  let pageNum = 0;
  while (pageNum < 10) {
    pageNum++;
    const body = { page_size: 100 };
    if (cursor) body.start_cursor = cursor;
    const res = await notionAPI('POST', `/databases/${SNAPSHOT_DB}/query`, body);
    if (res.object === 'error') throw new Error('スナップショット取得エラー: ' + res.message);
    for (const page of res.results) {
      const p = page.properties;
      const catName   = p['カテゴリ']?.select?.name || '';
      const pattern   = p['パターン名']?.rich_text?.[0]?.plain_text || '';
      const size      = p['サイズコード']?.rich_text?.[0]?.plain_text || '';
      const warehouse = p['倉庫']?.select?.name || '';
      const stock     = p['在庫数']?.number ?? 0;
      const threshold = p['しきい値']?.number ?? 0;
      if (catName && pattern && size && warehouse) {
        map[`${catName}|${pattern}|${size}|${warehouse}`] = {
          pageId: page.id, stock, threshold
        };
      }
    }
    if (!res.has_more) break;
    cursor = res.next_cursor;
  }
  return map;
}

// 後方互換（updateSnapshot等で使用）
async function fetchAllSnapshots() {
  const full = await fetchAllSnapshotsWithThreshold();
  const map = {};
  for (const [k,v] of Object.entries(full)) map[k] = v.stock;
  return map;
}


async function fetchKijunForCat(catName, kijunDbId) {
  // 1時間キャッシュ
  const cacheKey = 'kijun_cache_' + kijunDbId;
  try {
    const cached = JSON.parse(localStorage.getItem(cacheKey) || 'null');
    if (cached && cached.ts && Date.now() - cached.ts < 3600000) {
      return cached.rows;
    }
  } catch(e) {}
  try {
    const res = await notionAPI('POST', `/databases/${kijunDbId}/query`, { page_size: 100 });
    if (res.object === 'error') {
      console.warn('[' + catName + '] スキップ: ' + res.message);
      return [];
    }
    const rows = (res.results || []).map(page => {
      const p = page.properties;
      return {
        id: page.id,
        pattern: p['パターン名']?.select?.name || '',
        size: p['サイズコード']?.rich_text?.[0]?.plain_text || '',
        warehouse: p['倉庫']?.select?.name || '',
        threshold: p['しきい値']?.number ?? 0,
      };
    }).filter(r => r.pattern && r.size && r.threshold > 0
                && (r.warehouse === '五日市倉庫' || r.warehouse === '志和倉庫'));
    try { localStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), rows })); } catch(e) {}
    return rows;
  } catch(e) {
    console.warn('[' + catName + '] スキップ: ' + e.message);
    return [];
  }
}

async function fetchStockForCat(cat, dbInfo, stockMap) {
  const info = dbInfo || CAT_DB_MAP[cat];
  if (!info) return;
  const stockDbId = info.stockId || info.id;

  const warehouseField = info.wField;
  const filter = {
    or: [
      { property: warehouseField, select: { equals: '五日市倉庫' } },
      { property: warehouseField, select: { equals: '志和倉庫' } },
      { property: '区分', select: { equals: '発注中' } },
    ]
  };

  let all = [], cursor;
  let pageNum = 0;
  while (pageNum < 5) {
    pageNum++;
    const body = { filter, page_size: 100 };
    if (cursor) body.start_cursor = cursor;
    const res = await notionAPI('POST', `/databases/${stockDbId}/query`, body);
    if (res.object === 'error') throw new Error(res.message);
    all = all.concat(res.results);
    if (!res.has_more) break;
    cursor = res.next_cursor;
  }

  all.forEach(r => {
    const p = r.properties;
    const pattern = p['パターン名']?.select?.name || '';
    const size = p['サイズコード']?.select?.name || '';
    const qty = p['数量']?.number || 0;
    const kubun = p['区分']?.select?.name || '';
    if (!pattern || !size) return;

    if (kubun === '発注中') {
      const allKey = `${pattern}|${size}|__order__`;
      if (!stockMap[allKey]) stockMap[allKey] = 0;
      stockMap[allKey] += qty;
      return;
    }

    const warehouse = p[info.wField]?.select?.name || '';
    if (!warehouse) return;
    const key = `${pattern}|${size}|${warehouse}`;
    if (!stockMap[key]) stockMap[key] = { actual: 0, prepQty: 0 };

    const sign = KUBUN_SIGN[kubun] || 0;
    stockMap[key].actual += sign * qty;
    if (kubun === '準備') stockMap[key].prepQty += qty;
  });
}

function guessMaker(pattern) {
  const p = (pattern || '').toUpperCase();
  if (p.startsWith('W') || p.startsWith('G539') || p.startsWith('R') ||
      ['LV01','W300','RTM810','RTM804','RTM807','RTM81C-170','RTM890','RTW910','RTW911','RTW970','RTG610'].includes(pattern)) return 'BS';
  if (['LT01','SV01','VAN01','SPLT50','SPLT21','SPLT22'].includes(p) || p.startsWith('SP')) return 'DUNLOP';
  if (pattern === 'XJE4') return 'MICHELIN';
  return 'TOYO';
}

    <div class="summ-card"><div class="summ-num" style="color:var(--accent);">${toyo}</div><div class="summ-lbl">TOYO要発注</div></div>

    html += '</div>';

  html += `<div class="notice-box">準備中・発注中の在庫も加味した<strong style="color:var(--yellow);">実質在庫</strong>で判定しています</div>`;

  WAREHOUSES.forEach(wh => {
    const items = alertItems.filter(i => i.warehouse === wh);

    const dotColor = wh === '五日市倉庫' ? 'var(--green)' : 'var(--blue)';
    html += `<div class="wh-section"><div class="wh-dot" style="background:${dotColor};"></div>${wh}</div>`;

    items.sort((a,b) => (a.realStock/a.threshold) - (b.realStock/b.threshold));
    items.forEach(item => {
      const pct = Math.round((item.realStock / item.threshold) * 100);
      const cls = item.realStock === 0 ? 'critical' : 'warning';
      const dotColor2 = item.realStock === 0 ? 'var(--red)' : 'var(--yellow)';
      const numColor  = item.realStock === 0 ? 'color:var(--red)' : 'color:var(--yellow)';
      const barColor  = item.realStock === 0 ? 'var(--red)' : 'var(--yellow)';
      const makerTag  = item.maker === 'TOYO'
        ? `<span class="tag tag-toyo">TOYO</span>`
        : item.maker === 'BS'
        ? `<span class="tag tag-bs">BS</span>`
        : `<span class="tag tag-cat">${item.maker}</span>`;

      let stockInfo = `実在庫 ${item.actualStock}本`;
      if (item.prepQty > 0) stockInfo += `（うち準備中 ${item.prepQty}本）`;
      if (item.orderInFlight > 0) stockInfo += ` + 発注中 ${item.orderInFlight}本入荷予定`;

      html += `<div class="alert-card ${cls}">
        <div class="alert-card-inner">
          <div class="alert-dot-big" style="background:${dotColor2};"></div>
          <div class="alert-info">
            <div class="alert-pattern">${item.pattern} &nbsp;${makerTag}</div>
            <div class="alert-meta">${item.size}</div>
            <div class="alert-meta sub">${item.category} ／ ${stockInfo}</div>
          </div>
          <div class="alert-stocks">
            <div class="st-cell">
              <div class="st-num" style="${numColor}">${item.realStock}</div>
              <div class="st-lbl">実質在庫</div>
            </div>
            <div class="st-cell">
              <div class="st-num" style="color:var(--muted);">${item.threshold}</div>
              <div class="st-lbl">しきい値</div>
            </div>
          </div>
        </div>
        <div class="alert-bar"><div class="alert-bar-fill" style="width:${Math.min(pct,100)}%;background:${barColor};"></div></div>
      </div>`;
    });
  });

  const toyoCount = alertItems.filter(i => i.maker === 'TOYO' && i.orderQty > 0).length;
  html += `<button class="btn-primary" onclick="goToOrderTab()" ${toyoCount ? '' : 'disabled'}>
    TOYO 発注対象 ${toyoCount}品目 を確認する →
  </button>`;
  html += '<div style="height:16px;"></div>';
  html += '</div>';
  el.innerHTML = html;
}

function goToOrderTab() {
  renderOrderPage();
  switchTab('order');
}

// ──────────────────────────────────────
// 発注確認ページ描画
// ──────────────────────────────────────
function renderOrderPage() {
  const el = document.getElementById('order-list-content');
  const actEl = document.getElementById('order-actions');
  const allItems = alertItems.filter(i => i.orderQty > 0);
  if (!allItems.length) {
    el.innerHTML = '<div style="text-align:center;padding:32px 0;color:var(--muted);font-size:13px;">発注対象はありません</div>';
    actEl.style.display = 'none';
    return;
  }
  actEl.style.display = 'block';

  const MAKER_CONFIG = [
    { maker:'TOYO',       label:'TOYO TIRE',   color:'var(--accent)',  tagCls:'tag-toyo' },
    { maker:'BS',         label:'BRIDGESTONE', color:'var(--blue)',    tagCls:'tag-bs' },
    { maker:'DUNLOP',     label:'DUNLOP',      color:'var(--purple)',  tagCls:'tag-cat' },
    { maker:'MICHELIN',   label:'MICHELIN',    color:'var(--green)',   tagCls:'tag-cat' },
  ];

  let html = '';
  MAKER_CONFIG.forEach(mc => {
    const makerItems = allItems.filter(i => i.maker === mc.maker);
    if (!makerItems.length) return;
    html += `<div style="display:flex;align-items:center;gap:6px;padding:8px 0 5px;border-top:0.5px solid var(--border);margin-top:4px;">
      <div style="width:7px;height:7px;border-radius:50%;background:${mc.color};flex-shrink:0;"></div>
      <span style="font-size:10px;font-weight:700;color:${mc.color};letter-spacing:.06em;text-transform:uppercase;">${mc.label}</span>
      <span style="margin-left:auto;font-size:10px;color:${mc.color};">${makerItems.length}品目</span>
    </div>`;
    makerItems.forEach(item => {
      const globalIdx = alertItems.indexOf(item);
      const chkCls = item.selected ? '' : 'off';
      const chkIcon = item.selected ? '<div class="order-check-icon"></div>' : '';
      const entryCls = item.selected ? '' : 'deselected';
      html += `<div class="order-entry ${entryCls}" id="oe-${globalIdx}">
        <div class="order-checkbox ${chkCls}" onclick="toggleOrderItem(${globalIdx})">${chkIcon}</div>
        <div class="order-info">
          <div class="order-pattern">${item.pattern}</div>
          <div class="order-detail">${item.size} ／ <span style="color:var(--accent);font-weight:700;">${item.warehouse.replace('倉庫','')}</span></div>
        </div>
        <div class="qty-wrap">
          <div class="qty-btn" onclick="changeQty(${globalIdx},-1)">−</div>
          <div class="qty-num" id="qty-${globalIdx}">${item.orderQty}</div>
          <div class="qty-btn" onclick="changeQty(${globalIdx},+1)">＋</div>
        </div>
      </div>`;
    });
  });

  const selectedCount = allItems.filter(i => i.selected).length;
  const totalQty = allItems.filter(i => i.selected).reduce((s,i) => s+i.orderQty, 0);
  html += `<div style="background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;margin-top:6px;">
    <div style="font-size:12px;color:var(--muted);">選択中 ${selectedCount}品目</div>
    <div style="font-size:18px;font-weight:900;font-family:'DM Mono',monospace;color:var(--accent);">計 ${totalQty}本</div>
  </div>`;
  el.innerHTML = html;
  const btn = document.getElementById('order-submit-btn');
  if (btn) btn.disabled = selectedCount === 0;
}

function toggleOrderItem(idx) {
  alertItems[idx].selected = !alertItems[idx].selected;
  renderOrderPage();
}

function changeQty(idx, delta) {
  alertItems[idx].orderQty = Math.max(1, alertItems[idx].orderQty + delta);
  const el = document.getElementById(`qty-${idx}`);
  if (el) el.textContent = alertItems[idx].orderQty;
}

// ──────────────────────────────────────
// 発注処理
// ──────────────────────────────────────
// PDFプレビュー表示（Notionへの保存はまだしない）
function previewOrderPdf() {
  const tantou = document.getElementById('order-tantou').value;
  const nouki  = document.getElementById('order-nouki').value;
  const biko   = document.getElementById('order-biko').value.trim();
  if (!tantou) { alert('担当者を選択してください'); return; }
  if (!nouki)  { alert('希望納期を入力してください'); return; }
  const selectedItems = alertItems.filter(i => i.selected && i.orderQty > 0);
  if (!selectedItems.length) { alert('発注対象を選択してください'); return; }

  // ファイル名生成
  const STAFF_SHORT_PDF = {'向畑 充':'向畑','向畑　充':'向畑','岡崎 由美':'岡崎','岡崎　由美':'岡崎'};
  const tantouForFile = STAFF_SHORT_PDF[tantou] || tantou || '向畑';
  const MAKER_SHORT = {'TOYO':'TOYO','BS':'BS','BRIDGESTONE':'BS','DUNLOP':'DUNLOP'};
  const mc = {};
  selectedItems.forEach(i => { mc[i.maker] = (mc[i.maker]||0)+1; });
  const mm = Object.entries(mc).sort((a,b)=>b[1]-a[1])[0]?.[0] || 'TOYO';
  const now2 = new Date();
  const ds = `${now2.getFullYear()}-${String(now2.getMonth()+1).padStart(2,'0')}-${String(now2.getDate()).padStart(2,'0')}`;
  const defaultFilename = `TMFoo_発注書_自動発注_${MAKER_SHORT[mm]||mm}_${ds}`;
  document.getElementById('pdf-filename-input').value = defaultFilename;
  window._pdfFilename = defaultFilename;

  // PDF生成
  buildPrintSheet(selectedItems, tantou, nouki, biko);

  // iframeにセット（インライン用はorder-inline-frame）
  const frame = document.getElementById('order-inline-frame');
  const printContent = document.getElementById('print-content');
  if (frame && printContent && printContent.innerHTML.trim()) {
    frame.srcdoc = printContent.innerHTML.replace('<title></title>', `<title>${defaultFilename}</title>`);
  }

  // プレビューエリアを表示、通常ボタンを非表示
  document.getElementById('order-pdf-preview').style.display = 'block';
  document.getElementById('order-normal-btns').style.display = 'none';
  document.getElementById('order-submit-btn').disabled = false;

  // 発注データを保持
  window._pendingOrder = { selectedItems, tantou, nouki, biko };

  // 未入荷データを注入
  _fetchAndInjectPending();

  // プレビューエリアまでスクロール
  document.getElementById('order-pdf-preview').scrollIntoView({ behavior:'smooth' });
}

function cancelPreview() {
  document.getElementById('order-pdf-preview').style.display = 'none';
  document.getElementById('order-normal-btns').style.display = 'block';
  window._pendingOrder = null;
}

function openOrderPreviewOverlay(selectedItems, tantou, nouki, biko) {
  const totalQty = selectedItems.reduce((s,i) => s+i.orderQty, 0);

  // ファイル名候補を生成
  const STAFF_SHORT_PDF = {'向畑 充':'向畑','向畑　充':'向畑','岡崎 由美':'岡崎','岡崎　由美':'岡崎'};
  const tantouForFile = STAFF_SHORT_PDF[tantou] || tantou || '向畑';
  const MAKER_SHORT = {'TOYO':'TOYO','BS':'BS','BRIDGESTONE':'BS','DUNLOP':'DUNLOP'};
  const makerCounts2 = {};
  selectedItems.forEach(i => { makerCounts2[i.maker] = (makerCounts2[i.maker]||0)+1; });
  const mainMaker2 = Object.entries(makerCounts2).sort((a,b)=>b[1]-a[1])[0]?.[0] || 'TOYO';
  const makerShort = MAKER_SHORT[mainMaker2] || mainMaker2;
  const now2 = new Date();
  const dateStr2 = `${now2.getFullYear()}-${String(now2.getMonth()+1).padStart(2,'0')}-${String(now2.getDate()).padStart(2,'0')}`;
  const defaultFilename = `TMFoo_発注書_自動発注_${makerShort}_${dateStr2}`;

  // 静的DOMを更新
  document.getElementById('opo-subtitle').textContent = `${selectedItems.length}品目 / 計${totalQty}本`;
  document.getElementById('pdf-filename-input').value = defaultFilename;
  document.getElementById('order-preview-error').innerHTML = '';
  const confirmBtn = document.getElementById('order-confirm-btn');
  confirmBtn.disabled = false;
  confirmBtn.textContent = 'この内容で発注確定 → Notionに保存する';

  // オーバーレイは使用しない（インライン表示）

  // 発注データを保持
  window._pendingOrder = { selectedItems, tantou, nouki, biko };
  window._pdfFilename  = defaultFilename;

  history.pushState({ orderPreview: true }, '', location.href);
  window.addEventListener('popstate', _onPopStateOrder, { once: true });
}

function _onPopStateOrder(e) {
  if (e.state?.orderPreview) closeOrderPreviewOverlay();
}

function printOrderPreview() {
  // インラインプレビューとオーバーレイプレビューどちらも対応
  const frame = document.getElementById('order-inline-frame') || document.getElementById('order-preview-frame');
  if (!frame) return;
  const fname = document.getElementById('pdf-filename-input')?.value.trim() || window._pdfFilename || 'TMFoo_発注書';
  try {
    const iframeDoc = frame.contentDocument || frame.contentWindow?.document;
    if (iframeDoc) iframeDoc.title = fname;
  } catch(e) {}
  frame.contentWindow?.focus();
  frame.contentWindow?.print();
}

function closeOrderPreviewOverlay() {
  const overlay = document.getElementById('order-preview-overlay');
  if (overlay) overlay.style.display = 'none';
  window._pendingOrder = null;
  window.removeEventListener('popstate', _onPopStateOrder);
}

// 確認後にNotionへ保存
async function confirmAndSaveOrder() {
  const pending = window._pendingOrder;
  if (!pending) return;
  const { selectedItems, tantou, nouki, biko } = pending;

  const btn = document.getElementById('order-confirm-btn');
  if (btn) { btn.disabled = true; btn.textContent = '保存中…'; }
  const errEl = document.getElementById('order-preview-error');

  try {
    await createHacchuRecords(selectedItems, tantou, nouki, biko);

    // プレビューを隠してボタンを戻す
    document.getElementById('order-pdf-preview').style.display = 'none';
    document.getElementById('order-normal-btns').style.display = 'none';

    const actEl = document.getElementById('order-actions');
    actEl.innerHTML = `<div class="success-box">
      ✓ 発注管理表に ${selectedItems.length}件 を記録しました
    </div>
    <button class="btn-secondary" onclick="switchTab('history');loadHistory();">発注履歴を確認する</button>
    <button class="btn-secondary" onclick="loadAlerts();">在庫アラートを再チェック</button>`;

    alertItems = alertItems.filter(i => !selectedItems.includes(i));
    renderAlertPage();

  } catch(e) {
    if (errEl) errEl.innerHTML = `<div class="error-box" style="margin-bottom:8px;">エラー：${e.message}</div>`;
    if (btn) { btn.disabled = false; btn.textContent = 'この内容で発注確定 → Notionに保存する'; }
  }
}

async function submitOrders() {
  previewOrderPdf();
}

async function createHacchuRecords(items, tantou, nouki, biko) {
  // 並列で作成
  await Promise.all(items.map(item => {
    const warehouseLabel = item.warehouse === '五日市倉庫' ? '五日市' : '志和';
    const titleText = `${item.pattern} ${item.size} ${item.warehouse}`;
    const props = {
      'タイヤサイズ': { title: [{ text: { content: titleText } }] },
      'パターン':     { select: { name: item.pattern } },
      'サイズ':       { select: { name: item.size } },
      '数量':         { number: item.orderQty },
      '仕入先':       { select: { name: 'TOYO' } },
      '種別':         { select: { name: 'タイヤ' } },
      'ステータス':   { select: { name: '新規発注' } },
      '納入予定場所': { select: { name: warehouseLabel } },
      '注文担当':     { select: { name: tantou.includes('岡崎') ? '岡崎' : '向畑' } },
    };
    if (nouki) props['納期予定日'] = { date: { start: nouki } };
    if (biko)  props['備考欄'] = { rich_text: [{ text: { content: biko } }] };
    props['サイズコード'] = { rich_text: [{ text: { content: item.size } }] };
    return notionAPI('POST', '/pages', { parent: { database_id: HACCHU_DB }, properties: props });
  }));
}

  const noukiStr = nouki
    ? (() => { const d=new Date(nouki); return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`; })()
    : '未定';
  const todayStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
  const totalQty = items.reduce((s,i) => s + i.orderQty, 0);

  const MAKER_LABEL_MAP = {
    'TOYO':'トーヨータイヤジャパン広島営業所',

    'BRIDGESTONE':'ブリヂストンタイヤソリューションジャパン広島西',
    'DUNLOP':'ダンロップ',

  const makerCounts = {};
  items.forEach(i => { makerCounts[i.maker] = (makerCounts[i.maker]||0) + 1; });

  const mkRowNew = (item, i) => `<tr>

  const theadNew = `<tr>
    <th style="${TH('5%')}">パターン</th><th style="${TH('9%')}">サイズ</th>
    <th style="${TH('4%')}">本数</th><th style="${TH('5%')}">納入場所</th>
    <th style="${TH('4%')}">発注者</th><th style="${TH('4%')}">受注者</th>

    <th style="${TH('15%')}">備考</th>

  const newRows = items.map((item, i) => mkRowNew(item, i)).join('');

  // window._pdfState に今回の情報を保持（_fetchAndInjectPending が参照）
  window._pdfState = { makerLabel, tantouShort, issued, totalQty, theadNew, newRows, TH, tdS: null };

  // iframeに書き込む完全HTML（pending-sectionはdivのまま残す）

<title></title>
<style>

body{font-family:'Hiragino Kaku Gothic ProN','IPAGothic',sans-serif;padding:10mm 10mm;font-size:5pt;color:#1a1a18;}

  <tr>

      <div style="font-size:13pt;font-weight:bold;color:#2563a8;">発　注　書</div>

    </td>
    <td style="text-align:right;vertical-align:top;">
      <div style="font-size:7pt;font-weight:bold;">(有)タイヤマネージャーフー</div>
      <div style="font-size:5pt;color:#666;line-height:1.5;">〒731-5141 広島県広島市佐伯区千同３丁目３９４－１　TEL：082-942-3730</div>
    </td>
  </tr>
</table>
<table style="width:100%;border-collapse:collapse;border:1.5px solid #2563a8;background:#e8f0fa;margin-bottom:8px;">
  <tr>
    <td style="padding:3px 7px;width:65%;border-right:0.5px solid #b8cfe8;">
      <div style="font-size:4.5pt;color:#2563a8;font-weight:bold;margin-bottom:1px;">発注先</div>
      <div style="font-size:7pt;font-weight:bold;">${escHtml(makerLabel)}　御中</div>
    </td>
    <td style="padding:3px 7px;">
      <div style="font-size:4.5pt;color:#2563a8;font-weight:bold;margin-bottom:1px;">注文担当</div>
      <div style="font-size:5.5pt;font-weight:bold;color:#084298;">自動発注システム</div>
    </td>

</table>
<div style="font-size:5pt;font-weight:bold;color:#2563a8;margin:4px 0 2px;">■ 今回発注分</div>

async function _fetchAndInjectPending() {
  // iframeが描画された後を待つ
  await new Promise(r => setTimeout(r, 300));

  const iframe = document.getElementById('order-inline-frame') || document.getElementById('order-preview-frame');
  if (!iframe) return;

  const TH = (w='') => `padding:1px 2px;font-size:3.5pt;font-weight:bold;text-align:center;background:#1a4a80;color:#fff;border:0.3px solid #b8cfe8;white-space:nowrap;${w?'width:'+w+';':''}`;
  const tdS = (i,ex='') => `padding:1px 2px;font-size:3.5pt;text-align:center;border:0.3px solid #b8cfe8;${i%2===1?'background:#f0f5fc;':'background:#fff;'}white-space:nowrap;${ex}`;

  try {
    const body = {
      filter: { or: [
        { property: 'ステータス', select: { equals: '新規発注' } },
        { property: 'ステータス', select: { equals: '発注済' } },
      ]},
      sorts: [{ property: '発注日', direction: 'descending' }],
      page_size: 100,
    };
    const res = await notionAPI('POST', `/databases/${HACCHU_DB}/query`, body);
    const records = res.results || [];

    const fmt = s => s ? s.replace(/-/g,'/') : '—';

    // 発注日（古い順）→倉庫（五日市→志和）→カテゴリ（LTL TB→LTS→バン）
    const WH_ORD  = ['五日市','志和'];
    // 仕入先×パターンからカテゴリを推定
    const TOYO_LTL = new Set(['M646','M676','M125','M317','M323','M319','M320','M619','M626','M929','M919','M966','M920','M939']);
    const TOYO_LTS = new Set(['M634','M135','M134e','M131','M804','M935','M937','M934']);
    const BS_LTL   = new Set(['M888','M899','M801','M746','R225','R241','G539','W910','W900S','W911','W970','W999']);
    const BS_LTS   = new Set(['R207','W989','LV01','LT01']);
    const VAN_PAT  = new Set(['V03e','V02e','K370','R710','V600','W300','M935','VL10A','VAN01','SV01']);
    const RT_PAT   = new Set(['RTM810','RTM804','RTM807','RTM81C-170','RTM890','RTW910','RTW911','RTW970','RTG610','RTM919']);
    function getCatOrder(r) {
      const pat = r.properties['パターン']?.select?.name || '';
      if (RT_PAT.has(pat)) return 4;
      if (VAN_PAT.has(pat)) return 5;
      if (TOYO_LTL.has(pat) || BS_LTL.has(pat)) return 0; // LTL TB
      if (TOYO_LTS.has(pat) || BS_LTS.has(pat)) return 2; // LTS
      return 6;
    }
    records.sort((a, b) => {
      const da = a.properties['発注日']?.date?.start || '';
      const db2 = b.properties['発注日']?.date?.start || '';
      if (da !== db2) return da < db2 ? -1 : 1;
      const pa = a.properties['納入予定場所']?.select?.name || '';
      const pb = b.properties['納入予定場所']?.select?.name || '';
      const wa = WH_ORD.indexOf(pa), wb = WH_ORD.indexOf(pb);
      if (wa !== wb) return (wa===-1?99:wa) - (wb===-1?99:wb);
      const ca = getCatOrder(a), cb = getCatOrder(b);
      if (ca !== cb) return ca - cb;
      return (a.properties['パターン']?.select?.name||'').localeCompare(b.properties['パターン']?.select?.name||'');
    });

    const pendingRows = records.map((r, i) => {
      const p = r.properties;
      const pat    = p['パターン']?.select?.name || '—';
      const size   = p['サイズ']?.select?.name || p['サイズコード']?.rich_text?.[0]?.plain_text || '—';
      const qty    = p['数量']?.number ?? '—';
      const place  = p['納入予定場所']?.select?.name || '—';
      const nouki  = p['納期予定日']?.date?.start || '';
      const odate  = p['発注日']?.date?.start || '';
      const recv   = p['受注者']?.rich_text?.[0]?.plain_text || p['担当者']?.select?.name || '—';
      const tantouR= p['注文担当']?.select?.name || '—';
      const memo   = p['備考欄']?.rich_text?.[0]?.plain_text || '';
      return `<tr>
        <td style="${tdS(i)}">${pat}</td>
        <td style="${tdS(i)}">${size}</td>
        <td style="${tdS(i,'font-weight:bold;color:#e07000;')}">${qty}</td>
        <td style="${tdS(i)}">${place}</td>
        <td style="${tdS(i)}">${tantouR}</td>
        <td style="${tdS(i)}">${recv}</td>
        <td style="${tdS(i)}">${fmt(odate)}</td>
        <td style="${tdS(i)}">${fmt(nouki)}</td>
        <td style="${tdS(i,'color:#888;white-space:normal;text-align:left;')}">${memo}</td>
      </tr>`;
    }).join('');

    const totalPending = records.reduce((s,r) => s + (r.properties['数量']?.number || 0), 0);

    const pendingHtml = records.length === 0 ? '' : `
<div style="font-size:4pt;font-weight:bold;color:#2563a8;margin-bottom:2px;">■ 未入荷（既発注分）</div>
<table style="width:100%;border-collapse:collapse;table-layout:fixed;"><thead><tr>
  <th style="${TH('5%')}">パターン</th><th style="${TH('9%')}">サイズ</th>
  <th style="${TH('4%')}">本数</th><th style="${TH('5%')}">納入場所</th>
  <th style="${TH('4%')}">発注者</th><th style="${TH('4%')}">受注者</th>
  <th style="${TH('7%')}">発注日</th><th style="${TH('7%')}">納期予定</th>
  <th style="${TH('15%')}">備考</th>
</tr></thead><tbody>${pendingRows}</tbody></table>
<div style="text-align:right;margin-top:2px;padding-top:2px;border-top:0.5px solid #e0dcd6;font-size:3pt;color:#666;">
  未入荷合計：<span style="font-size:6pt;font-weight:bold;color:#1a1a18;">${totalPending}本</span>
</div>`;

    // iframeのcontentDocumentのDOMを直接書き換える
    const iframeDoc = iframe.contentDocument || iframe.contentWindow?.document;
    if (iframeDoc) {
      const el = iframeDoc.getElementById('pending-section');
      if (el) {
        el.innerHTML = pendingHtml;

      }
    }

  } catch(e) {
    console.warn('未入荷データ取得失敗:', e.message);
    const iframeDoc = iframe.contentDocument || iframe.contentWindow?.document;
    if (iframeDoc) {
      const el = iframeDoc.getElementById('pending-section');
      if (el) el.innerHTML = `<div style="font-size:4.5pt;color:#e07000;">未入荷データ取得失敗: ${e.message}</div>`;
    }
  }
}
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadHistory() {
  const el = document.getElementById('history-content');
  el.innerHTML = '<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">発注履歴を取得中…</div></div>';
  try {
    const res = await notionAPI('POST', `/databases/${HACCHU_DB}/query`, {
      filter: { property: '種別', select: { equals: 'タイヤ' } },
      sorts: [{ property: '発注日', direction: 'descending' }],
      page_size: 50,
    });
    renderHistory(res.results || []);
  } catch(e) {
    el.innerHTML = `<div class="content"><div class="error-box">取得エラー：${e.message}</div><button class="btn-secondary" onclick="loadHistory()">再試行</button></div>`;
  }
}

function renderHistory(records) {
  const el = document.getElementById('history-content');
  if (!records.length) {
    el.innerHTML = '<div style="text-align:center;padding:48px 20px;color:var(--muted);font-size:14px;">発注履歴がありません</div>';
    return;
  }
  const STATUS_CLASS = {
    '新規発注': 'st-new', '発注済': 'st-ordered', '納入済': 'st-done', 'キャンセル': 'st-cancel'
  };
  const MAKER_GROUPS = [
    { key:'TOYO',       label:'TOYO TIRE',   color:'var(--accent)' },
    { key:'BRIDGESTONE',label:'BRIDGESTONE', color:'var(--blue)' },
    { key:'DUNLOP',     label:'DUNLOP',      color:'var(--purple)' },
    { key:'その他',     label:'その他',      color:'var(--muted)' },
  ];
  const grouped = {};
  records.forEach(r => {
    const sup = r.properties['仕入先']?.select?.name || 'その他';
    const g = MAKER_GROUPS.find(m => m.key === sup) ? sup : 'その他';
    if (!grouped[g]) grouped[g] = [];
    grouped[g].push(r);
  });

  let html = '<div style="padding:12px 0 0;">';
  MAKER_GROUPS.forEach(mg => {
    const rows = grouped[mg.key];
    if (!rows || !rows.length) return;
    html += `<div style="display:flex;align-items:center;gap:6px;padding:8px 0 5px;border-top:0.5px solid var(--border);margin-top:2px;">
      <div style="width:7px;height:7px;border-radius:50%;background:${mg.color};flex-shrink:0;"></div>
      <span style="font-size:10px;font-weight:700;color:${mg.color};letter-spacing:.06em;text-transform:uppercase;">${mg.label}</span>
    </div>`;
    rows.forEach(r => {
      const p = r.properties;
      const title   = p['タイヤサイズ']?.title?.[0]?.plain_text || '—';
      const status  = p['ステータス']?.select?.name || '—';
      const qty     = p['数量']?.number ?? '—';
      const nouki   = p['納期予定日']?.date?.start || '';
      const place   = p['納入予定場所']?.select?.name || '—';
      const tantou  = p['注文担当']?.select?.name || '—';
      const pattern = p['パターン']?.select?.name || '';
      const dateStr = r.created_time ? new Date(r.created_time).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'}) : '—';
      const stCls   = STATUS_CLASS[status] || 'st-new';
      const noukiStr= nouki ? new Date(nouki).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'}) : '—';
      html += `<div class="history-row">
        <div class="history-row-head">
          <div class="history-date">${dateStr} 登録</div>
          <span class="history-status ${stCls}">${status}</span>
        </div>
        <div class="history-row-body">
          ${pattern ? `<span style="font-size:13px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text);margin-right:6px;">${escHtml(pattern)}</span>` : ''}
          <strong style="font-family:'DM Mono',monospace;">${escHtml(title)}</strong>
          &nbsp; <strong style="color:var(--accent);">${qty}本</strong>
        </div>
        <div class="history-row-meta">納入先：${place} ／ 担当：${tantou} ／ 希望納期：${noukiStr}</div>
      </div>`;
    });
  });
  html += '</div>';
  el.innerHTML = html;
}

function switchTab(tab) {
  const tabs = ['alert','order','history','threshold'];
  document.querySelectorAll('.nav-btn').forEach((b,i) => {
    b.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  if (tab === 'history') loadHistory();
  if (tab === 'threshold') loadThresholdPage();
}

      <div style="display:flex;align-items:center;gap:6px;">
        <button onclick="thNewQty=Math.max(1,thNewQty-1);document.getElementById('th-new-qty').textContent=thNewQty;" style="width:34px;height:34px;border-radius:8px;border:1px solid var(--border2);background:var(--s3);color:var(--text);font-size:18px;cursor:pointer;">−</button>
        <div id="th-new-qty" style="font-size:20px;font-weight:700;color:var(--accent);min-width:44px;text-align:center;font-family:'DM Mono',monospace;">${thNewQty}</div>
        <button onclick="thNewQty=thNewQty+1;document.getElementById('th-new-qty').textContent=thNewQty;" style="width:34px;height:34px;border-radius:8px;border:1px solid var(--border2);background:var(--s3);color:var(--text);font-size:18px;cursor:pointer;">＋</button>
        <span style="font-size:12px;color:var(--muted);">本</span>
      </div>
    </div>

    <div id="th-save-wrap" style="display:none;">
      <div id="th-save-error" style="display:none;" class="error-box"></div>
      <button id="th-save-btn" onclick="saveNewThreshold()" style="width:100%;background:var(--accent);border:none;border-radius:10px;padding:13px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">Notionに保存する</button>
    </div>
  </div>
  <div style="height:20px;"></div>
  </div>`;

  el.innerHTML = html;
}

// サイズ検索→既存しきい値を表示
function onThViewInput(v) {
  const dd = document.getElementById('th-view-drop');
  const q = v.trim();
  if (!q) { dd.style.display='none'; document.getElementById('th-view-results').innerHTML=''; return; }
  const dq = q.replace(/[^\d]/g,'');
  const allSizes = new Set();
  Object.values(CAT_SIZES).forEach(arr => arr.forEach(s => allSizes.add(s)));
  const hits = [...allSizes].filter(s => {
    const ds = s.replace(/[^\d]/g,'');
    return s.toLowerCase().includes(q.toLowerCase()) || (dq.length >= 3 && ds.startsWith(dq));
  }).slice(0,10);
  if (!hits.length) { dd.style.display='none'; return; }
  dd.innerHTML = hits.map(s =>
    `<div onclick="thViewPickSize('${s.replace(/'/g,"\\'")}');document.getElementById('th-view-drop').style.display='none';"
     style="padding:9px 12px;font-size:13px;cursor:pointer;border-bottom:0.5px solid var(--border);color:var(--text);">${s}</div>`
  ).join('');
  dd.style.display = 'block';
}

function thViewPickSize(size) {
  const inp = document.getElementById('th-view-input');
  if (inp) inp.value = size;
  document.getElementById('th-view-drop').style.display = 'none';

  if (!snapshotCache) { document.getElementById('th-view-results').innerHTML = '<div style="font-size:12px;color:var(--muted);padding:8px 0;">読み込み中…</div>'; return; }

  // このサイズのスナップショットレコードを全件抽出
  const matches = Object.entries(snapshotCache).filter(([key]) => {
    const [,,sz] = key.split('|');
    // 全角・半角スペース正規化して比較
    return sz.replace(/[　 ]/g,' ') === size.replace(/[　 ]/g,' ');
  });

  if (!matches.length) {
    document.getElementById('th-view-results').innerHTML = '<div style="font-size:12px;color:var(--muted);padding:8px 0;">このサイズのレコードが見つかりません</div>';
    return;
  }

  // パターン別にグルーピング
  const byPattern = {};
  matches.forEach(([key, snap]) => {
    const [cat, pattern, sz, wh] = key.split('|');
    const pKey = `${cat}|${pattern}|${sz}`;
    if (!byPattern[pKey]) byPattern[pKey] = { cat, pattern, size: sz, items: {} };
    byPattern[pKey].items[wh] = { key, snap };
  });

  let html = `<div style="font-size:10px;color:var(--muted);margin-bottom:6px;">${size} の設定済みしきい値</div>`;
  Object.values(byPattern).forEach(g => {
    const itsuka = g.items['五日市倉庫'];
    const shiwa  = g.items['志和倉庫'];
    html += `<div style="background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:9px 10px;margin-bottom:6px;">
      <div style="background:var(--s3);border-radius:7px;padding:7px 10px;margin-bottom:8px;">
        <div style="display:flex;align-items:baseline;gap:8px;">
          <span style="font-size:13px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text);">${g.pattern}</span>
          <span style="font-size:13px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text);">${g.size}</span>
        </div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px;">${g.cat}</div>
      </div>
      <div style="display:flex;gap:8px;">
        ${itsuka ? `<div style="flex:1;">
          <div style="font-size:10px;font-weight:700;color:var(--green);margin-bottom:4px;">五日市倉庫</div>
          <div style="display:flex;align-items:center;gap:0;">
            <button onclick="changeThreshold('${itsuka.key}',-1)" style="width:28px;height:28px;border-radius:6px 0 0 6px;border:1px solid var(--border2);background:var(--s3);color:var(--text);font-size:15px;cursor:pointer;">−</button>
            <div id="th-num-${keyToSafeId(itsuka.key)}" style="flex:1;font-size:15px;font-weight:700;color:var(--accent);text-align:center;border-top:1px solid var(--border2);border-bottom:1px solid var(--border2);height:28px;line-height:28px;font-family:'DM Mono',monospace;">${itsuka.snap.threshold||0}</div>
            <button onclick="changeThreshold('${itsuka.key}',+1)" style="width:28px;height:28px;border-radius:0 6px 6px 0;border:1px solid var(--border2);background:var(--s3);color:var(--text);font-size:15px;cursor:pointer;">＋</button>
          </div>
        </div>` : `<div style="flex:1;opacity:0.3;"><div style="font-size:10px;color:var(--muted);">五日市倉庫</div><div style="height:28px;border-radius:6px;border:1px dashed var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);">未設定</div></div>`}
        ${shiwa ? `<div style="flex:1;">
          <div style="font-size:10px;font-weight:700;color:var(--blue);margin-bottom:4px;">志和倉庫</div>
          <div style="display:flex;align-items:center;gap:0;">
            <button onclick="changeThreshold('${shiwa.key}',-1)" style="width:28px;height:28px;border-radius:6px 0 0 6px;border:1px solid var(--border2);background:var(--s3);color:var(--text);font-size:15px;cursor:pointer;">−</button>
            <div id="th-num-${keyToSafeId(shiwa.key)}" style="flex:1;font-size:15px;font-weight:700;color:var(--accent);text-align:center;border-top:1px solid var(--border2);border-bottom:1px solid var(--border2);height:28px;line-height:28px;font-family:'DM Mono',monospace;">${shiwa.snap.threshold||0}</div>
            <button onclick="changeThreshold('${shiwa.key}',+1)" style="width:28px;height:28px;border-radius:0 6px 6px 0;border:1px solid var(--border2);background:var(--s3);color:var(--text);font-size:15px;cursor:pointer;">＋</button>
          </div>
        </div>` : `<div style="flex:1;opacity:0.3;"><div style="font-size:10px;color:var(--muted);">志和倉庫</div><div style="height:28px;border-radius:6px;border:1px dashed var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);">未設定</div></div>`}
      </div>
    </div>`;
  });
  document.getElementById('th-view-results').innerHTML = html;
}


// しきい値変更（±ボタン）→ 即座にNotionに保存
async function changeThreshold(key, delta) {
  const snap = snapshotCache[key];
  if (!snap || !snap.pageId) return;
  const newVal = Math.max(0, (snap.threshold || 0) + delta);
  snap.threshold = newVal;
  const safeId = keyToSafeId(key);
  const el = document.getElementById(`th-num-${safeId}`);
  if (el) el.textContent = newVal;
  try {
    await notionAPI('PATCH', `/pages/${snap.pageId}`, {
      properties: { 'しきい値': { number: newVal } }
    });
  } catch(e) {
    console.error('しきい値保存エラー:', e);
  }
}

// サイズ予測検索
function onThSizeInput(v) {
  const dd = document.getElementById('th-size-drop');
  const q = v.trim();
  if (!q) { dd.style.display = 'none'; return; }
  const dq = q.replace(/[^\d]/g,'');
  const allSizes = new Set();
  Object.values(CAT_SIZES).forEach(arr => arr.forEach(s => allSizes.add(s)));
  const hits = [...allSizes].filter(s => {
    const ds = s.replace(/[^\d]/g,'');
    return s.toLowerCase().includes(q.toLowerCase()) || (dq.length >= 3 && ds.startsWith(dq));
  }).slice(0,10);
  if (!hits.length) { dd.style.display = 'none'; return; }
  dd.innerHTML = hits.map(s =>
    `<div onclick="thPickSize('${s.replace(/'/g,"\'")}');document.getElementById('th-size-drop').style.display='none';"
     style="padding:9px 12px;font-size:13px;cursor:pointer;border-bottom:0.5px solid var(--border);color:var(--text);">${s}</div>`
  ).join('');
  dd.style.display = 'block';
}

let thSelSize = '';
let thSelPattern = '';

function thPickSize(s) {
  thSelSize = s;
  const inp = document.getElementById('th-size-input');
  if (inp) inp.style.display = 'none';
  const chosen = document.getElementById('th-size-chosen');
  document.getElementById('th-size-val').textContent = s;
  chosen.style.display = 'flex';
  // カテゴリチップ表示
  const matchCats = Object.entries(CAT_SIZES).filter(([,sizes]) => sizes.includes(s)).map(([cat]) => cat);
  const wrap = document.getElementById('th-cat-wrap');
  const chips = document.getElementById('th-cat-chips');
  if (matchCats.length) {
    chips.innerHTML = matchCats.map(cat =>
      `<button onclick="thPickCat('${cat}')" id="th-chip-${keyToSafeId(cat)}"
       style="padding:4px 10px;border-radius:12px;border:1px solid var(--border2);background:var(--s2);color:var(--muted);font-size:11px;cursor:pointer;font-family:inherit;">${cat}</button>`
    ).join('');
    wrap.style.display = 'block';
    if (matchCats.length === 1) thPickCat(matchCats[0]);
  }
  thUpdateSaveVisibility();
}

function thClearSize() {
  thSelSize = ''; thSelPattern = ''; thNewCat = '';
  const inp = document.getElementById('th-size-input');
  if (inp) { inp.style.display = ''; inp.value = ''; }
  document.getElementById('th-size-chosen').style.display = 'none';
  document.getElementById('th-cat-wrap').style.display = 'none';
  document.getElementById('th-pattern-wrap').style.display = 'none';
  document.getElementById('th-wh-wrap').style.display = 'none';
  document.getElementById('th-qty-wrap').style.display = 'none';
  document.getElementById('th-save-wrap').style.display = 'none';
}

function thPickCat(cat) {
  thNewCat = cat;
  document.querySelectorAll('#th-cat-chips button').forEach(b => {
    b.style.borderColor = b.textContent === cat ? 'var(--accent)' : 'var(--border2)';
    b.style.color       = b.textContent === cat ? 'var(--accent)' : 'var(--muted)';
    b.style.background  = b.textContent === cat ? 'rgba(240,165,0,.1)' : 'var(--s2)';
  });
  // パターンドロップダウン構築
  const patterns = CAT_PATTERNS[cat] || [];
  const patWrap = document.getElementById('th-pattern-wrap');
  const patInp  = document.getElementById('th-pattern-input');
  patInp.value = '';
  patInp.dataset.patterns = JSON.stringify(patterns);
  patWrap.style.display = 'block';
  document.getElementById('th-wh-wrap').style.display = 'block';
  document.getElementById('th-qty-wrap').style.display = 'block';
  thUpdateSaveVisibility();
}

function onThPatternInput(v) {
  const dd = document.getElementById('th-pattern-drop');
  const patterns = JSON.parse(document.getElementById('th-pattern-input').dataset.patterns || '[]');
  const q = v.trim().toUpperCase();
  if (!q) { dd.style.display = 'none'; return; }
  const hits = patterns.filter(p => p.toUpperCase().startsWith(q) || p.toUpperCase().includes(q)).slice(0,8);
  if (!hits.length) { dd.style.display = 'none'; return; }
  dd.innerHTML = hits.map(p =>
    `<div onclick="document.getElementById('th-pattern-input').value='${p}';document.getElementById('th-pattern-drop').style.display='none';thSelPattern='${p}';"
     style="padding:9px 12px;font-size:13px;cursor:pointer;border-bottom:0.5px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;">${p}</div>`
  ).join('');
  dd.style.display = 'block';
}

function thSelectWh(wh) {
  thNewWh = wh;
  const i = document.getElementById('th-wh-itsuka');
  const s = document.getElementById('th-wh-shiwa');
  if (wh === '五日市倉庫') {
    i.style.borderColor='var(--accent)'; i.style.color='var(--accent)'; i.style.background='rgba(240,165,0,.1)';
    s.style.borderColor='var(--border2)'; s.style.color='var(--muted)'; s.style.background='var(--s3)';
  } else {
    s.style.borderColor='var(--blue)'; s.style.color='var(--blue)'; s.style.background='rgba(59,130,246,.1)';
    i.style.borderColor='var(--border2)'; i.style.color='var(--muted)'; i.style.background='var(--s3)';
  }
}

function thUpdateSaveVisibility() {
  const showSave = thSelSize && thNewCat;
  document.getElementById('th-save-wrap').style.display = showSave ? 'block' : 'none';
}

async function saveNewThreshold() {
  const pattern = document.getElementById('th-pattern-input').value.trim() || thSelPattern;
  const size    = thSelSize;
  const cat     = thNewCat;
  const wh      = thNewWh;
  const val     = thNewQty;
  const errEl   = document.getElementById('th-save-error');
  const btn     = document.getElementById('th-save-btn');

  // サイズが未選択の場合、入力欄の値をそのまま使う
  const sizeVal = size || document.getElementById('th-size-input')?.value.trim();
  if (!sizeVal || !cat) { errEl.textContent='サイズとカテゴリを選択してください'; errEl.style.display='block'; return; }
  if (!size) thSelSize = sizeVal;
  errEl.style.display = 'none';
  btn.disabled = true; btn.textContent = '保存中…';

  const key = `${cat}|${pattern}|${size}|${wh}`;
  const snap = snapshotCache?.[key];

  try {
    if (snap && snap.pageId) {
      // 既存レコードのしきい値を更新
      await notionAPI('PATCH', `/pages/${snap.pageId}`, {
        properties: { 'しきい値': { number: val } }
      });
      snapshotCache[key].threshold = val;
    } else {
      // スナップショットに新規レコード作成
      const name = pattern ? `${pattern}|${size}|${wh}` : `${size}|${wh}`;
      const res = await notionAPI('POST', '/pages', {
        parent: { database_id: SNAPSHOT_DB },
        properties: {
          'Name':       { title: [{ text: { content: name } }] },
          'パターン名': { rich_text: [{ text: { content: pattern } }] },
          'サイズコード':{ rich_text: [{ text: { content: size } }] },
          'カテゴリ':   { select: { name: cat } },
          '倉庫':       { select: { name: wh } },
          '在庫数':     { number: 0 },
          'しきい値':   { number: val },
        }
      });
      if (snapshotCache) snapshotCache[key] = { pageId: res.id, stock: 0, threshold: val };
    }
    btn.textContent = '✓ 保存しました';
    setTimeout(() => {
      snapshotCache = null;
      loadThresholdPage();
    }, 800);
  } catch(e) {
    errEl.textContent = '保存エラー: ' + e.message;
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Notionに保存する';
  }
}
