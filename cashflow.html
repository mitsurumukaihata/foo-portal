<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>資金繰り | Cash Flow f.o.o</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #18181f; --s1: #101015; --s2: #1e1e26; --s3: #26262f;
  --border: #2c2c38; --border2: #3c3c4a; --text: #f0f0f2; --muted: #68687a;
  --accent: #f0a500; --accent2: #f5be40; --green: #22c55e; --blue: #3b82f6;
  --yellow: #f59e0b; --red: #ef4444; --purple: #a855f7;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #fdf6ee; --s1: #ffffff; --s2: #fdf0e4; --s3: #f5e6d4;
    --border: #e8d8c4; --border2: #d8c4a8; --text: #1a1208; --muted: #a08060;
    --accent: #e07000; --accent2: #c05800; --green: #1a9e4a; --blue: #2563eb;
    --yellow: #d97706; --red: #dc2626; --purple: #9333ea;
  }
}
[data-theme="dark"] {
  --bg: #18181f; --s1: #101015; --s2: #1e1e26; --s3: #26262f;
  --border: #2c2c38; --border2: #3c3c4a; --text: #f0f0f2; --muted: #68687a;
  --accent: #f0a500; --accent2: #f5be40; --green: #22c55e; --blue: #3b82f6;
  --yellow: #f59e0b; --red: #ef4444; --purple: #a855f7;
}
[data-theme="light"] {
  --bg: #fdf6ee; --s1: #ffffff; --s2: #fdf0e4; --s3: #f5e6d4;
  --border: #e8d8c4; --border2: #d8c4a8; --text: #1a1208; --muted: #a08060;
  --accent: #e07000; --accent2: #c05800; --green: #1a9e4a; --blue: #2563eb;
  --yellow: #d97706; --red: #dc2626; --purple: #9333ea;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; max-width: 480px; margin: 0 auto; }

/* ── ヘッダー ── */
.app-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px 8px; }
.portal-link { display:flex; align-items:center; gap:4px; color:var(--muted); font-size:12px; text-decoration:none; }
.portal-link svg { width:16px; height:16px; }
.portal-link:active { opacity:0.6; }
.app-title { font-size:20px; font-weight:900; letter-spacing:-0.03em; padding:0 20px 4px; }
.app-title span { color:var(--accent); }
.app-subtitle { font-size:11px; color:var(--muted); padding:0 20px 12px; }

/* ── 月セレクタ ── */
.month-bar { display:flex; align-items:center; justify-content:center; gap:12px; padding:8px 20px 16px; }
.month-bar button { background:var(--s2); border:1px solid var(--border2); border-radius:8px; width:36px; height:36px; color:var(--text); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.month-bar button:active { background:var(--s3); }
.month-label { font-family:'DM Mono',monospace; font-size:17px; font-weight:700; min-width:130px; text-align:center; }

/* ── ナビ ── */
.nav { display:flex; gap:2px; padding:0 20px 12px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.nav::-webkit-scrollbar { display:none; }
.nav-btn { flex-shrink:0; background:var(--s2); border:1px solid var(--border); border-radius:8px; padding:9px 14px; font-size:12px; font-weight:600; color:var(--muted); cursor:pointer; font-family:'Noto Sans JP',sans-serif; transition:all 0.15s; white-space:nowrap; }
.nav-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

/* ── ページ ── */
.page { display:none; padding:0 20px 100px; }
.page.show { display:block; }

/* ── カード ── */
.card { background:var(--s2); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:10px; }
.card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.card-label { font-size:11px; color:var(--muted); font-weight:500; }
.card-value { font-family:'DM Mono',monospace; font-size:22px; font-weight:700; }
.card-value.green { color:var(--green); }
.card-value.red { color:var(--red); }
.card-value.blue { color:var(--blue); }

/* ── サマリーカード群 ── */
.summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
.summary-card { background:var(--s2); border:1px solid var(--border); border-radius:10px; padding:12px; }
.summary-card .label { font-size:10px; color:var(--muted); margin-bottom:4px; }
.summary-card .value { font-family:'DM Mono',monospace; font-size:16px; font-weight:700; }

/* ── チャート ── */
.chart-wrap { background:var(--s2); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:12px; }
.chart-title { font-size:12px; font-weight:700; margin-bottom:10px; color:var(--text); }
.chart-canvas { width:100%; height:200px; }

/* ── テーブル ── */
.data-table { width:100%; border-collapse:collapse; font-size:12px; }
.data-table th { text-align:left; padding:8px 6px; font-size:10px; color:var(--muted); font-weight:600; border-bottom:1px solid var(--border2); white-space:nowrap; }
.data-table td { padding:8px 6px; border-bottom:0.5px solid var(--border); vertical-align:top; }
.data-table .num { font-family:'DM Mono',monospace; text-align:right; white-space:nowrap; }
.data-table .tag { display:inline-block; padding:2px 7px; border-radius:12px; font-size:10px; font-weight:600; white-space:nowrap; }
.tag-unpaid { background:rgba(239,68,68,0.15); color:var(--red); }
.tag-reserved { background:rgba(59,130,246,0.15); color:var(--blue); }
.tag-paid { background:rgba(34,197,94,0.15); color:var(--green); }
.tag-hold { background:rgba(245,158,11,0.15); color:var(--yellow); }
.tag-repaying { background:rgba(107,114,128,0.2); color:var(--muted); }
.tag-completed { background:rgba(34,197,94,0.15); color:var(--green); }
.tag-overdue { background:rgba(239,68,68,0.15); color:var(--red); }

/* ── 棒グラフ（SVG不要、CSS） ── */
.bar-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.bar-label { font-size:10px; color:var(--muted); width:55px; text-align:right; flex-shrink:0; }
.bar-track { flex:1; height:18px; background:var(--s3); border-radius:4px; overflow:hidden; position:relative; display:flex; }
.bar-seg { height:100%; transition:width 0.4s ease; }
.bar-val { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); width:65px; text-align:right; flex-shrink:0; }

/* ── 円グラフ凡例 ── */
.pie-legend { display:flex; flex-wrap:wrap; gap:6px 12px; margin-top:8px; }
.pie-legend-item { display:flex; align-items:center; gap:4px; font-size:10px; }
.pie-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

/* ── フォーム ── */
.form-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100; justify-content:center; align-items:flex-end; }
.form-overlay.show { display:flex; }
.form-sheet { background:var(--bg); border-radius:20px 20px 0 0; width:100%; max-width:480px; max-height:85vh; overflow-y:auto; padding:20px 20px 32px; }
.form-title { font-size:16px; font-weight:700; margin-bottom:16px; }
.form-group { margin-bottom:14px; }
.form-label { font-size:11px; color:var(--muted); font-weight:600; margin-bottom:5px; }
.form-input { width:100%; background:var(--s2); border:1.5px solid var(--border); border-radius:10px; padding:12px 14px; font-size:14px; color:var(--text); outline:none; font-family:inherit; }
.form-input:focus { border-color:var(--accent); }
.form-select { width:100%; background:var(--s2); border:1.5px solid var(--border); border-radius:10px; padding:12px 14px; font-size:14px; color:var(--text); outline:none; font-family:inherit; appearance:none; }
.form-select:focus { border-color:var(--accent); }
.form-input[inputmode="numeric"], .form-input[inputmode="decimal"] { font-family:'DM Mono',monospace; }
.form-row { display:flex; gap:8px; }
.form-row > * { flex:1; }
.form-btn { width:100%; background:var(--accent); border:none; border-radius:10px; padding:14px; color:#fff; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; margin-top:8px; }
.form-btn:disabled { opacity:0.4; cursor:default; }
.form-btn-cancel { width:100%; background:var(--s3); border:1px solid var(--border2); border-radius:10px; padding:12px; color:var(--text); font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; margin-top:6px; }
.form-btn-cancel:active { opacity:0.7; }

/* ── ローディング ── */
.loading { text-align:center; padding:40px 20px; color:var(--muted); font-size:13px; }
.loading::before { content:''; display:block; width:28px; height:28px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── FAB ── */
.fab { position:fixed; bottom:24px; right:24px; width:52px; height:52px; border-radius:50%; background:var(--accent); border:none; color:#fff; font-size:28px; font-weight:300; cursor:pointer; box-shadow:0 4px 16px rgba(0,0,0,0.4); display:none; align-items:center; justify-content:center; z-index:50; }
.fab.show { display:flex; }

/* ── 銀行残高プログレス ── */
.bank-card { background:var(--s2); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:8px; }
.bank-name { font-size:13px; font-weight:700; margin-bottom:4px; }
.bank-balance { font-family:'DM Mono',monospace; font-size:20px; font-weight:700; margin-bottom:6px; }
.bank-meta { font-size:10px; color:var(--muted); }

/* ── 返済カード ── */
.loan-card { background:var(--s2); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:8px; }
.loan-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
.loan-name { font-size:13px; font-weight:700; }
.loan-amount { font-family:'DM Mono',monospace; font-size:16px; font-weight:700; }
.loan-detail { font-size:11px; color:var(--muted); line-height:1.8; }
.loan-progress { height:4px; background:var(--s3); border-radius:2px; margin-top:8px; overflow:hidden; }
.loan-progress-bar { height:100%; background:var(--accent); border-radius:2px; transition:width 0.4s; }

/* ── 空状態 ── */
.empty-state { text-align:center; padding:40px 20px; color:var(--muted); font-size:13px; line-height:1.8; }
</style>
</head>
<body>

<!-- ── ヘッダー ── -->
<div class="app-header">
  <a href="https://mitsurumukaihata.github.io/foo-portal/" class="portal-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>

  </a>
</div>
<div class="app-title">資金<span>繰り</span></div>

<!-- ── 月セレクタ ── -->

</div>

<!-- ── ナビ ── -->
<div class="nav">
  <button class="nav-btn active" onclick="switchTab('dash')">ダッシュボード</button>

</div>

<!-- ── ページ ── -->
<div class="page show" id="page-dash"><div id="dash-content"><div class="loading">データを取得中…</div></div></div>

<script>
// ─── 設定 ──────────────────────────────────────────────────────────────────────
const PROXY = 'https://notion-proxy.33322666666mm.workers.dev';
const DB = {
  payment:  '2e8a695f-8e88-80dd-a57f-d1914389e217', // 支払いDB（請求書）
  bank:     '1fda695f-8e88-80e4-8104-fda466999e0e', // 銀行別DB

  loan:     '1f1a695f-8e88-808b-b8d3-d57acf8ea6e7', // 返済スケジュール
};

const VENDORS = ['TOYO','DUNLOP','BRIDGESTONE','三上タイヤ','下岡タイヤ','ふそう','ふそう(登録諸税等)','アクトシステム','林電機','大東建託','船越ガレージ','ISCごみ処理','FIELD','佐川急便','SAISONプラチナ','SAISONパール','オリコ宇佐美カード','Dカード','paypayカード'];
const PAY_BANKS = ['③もみじ銀行　観音','④広銀　観音','⑤広銀　海田','⑥広信　八本松','⑦広銀　充','⑨シシンヨー'];
const BANK_NAMES = ['もみじ','広銀　観音','広銀　海田','広信','シシンヨー','ヤフオク売上金'];
const LOAN_BANKS = ['広島銀行　観音','もみじ銀行　堺','広島信用金庫　八本松','シシンヨー　五日市'];

// ── 期間定義 ──
const PERIODS = [
  { key:'1-5',   label:'1〜5',   from:1,  to:5  },
  { key:'6-10',  label:'6〜10',  from:6,  to:10 },
  { key:'11-15', label:'11〜15', from:11, to:15 },
  { key:'16-20', label:'16〜20', from:16, to:20 },
  { key:'21-25', label:'21〜25', from:21, to:25 },
  { key:'26-end',label:'26〜末', from:26, to:31 },
];

// 引落日 → 期間マップ
const DEBIT_PERIOD = { '5日':'1-5', '10日':'6-10', '15日':'11-15', '29日':'26-end' };

// ── 状態 ──
let currentTab = 'dash';
let targetYear, targetMonth;
let cache = {};

// ─── テーマ同期 ────────────────────────────────────────────────────────────────
(function initTheme() {
  const t = localStorage.getItem('foo_portal_theme');
  if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
})();

// ─── 月制御 ──────────────────────────────────────────────────────────────────
function initMonth() {
  const now = new Date();
  targetYear = now.getFullYear();
  targetMonth = now.getMonth() + 1;
  updateMonthLabel();
}
function changeMonth(d) {
  targetMonth += d;
  if (targetMonth > 12) { targetMonth = 1; targetYear++; }
  if (targetMonth < 1)  { targetMonth = 12; targetYear--; }
  updateMonthLabel();
  cache = {};
  loadTab(currentTab);
}
function updateMonthLabel() {
  document.getElementById('month-label').textContent = `${targetYear}年${targetMonth}月`;
}
function ym() { return `${targetYear}-${String(targetMonth).padStart(2,'0')}`; }
// 前月の末日を取得
function prevMonthEnd() {
  const d = new Date(targetYear, targetMonth - 1, 0);
  return d.toISOString().slice(0, 10);
}

// ─── Notion API ────────────────────────────────────────────────────────────────
async function notionAPI(method, path, body) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 20000);
  try {
    const res = await fetch(PROXY + path, {
      method, headers: { 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined, signal: ctrl.signal
    });
    clearTimeout(timer);
    const data = await res.json();
    if (data.object === 'error') throw new Error(data.message);
    return data;
  } catch(e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') throw new Error('タイムアウト');
    throw new Error('通信エラー: ' + e.message);
  }
}

// ページネーション付きクエリ
async function queryAll(dbId, body) {
  let all = [], cursor = null;
  while (true) {
    const b = { ...body, page_size: 100 };
    if (cursor) b.start_cursor = cursor;
    const res = await notionAPI('POST', `/databases/${dbId}/query`, b);
    all = all.concat(res.results || []);
    if (!res.has_more) break;
    cursor = res.next_cursor;
  }
  return all;
}

// ─── ヘルパー ──────────────────────────────────────────────────────────────────
function propStr(r, name) {
  const p = r.properties?.[name];
  if (!p) return '';
  if (p.type === 'title') return p.title?.[0]?.plain_text || '';
  if (p.type === 'rich_text') return p.rich_text?.[0]?.plain_text || '';
  if (p.type === 'select') return p.select?.name || '';
  if (p.type === 'status') return p.status?.name || '';
  if (p.type === 'number') return p.number != null ? p.number : '';
  if (p.type === 'date') return p.date?.start || '';
  if (p.type === 'formula') {
    if (p.formula?.type === 'string') return p.formula.string || '';
    if (p.formula?.type === 'number') return p.formula.number != null ? p.formula.number : '';
    return '';
  }
  if (p.type === 'multi_select') return (p.multi_select || []).map(o => o.name);
  if (p.type === 'checkbox') return p.checkbox ? true : false;
  return '';
}
function fmt(n) {
  if (n === '' || n == null) return '—';
  return Number(n).toLocaleString('ja-JP');
}
function fmtYen(n) {
  if (n === '' || n == null) return '—';
  return '¥' + Number(n).toLocaleString('ja-JP');
}

// ─── タブ切替 ────────────────────────────────────────────────────────────────

// ─── データ取得 ──────────────────────────────────────────────────────────────
async function loadTab(tab) {

// ─── 支払いデータ取得 ─────────────────────────────────────────────────────────
// 支払月の判定ルール：
//   ・支払日がある → 支払日の月
//   ・支払日なし   → 締め日（月末）の翌月
// APIでは広めに取得し、クライアント側で正確にフィルタ
async function fetchPayments() {
  if (cache.payments) return cache.payments;
  const monthStart = `${ym()}-01`;
  const monthEnd = `${ym()}-31`;
  const prevYm = (() => {
    let m = targetMonth - 1, y = targetYear;
    if (m < 1) { m = 12; y--; }
    return `${y}-${String(m).padStart(2,'0')}`;
  })();
  const prevStart = `${prevYm}-01`;
  const prevEnd = `${prevYm}-31`;

  // 支払日が当月 OR 締め日が前月 → 広めに取得
  const results = await queryAll(DB.payment, {
    filter: { or: [
      { property: '支払日', date: { on_or_after: monthStart, on_or_before: monthEnd } },
      { property: '締め日（月末）', date: { on_or_after: prevStart, on_or_before: prevEnd } }
    ]},
    sorts: [{ property: '支払日', direction: 'ascending' }]
  });

  // クライアント側で正確にフィルタ
  const target = ym(); // "YYYY-MM"
  const filtered = results.filter(r => {
    const payDate = propStr(r, '支払日');
    if (payDate) {
      // 支払日がある → その月で判定
      return payDate.slice(0, 7) === target;
    }
    // 支払日なし → 締め日の翌月が支払月
    const closeDate = propStr(r, '締め日（月末）');
    if (closeDate) {
      const cd = new Date(closeDate);
      cd.setMonth(cd.getMonth() + 1);
      const expectedYm = `${cd.getFullYear()}-${String(cd.getMonth() + 1).padStart(2, '0')}`;
      return expectedYm === target;
    }
    return false;
  });

  cache.payments = filtered;
  return filtered;
}

async function fetchIncome() {
  if (cache.income) return cache.income;
  const results = await queryAll(DB.income, {
    filter: { property: '入金月', rich_text: { contains: ym() } }
  });
  cache.income = results;
  return results;
}

async function fetchBanks() {
  if (cache.banks) return cache.banks;
  // 全残高を取得（最新順）
  const results = await queryAll(DB.bank, {
    sorts: [{ property: '集計日', direction: 'descending' }]
  });
  cache.banks = results;
  return results;
}

async function fetchLoans() {
  if (cache.loans) return cache.loans;
  const results = await queryAll(DB.loan, {
    filter: { property: 'ステータス', select: { equals: '返済中' } },
    sorts: [{ property: '引落日', direction: 'ascending' }]
  });
  cache.loans = results;
  return results;
}

// ─── ダッシュボード ──────────────────────────────────────────────────────────
async function loadDashboard() {
  const el = document.getElementById('dash-content');
  el.innerHTML = '<div class="loading">データを取得中…</div>';

  const [payments, incomeData, loans, banks] = await Promise.all([
    fetchPayments(), fetchIncome(), fetchLoans(), fetchBanks()
  ]);

  // ── 集計 ──
  let totalPayment = 0, totalPaymentToyo = 0;
  payments.forEach(r => {
    const amt = propStr(r, '振込金額') || propStr(r, '金額') || 0;
    totalPayment += Number(amt) || 0;
    if (propStr(r, '取引先') === 'TOYO') {
      totalPaymentToyo += Number(amt) || 0;
    }
  });

  let totalIncome = 0;
  const periodIncome = {};
  PERIODS.forEach(p => periodIncome[p.key] = 0);
  incomeData.forEach(r => {
    totalIncome += Number(propStr(r, '入金額')) || 0;
    periodIncome['1-5']    += Number(propStr(r, '１～５')) || 0;
    periodIncome['6-10']   += Number(propStr(r, '６～１０')) || 0;
    periodIncome['11-15']  += Number(propStr(r, '１１～１５')) || 0;
    periodIncome['16-20']  += Number(propStr(r, '１６～２０')) || 0;
    periodIncome['21-25']  += Number(propStr(r, '２１～２５')) || 0;
    periodIncome['26-end'] += Number(propStr(r, '２６～月末')) || 0;
  });

  let totalLoan = 0;
  const periodLoan = {};
  PERIODS.forEach(p => periodLoan[p.key] = 0);
  loans.forEach(r => {
    const monthly = Number(propStr(r, '毎月返済額')) || 0;
    totalLoan += monthly;
    const debit = propStr(r, '引落日');
    const pk = DEBIT_PERIOD[debit];
    if (pk) periodLoan[pk] += monthly;
  });

  // 期間別支払い
  const periodPayment = {};
  PERIODS.forEach(p => periodPayment[p.key] = 0);
  payments.forEach(r => {
    const payDate = propStr(r, '支払日');
    if (!payDate) return;
    const day = parseInt(payDate.split('-')[2], 10);
    const pk = PERIODS.find(p => day >= p.from && day <= p.to)?.key;
    if (pk) periodPayment[pk] += Number(propStr(r, '振込金額') || propStr(r, '金額')) || 0;
  });

  const netCashflow = totalIncome - totalPayment - totalLoan;

  // 銀行残高合計（各銀行の最新残高）
  let totalBalance = 0;
  const latestBanks = {};
  banks.forEach(r => {
    const name = propStr(r, '銀行名');
    if (!latestBanks[name]) latestBanks[name] = r;
  });
  Object.values(latestBanks).forEach(r => {
    totalBalance += Number(propStr(r, '残高')) || 0;
  });
  const hasBankData = Object.keys(latestBanks).length > 0;

  // ── HTML ──
  let html = '';

  // サマリーカード
  html += `<div class="summary-grid">
    <div class="summary-card"><div class="label">入金予定</div><div class="value" style="color:var(--green)">${fmtYen(totalIncome)}</div></div>
    <div class="summary-card"><div class="label">支払い合計</div><div class="value" style="color:var(--red)">${fmtYen(totalPayment)}</div></div>
    <div class="summary-card"><div class="label">銀行返済</div><div class="value" style="color:var(--yellow)">${fmtYen(totalLoan)}</div></div>
    <div class="summary-card"><div class="label">銀行残高合計</div><div class="value" style="color:var(--blue)">${hasBankData ? fmtYen(totalBalance) : '（未登録）'}</div></div>
  </div>`;

  // 差引き
  html += `<div class="card"><div class="card-header"><div class="card-label">当月キャッシュフロー（入金 − 支払 − 返済）</div></div>
    <div class="card-value ${netCashflow >= 0 ? 'green' : 'red'}">${fmtYen(netCashflow)}</div>
    ${totalPaymentToyo > 0 ? `<div style="font-size:10px;color:var(--muted);margin-top:4px;">※ うちTOYO相殺分 ${fmtYen(totalPaymentToyo)}</div>` : ''}
  </div>`;

  // ── 期間別キャッシュフロー棒グラフ ──
  html += `<div class="chart-wrap"><div class="chart-title">期間別キャッシュフロー</div>`;
  const allValues = PERIODS.map(p => {
    const inc = periodIncome[p.key];
    const pay = periodPayment[p.key];
    const loan = periodLoan[p.key];
    return { period: p.label, income: inc, payment: pay, loan: loan, net: inc - pay - loan };
  });
  const maxVal = Math.max(...allValues.map(v => Math.max(v.income, v.payment + v.loan)), 1);

  // 期間別テーブル
  html += `<table class="data-table" style="margin-bottom:12px;">
    <tr><th>期間</th><th class="num">入金</th><th class="num">支払</th><th class="num">返済</th><th class="num">差引</th></tr>`;
  let cumulative = 0;
  allValues.forEach(v => {
    cumulative += v.net;
    html += `<tr>
      <td>${v.period}</td>
      <td class="num" style="color:var(--green)">${fmt(v.income)}</td>
      <td class="num" style="color:var(--red)">${fmt(v.payment)}</td>
      <td class="num" style="color:var(--yellow)">${fmt(v.loan)}</td>
      <td class="num" style="color:${v.net >= 0 ? 'var(--green)' : 'var(--red)'};font-weight:700">${fmt(v.net)}</td>
    </tr>`;
  });
  html += `<tr style="border-top:2px solid var(--border2);">
    <td style="font-weight:700">合計</td>
    <td class="num" style="color:var(--green);font-weight:700">${fmt(totalIncome)}</td>
    <td class="num" style="color:var(--red);font-weight:700">${fmt(totalPayment)}</td>
    <td class="num" style="color:var(--yellow);font-weight:700">${fmt(totalLoan)}</td>
    <td class="num" style="color:${netCashflow >= 0 ? 'var(--green)' : 'var(--red)'};font-weight:700">${fmt(netCashflow)}</td>
  </tr></table>`;

  // 棒グラフ
  allValues.forEach(v => {
    const incW = maxVal > 0 ? (v.income / maxVal * 100) : 0;
    const payW = maxVal > 0 ? (v.payment / maxVal * 100) : 0;
    const loanW = maxVal > 0 ? (v.loan / maxVal * 100) : 0;
    html += `<div style="margin-bottom:8px;">
      <div style="font-size:10px;color:var(--muted);margin-bottom:3px;">${v.period}</div>
      <div class="bar-row"><div class="bar-label" style="width:30px;font-size:9px;color:var(--green)">入金</div><div class="bar-track"><div class="bar-seg" style="width:${incW}%;background:var(--green);"></div></div><div class="bar-val">${fmt(v.income)}</div></div>
      <div class="bar-row"><div class="bar-label" style="width:30px;font-size:9px;color:var(--red)">支払</div><div class="bar-track"><div class="bar-seg" style="width:${payW}%;background:var(--red);"></div></div><div class="bar-val">${fmt(v.payment)}</div></div>
      <div class="bar-row"><div class="bar-label" style="width:30px;font-size:9px;color:var(--yellow)">返済</div><div class="bar-track"><div class="bar-seg" style="width:${loanW}%;background:var(--yellow);"></div></div><div class="bar-val">${fmt(v.loan)}</div></div>
    </div>`;
  });
  html += '</div>';

  // ── 銀行残高一覧（ダッシュ用・各銀行の最新残高） ──
  const dashToday = new Date();
  html += `<div class="chart-wrap"><div class="chart-title">銀行残高（最終更新）</div>`;
  if (!hasBankData) {
    html += '<div style="text-align:center;padding:12px;font-size:12px;color:var(--muted);">残高データが未登録です</div>';
  } else {
    Object.entries(latestBanks).forEach(([name, r]) => {
      const bal = Number(propStr(r, '残高')) || 0;
      const date = propStr(r, '集計日');
      const cat = propStr(r, 'カテゴリ');
      const stale = date ? Math.floor((dashToday - new Date(date)) / 86400000) >= 15 : false;
      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--border);">
        <div><div style="font-size:12px;font-weight:600;">${stale ? '⚠️ ' : ''}${name}</div><div style="font-size:9px;color:${stale ? 'var(--yellow)' : 'var(--muted)'};">${date || '—'} ${cat}</div></div>
        <div style="font-family:'DM Mono',monospace;font-size:14px;font-weight:700;${bal >= 0 ? 'color:var(--blue)' : 'color:var(--red)'}">${fmtYen(bal)}</div>
      </div>`;
    });
  }
  html += '</div>';

  // ── 取引先別支払い（円グラフ風 → ランキング） ──
  html += `<div class="chart-wrap"><div class="chart-title">取引先別 支払い内訳</div>`;
  const vendorTotals = {};
  payments.forEach(r => {
    const v = propStr(r, '取引先') || '不明';
    const amt = Number(propStr(r, '振込金額') || propStr(r, '金額')) || 0;
    vendorTotals[v] = (vendorTotals[v] || 0) + amt;
  });
  const vendorRank = Object.entries(vendorTotals).sort((a,b) => b[1] - a[1]);
  const COLORS = ['#f0a500','#3b82f6','#22c55e','#ef4444','#a855f7','#f59e0b','#ec4899','#14b8a6','#8b5cf6','#f97316'];
  if (vendorRank.length === 0) {
    html += '<div class="empty-state">データなし</div>';
  } else {
    const topMax = vendorRank[0][1] || 1;
    vendorRank.forEach(([name, amt], i) => {
      const color = COLORS[i % COLORS.length];
      const pct = totalPayment > 0 ? (amt / totalPayment * 100).toFixed(1) : 0;
      html += `<div class="bar-row">
        <div class="bar-label" style="width:70px;font-size:10px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${name}">${name}</div>
        <div class="bar-track"><div class="bar-seg" style="width:${amt/topMax*100}%;background:${color};border-radius:4px;"></div></div>
        <div class="bar-val">${fmt(amt)}<span style="font-size:8px;color:var(--muted);margin-left:2px;">(${pct}%)</span></div>
      </div>`;
    });
  }
  html += '</div>';

  el.innerHTML = html;
}

async function loadPayments() {

  if (results.length === 0) {
    el.innerHTML = '<div class="empty-state">当月の支払いデータがありません</div>';

    if (s === '未払い')     return '<span class="tag tag-unpaid">未払い</span>';
    if (s === '支払予約済') return '<span class="tag tag-reserved">予約済</span>';
    if (s === '支払済')     return '<span class="tag tag-paid">支払済</span>';
    if (s === '保留')       return '<span class="tag tag-hold">保留</span>';
    return `<span class="tag">${s}</span>`;

  let html = `<table class="data-table">
    <tr><th>取引先</th><th>締め日</th><th>支払日</th><th class="num">振込額</th><th>状況</th></tr>`;

    <td class="num" style="font-weight:700;color:var(--red);">${fmt(total)}</td>

  el.innerHTML = html;
}

// ─── 銀行残高一覧 ──────────────────────────────────────────────────────────
async function loadBanks() {
  const el = document.getElementById('bank-content');
  el.innerHTML = '<div class="loading">データを取得中…</div>';
  const results = await fetchBanks();

  // 銀行名ごとに最新1件を取得
  const latestByBank = {};
  results.forEach(r => {
    const name = propStr(r, '銀行名');
    if (!name) return;
    if (!latestByBank[name]) latestByBank[name] = r;
  });

  const allBankNames = [...new Set([...BANK_NAMES, ...Object.keys(latestByBank)])];
  const today = new Date();

  let html = `<div style="font-size:12px;color:var(--muted);margin-bottom:10px;">各銀行の最終残高</div>`;

  allBankNames.forEach(name => {
    const latest = latestByBank[name];
    if (!latest) {
      html += `<div class="bank-card">
        <div class="bank-name">${name}</div>
        <div class="bank-balance" style="color:var(--muted);font-size:14px;">（未登録）</div>
      </div>`;
      return;
    }

    const bal = Number(propStr(latest, '残高')) || 0;
    const date = propStr(latest, '集計日');
    const cat = propStr(latest, 'カテゴリ');

    // 15日以上前かチェック
    let stale = false;
    if (date) {
      const diffDays = Math.floor((today - new Date(date)) / (1000 * 60 * 60 * 24));
      stale = diffDays >= 15;
    }

    html += `<div class="bank-card"${stale ? ' style="border-color:var(--yellow);"' : ''}>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div class="bank-name">${name}</div>
        ${stale ? '<span style="font-size:16px;" title="15日以上更新されていません">⚠️</span>' : ''}
      </div>
      <div class="bank-balance" style="${bal >= 0 ? 'color:var(--blue)' : 'color:var(--red)'}">${fmtYen(bal)}</div>
      <div class="bank-meta">${date || '—'} ／ ${cat || '—'}</div>
      ${stale ? '<div style="font-size:10px;color:var(--yellow);margin-top:4px;font-weight:600;">⚠ 残高を更新してください</div>' : ''}
    </div>`;
  });

  el.innerHTML = html;
}

// ─── 返済一覧 ────────────────────────────────────────────────────────────────
async function loadLoans() {
  const el = document.getElementById('loan-content');
  el.innerHTML = '<div class="loading">データを取得中…</div>';

  // 返済中だけでなく全ステータスも取得
  const allLoans = await queryAll(DB.loan, {
    sorts: [{ property: '引落日', direction: 'ascending' }]
  });

  if (allLoans.length === 0) {
    el.innerHTML = '<div class="empty-state">返済データがありません</div>';
    return;
  }

  const statusTag = (s) => {
    if (s === '返済中') return '<span class="tag tag-repaying">返済中</span>';
    if (s === '完済')   return '<span class="tag tag-completed">完済</span>';
    if (s === '延滞中') return '<span class="tag tag-overdue">延滞中</span>';
    return `<span class="tag">${s}</span>`;
  };

  let totalMonthly = 0;
  let html = '';

  // 返済中は返済期日が近い順にソート
  const repaying = allLoans.filter(r => propStr(r, 'ステータス') === '返済中')
    .sort((a, b) => {
      const da = propStr(a, '返済期日') || '9999-12-31';
      const db = propStr(b, '返済期日') || '9999-12-31';
      return da.localeCompare(db);
    });
  const completed = allLoans.filter(r => propStr(r, 'ステータス') === '完済');
  const overdue = allLoans.filter(r => propStr(r, 'ステータス') === '延滞中');

  // 返済中の合計
  repaying.forEach(r => { totalMonthly += Number(propStr(r, '毎月返済額')) || 0; });

  // 合計ヘッダー
  html += `<div class="card" style="margin-bottom:12px;">
    <div class="card-label">返済中 毎月合計</div>
    <div class="card-value" style="color:var(--yellow);">${fmtYen(totalMonthly)}</div>
  </div>`;

  // セクション描画関数
  const renderSection = (title, tag, items) => {
    if (items.length === 0) return;
    html += `<div style="font-size:12px;font-weight:700;color:var(--muted);margin:16px 0 8px;display:flex;align-items:center;gap:6px;">${title} <span class="tag ${tag}">${items.length}件</span></div>`;
    items.forEach(r => { html += renderLoanCard(r); });
  };

  renderSection('返済中', 'tag-repaying', repaying);
  renderSection('延滞中', 'tag-overdue', overdue);
  renderSection('完済', 'tag-completed', completed);

  el.innerHTML = html;
}

function renderLoanCard(r) {
  const statusTag = (s) => {
    if (s === '返済中') return '<span class="tag tag-repaying">返済中</span>';
    if (s === '完済')   return '<span class="tag tag-completed">完済</span>';
    if (s === '延滞中') return '<span class="tag tag-overdue">延滞中</span>';
    return `<span class="tag">${s}</span>`;
  };

  const name = propStr(r, '名前');
  const bank = propStr(r, '銀行名');
  const monthly = Number(propStr(r, '毎月返済額')) || 0;
  const principal = Number(propStr(r, '借入額')) || 0;
  const rate = propStr(r, '金利');
  const debit = propStr(r, '引落日');
  const endDate = propStr(r, '返済期日');
  const status = propStr(r, 'ステータス');
  const purpose = propStr(r, '目的');
  const remaining = propStr(r, '支払残高（概算）');
  const paidTotal = propStr(r, '支払済総額');
  const guarantee = propStr(r, '保証協会');
  const collateral = propStr(r, '担保');

  let progressPct = 0;
  if (principal > 0 && paidTotal !== '') {
    progressPct = Math.min((Number(paidTotal) / principal) * 100, 100);
  }

  return `<div class="loan-card">
    <div class="loan-top">
      <div>
        <div class="loan-name">${name}</div>
        <div style="font-size:10px;color:var(--muted);">${bank} ／ ${purpose}</div>
      </div>
      ${statusTag(status)}
    </div>
    <div class="loan-amount" style="color:var(--yellow);">${fmtYen(monthly)}<span style="font-size:10px;color:var(--muted);">／月</span></div>
    <div class="loan-detail">
      借入額：${fmtYen(principal)}　金利：${rate !== '' ? (Number(rate) * 100).toFixed(2) + '%' : '—'}<br>
      引落日：${debit}　期限：${endDate || '—'}<br>
      ${guarantee ? '保証協会あり' : ''}${collateral ? '　担保あり' : ''}
      ${remaining !== '' ? `<br>残高概算：${fmtYen(remaining)}` : ''}
    </div>
    ${progressPct > 0 ? `<div class="loan-progress"><div class="loan-progress-bar" style="width:${progressPct}%;"></div></div><div style="text-align:right;font-size:9px;color:var(--muted);margin-top:2px;">${progressPct.toFixed(0)}% 返済済み</div>` : ''}
  </div>`;
}

// ─── 支払い追加 ──────────────────────────────────────────────────────────────
async function submitPayment() {
  const name = document.getElementById('fp-name').value.trim();
  const vendor = document.getElementById('fp-vendor').value;
  const amount = Number(document.getElementById('fp-amount').value) || 0;
  const offset = Number(document.getElementById('fp-offset').value) || 0;
  const closeDate = document.getElementById('fp-close').value;
  const payDate = document.getElementById('fp-paydate').value;
  const bankSelect = document.getElementById('fp-bank');
  const banks = [...bankSelect.selectedOptions].map(o => o.value);
  const status = document.getElementById('fp-status').value;
  const memo = document.getElementById('fp-memo').value.trim();

  if (!name || !vendor) { alert('名前と取引先は必須です'); return; }

  const btn = document.getElementById('fp-submit');
  btn.disabled = true; btn.textContent = '送信中…';

  try {
    const props = {
      '名前': { title: [{ text: { content: name } }] },
      '取引先': { select: { name: vendor } },
      '金額': { number: amount },
      '支払状況': { status: { name: status } },
    };
    if (offset) props['相殺額'] = { number: offset };
    if (closeDate) props['締め日（月末）'] = { date: { start: closeDate } };
    if (payDate) props['支払日'] = { date: { start: payDate } };
    if (banks.length) props['支払銀行'] = { multi_select: banks.map(b => ({ name: b })) };
    if (memo) props['メモ'] = { rich_text: [{ text: { content: memo } }] };

    await notionAPI('POST', '/pages', { parent: { database_id: DB.payment }, properties: props });
    closeForm('form-payment');
    cache.payments = null; cache.income = null;
    await loadTab(currentTab);
    alert('追加しました');
  } catch(e) {
    alert('エラー: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = '追加する';
  }
}

// ─── アクセス制御 ──────────────────────────────────────────────────────────────
function checkAccess() {
  try {
    const raw = localStorage.getItem('foo_portal_session');
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (new Date(data.expires) < new Date()) return false;
    // 資金繰り権限チェック
    if (data.apps && data.apps.cashflow === true) return true;
    return false;
  } catch(e) { return false; }
}

// ─── 初期化 ──────────────────────────────────────────────────────────────────
if (!checkAccess()) {
  document.body.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px;text-align:center;">
    <div style="font-size:40px;margin-bottom:16px;">🔒</div>
    <div style="font-size:16px;font-weight:700;margin-bottom:8px;">アクセス権限がありません</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.6;">このアプリは許可されたユーザーのみ利用できます。<br>ポータルからログインしてください。</div>
