<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>DB繰越管理 | TIRE MANAGER F.O.O</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fdf8f0;color:#333;padding-bottom:60px}
.header{background:#fff;padding:14px 20px 10px;border-bottom:0.5px solid #e0d6c8;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
.header-brand{font-size:10px;color:#888;letter-spacing:0.12em;text-transform:uppercase;}
.header-back{font-size:11px;color:#888;text-decoration:none;border:0.5px solid #e0d6c8;border-radius:20px;padding:3px 10px;}
.header-title{font-size:17px;font-weight:900;letter-spacing:-0.02em;}
.header-title span{color:#c87a2a;}
h1{padding:16px 20px 4px;font-size:22px;color:#c87a2a}
h1 span{font-weight:400;font-size:16px;color:#888}
.content{padding:8px 20px 20px}
.info-box{background:#fff8ec;border:1px solid #f0d9a0;border-radius:10px;padding:14px;margin:12px 0;font-size:13px;line-height:1.7;color:#8a6d3b}
.cat-card{background:#fff;border:1px solid #e8ddd0;border-radius:12px;padding:14px 16px;margin:8px 0;display:flex;justify-content:space-between;align-items:center}
.cat-left{display:flex;align-items:center;gap:10px}
.cat-icon{font-size:20px}
.cat-name{font-weight:700;font-size:14px}
.cat-meta{font-size:12px;color:#888;margin-top:2px}
.cat-count{font-size:13px;color:#888;text-align:right}
.cat-count .num{font-size:18px;font-weight:700;color:#c87a2a}
.btn-primary{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#d4880a,#c87a2a);color:#fff;font-size:15px;font-weight:700;border:none;border-radius:12px;cursor:pointer;margin-top:16px;letter-spacing:0.5px}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-secondary{display:inline-block;padding:10px 16px;background:#f5ede0;color:#c87a2a;font-size:13px;font-weight:600;border:none;border-radius:8px;cursor:pointer;margin-top:8px}
.progress-wrap{margin:16px 0}
.progress-bar{background:#e8ddd0;border-radius:8px;height:8px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#d4880a,#f0a500);transition:width 0.3s;width:0%}
.progress-text{font-size:13px;color:#888;text-align:center;margin-top:6px}
.log{background:#fff;border:1px solid #e8ddd0;border-radius:10px;padding:12px;margin:12px 0;max-height:350px;overflow-y:auto;font-size:12px;line-height:1.9;font-family:'SF Mono',Monaco,monospace}
.log-ok{color:#16a34a}
.log-err{color:#dc2626}
.log-info{color:#888}
.spinner{width:22px;height:22px;border:3px solid #e8ddd0;border-top-color:#c87a2a;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.last-run{background:#e8f5e9;border:1px solid #a5d6a7;border-radius:10px;padding:12px 14px;margin:12px 0;font-size:13px;color:#2e7d32}
.no-run{background:#fff3e0;border:1px solid #ffcc80;border-radius:10px;padding:12px 14px;margin:12px 0;font-size:13px;color:#e65100}
.summary{background:#e3f2fd;border:1px solid #90caf9;border-radius:10px;padding:14px;margin:16px 0;font-size:13px;color:#1565c0;line-height:1.7}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-brand">F.o.o · 管理</div>
    <a class="header-back" href="https://mitsurumukaihata.github.io/foo-portal/">← ポータル</a>
  </div>
  <div class="header-title">DB繰越<span>管理</span></div>
</div>

<div class="content">
  <div class="info-box">
    <b>スナップショットDBの在庫値</b>をベースに「繰越」レコードを作成します。<br>
    過去データは<b>削除されません</b>。過去の繰越レコードのみアーカイブされます。<br>
    繰越後、在庫計算は繰越＋準備＋発注中＋新規レコードだけで行われ<b>表示速度が向上</b>します。
  </div>

  <div id="last-run-info"></div>
  <div id="db-list"><div style="text-align:center;padding:24px"><span class="spinner"></span> DB情報を確認中…</div></div>

  <button class="btn-primary" id="run-btn" onclick="confirmAndRun()">繰越処理を実行</button>

  <div id="progress-wrap" class="progress-wrap" style="display:none">
    <div class="progress-bar"><div class="progress-fill" id="pbar"></div></div>
    <div class="progress-text" id="ptext"></div>
  </div>

  <div id="log-wrap" style="display:none">
    <div class="log" id="log"></div>
  </div>

  <div id="summary-wrap"></div>
</div>

<script>
const WORKER = 'https://notion-proxy.33322666666mm.workers.dev';
const SESSION_KEY = 'foo_portal_session';
const KURIKOSHI_KEY = 'foo_kurikoshi_date';

const SNAPSHOT_DB = '1123c46301764238a511114ed59159bd'; // しきい値管理DB（繰越ベースライン＋しきい値）

const DB_MAP = {
  ltl_normal:   { id:'200a695f8e888018b5f5eac83fdad412', name:'LTL TB ノーマル',     catName:'LTL TB　ノーマル',     icon:'🚛', wField:'倉庫' },
  ltl_studless: { id:'201a695f8e888171abb8e349ad4d055a', name:'LTL TB スタッドレス', catName:'LTL TB　スタッドレス', icon:'❄️', wField:'倉庫' },
  lts_normal:   { id:'201a695f8e8881adb144cd3a1639132d', name:'LTS ノーマル',        catName:'LTS　ノーマル',        icon:'🚐', wField:'倉庫' },
  lts_studless: { id:'201a695f8e8881a299e8fb57bad707f6', name:'LTS スタッドレス',    catName:'LTS　スタッドレス',    icon:'❄️', wField:'倉庫' },
  rt:           { id:'201a695f8e888104bb47c7103d5909dc', name:'RT 再生',             catName:'RT 再生',             icon:'♻️', wField:'倉庫' },
  tt:           { id:'201a695f8e8881a6930fcf2bd752e676', name:'T/T チューブタイプ',  catName:'T/T チューブタイプ',  icon:'🔧', wField:'倉庫' },
  van:          { id:'201a695f8e8881f3a958cead42156e07', name:'バン',                catName:'バン',                icon:'🚌', wField:'出庫倉庫' },
  lift:         { id:'201a695f8e8881c5b2c3d9e9ce2ffd21', name:'リフト',             catName:'リフト',             icon:'🏗️', wField:'出庫倉庫' },
};

const KUBUN_SIGN = {
  '入庫':1,'移動入庫':1,'返品（倉庫へ）':1,'返品':1,
  '出庫':-1,'準備':-1,'移動出庫':-1,'返品（メーカーへ）':-1,
  '発注中':0,'繰越':1
};

async function notionAPI(method, path, body) {
  const res = await fetch(WORKER + path, {
    method,
    headers:{'Content-Type':'application/json'},
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    let msg = 'HTTP ' + res.status;
    try { const d = await res.json(); if (d.message) msg = d.message; } catch(_){}
    throw new Error(msg);
  }
  return res.json();
}

function checkAuth() {
  try {
    const s = JSON.parse(localStorage.getItem(SESSION_KEY));
    if (s?.name) return s;
  } catch(_){}
  location.href = 'index.html';
}

// ── Fetch all records from a DB (with pagination) ──
async function fetchAll(dbId, extraFilter) {
  let all = [], cursor, page = 0;
  while (page < 80) {
    page++;
    const body = { page_size: 100 };
    if (extraFilter) body.filter = extraFilter;
    if (cursor) body.start_cursor = cursor;
    const res = await notionAPI('POST', `/databases/${dbId}/query`, body);
    all = all.concat(res.results || []);
    if (!res.has_more) break;
    cursor = res.next_cursor;
  }
  return all;
}

// ── Show last 繰越 date ──
function showLastRun() {
  const el = document.getElementById('last-run-info');
  const dt = localStorage.getItem(KURIKOSHI_KEY);
  if (dt) {
    const d = new Date(dt);
    el.innerHTML = `<div class="last-run">前回の繰越: ${d.getFullYear()}/${(d.getMonth()+1)}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}</div>`;
  } else {
    el.innerHTML = `<div class="no-run">繰越処理はまだ実行されていません</div>`;
  }
}

// ── Load record counts per DB ──
async function loadDBInfo() {
  const el = document.getElementById('db-list');
  let html = '';
  for (const [key, db] of Object.entries(DB_MAP)) {
    try {
      const all = await fetchAll(db.id);
      const kuriCount = all.filter(r => r.properties['区分']?.select?.name === '繰越').length;
      html += `<div class="cat-card" id="card-${key}">
        <div class="cat-left"><span class="cat-icon">${db.icon}</span><div><div class="cat-name">${db.name}</div><div class="cat-meta">繰越: ${kuriCount} 件</div></div></div>
        <div class="cat-count"><span class="num">${all.length}</span><br>件</div>
      </div>`;
      window['_count_' + key] = all.length;
    } catch(e) {
      html += `<div class="cat-card"><div class="cat-left"><span class="cat-icon">${db.icon}</span><div><div class="cat-name">${db.name}</div><div class="cat-meta" style="color:#dc2626">接続エラー</div></div></div></div>`;
    }
  }
  el.innerHTML = html;
}

// ── Logging ──
function addLog(msg, type) {
  const log = document.getElementById('log');
  const t = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const cls = type === 'ok' ? 'log-ok' : type === 'err' ? 'log-err' : 'log-info';
  log.innerHTML += `<div class="${cls}">${t}  ${msg}</div>`;
  log.scrollTop = log.scrollHeight;
}

function updateProgress(done, total, label) {
  document.getElementById('pbar').style.width = Math.round((done / total) * 100) + '%';
  document.getElementById('ptext').textContent = label;
}

// ── Confirm dialog ──
function confirmAndRun() {
  if (confirm('繰越処理を実行しますか？\n\n各カテゴリの在庫を集計し、繰越レコードを作成します。\n既存データは削除されません。')) {
    runKurikoshi();
  }
}

// ── 在庫DBのレコードからリアルタイム在庫を計算 ──
function calcStockFromRecords(records, wField) {
  const stockMap = {}; // key: "pattern|size|warehouse" → stock number
  // 繰越に含めない区分: 繰越（旧データ）、準備、発注中
  // 準備・発注中は繰越後も日付を問わず取得して表示時に適用するため、
  // 繰越ベースラインには含めない（二重計上防止）
  const SKIP_IN_KURIKOSHI = new Set(['繰越', '準備', '発注中']);
  for (const r of records) {
    const p = r.properties;
    const kubun = p['区分']?.select?.name || '';
    if (SKIP_IN_KURIKOSHI.has(kubun)) continue;
    const pattern = p['パターン名']?.select?.name || '';
    const size = p['サイズコード']?.select?.name || '';
    const wh = p[wField]?.select?.name || '';
    const qty = p['数量']?.number || 0;
    const sign = KUBUN_SIGN[kubun] ?? 0;
    if (!pattern || !size || !wh) continue;
    const key = `${pattern}|${size}|${wh}`;
    stockMap[key] = (stockMap[key] || 0) + sign * qty;
  }
  return stockMap;
}

// ── Main 繰越 processing ──
async function runKurikoshi() {
  const user = checkAuth();
  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.textContent = '処理中…';
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('log-wrap').style.display = 'block';
  document.getElementById('log').innerHTML = '';
  document.getElementById('summary-wrap').innerHTML = '';

  try {
    const cats = Object.entries(DB_MAP);
    let totalCreated = 0, totalArchived = 0;
    let done = 0;

    for (const [catKey, db] of cats) {
      updateProgress(done, cats.length, `${db.icon} ${db.name} を処理中… (${done+1}/${cats.length})`);

      try {
        addLog(`━━ ${db.icon} ${db.name} ━━`);

        // ── Step 1: 在庫DBの全レコードを取得 ──
        addLog(`全レコードを取得中…`);
        const allRecords = await fetchAll(db.id);
        addLog(`${allRecords.length} 件取得`, 'ok');

        // ── Step 2: 入出庫レコードからリアルタイム在庫を計算 ──
        const stockMap = calcStockFromRecords(allRecords, db.wField);
        const itemCount = Object.keys(stockMap).length;
        addLog(`在庫計算完了: ${itemCount} 組合せ`);

        // ── Step 3: 既存の繰越レコードをアーカイブ ──
        try {
          const oldKuri = allRecords.filter(r => r.properties['区分']?.select?.name === '繰越');
          if (oldKuri.length) {
            addLog(`旧繰越 ${oldKuri.length} 件をアーカイブ…`);
            for (const r of oldKuri) {
              await notionAPI('PATCH', `/pages/${r.id}`, { archived: true });
            }
            totalArchived += oldKuri.length;
          }
        } catch(archiveErr) {
          addLog(`旧繰越なし（初回実行）`, 'info');
        }

        // ── Step 4: 実在庫で繰越レコードを作成 ──
        const entries = Object.entries(stockMap).filter(([, v]) => v > 0);
        addLog(`繰越レコード ${entries.length} 件を作成中…`);
        let created = 0;
        for (const [combo, stock] of entries) {
          const [pattern, size, wh] = combo.split('|');
          if (!pattern || !size || !wh) continue;
          await notionAPI('POST', '/pages', {
            parent: { database_id: db.id },
            properties: {
              'タイトル': { title: [{ text: { content: `${size} ${pattern} 繰越 ${wh}` } }] },
              'サイズコード': { select: { name: size } },
              'パターン名': { select: { name: pattern } },
              '区分': { select: { name: '繰越' } },
              '数量': { number: stock },
              [db.wField]: { select: { name: wh } },
              '作成者': { select: { name: user.name } },
            }
          });
          created++;
          if (created % 10 === 0 || created === entries.length) {
            addLog(`  ${created}/${entries.length} 作成完了`, 'ok');
          }
        }

        totalCreated += created;
        addLog(`${db.name} 完了`, 'ok');

        const card = document.getElementById(`card-${catKey}`);
        if (card) {
          const countDiv = card.querySelector('.cat-count');
          if (countDiv) countDiv.innerHTML = `<span class="num">${created}</span><br>繰越作成`;
        }
      } catch(e) {
        addLog(`${db.name} エラー: ${e.message}`, 'err');
      }
      done++;
    }

    // Save 繰越 date
    const now = new Date().toISOString();
    localStorage.setItem(KURIKOSHI_KEY, now);

    updateProgress(cats.length, cats.length, '全カテゴリの繰越処理が完了しました');
    addLog('━━━━━━━━━━━━━━━━━━━━━━━━━━', 'ok');
    addLog('全カテゴリ処理完了', 'ok');

    document.getElementById('summary-wrap').innerHTML = `
      <div class="summary">
        <b>繰越処理サマリー</b><br>
        スナップショットから取得: ${snapCount} 件<br>
        作成した繰越レコード: ${totalCreated.toLocaleString()} 件<br>
        アーカイブした旧繰越: ${totalArchived.toLocaleString()} 件<br><br>
        スナップショットの実績値をベースに繰越レコードを作成しました。<br>
        以降の在庫計算は繰越＋準備＋発注中＋新規レコードで正確に行われます。
      </div>`;

    showLastRun();

  } catch(e) {
    addLog(`致命的エラー: ${e.message}`, 'err');
  }

  btn.textContent = '繰越処理を実行';
  btn.disabled = false;
}

// ── Init ──
const user = checkAuth();
showLastRun();
loadDBInfo();
</script>
</body>
</html>
