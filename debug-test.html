<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>接続テスト</title>
<style>
body { font-family: monospace; padding: 20px; background: #1a1a1f; color: #f0f0f0; }
.result { background: #2a2a2f; padding: 12px; margin: 8px 0; border-radius: 8px; font-size: 12px; word-break: break-all; }
.ok { border-left: 4px solid #22c55e; }
.err { border-left: 4px solid #ef4444; }
.pending { border-left: 4px solid #f59e0b; }
button { background: #f0a500; border: none; padding: 12px 24px; border-radius: 8px; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; margin: 8px 4px; }
</style>
</head>
<body>
<h2>🔧 接続テスト</h2>
<button onclick="runTest()">テスト開始</button>
<button onclick="document.getElementById('log').innerHTML=''">クリア</button>
<div id="log"></div>

<script>
const WORKER = 'https://notion-proxy.33322666666mm.workers.dev';

function log(msg, type='pending') {
  const d = document.createElement('div');
  d.className = 'result ' + type;
  d.textContent = new Date().toLocaleTimeString('ja') + ' | ' + msg;
  document.getElementById('log').prepend(d);
}

async function testDB(name, id) {
  log('→ ' + name + ' クエリ開始...', 'pending');
  const start = Date.now();
  try {
    const res = await fetch(WORKER + '/databases/' + id + '/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ page_size: 1 })
    });
    const elapsed = Date.now() - start;
    const text = await res.text();
    const first100 = text.slice(0, 100);
    if (text.includes('"object":"error"') || text.includes('"object": "error"')) {
      const msg = text.match(/"message":"([^"]+)"/)?.[1] || '不明なエラー';
      log('✕ ' + name + ' エラー(' + elapsed + 'ms): ' + msg, 'err');
    } else if (text.includes('"object":"list"') || text.includes('"results"')) {
      log('✓ ' + name + ' 成功(' + elapsed + 'ms): ' + first100, 'ok');
    } else {
      log('? ' + name + ' 不明な応答(' + elapsed + 'ms): ' + first100, 'err');
    }
  } catch(e) {
    const elapsed = Date.now() - start;
    log('✕ ' + name + ' 例外(' + elapsed + 'ms): ' + e.message, 'err');
  }
}

async function runTest() {
  log('=== テスト開始 ===', 'pending');
  // LTLTBノーマル在庫基準
  await testDB('LTL基準DB', '520fe8fa034543428c0e9fff3c5cb511');
  // LTSノーマル在庫基準
  await testDB('LTS基準DB', '2fea695f8e88813ca455d96295acc4c5');
  // RT再生在庫基準
  await testDB('RT基準DB', '302a695f8e8881f49821faa32d2708b4');
  // バン在庫基準
  await testDB('バン基準DB', '301a695f8e8881b7ad64e2cb9ad06e66');
  // 発注管理表
  await testDB('発注管理表', '202a695f8e8880aa92f6f38d9b47b537');
  log('=== テスト完了 ===', 'pending');
}
</script>
</body>
</html>
