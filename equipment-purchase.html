:root {

  --border: #2c2c38; --border2: #3c3c4a; --text: #f0f0f2; --muted: #68687a;

  --blue: #3b82f6; --purple: #a855f7; --yellow: #eab308;

}
@media (prefers-color-scheme: light) {

    --bg: #fdf6ee; --s1: #ffffff; --s2: #fdf0e4; --s3: #f5e6d4;
    --border: #e8d8c4; --border2: #d8c4a8; --text: #1a1208; --muted: #a08060;

[data-theme="dark"] {

}
[data-theme="light"] {
  --bg: #fdf6ee; --s1: #ffffff; --s2: #fdf0e4; --s3: #f5e6d4;
  --border: #e8d8c4; --border2: #d8c4a8; --text: #1a1208; --muted: #a08060;
  --accent: #e07000; --accent2: #c05800; --green: #1a9e4a; --red: #dc2626;

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans JP',sans-serif; min-height:100vh; max-width:480px; margin:0 auto; overflow-x:hidden; }

/* ── Header ── */
.header { background:var(--s1); border-bottom:0.5px solid var(--border); padding:14px 20px 10px; position:sticky; top:0; z-index:100; }
.back-btn { display:inline-block; color:var(--accent); font-size:13px; font-weight:700; text-decoration:none; padding:4px 0; margin-bottom:2px; }
.back-btn:active { opacity:0.6; }
.header-title { font-size:17px; font-weight:900; letter-spacing:-0.02em; }
.header-title span { color:var(--accent); }

/* ── Tabs ── */
.nav { display:flex; background:var(--s1); border-bottom:0.5px solid var(--border); position:sticky; top:52px; z-index:99; }
.nav-btn { flex:1; padding:10px 6px 8px; background:transparent; border:none; border-bottom:2px solid transparent; color:var(--muted); font-size:12px; font-weight:500; font-family:'Noto Sans JP',sans-serif; cursor:pointer; transition:all 0.15s; text-align:center; }
.nav-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
.nav-badge { display:inline-flex; align-items:center; justify-content:center; min-width:16px; height:16px; padding:0 4px; background:var(--s3); border-radius:8px; font-size:10px; font-weight:700; margin-left:3px; color:var(--muted); }
.nav-btn.active .nav-badge { background:rgba(240,165,0,0.2); color:var(--accent); }

/* ── Pages ── */
.page { display:none; padding:0 0 100px; }
.page.show { display:block; }

/* ── Summary ── */
.summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:14px 16px 6px; }
.summary-card { background:var(--s2); border:1px solid var(--border); border-radius:10px; padding:12px 14px; }
.summary-card.wide { grid-column:1/-1; }
.sc-label { font-size:9px; color:var(--muted); margin-bottom:4px; font-weight:600; letter-spacing:0.06em; }
.sc-value { font-family:'DM Mono',monospace; font-size:18px; font-weight:700; }
.sc-value.accent { color:var(--accent); }
.sc-sub { font-size:10px; color:var(--muted); margin-top:2px; }

/* ── Status Sections ── */
.status-section { padding:0 12px; margin-bottom:4px; }
.status-header { display:flex; align-items:center; gap:8px; padding:14px 4px 8px; }
.status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.status-title { font-size:13px; font-weight:700; flex:1; }
.status-count { font-size:11px; color:var(--muted); font-weight:500; }

/* ── Cards ── */
.eq-card { background:var(--s2); border:1.5px solid var(--border); border-radius:12px; padding:14px 16px; margin-bottom:8px; cursor:pointer; transition:all 0.2s; }
.eq-card:active { transform:scale(0.98); border-color:rgba(240,165,0,0.3); }
.eq-card.archived { opacity:0.65; }
.eq-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:8px; }
.eq-name { font-size:13px; font-weight:700; line-height:1.4; flex:1; }
.eq-badges { display:flex; gap:4px; flex-shrink:0; flex-wrap:wrap; justify-content:flex-end; }
.badge { display:inline-block; font-size:9px; font-weight:700; padding:2px 8px; border-radius:20px; white-space:nowrap; }
.badge-cat { color:#fff; }
.badge-cat-vehicle { background:var(--pink); }
.badge-cat-furniture { background:var(--orange); }
.badge-cat-it { background:var(--gray); }
.badge-cat-machine { background:var(--purple); }
.badge-pri-high { background:rgba(239,68,68,0.15); color:var(--red); }
.badge-pri-mid { background:rgba(234,179,8,0.15); color:var(--yellow); }
.badge-pri-low { background:rgba(59,130,246,0.15); color:var(--blue); }
.badge-status { font-size:9px; font-weight:700; padding:2px 8px; border-radius:20px; }

.eq-meta { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.eq-vendor { font-size:11px; color:var(--muted); font-weight:500; }
.eq-cost { font-family:'DM Mono',monospace; font-size:16px; font-weight:700; color:var(--accent); }
.eq-cost small { font-size:10px; color:var(--muted); font-family:'Noto Sans JP',sans-serif; font-weight:500; }

.eq-dates { display:flex; gap:10px; flex-wrap:wrap; margin-top:8px; }
.eq-date { font-size:10px; color:var(--muted); }
.eq-date strong { color:var(--text); font-weight:600; font-family:'DM Mono',monospace; font-size:10px; }

/* ── Expanded details ── */
.eq-details { display:none; margin-top:12px; padding-top:12px; border-top:0.5px solid var(--border); }
.eq-card.expanded .eq-details { display:block; }
.detail-row { display:flex; justify-content:space-between; align-items:flex-start; padding:5px 0; font-size:12px; gap:10px; }
.detail-label { color:var(--muted); font-size:11px; flex-shrink:0; }
.detail-value { font-weight:600; font-size:12px; text-align:right; word-break:break-all; }

.eq-actions { display:flex; gap:6px; margin-top:14px; flex-wrap:wrap; }
.btn-action { flex:1; min-width:0; padding:9px 6px; border-radius:10px; border:none; font-size:11px; font-weight:700; font-family:'Noto Sans JP',sans-serif; cursor:pointer; transition:all 0.15s; text-align:center; white-space:nowrap; }

.btn-status { background:var(--blue); color:#fff; }

/* ── Form ── */

.form-input:focus { border-color:var(--accent); }
.form-input::placeholder { color:var(--muted); opacity:0.6; }

textarea.form-input { min-height:80px; resize:vertical; line-height:1.6; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.btn-submit { width:100%; padding:14px; border-radius:12px; background:var(--accent); border:none; color:#fff; font-size:15px; font-weight:700; font-family:'Noto Sans JP',sans-serif; cursor:pointer; transition:all 0.15s; margin-top:8px; }
.btn-submit:active { opacity:0.8; transform:scale(0.98); }
.btn-submit:disabled { opacity:0.4; cursor:default; transform:none; }

/* ── Bottom Sheet / Overlay ── */
.overlay { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); opacity:0; pointer-events:none; transition:opacity 0.25s; }
.overlay.open { opacity:1; pointer-events:all; }
.panel { position:fixed; bottom:0; left:50%; z-index:201; transform:translateX(-50%) translateY(100%); width:100%; max-width:480px; max-height:88dvh; overflow-y:auto; background:var(--s1); border-radius:16px 16px 0 0; border-top:0.5px solid var(--border); padding:16px 20px 32px; transition:transform 0.3s cubic-bezier(0.32,0.72,0,1); }
.panel.open { transform:translateX(-50%) translateY(0); }
.panel-handle { width:36px; height:4px; background:var(--s3); border-radius:2px; margin:0 auto 16px; }
.panel-title { font-size:16px; font-weight:900; margin-bottom:18px; letter-spacing:-0.02em; }

/* ── PDF Modal ── */
.pdf-overlay { position:fixed; inset:0; z-index:300; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); display:none; align-items:center; justify-content:center; padding:16px; }
.pdf-overlay.open { display:flex; }
.pdf-container { width:100%; max-width:480px; height:85vh; background:var(--s1); border-radius:12px; overflow:hidden; display:flex; flex-direction:column; }
.pdf-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:0.5px solid var(--border); }
.pdf-title { font-size:13px; font-weight:700; }
.pdf-close { background:var(--s3); border:none; color:var(--text); width:30px; height:30px; border-radius:50%; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.pdf-close:active { opacity:0.7; }
.pdf-frame { flex:1; border:none; width:100%; }

/* ── Toast ── */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); max-width:400px; width:calc(100% - 40px); background:var(--s1); border:1px solid var(--border2); border-radius:12px; padding:14px 18px; font-size:13px; font-weight:600; z-index:400; transition:transform 0.3s cubic-bezier(0.32,0.72,0,1); display:flex; align-items:center; gap:8px; box-shadow:0 8px 32px rgba(0,0,0,0.3); }
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.success { border-color:rgba(34,197,94,0.3); }
.toast.error { border-color:rgba(239,68,68,0.3); }

/* ── Loading ── */
.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; }
.spinner { width:28px; height:28px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin-bottom:12px; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { font-size:13px; color:var(--muted); }

/* ── Empty ── */
.empty { text-align:center; padding:48px 20px; color:var(--muted); }
.empty-icon { font-size:32px; margin-bottom:8px; opacity:0.5; }
.empty-text { font-size:13px; }

/* ── Utilities ── */
.mono { font-family:'DM Mono',monospace; }
.yen { font-family:'DM Mono',monospace; }
</style>
</head>

const ARCHIVE_STATUSES = ['設置済み', '納品済'];
const STATUS_ORDER = { '未着手': 0, '発注済': 1, '納品待ち': 2, '設置済み': 3, '納品済': 4 };
const STATUS_NEXT = { '未着手': '発注済', '発注済': '納品待ち', '納品待ち': '納品済' };
const PRIORITY_ORDER = { '高': 0, '中': 1, '低': 2 };

const CAT_CLASS = { '車両': 'badge-cat-vehicle', '家具': 'badge-cat-furniture', 'IT機器': 'badge-cat-it', '機械': 'badge-cat-machine' };
const PRI_CLASS = { '高': 'badge-pri-high', '中': 'badge-pri-mid', '低': 'badge-pri-low' };
const STATUS_COLOR = {
  '未着手': 'var(--muted)', '発注済': 'var(--blue)', '納品待ち': 'var(--accent)',
  '設置済み': 'var(--green)', '納品済': 'var(--green)'
};
const STATUS_BG = {
  '未着手': 'rgba(104,104,122,0.15)', '発注済': 'rgba(59,130,246,0.15)', '納品待ち': 'rgba(240,165,0,0.15)',
  '設置済み': 'rgba(34,197,94,0.15)', '納品済': 'rgba(34,197,94,0.15)'
};

let items = [];
let currentTab = 'active';

// ── API ──
async function notionAPI(path, method, body) {
  if (path.startsWith('/v1/')) path = path.slice(3);
  if (!path.startsWith('/')) path = '/' + path;
  const opts = { method: method || 'GET', headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(WORKER + path, opts);
  if (!r.ok) throw new Error('error code: ' + r.status);
  const data = await r.json();
  if (data.object === 'error') throw new Error(data.message);
  return data;
}

// ── Data helpers ──
function prop(page, name, type) {
  const p = page.properties?.[name];
  if (!p) return null;
  switch (type || p.type) {
    case 'title': return p.title?.map(t => t.plain_text).join('') || '';
    case 'rich_text': return p.rich_text?.map(t => t.plain_text).join('') || '';
    case 'number': return p.number;
    case 'select': return p.select?.name || '';
    case 'status': return p.status?.name || '';
    case 'date': return p.date?.start || '';
    case 'files': return p.files || [];
    default: return null;
  }
}

function parseItem(page) {
  return {
    id: page.id,
    name: prop(page, '名前', 'title'),
    status: prop(page, 'ステータス', 'status'),
    category: prop(page, '選択', 'select'),
    vendor: prop(page, '取引先', 'select'),
    priority: prop(page, '優先度', 'select'),
    estimate: prop(page, '見積額', 'number'),
    qty: prop(page, '数量', 'number'),
    model: prop(page, 'メーカー・型番', 'rich_text'),
    purpose: prop(page, '購入目的', 'rich_text'),
    location: prop(page, '設置場所', 'rich_text'),
    memo: prop(page, 'メモ', 'rich_text'),
    estimateDate: prop(page, '見積日', 'date'),
    orderDate: prop(page, '発注予定日', 'date'),
    deliveryDate: prop(page, '納品予定日', 'date'),
    files: prop(page, '見積書', 'files'),
  };
}

function formatYen(n) {
  if (n == null) return '-';
  return '¥' + n.toLocaleString('ja-JP');
}

function formatDate(d) {
  if (!d) return '';
  return d.replace(/-/g, '/');
}

function sortItems(arr) {
  return arr.sort((a, b) => {
    const pa = PRIORITY_ORDER[a.priority] ?? 9;
    const pb = PRIORITY_ORDER[b.priority] ?? 9;
    if (pa !== pb) return pa - pb;
    const da = a.orderDate || '9999';
    const db = b.orderDate || '9999';
    return da.localeCompare(db);
  });
}

// ── Fetch ──
async function loadData() {
  const el = document.getElementById('active-list');
  el.innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-text">読み込み中...</div></div>';

  try {
    let all = [];
    let cursor = undefined;
    do {
      const body = { page_size: 100 };
      if (cursor) body.start_cursor = cursor;
      const res = await notionAPI(`/databases/${DB_ID}/query`, 'POST', body);
      all = all.concat(res.results);
      cursor = res.has_more ? res.next_cursor : null;
    } while (cursor);

    items = all.filter(p => !p.archived).map(parseItem);
    render();
  } catch (e) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">!</div><div class="empty-text">読み込みエラー: ${e.message}</div></div>`;
    console.error(e);
  }
}

// ── Render ──
function render() {
  const active = sortItems(items.filter(i => ACTIVE_STATUSES.includes(i.status)));
  const archive = sortItems(items.filter(i => ARCHIVE_STATUSES.includes(i.status)));

  document.getElementById('badge-active').textContent = active.length;
  document.getElementById('badge-archive').textContent = archive.length;

  // Summary
  const totalEstimate = active.reduce((s, i) => s + (i.estimate || 0), 0);
  const orderedCount = active.filter(i => i.status === '発注済').length;
  document.getElementById('sum-total').textContent = formatYen(totalEstimate);
  document.getElementById('sum-count').textContent = active.length + '件';
  document.getElementById('sum-ordered').textContent = orderedCount + '件';

  // Active list grouped by status
  const activeEl = document.getElementById('active-list');
  if (active.length === 0) {
    activeEl.innerHTML = '<div class="empty"><div class="empty-icon">&#x2714;</div><div class="empty-text">進行中の設備購入はありません</div></div>';
  } else {
    let html = '';
    for (const st of ACTIVE_STATUSES) {
      const group = active.filter(i => i.status === st);
      if (group.length === 0) continue;
      html += renderStatusSection(st, group, false);
    }
    activeEl.innerHTML = html;
  }

  // Archive list
  const archiveEl = document.getElementById('archive-list');
  if (archive.length === 0) {
    archiveEl.innerHTML = '<div class="empty"><div class="empty-text">アーカイブはありません</div></div>';
  } else {
    let html = '';
    for (const st of ARCHIVE_STATUSES) {
      const group = archive.filter(i => i.status === st);
      if (group.length === 0) continue;
      html += renderStatusSection(st, group, true);
    }
    archiveEl.innerHTML = html;
  }
}

function renderStatusSection(status, group, isArchive) {
  let html = `<div class="status-section">
    <div class="status-header">
      <div class="status-dot" style="background:${STATUS_COLOR[status]}"></div>
      <div class="status-title">${status}</div>
      <div class="status-count">${group.length}件</div>
    </div>`;
  for (const item of group) {
    html += renderCard(item, isArchive);
  }
  html += '</div>';
  return html;
}

function renderCard(item, isArchive) {
  const catClass = CAT_CLASS[item.category] || '';
  const priClass = PRI_CLASS[item.priority] || '';
  const fileUrl = getFileUrl(item.files);
  const nextStatus = STATUS_NEXT[item.status];

  let datesHtml = '';
  if (item.estimateDate) datesHtml += `<span class="eq-date">見積: <strong>${formatDate(item.estimateDate)}</strong></span>`;
  if (item.orderDate) datesHtml += `<span class="eq-date">発注: <strong>${formatDate(item.orderDate)}</strong></span>`;
  if (item.deliveryDate) datesHtml += `<span class="eq-date">納品: <strong>${formatDate(item.deliveryDate)}</strong></span>`;

  let detailsHtml = '';
  if (item.model) detailsHtml += `<div class="detail-row"><span class="detail-label">メーカー・型番</span><span class="detail-value">${esc(item.model)}</span></div>`;
  if (item.qty) detailsHtml += `<div class="detail-row"><span class="detail-label">数量</span><span class="detail-value mono">${item.qty}</span></div>`;
  if (item.purpose) detailsHtml += `<div class="detail-row"><span class="detail-label">購入目的</span><span class="detail-value">${esc(item.purpose)}</span></div>`;
  if (item.location) detailsHtml += `<div class="detail-row"><span class="detail-label">設置場所</span><span class="detail-value">${esc(item.location)}</span></div>`;
  if (item.memo) detailsHtml += `<div class="detail-row"><span class="detail-label">メモ</span><span class="detail-value">${esc(item.memo)}</span></div>`;

  let actionsHtml = '<div class="eq-actions">';
  if (!isArchive && nextStatus) {
    const btnClass = nextStatus === '納品済' ? 'green' : (nextStatus === '納品待ち' ? 'accent' : '');
    actionsHtml += `<button class="btn-action btn-status ${btnClass}" onclick="event.stopPropagation();changeStatus('${item.id}','${nextStatus}')">${nextStatus}へ</button>`;
  }
  if (isArchive) {
    actionsHtml += `<button class="btn-action btn-revert" onclick="event.stopPropagation();changeStatus('${item.id}','未着手')">未着手に戻す</button>`;
  }
  if (fileUrl) {
    actionsHtml += `<button class="btn-action btn-pdf" onclick="event.stopPropagation();openPdf('${esc(fileUrl)}','${esc(item.name)}')">見積書を見る</button>`;
  }
  actionsHtml += `<button class="btn-action btn-edit" onclick="event.stopPropagation();openEdit('${item.id}')">編集</button>`;
  actionsHtml += '</div>';

  return `<div class="eq-card ${isArchive ? 'archived' : ''}" onclick="toggleCard(this)">
    <div class="eq-top">
      <div class="eq-name">${esc(item.name)}</div>
      <div class="eq-badges">
        ${item.category ? `<span class="badge badge-cat ${catClass}">${item.category}</span>` : ''}
        ${item.priority ? `<span class="badge ${priClass}">${item.priority}</span>` : ''}
      </div>
    </div>
    <div class="eq-meta">
      <span class="eq-vendor">${esc(item.vendor) || '-'}</span>
      <span class="eq-cost">${item.estimate != null ? formatYen(item.estimate) : ''}</span>
    </div>
    ${datesHtml ? `<div class="eq-dates">${datesHtml}</div>` : ''}
    <div class="eq-details">
      ${detailsHtml}
      ${actionsHtml}
    </div>
  </div>`;
}

function getFileUrl(files) {
  if (!files || files.length === 0) return '';
  const f = files[0];
  if (f.type === 'file') return f.file?.url || '';
  if (f.type === 'external') return f.external?.url || '';
  return '';
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ── Card expand ──
function toggleCard(el) {
  el.classList.toggle('expanded');
}

// ── Tab switch ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
  document.getElementById('page-' + tab).classList.add('show');
}

// ── Status change ──
async function changeStatus(id, newStatus) {
  try {
    await notionAPI(`/pages/${id}`, 'PATCH', {
      properties: { 'ステータス': { status: { name: newStatus } } }
    });
    const item = items.find(i => i.id === id);
    if (item) item.status = newStatus;
    render();
    showToast('ステータスを更新しました', 'success');
  } catch (e) {
    showToast('更新エラー: ' + e.message, 'error');
  }
}

// ── Create ──
async function createItem() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('名前を入力してください', 'error'); return; }

  const btn = document.getElementById('btn-create');
  btn.disabled = true;
  btn.textContent = '登録中...';

  try {
    const props = {
      '名前': { title: [{ text: { content: name } }] },
      'ステータス': { status: { name: '未着手' } },
    };

    const cat = document.getElementById('f-category').value;
    if (cat) props['選択'] = { select: { name: cat } };

    const vendor = document.getElementById('f-vendor').value;
    if (vendor) props['取引先'] = { select: { name: vendor } };

    const pri = document.getElementById('f-priority').value;
    if (pri) props['優先度'] = { select: { name: pri } };

    const est = document.getElementById('f-estimate').value;
    if (est) props['見積額'] = { number: Number(est) };

    const qty = document.getElementById('f-qty').value;
    if (qty) props['数量'] = { number: Number(qty) };

    const model = document.getElementById('f-model').value.trim();
    if (model) props['メーカー・型番'] = { rich_text: [{ text: { content: model } }] };

    const purpose = document.getElementById('f-purpose').value.trim();
    if (purpose) props['購入目的'] = { rich_text: [{ text: { content: purpose } }] };

    const loc = document.getElementById('f-location').value.trim();
    if (loc) props['設置場所'] = { rich_text: [{ text: { content: loc } }] };

    const memo = document.getElementById('f-memo').value.trim();
    if (memo) props['メモ'] = { rich_text: [{ text: { content: memo } }] };

    const estDate = document.getElementById('f-estimate-date').value;
    if (estDate) props['見積日'] = { date: { start: estDate } };

    const ordDate = document.getElementById('f-order-date').value;
    if (ordDate) props['発注予定日'] = { date: { start: ordDate } };

    const delDate = document.getElementById('f-delivery-date').value;
    if (delDate) props['納品予定日'] = { date: { start: delDate } };

    await notionAPI('/pages', 'POST', { parent: { database_id: DB_ID }, properties: props });

    // Reset form
    document.getElementById('f-name').value = '';
    document.getElementById('f-category').value = '';
    document.getElementById('f-vendor').value = '';
    document.getElementById('f-priority').value = '中';
    document.getElementById('f-estimate').value = '';
    document.getElementById('f-qty').value = '1';
    document.getElementById('f-model').value = '';
    document.getElementById('f-purpose').value = '';
    document.getElementById('f-location').value = '';
    document.getElementById('f-memo').value = '';
    document.getElementById('f-estimate-date').value = '';
    document.getElementById('f-order-date').value = '';
    document.getElementById('f-delivery-date').value = '';

    showToast('登録しました', 'success');
    switchTab('active');
    loadData();
  } catch (e) {
    showToast('登録エラー: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '登録する';
  }
}

// ── Edit ──
function openEdit(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;

  document.getElementById('edit-id').value = id;
  document.getElementById('e-name').value = item.name || '';
  document.getElementById('e-category').value = item.category || '';
  document.getElementById('e-vendor').value = item.vendor || '';
  document.getElementById('e-priority').value = item.priority || '中';
  document.getElementById('e-qty').value = item.qty || 1;
  document.getElementById('e-estimate').value = item.estimate || '';
  document.getElementById('e-model').value = item.model || '';
  document.getElementById('e-purpose').value = item.purpose || '';
  document.getElementById('e-location').value = item.location || '';
  document.getElementById('e-memo').value = item.memo || '';
  document.getElementById('e-estimate-date').value = item.estimateDate || '';
  document.getElementById('e-order-date').value = item.orderDate || '';
  document.getElementById('e-delivery-date').value = item.deliveryDate || '';

  document.getElementById('edit-overlay').classList.add('open');
  document.getElementById('edit-panel').classList.add('open');
}

function closeEdit() {
  document.getElementById('edit-overlay').classList.remove('open');
  document.getElementById('edit-panel').classList.remove('open');
}

async function saveEdit() {
  const id = document.getElementById('edit-id').value;
  const name = document.getElementById('e-name').value.trim();
  if (!name) { showToast('名前を入力してください', 'error'); return; }

  try {
    const props = {
      '名前': { title: [{ text: { content: name } }] },
    };

    const cat = document.getElementById('e-category').value;
    props['選択'] = cat ? { select: { name: cat } } : { select: null };

    const vendor = document.getElementById('e-vendor').value;
    props['取引先'] = vendor ? { select: { name: vendor } } : { select: null };

    const pri = document.getElementById('e-priority').value;
    props['優先度'] = pri ? { select: { name: pri } } : { select: null };

    const est = document.getElementById('e-estimate').value;
    props['見積額'] = est ? { number: Number(est) } : { number: null };

    const qty = document.getElementById('e-qty').value;
    props['数量'] = qty ? { number: Number(qty) } : { number: null };

    const model = document.getElementById('e-model').value.trim();
    props['メーカー・型番'] = { rich_text: model ? [{ text: { content: model } }] : [] };

    const purpose = document.getElementById('e-purpose').value.trim();
    props['購入目的'] = { rich_text: purpose ? [{ text: { content: purpose } }] : [] };

    const loc = document.getElementById('e-location').value.trim();
    props['設置場所'] = { rich_text: loc ? [{ text: { content: loc } }] : [] };

    const memo = document.getElementById('e-memo').value.trim();
    props['メモ'] = { rich_text: memo ? [{ text: { content: memo } }] : [] };

    const estDate = document.getElementById('e-estimate-date').value;
    props['見積日'] = estDate ? { date: { start: estDate } } : { date: null };

    const ordDate = document.getElementById('e-order-date').value;
    props['発注予定日'] = ordDate ? { date: { start: ordDate } } : { date: null };

    const delDate = document.getElementById('e-delivery-date').value;
    props['納品予定日'] = delDate ? { date: { start: delDate } } : { date: null };

    await notionAPI(`/pages/${id}`, 'PATCH', { properties: props });

    closeEdit();
    showToast('保存しました', 'success');
    loadData();
  } catch (e) {
    showToast('保存エラー: ' + e.message, 'error');
  }
}

// ── PDF ──
function openPdf(url, name) {
  const proxyUrl = WORKER + '/pdf-proxy?url=' + encodeURIComponent(url);
  document.getElementById('pdf-title').textContent = name + ' - 見積書';
  document.getElementById('pdf-frame').src = proxyUrl;
  document.getElementById('pdf-overlay').classList.add('open');
}

function closePdf() {
  document.getElementById('pdf-overlay').classList.remove('open');
  document.getElementById('pdf-frame').src = 'about:blank';
}

// ── Toast ──
let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.className = 'toast ' + (type || '');
  t.textContent = msg;
  clearTimeout(toastTimer);
  requestAnimationFrame(() => {
    t.classList.add('show');
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  });
}

// ── Init ──
loadData();
</script>
