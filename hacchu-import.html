<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>発注データ取込 | TIRE MANAGER F.O.O</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fdf8f0;color:#333;padding-bottom:20px}
[data-theme="dark"] body{background:#0e0e10;color:#f0f0f0}
[data-theme="dark"] .header{background:#18181b;border-bottom-color:#27272a}
[data-theme="dark"] .header-brand,[data-theme="dark"] .header-back{color:#71717a;border-color:#3f3f46}
[data-theme="dark"] .header-title span{color:#f0a500}
[data-theme="dark"] h1{color:#f0a500}
[data-theme="dark"] .log{background:#18181b;border-color:#27272a}
[data-theme="dark"] .info{color:#71717a}
[data-theme="dark"] button{background:#d4880a}
[data-theme="dark"] #result{background:#1a1a2e;border-color:#3b82f6;color:#93c5fd}
.header{background:#fff;padding:14px 20px 10px;border-bottom:0.5px solid #e0d6c8;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
.header-brand{font-size:10px;color:#888;letter-spacing:0.12em;text-transform:uppercase;}
.header-back{font-size:11px;color:#888;text-decoration:none;border:0.5px solid #e0d6c8;border-radius:20px;padding:3px 10px;}
.header-title{font-size:17px;font-weight:900;letter-spacing:-0.02em;}
.header-title span{color:#c87a2a;}
.content{padding:20px;}
h1{font-size:20px;color:#c87a2a;margin-bottom:12px}
.log{background:#fff;border:1px solid #e8ddd0;border-radius:10px;padding:12px;margin:12px 0;max-height:600px;overflow-y:auto;font-size:12px;line-height:1.8;font-family:monospace}
.ok{color:#16a34a} .err{color:#dc2626} .info{color:#888} .warn{color:#e65100}
button{padding:12px 24px;background:#c87a2a;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin:8px 4px}
button:disabled{opacity:0.4}
#result{background:#e3f2fd;border:1px solid #90caf9;border-radius:10px;padding:14px;margin:16px 0;font-size:13px;display:none}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="header-brand">F.o.o · 事務</div>
    <a class="header-back" href="https://mitsurumukaihata.github.io/foo-portal/">← ポータル</a>
  </div>
  <div class="header-title">発注<span>取込</span></div>
</div>
<div class="content">
<p style="font-size:13px;color:#888;margin-bottom:12px">HACCHU_DBから今日(2026-03-23)の発注データを取得し、各在庫DBに「発注中」レコードとして登録します。</p>

<button id="btn-fetch" onclick="fetchOrders()">① 発注データ取得</button>
<button id="btn-import" onclick="importToStockDB()" disabled>② 在庫DBに登録</button>

<div class="log" id="log"></div>
<div id="result"></div>

<script>
(function(){
  var t = localStorage.getItem('foo_portal_theme') || 'auto';
  if (t !== 'auto') document.documentElement.setAttribute('data-theme', t);
})();
const WORKER = 'https://notion-proxy.33322666666mm.workers.dev';
const HACCHU_DB = '202a695f-8e88-80aa-92f6-f38d9b47b537';

const DB_MAP = {
  'LTL TB　ノーマル':     { id:'200a695f8e888018b5f5eac83fdad412', wField:'倉庫' },
  'LTL TB　スタッドレス': { id:'201a695f8e888171abb8e349ad4d055a', wField:'倉庫' },
  'LTS　ノーマル':        { id:'201a695f8e8881adb144cd3a1639132d', wField:'倉庫' },
  'LTS　スタッドレス':    { id:'201a695f8e8881a299e8fb57bad707f6', wField:'倉庫' },
  'RT 再生':              { id:'201a695f8e888104bb47c7103d5909dc', wField:'倉庫' },
  'T/T チューブタイプ':   { id:'201a695f8e8881a6930fcf2bd752e676', wField:'倉庫' },
  'バン':                 { id:'201a695f8e8881f3a958cead42156e07', wField:'出庫倉庫' },
  'リフト':               { id:'201a695f8e8881c5b2c3d9e9ce2ffd21', wField:'出庫倉庫' },
};

let ordersToImport = [];

async function notionAPI(method, path, body) {
  const res = await fetch(WORKER + path, {
    method,
    headers:{'Content-Type':'application/json'},
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    let msg = 'HTTP ' + res.status;
    try { const d = await res.json(); if (d.message) msg = d.message; } catch(_){}
    throw new Error(msg);
  }
  return res.json();
}

function log(msg, cls='info') {
  const el = document.getElementById('log');
  const t = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  el.innerHTML += `<div class="${cls}">${t}  ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

async function fetchOrders() {
  document.getElementById('btn-fetch').disabled = true;
  document.getElementById('log').innerHTML = '';
  ordersToImport = [];
  
  log('HACCHU_DBから今日の発注データを取得中…');
  
  try {
    let allResults = [];
    let cursor = null;
    let page = 0;
    
    while (page < 20) {
      page++;
      const body = {
        page_size: 100,
        filter: {
          and: [
            { timestamp: 'created_time', created_time: { on_or_after: '2026-03-23T00:00:00+09:00' } },
            { timestamp: 'created_time', created_time: { before: '2026-03-24T00:00:00+09:00' } }
          ]
        }
      };
      if (cursor) body.start_cursor = cursor;
      
      const res = await notionAPI('POST', `/databases/${HACCHU_DB}/query`, body);
      allResults = allResults.concat(res.results || []);
      if (!res.has_more) break;
      cursor = res.next_cursor;
    }
    
    log(`取得件数: ${allResults.length} 件`, 'ok');
    
    // Parse each order
    for (const r of allResults) {
      const p = r.properties;
      const pattern = p['パターン名']?.select?.name || '';
      const size = p['サイズコード']?.select?.name || p['サイズコード']?.rich_text?.[0]?.plain_text || '';
      const qty = p['数量']?.number || 0;
      const warehouse = p['倉庫']?.select?.name || '';
      const cat = p['カテゴリ']?.select?.name || '';
      const status = p['ステータス']?.select?.name || '';
      const maker = p['メーカー']?.select?.name || '';
      const title = p['タイトル']?.title?.[0]?.plain_text || '';
      
      log(`  ${pattern} ${size} | ${warehouse} ${qty}本 | ${cat} | ${status} | ${maker}`);
      
      if (!cat || !pattern || !size || !warehouse || qty <= 0) {
        log(`  ⚠ スキップ（データ不足: cat=${cat}, pattern=${pattern}, size=${size}, wh=${warehouse}, qty=${qty})`, 'warn');
        continue;
      }
      
      const dbInfo = DB_MAP[cat];
      if (!dbInfo) {
        log(`  ⚠ カテゴリ "${cat}" に対応するDBが見つかりません`, 'warn');
        continue;
      }
      
      ordersToImport.push({ pattern, size, qty, warehouse, cat, dbInfo, status, maker });
    }
    
    log(`━━━━━━━━━━━━━━━━━━━━━━`, 'ok');
    log(`登録対象: ${ordersToImport.length} 件`, 'ok');
    
    if (ordersToImport.length > 0) {
      document.getElementById('btn-import').disabled = false;
    }
    
  } catch(e) {
    log(`エラー: ${e.message}`, 'err');
  }
  
  document.getElementById('btn-fetch').disabled = false;
}

async function importToStockDB() {
  if (!ordersToImport.length) return;
  
  document.getElementById('btn-import').disabled = true;
  document.getElementById('btn-fetch').disabled = true;
  
  log('');
  log('━━ 在庫DBへの登録開始 ━━');
  
  let success = 0, fail = 0;
  
  for (let i = 0; i < ordersToImport.length; i++) {
    const o = ordersToImport[i];
    const dbInfo = o.dbInfo;
    
    try {
      await notionAPI('POST', '/pages', {
        parent: { database_id: dbInfo.id },
        properties: {
          'タイトル': { title: [{ text: { content: `${o.size} ${o.pattern} 発注中 ${o.warehouse}` } }] },
          'サイズコード': { select: { name: o.size } },
          'パターン名': { select: { name: o.pattern } },
          '区分': { select: { name: '発注中' } },
          '数量': { number: o.qty },
          [dbInfo.wField]: { select: { name: o.warehouse } },
          '作成者': { select: { name: '自動取込' } },
        }
      });
      success++;
      log(`✅ [${i+1}/${ordersToImport.length}] ${o.pattern} ${o.size} ${o.warehouse} ${o.qty}本 → ${o.cat}`, 'ok');
    } catch(e) {
      fail++;
      log(`❌ [${i+1}/${ordersToImport.length}] ${o.pattern} ${o.size}: ${e.message}`, 'err');
    }
    
    // Rate limit: small delay
    if (i < ordersToImport.length - 1) {
      await new Promise(r => setTimeout(r, 350));
    }
  }
  
  log('');
  log(`━━ 完了 ━━`, 'ok');
  log(`成功: ${success} 件 / 失敗: ${fail} 件`, success > 0 ? 'ok' : 'err');
  
  const resultEl = document.getElementById('result');
  resultEl.style.display = 'block';
  resultEl.innerHTML = `<b>取込結果</b><br>成功: ${success} 件<br>失敗: ${fail} 件<br><br>これで繰越処理の準備が整いました。<a href="db-renewal.html">DB繰越管理ページ</a>へ進んでください。`;
  
  document.getElementById('btn-fetch').disabled = false;
}
</script>
</div>
<script src="foo-swipe.js"></script>
</body>
</html>
