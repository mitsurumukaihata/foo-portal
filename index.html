<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #18181f;
  --s1: #101015;
  --s2: #1e1e26;
  --s3: #26262f;
  --border: #2c2c38;
  --border2: #3c3c4a;
  --text: #f0f0f2;
  --muted: #68687a;
  --accent: #f0a500;
  --accent2: #f5be40;
  --green: #22c55e;
  --red: #ef4444;
  --blue: #3b82f6;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg: #fdf6ee;
    --s1: #ffffff;
    --s2: #fdf0e4;
    --s3: #f5e6d4;
    --border: #e8d8c4;
    --border2: #d8c4a8;
    --text: #1a1208;
    --muted: #a08060;
    --accent: #e07000;
    --accent2: #c05800;
    --green: #1a9e4a;
    --red: #dc2626;
    --blue: #2563eb;
  }
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
}

/* ── ログイン画面 ── */
#login-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 40px 24px 32px;
}

.login-brand {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 32px;
}

.login-title {
  font-size: 30px;
  font-weight: 900;
  letter-spacing: -0.03em;
  line-height: 1.1;
  margin-bottom: 6px;
}
.login-title span { color: var(--accent); }

.login-sub {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 36px;
  line-height: 1.6;
}

.login-label {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

/* 社員選択グリッド */
.staff-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 28px;
}

.staff-btn {
  background: var(--s2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 14px 10px;
  text-align: center;
  cursor: pointer;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.15s;
  line-height: 1.3;
}
.staff-btn:active { transform: scale(0.97); }
.staff-btn.selected {
  border-color: var(--accent);
  background: rgba(240,165,0,0.1);
  color: var(--accent);
}

/* PINエリア */
.pin-area {
  display: none;
  flex-direction: column;
  gap: 12px;
}
.pin-area.visible { display: flex; }

.pin-display {
  background: var(--s2);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  transition: border-color 0.15s;
}
.pin-display.focus { border-color: var(--accent); }
.pin-display.error { border-color: var(--red); }

.pin-dots {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-bottom: 6px;
}
.pin-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 2px solid var(--border2);
  background: transparent;
  transition: all 0.15s;
}
.pin-dot.filled {
  background: var(--accent);
  border-color: var(--accent);
}

.pin-hint { font-size: 12px; color: var(--muted); }
.pin-hint.error-msg { color: var(--red); }

.pin-numpad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.pin-key {
  background: var(--s2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 18px;
  font-size: 20px;
  font-weight: 500;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  cursor: pointer;
  text-align: center;
  transition: all 0.1s;
}
.pin-key:active { background: var(--s3); transform: scale(0.95); }
.pin-key.del { color: var(--accent); font-size: 16px; }
.pin-key.empty { background: transparent; border-color: transparent; cursor: default; }

.btn-login {
  width: 100%;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  padding: 15px;
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-login:disabled { opacity: 0.4; cursor: default; }

.loading-spinner {
  display: inline-block;
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-box {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 12px;
  color: var(--red);
  line-height: 1.5;
  display: none;
}
.error-box.visible { display: block; }

.btn-back {
  background: transparent;
  border: none;
  color: var(--muted);
  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  padding: 8px 0;
  text-align: center;
}

/* ── ポータル画面 ── */
#portal-screen { display: none; }

.portal-header {
  background: var(--s1);
  border-bottom: 0.5px solid var(--border);

.portal-brand {

.user-name { font-size: 12px; font-weight: 700; color: var(--text); }
.user-role { font-size: 11px; color: var(--accent); font-weight: 500; }

.portal-body { padding: 0 0 48px; }

.sec { padding: 24px 20px 0; }
.sec-label {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.12em;

.app-row {
  background: var(--s1);

  align-items: center;

.app-row:active { transform: scale(0.99); }

.app-icon {

.app-text { flex: 1; }

.app-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

.coming { opacity: 0.35; pointer-events: none; }

.portal-footer {

</style>
</head>

<script>
// ─── 設定 ────────────────────────────────────────────────────────────────────
const WORKER_URL  = 'https://notion-proxy.33322666666mm.workers.dev';
const MASTER_DB   = '08c5405729794337886b3565352ef96a';
const SESSION_KEY = 'foo_portal_session';
const SESSION_DAYS = 30;

// ─── 状態 ────────────────────────────────────────────────────────────────────
let selectedStaff = '';
let pinDigits = [];
let pinLocked = false;
let failCount = 0;

// ─── セッション管理 ───────────────────────────────────────────────────────────
function saveSession(user) {
  const expires = new Date();
  expires.setDate(expires.getDate() + SESSION_DAYS);
  const data = {
    name:    user.name,
    email:   user.email,
    role:    user.role,
    expires: expires.toISOString(),
  };
  localStorage.setItem(SESSION_KEY, JSON.stringify(data));
}

function loadSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (new Date(data.expires) < new Date()) {
      localStorage.removeItem(SESSION_KEY);
      return null;
    }
    // 最終アクセス日を更新（30日リセット）
    saveSession(data);
    return data;
  } catch(e) {
    return null;
  }
}

function logout() {
  if (!confirm('ログアウトしますか？')) return;
  localStorage.removeItem(SESSION_KEY);
  location.reload();
}

// ─── Notion API ───────────────────────────────────────────────────────────────
async function notionAPI(method, path, body) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 12000);
  try {
    const res = await fetch(WORKER_URL + path, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined,
      signal: controller.signal,
    });
    clearTimeout(timer);
    return await res.json();
  } catch(e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') throw new Error('タイムアウト。通信環境を確認してください。');
    throw new Error('通信エラー: ' + e.message);
  }
}

// 社員マスタDBから該当社員のPINを照合
async function verifyPin(name, pin) {
  const res = await notionAPI('POST', `/databases/${MASTER_DB}/query`, {
    filter: {
      and: [
        { property: '氏名',   title:  { equals: name } },
        { property: '在籍',   select: { equals: '在籍中' } },
      ]
    },
    page_size: 1,
  });
  if (res.object === 'error') throw new Error(res.message);
  if (!res.results || res.results.length === 0) throw new Error('社員情報が見つかりません');

  const page = res.results[0];
  const props = page.properties;
  const storedPin   = props['PIN']?.rich_text?.[0]?.plain_text || '';
  const email       = props['メールアドレス']?.email || '';
  const role        = props['権限']?.select?.name || '一般';

  if (storedPin !== pin) return null; // PIN不一致

  return { name, email, role };
}

// ─── ログイン: STEP1 社員選択 ──────────────────────────────────────────────────
function selectStaff(name) {
  selectedStaff = name;
  document.querySelectorAll('.staff-btn').forEach(b => {
    b.classList.toggle('selected', b.textContent.trim() === name);
  });

  // STEP2へ遷移
  document.getElementById('step-staff').style.display = 'none';
  document.getElementById('login-sub').textContent = name + ' のPINを入力';
  document.getElementById('pin-label').textContent = name + ' · PIN入力';

  const pinArea = document.getElementById('step-pin');
  pinArea.classList.add('visible');

  pinDigits = [];
  failCount = 0;
  pinLocked = false;
  renderPinDots();
  showPinHint('4桁のPINを入力してください', false);
}

function backToStaff() {
  selectedStaff = '';
  pinDigits = [];
  document.getElementById('step-pin').classList.remove('visible');
  document.getElementById('step-staff').style.display = '';
  document.getElementById('login-sub').textContent = '名前を選択してください';
  document.querySelectorAll('.staff-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('pin-error').classList.remove('visible');
}

// ─── ログイン: STEP2 PIN入力 ──────────────────────────────────────────────────
function pinInput(digit) {
  if (pinLocked) return;
  if (pinDigits.length >= 4) return;
  pinDigits.push(digit);
  renderPinDots();
  document.getElementById('pin-display').classList.add('focus');
  document.getElementById('pin-display').classList.remove('error');
  showPinHint('4桁のPINを入力してください', false);

  // 4桁揃ったら自動送信
  if (pinDigits.length === 4) {
    document.getElementById('pin-submit-btn').disabled = false;
    setTimeout(submitPin, 120);
  } else {
    document.getElementById('pin-submit-btn').disabled = true;
  }
}

function pinDel() {
  if (pinLocked) return;
  pinDigits.pop();
  renderPinDots();
  document.getElementById('pin-submit-btn').disabled = true;
}

function renderPinDots() {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('d' + i);
    dot.classList.toggle('filled', i < pinDigits.length);
  }
}

function showPinHint(msg, isError) {
  const hint = document.getElementById('pin-hint');
  const disp = document.getElementById('pin-display');
  hint.textContent = msg;
  hint.className = 'pin-hint' + (isError ? ' error-msg' : '');
  disp.classList.toggle('error', isError);
}

async function submitPin() {
  if (pinLocked || pinDigits.length < 4) return;
  pinLocked = true;

  const btn = document.getElementById('pin-submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span>確認中…';

  const errEl = document.getElementById('pin-error');
  errEl.classList.remove('visible');

  try {
    const pin = pinDigits.join('');
    const user = await verifyPin(selectedStaff, pin);

    if (!user) {
      // PIN不一致
      failCount++;
      showPinHint(`PINが違います（${failCount}回目）`, true);
      pinDigits = [];
      renderPinDots();
      btn.innerHTML = 'ログイン';
      btn.disabled = true;
      pinLocked = false;

      if (failCount >= 5) {
        showPinHint('5回失敗しました。管理者に連絡してください。', true);
        pinLocked = true;
        btn.disabled = true;
      }
      return;
    }

    // ログイン成功
    saveSession(user);
    launchPortal(user);

  } catch(e) {
    errEl.textContent = 'エラー: ' + e.message;
    errEl.classList.add('visible');
    btn.innerHTML = 'ログイン';
    btn.disabled = false;
    pinLocked = false;
    pinDigits = [];
    renderPinDots();
  }
}

// ─── ポータル起動 ─────────────────────────────────────────────────────────────
function launchPortal(user) {
  document.getElementById('login-screen').style.display  = 'none';
  document.getElementById('portal-screen').style.display = 'block';

  // ユーザー情報をセット
  const initials = user.name.replace(/\s/g, '').slice(-1) || user.name[0];
  document.getElementById('portal-avatar').textContent = initials;
  document.getElementById('portal-name').textContent   = user.name;
  document.getElementById('portal-role').textContent   = user.role;
}

// ─── 初期化 ──────────────────────────────────────────────────────────────────
window.onload = () => {
  const session = loadSession();
  if (session) {
    launchPortal(session);
  }
};
</script>
