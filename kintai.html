<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>出勤簿 | f.o.o</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #18181f;
  --s1: #101015;
  --s2: #1e1e26;
  --s3: #26262f;
  --border: #2c2c38;
  --border2: #3c3c4a;
  --text: #f0f0f2;
  --muted: #68687a;
  --accent: #f0a500;
  --accent2: #f5be40;
  --green: #22c55e;
  --red: #ef4444;
  --blue: #3b82f6;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #fdf6ee; --s1: #ffffff; --s2: #fdf0e4; --s3: #f5e6d4;
    --border: #e8d8c4; --border2: #d8c4a8; --text: #1a1208; --muted: #a08060;
    --accent: #e07000; --accent2: #c05800; --green: #1a9e4a; --red: #dc2626; --blue: #2563eb;
  }
}
[data-theme="dark"] {
  --bg: #18181f; --s1: #101015; --s2: #1e1e26; --s3: #26262f;
  --border: #2c2c38; --border2: #3c3c4a; --text: #f0f0f2; --muted: #68687a;
  --accent: #f0a500; --accent2: #f5be40; --green: #22c55e; --red: #ef4444; --blue: #3b82f6;
}
[data-theme="light"] {
  --bg: #fdf6ee; --s1: #ffffff; --s2: #fdf0e4; --s3: #f5e6d4;
  --border: #e8d8c4; --border2: #d8c4a8; --text: #1a1208; --muted: #a08060;
  --accent: #e07000; --accent2: #c05800; --green: #1a9e4a; --red: #dc2626; --blue: #2563eb;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans JP',sans-serif; min-height:100vh; max-width:480px; margin:0 auto; }

/* ── ヘッダー ── */
.header { background:var(--s1); border-bottom:0.5px solid var(--border); padding:14px 20px 10px; position:sticky; top:0; z-index:100; }
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:2px; }
.header-brand { font-size:10px; color:var(--muted); letter-spacing:0.12em; text-transform:uppercase; }
.header-back { font-size:11px; color:var(--muted); text-decoration:none; border:0.5px solid var(--border); border-radius:20px; padding:3px 10px; }
.header-title { font-size:17px; font-weight:900; letter-spacing:-0.02em; }
.header-title span { color:var(--accent); }

/* ── 共通 ── */
.page { display:none; padding-bottom:48px; }
.page.active { display:block; }
.content { padding:20px; }
.screen-label { font-size:10px; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:6px; }
.screen-title { font-size:20px; font-weight:900; letter-spacing:-0.02em; margin-bottom:16px; line-height:1.2; }

.btn-primary { width:100%; background:var(--accent); border:none; border-radius:10px; padding:15px; color:#fff; font-size:14px; font-weight:700; font-family:'Noto Sans JP',sans-serif; cursor:pointer; margin-top:10px; transition:opacity 0.15s; }
.btn-primary:disabled { opacity:0.4; cursor:default; }
.btn-secondary { width:100%; background:transparent; border:1.5px solid var(--border2); border-radius:10px; padding:12px; color:var(--text); font-size:14px; font-family:'Noto Sans JP',sans-serif; cursor:pointer; margin-top:6px; font-weight:500; }

.error-box { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:8px; padding:12px 14px; margin-bottom:12px; font-size:12px; color:var(--red); line-height:1.5; }
.info-box { background:rgba(240,165,0,0.08); border:1px solid rgba(240,165,0,0.25); border-radius:8px; padding:12px 14px; margin-bottom:12px; font-size:12px; color:var(--accent2); line-height:1.7; }

.spinner { width:28px; height:28px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-wrap { text-align:center; padding:48px 20px; }
.loading-text { font-size:13px; color:var(--muted); }

/* ── ナビタブ ── */
.nav { display:flex; background:var(--s1); border-bottom:0.5px solid var(--border); }
.nav-btn { flex:1; padding:10px 6px 8px; background:transparent; border:none; border-bottom:2px solid transparent; color:var(--muted); font-size:12px; font-family:'Noto Sans JP',sans-serif; cursor:pointer; transition:all 0.15s; }
.nav-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

/* ── 日付選択 ── */
.date-selector { display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; margin-bottom:16px; scrollbar-width:none; }
.date-selector::-webkit-scrollbar { display:none; }
.date-chip { flex-shrink:0; background:var(--s2); border:1.5px solid var(--border); border-radius:20px; padding:7px 14px; font-size:12px; font-weight:500; color:var(--muted); cursor:pointer; transition:all 0.15s; text-align:center; }
.date-chip:active { transform:scale(0.97); }
.date-chip.active { border-color:var(--accent); background:rgba(240,165,0,0.1); color:var(--accent); }
.date-chip .dc-date { font-family:'DM Mono',monospace; font-size:13px; font-weight:700; }
.date-chip .dc-day { font-size:10px; margin-top:1px; }
.date-chip.shitei { border-color:rgba(240,165,0,0.45); }
.date-chip.shitei.active { border-color:var(--accent); }
.dc-shitei { font-size:9px; font-weight:700; color:var(--accent); background:rgba(240,165,0,0.15); border-radius:4px; padding:1px 5px; margin-top:3px; display:inline-block; letter-spacing:0.04em; }
.date-chip.active .dc-shitei { background:rgba(255,255,255,0.22); color:#fff; }

/* ── 全員閲覧 ── */
.view-tabs { display:flex; gap:6px; margin-bottom:14px; }
.view-tab { flex:1; padding:9px; background:var(--s2); border:1.5px solid var(--border); border-radius:8px; font-size:12px; font-weight:700; color:var(--muted); cursor:pointer; text-align:center; transition:all 0.12s; }
.view-tab.active { border-color:var(--accent); background:rgba(240,165,0,0.1); color:var(--accent); }

.kintai-row { display:flex; align-items:center; padding:10px 0; border-bottom:0.5px solid var(--border); gap:10px; }
.kintai-row:last-child { border-bottom:none; }
.kr-avatar { width:28px; height:28px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; flex-shrink:0; }
.kr-name { font-size:13px; font-weight:700; color:var(--text); flex:1; }
.kr-time { font-family:'DM Mono',monospace; font-size:13px; color:var(--text); text-align:right; }
.kr-badge { font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; }
.badge-ok { background:rgba(34,197,94,0.15); color:var(--green); }
.badge-mid { background:rgba(240,165,0,0.12); color:var(--accent2); }
.badge-none { background:var(--s3); color:var(--muted); }
.badge-shiteikyu { background:rgba(59,130,246,0.12); color:var(--blue); }

/* ── 修正依頼 ── */
.request-old { background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.25); border-radius:10px; padding:14px; margin-bottom:16px; font-size:12px; color:var(--red); line-height:1.8; }

/* ── ホーム画面 ── */
.user-row { display:flex; align-items:center; gap:10px; margin-bottom:16px; padding-bottom:16px; border-bottom:0.5px solid var(--border); }
.avatar { width:32px; height:32px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#fff; flex-shrink:0; }
.user-name-text { font-size:15px; font-weight:700; color:var(--text); }
.user-date-text { font-size:11px; color:var(--muted); font-family:'DM Mono',monospace; }

.today-card { background:var(--s2); border:1px solid var(--border); border-radius:12px; padding:14px 16px; margin-bottom:16px; }
.today-row { display:flex; justify-content:space-between; align-items:center; }
.today-item { flex:1; text-align:center; }
.today-label { font-size:10px; color:var(--muted); letter-spacing:0.06em; margin-bottom:4px; }
.today-time { font-size:22px; font-weight:700; font-family:'DM Mono',monospace; color:var(--text); }
.today-time.done { color:var(--green); }
.today-time.empty { color:var(--muted); font-size:14px; font-weight:400; }
.today-div { width:1px; background:var(--border); align-self:stretch; margin:0 8px; }
.today-status { font-size:10px; margin-top:4px; }
.status-done { color:var(--green); }
.status-empty { color:var(--muted); }

.action-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
.action-card { background:var(--s2); border:1.5px solid var(--border); border-radius:12px; padding:16px 12px; text-align:center; cursor:pointer; transition:all 0.15s; }
.action-card:active { transform:scale(0.97); }
.action-card.available { border-color:var(--accent); background:rgba(240,165,0,0.08); }
.action-card.disabled { opacity:0.4; cursor:default; pointer-events:none; }
.action-card.recorded { border-color:var(--green); background:rgba(34,197,94,0.06); cursor:pointer; }
.action-card.recorded:active { transform:scale(0.97); }
.action-icon { margin:0 auto 8px; }
.action-icon svg { width:24px; height:24px; }
.action-name { font-size:13px; font-weight:700; color:var(--text); }
.action-name.accent { color:var(--accent); }
.action-sub { font-size:10px; color:var(--muted); margin-top:3px; }

.kyukei-note { background:rgba(59,130,246,0.08); border:1px solid rgba(59,130,246,0.2); border-radius:8px; padding:10px 12px; margin-bottom:12px; font-size:11px; color:var(--blue); line-height:1.7; }

.shiteikyu-btn { width:100%; background:var(--s2); border:1.5px solid var(--border); border-radius:10px; padding:14px 16px; display:flex; align-items:center; gap:12px; cursor:pointer; transition:all 0.15s; margin-bottom:8px; }
.shiteikyu-btn:active { transform:scale(0.98); border-color:var(--accent); }
.shiteikyu-icon { width:36px; height:36px; border-radius:8px; background:rgba(240,165,0,0.1); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.shiteikyu-icon svg { width:18px; height:18px; }
.shiteikyu-text { flex:1; }
.shiteikyu-name { font-size:14px; font-weight:700; color:var(--text); }
.shiteikyu-sub { font-size:11px; color:var(--muted); margin-top:2px; }

/* ── 統合打刻画面（A案） ── */
.a-time-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:6px; }
.a-time-box {
  background:var(--s2);
  border:2px solid var(--border);
  border-radius:12px;
  padding:14px 10px 14px;
  text-align:center;
  cursor:pointer;
  transition:all 0.18s;
  position:relative;
  overflow:visible;
}
.a-time-box:active { transform:scale(0.98); }

/* 入力中（focus）: オレンジの太枠 + 背景色 + 上部に▼アクティブインジケーター */
.a-time-box.focus {
  border-color:var(--accent);
  background:rgba(240,165,0,0.14);
  box-shadow:0 0 0 4px rgba(240,165,0,0.15), 0 4px 16px rgba(240,165,0,0.25);
  transform:translateY(-2px);
}
.a-time-box.focus::before {
  content:'';
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
  width:0;
  height:0;
  border-left:8px solid transparent;
  border-right:8px solid transparent;
  border-top:8px solid var(--accent);
}
.a-time-box.focus::after {
  content:'入力中';
  position:absolute;
  top:-10px;
  right:10px;
  background:var(--accent);
  color:#fff;
  font-size:9px;
  font-weight:700;
  padding:2px 8px;
  border-radius:10px;
  letter-spacing:0.08em;
  box-shadow:0 2px 6px rgba(240,165,0,0.4);
  animation:focus-pulse 1.6s ease-in-out infinite;
}
@keyframes focus-pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50%     { opacity:0.85; transform:scale(1.05); }
}

/* 完了（done）: 緑枠 + 薄背景 */
.a-time-box.done {
  border-color:var(--green);
  background:rgba(34,197,94,0.08);
}
.a-time-box.done::after {
  content:'✓';
  position:absolute;
  top:-8px;
  right:8px;
  width:18px;
  height:18px;
  background:var(--green);
  color:#fff;
  font-size:11px;
  font-weight:900;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 2px 6px rgba(34,197,94,0.4);
}

.a-time-box .a-label { font-size:11px; color:var(--muted); margin-bottom:4px; letter-spacing:0.1em; font-weight:700; }
.a-time-box.focus .a-label { color:var(--accent); }
.a-time-box.done .a-label { color:var(--green); }
.a-time-box .a-value { font-family:'DM Mono',monospace; font-size:28px; font-weight:700; }
.a-time-box .a-value.empty { color:var(--muted); font-size:13px; font-weight:400; }
.a-time-box .a-value.filled { color:var(--accent); }
.a-time-box.focus .a-value.empty { color:var(--accent); }
.a-time-box.done .a-value { color:var(--green); }
.a-indicator { font-size:11px; text-align:center; color:var(--accent); margin:10px 0 8px; font-weight:700; }

/* ── 打刻画面（修正用） ── */
.time-disp { background:var(--s2); border:1.5px solid var(--border); border-radius:12px; padding:20px; text-align:center; margin-bottom:12px; transition:border-color 0.15s; }
.time-disp.focus { border-color:var(--accent); }
.time-disp.error { border-color:var(--red); }
.time-val { font-size:52px; font-weight:500; font-family:'DM Mono',monospace; color:var(--text); line-height:1; letter-spacing:0.05em; }
.time-val.empty { color:var(--muted); font-size:20px; padding:14px 0; }
.time-unit { font-size:12px; color:var(--muted); margin-top:6px; }

.numpad { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px; }
.np-btn { background:var(--s2); border:1.5px solid var(--border); border-radius:10px; padding:16px; font-size:20px; font-weight:500; color:var(--text); cursor:pointer; text-align:center; transition:all 0.1s; font-family:'DM Mono',monospace; }
.np-btn:active { background:var(--s3); transform:scale(0.95); }
.np-del { color:var(--accent); font-size:16px; }
.np-empty { background:transparent; border-color:transparent; cursor:default; }

.checks { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:14px; }
.check-item { display:flex; align-items:center; gap:8px; background:var(--s2); border:1.5px solid var(--border); border-radius:8px; padding:10px 12px; cursor:pointer; transition:all 0.15s; }
.check-item.on { border-color:var(--accent); background:rgba(240,165,0,0.08); }
.check-box { width:18px; height:18px; border-radius:4px; border:1.5px solid var(--border2); flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
.check-item.on .check-box { background:var(--accent); border-color:var(--accent); }
.check-mark { width:10px; height:10px; display:none; }
.check-item.on .check-mark { display:block; }
.check-label { font-size:12px; font-weight:500; color:var(--text); }

.yukyu-inp { width:100%; background:var(--s2); border:1.5px solid var(--border); border-radius:8px; padding:10px 12px; font-size:14px; font-family:'DM Mono',monospace; color:var(--text); outline:none; margin-top:6px; transition:border-color 0.15s; }
.yukyu-inp:focus { border-color:var(--accent); }

.memo-input { width:100%; background:var(--s2); border:1.5px solid var(--border); border-radius:8px; padding:12px 14px; font-size:13px; font-family:'Noto Sans JP',sans-serif; color:var(--text); outline:none; resize:none; min-height:68px; transition:border-color 0.15s; }
.memo-input:focus { border-color:var(--accent); }
.memo-input::placeholder { color:var(--muted); }

/* ── 完了 ── */
.success-wrap { text-align:center; padding:32px 20px; }
.success-icon { width:64px; height:64px; background:rgba(34,197,94,0.15); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; }
.success-title { font-size:20px; font-weight:900; letter-spacing:-0.02em; margin-bottom:8px; }
.success-sub { font-size:13px; color:var(--muted); line-height:1.6; }
.success-tag { display:inline-block; margin-top:12px; background:rgba(240,165,0,0.12); color:var(--accent2); padding:5px 14px; border-radius:20px; font-size:11px; }

/* ── カレンダー ── */
.cal-legend { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:14px; padding:10px 12px; background:var(--s2); border-radius:8px; border:1px solid var(--border); }
.leg-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--muted); }
.leg-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.leg-sel { background:var(--accent); }
.leg-reg { background:transparent; border:2px solid var(--accent); }
.leg-del { background:rgba(239,68,68,0.3); border:2px solid var(--red); }

.cal-nav-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.cal-month { font-size:16px; font-weight:700; color:var(--text); }
.cal-nav-btn { background:var(--s2); border:1px solid var(--border); border-radius:8px; padding:6px 14px; font-size:16px; color:var(--text); cursor:pointer; }
.cal-nav-btn:active { transform:scale(0.95); }

.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-bottom:8px; }
.cal-dow { font-size:10px; color:var(--muted); text-align:center; padding:4px 0; }
.cal-day { font-size:13px; text-align:center; padding:8px 2px; border-radius:8px; cursor:pointer; position:relative; font-family:'DM Mono',monospace; color:var(--text); transition:all 0.12s; }
.cal-day:active { transform:scale(0.95); }
.cal-day.past { color:var(--muted); opacity:0.4; pointer-events:none; }
.cal-day.past-ok { color:var(--muted); opacity:0.7; }
.cal-day.empty { pointer-events:none; }
.cal-day.today { background:var(--s3); font-weight:700; }
.cal-day.selected { background:var(--accent); color:#fff; font-weight:700; }
.cal-day.registered { color:var(--accent2); }
.cal-day.registered::after { content:''; width:5px; height:5px; border-radius:50%; background:var(--accent); position:absolute; bottom:2px; left:50%; transform:translateX(-50%); }
.cal-day.to-delete { background:rgba(239,68,68,0.15); color:var(--red); }
.cal-day.to-delete::after { content:''; width:5px; height:5px; border-radius:50%; background:var(--red); position:absolute; bottom:2px; left:50%; transform:translateX(-50%); }

.cal-summary { font-size:12px; color:var(--muted); text-align:center; padding:8px 0; min-height:24px; }
</style>
</head>
<body>

<!-- 認証エラー -->
<div id="auth-error" style="display:none;">
  <div style="font-size:10px;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:24px;">f.o.o · 出勤簿</div>
  <div style="font-size:24px;font-weight:900;margin-bottom:12px;">ログインが<span style="color:var(--accent);">必要です</span></div>
  <div style="font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:28px;">ポータルからログインしてください。</div>
  <a href="https://mitsurumukaihata.github.io/foo-portal/" style="display:block;background:var(--accent);border-radius:10px;padding:15px;text-align:center;color:#fff;font-size:15px;font-weight:700;text-decoration:none;">ポータルへ</a>
</div>

<!-- メインアプリ -->
<div id="app" style="display:none;">
  <div class="header">
    <div class="header-top">
      <div class="header-brand">F.o.o · 現場・業務</div>
      <a class="header-back" href="https://mitsurumukaihata.github.io/foo-portal/">← ポータル</a>
    </div>
    <div class="header-title">勤怠<span>打刻</span></div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="switchKintaiTab('home')">打刻</button>
    <button class="nav-btn" onclick="switchKintaiTab('all')">全員確認</button>
  </div>

  <!-- ホーム -->
  <div class="page active" id="page-home">
    <div id="home-content"></div>
  </div>

  <!-- 出勤打刻 -->
  <div class="page" id="page-syukkin">
    <div id="syukkin-content"></div>
  </div>

    if (!d || new Date(d.expires) < new Date()) { localStorage.removeItem(SESSION_KEY); return null; }

    localStorage.setItem(SESSION_KEY, JSON.stringify(d));
    return d;
  } catch(e) { return null; }
}

// ─── Notion API ────────────────────────────────────────────────────────────
async function notionAPI(method, path, body) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), 15000);
  try {
    const res = await fetch(WORKER_URL + path, {
      method, headers:{'Content-Type':'application/json'},
      body: body ? JSON.stringify(body) : undefined,
      signal: ctrl.signal
    });
    clearTimeout(t);
    const data = await res.json();
    if (data.object === 'error') throw new Error(data.message);
    return data;
  } catch(e) {
    clearTimeout(t);
    if (e.name === 'AbortError') throw new Error('タイムアウト。通信環境を確認してください。');
    throw e;
  }
}

// ─── 定時 ──
const WORK_START_MIN = 9 * 60;   // 09:00 = 540分
const WORK_END_MIN   = 18 * 60;  // 18:00 = 1080分

function padTime(h, m) {
  return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
}

// 出勤・退勤（分）から有給時間帯を計算
// 戻り値: { ysMin, yeMin, yukyuMin, breakDeducted } または null
function calcYukyuRangeFromTimes(sMin, tMin) {
  var ysMin = null, yeMin = null;
  // 退勤が定時より早い → 退勤〜18:00 が有給
  if (tMin !== null && tMin < WORK_END_MIN) {
    ysMin = tMin;
    yeMin = WORK_END_MIN;
  }
  // 出勤が定時より遅い → 9:00〜出勤 が有給（退勤は定時以降 or 未入力）
  else if (sMin !== null && sMin > WORK_START_MIN) {
    ysMin = WORK_START_MIN;
    yeMin = sMin;
  }
  if (ysMin === null || yeMin === null) return null;
  var total = yeMin - ysMin;
  if (total <= 0) return null;
  var breakPoint = 12 * 60 + 1;
  var breakDeducted = (ysMin <= breakPoint && yeMin > breakPoint);
  var yukyuMin = breakDeducted ? total - 60 : total;
  return { ysMin: ysMin, yeMin: yeMin, yukyuMin: Math.max(0, yukyuMin), breakDeducted: breakDeducted };
}

function calcYukyuPreview() {
  var calcEl = document.getElementById('home-yukyu-calc');
  if (!calcEl) return;
  var sArr = window._homeDigits?.s || [];
  var tArr = window._homeDigits?.t || [];
  var sMin = null, tMin = null;
  if (sArr.length === 4) {
    var sNum = parseInt(sArr.join(''));
    var sH = Math.floor(sNum / 100), sM = sNum % 100;
    if (sH <= 23 && sM <= 59) sMin = sH * 60 + sM;
  }
  if (tArr.length === 4) {
    var tNum = parseInt(tArr.join(''));
    var tH = Math.floor(tNum / 100), tM = tNum % 100;
    if (tH <= 23 && tM <= 59) tMin = tH * 60 + tM;
  }
  // 出退勤未入力 → 丸一日有給（8時間）
  if (sMin === null && tMin === null) {
    calcEl.innerHTML = '🏖 <strong>丸一日有給</strong> → <strong style="color:var(--accent);">8時間</strong>'
      + '<br><span style="font-size:10px;">（出退勤を入力すると半日有給として自動計算されます）</span>';
    return;
  }
  var range = calcYukyuRangeFromTimes(sMin, tMin);
  if (!range) {
    calcEl.innerHTML = '定時内勤務のため有給時間は0時間です';
    return;
  }
  var h = Math.floor(range.yukyuMin / 60);
  var m = range.yukyuMin % 60;
  var timeStr = h + '時間' + (m > 0 ? m + '分' : '');
  var ysStr = padTime(Math.floor(range.ysMin / 60), range.ysMin % 60);
  var yeStr = padTime(Math.floor(range.yeMin / 60), range.yeMin % 60);
  calcEl.innerHTML = '🏖 有給: <strong>' + ysStr + '〜' + yeStr + '</strong> '
    + '→ <strong style="color:var(--accent);">' + timeStr + '</strong>'
    + (range.breakDeducted ? '<br><span style="font-size:10px;">（12:01を含むため休憩1h差引）</span>' : '');
}

async function homeSubmit() {
  const sArr = window._homeDigits.s;
  const tArr = window._homeDigits.t;
  const errEl = document.getElementById('home-error');
  errEl.innerHTML = '';

  // 少なくとも出勤か退勤のどちらかは入力必須（ただし丸一日有給 or 欠勤の場合は時刻不要）
  const chkEarly = window._homeChecks;
  const fullDayLeave = chkEarly.yukyu || chkEarly.kekkin || chkEarly.rousai;
  if (sArr.length < 4 && tArr.length < 4 && !fullDayLeave) {
    errEl.innerHTML = '<div class="error-box">出勤または退勤の時刻を入力してください<br>（丸一日有給の場合は有給使用にチェック）</div>';
    return;
  }

  // 時刻バリデーション
  if (sArr.length > 0 && sArr.length < 4) {
    errEl.innerHTML = '<div class="error-box">出勤時刻を4桁で入力してください</div>';
    return;
  }
  if (tArr.length > 0 && tArr.length < 4) {
    errEl.innerHTML = '<div class="error-box">退勤時刻を4桁で入力してください</div>';
    return;
  }

  let sNum = sArr.length === 4 ? parseInt(sArr.join('')) : null;
  let tNum = tArr.length === 4 ? parseInt(tArr.join('')) : null;

  if (sNum !== null) {
    const h = Math.floor(sNum/100), m = sNum%100;
    if (h > 23 || m > 59) { errEl.innerHTML = '<div class="error-box">出勤時刻が正しくありません</div>'; return; }
  }
  if (tNum !== null) {
    const h = Math.floor(tNum/100), m = tNum%100;
    if (h > 23 || m > 59) { errEl.innerHTML = '<div class="error-box">退勤時刻が正しくありません</div>'; return; }
  }

  const chk = window._homeChecks;
  const memoVal = document.getElementById('home-memo')?.value || '';
  const btn = document.getElementById('home-submit');
  btn.disabled = true; btn.textContent = '送信中…';

  // 有給使用時間の計算（出勤・退勤から自動・12:01ルール）
  var yukyuHours = 0;
  if (chk.yukyu) {
    var sMinCalc = sNum !== null ? (Math.floor(sNum / 100) * 60 + sNum % 100) : null;
    var tMinCalc = tNum !== null ? (Math.floor(tNum / 100) * 60 + tNum % 100) : null;
    if (sMinCalc === null && tMinCalc === null) {
      // 出退勤なし + 有給チェック = 丸一日有給 (8時間)
      yukyuHours = 8;
    } else {
      var range = calcYukyuRangeFromTimes(sMinCalc, tMinCalc);
      if (range) yukyuHours = range.yukyuMin / 60;
    }
  }

  try {
    const props = {};
    if (sNum !== null) props['出勤'] = { number: sNum };
    if (tNum !== null) props['退勤'] = { number: tNum };
    props['有給使用'] = { checkbox: chk.yukyu };
    props['欠勤']     = { checkbox: chk.kekkin };
    props['労災扱い'] = { checkbox: chk.rousai };
    props['備考']     = { rich_text: memoVal ? [{ text: { content: memoVal } }] : [] };
    if (chk.yukyu && yukyuHours > 0) {
      props['有給使用時間'] = { number: yukyuHours };
    }

    if (selectedDateRecord) {
      // 既存レコードを更新
      await notionAPI('PATCH', `/pages/${selectedDateRecord.id}`, { properties: props });
    } else {
      // 新規作成
      props['社員名'] = { select: { name: USER.name } };
      props['日付']   = { date: { start: selectedDate } };
      props['タイトル'] = { title: [{ text: { content: `${selectedDate} - ${USER.name}` } }] };
      await notionAPI('POST', '/pages', { parent: { database_id: KINTAI_DB }, properties: props });
    }

    const parts = [];
    if (sNum !== null) parts.push('出勤');
    if (tNum !== null) parts.push('退勤');
    showDone(`${parts.join('・')}を記録しました`, `${USER.name} · ${formatDate(selectedDate)}`);
  } catch(e) {
    errEl.innerHTML = `<div class="error-box">送信に失敗しました。<br><small>${e.message}</small></div>`;
    btn.disabled = false; btn.textContent = '打刻を記録する';
  }
}

function goModify(el) {

  const type = el.dataset.type;

}

  });
}

async function submitModify(type) {
  if (timeDigits.length < 4) return;
  const num = parseInt(timeDigits.join(''));
  const h = Math.floor(num / 100), m = num % 100;
  const errEl = document.getElementById('modify-error');

  // 時刻の基本チェックのみ（現在時刻より後でも打ち込み可）
  if (h > 23 || m > 59) {
    errEl.innerHTML = '<div class="error-box">時刻が正しくありません（例：0830）</div>';
    return;
  }

  const btn = document.getElementById('modify-submit-btn');
  btn.disabled = true;
  btn.textContent = '更新中…';

  try {
    const field = type === 'syukkin' ? '出勤' : '退勤';
    const props = {};
    props[field] = { number: num };

    if (selectedDateRecord) {
      // 既存レコードを上書き更新
      await notionAPI('PATCH', `/pages/${selectedDateRecord.id}`, { properties: props });
    } else {
      // レコードがない場合は新規作成（退勤のみ先に入力するケース）
      props['タイトル'] = { title: [{ text: { content: `${selectedDate} - ${USER.name}` } }] };
      props['社員名'] = { select: { name: USER.name } };
      props['日付'] = { date: { start: selectedDate } };
      const res = await notionAPI('POST', '/pages', {
        parent: { database_id: KINTAI_DB }, properties: props
      });
      selectedDateRecord = res;
    }

    const label = type === 'syukkin' ? '出勤' : '退勤';
    const timeStr = `${String(Math.floor(num/100)).padStart(2,'0')}:${String(num%100).padStart(2,'0')}`;
    showDone(`${label}時刻を ${timeStr} に更新しました`, `${USER.name} · ${formatDate(selectedDate)}`);
  } catch(e) {
    errEl.innerHTML = `<div class="error-box">更新に失敗しました。<br><small>${e.message}</small></div>`;
    btn.disabled = false;
    btn.textContent = '時刻を更新する';
  }
}

      <div class="time-disp focus" id="taikin-disp">
        <div class="time-val empty" id="taikin-val">退勤時刻</div>
        <div class="time-unit">4桁で入力（例：1730）</div>
      </div>

        例②）実働9:30〜15:00（休憩15分）→ <strong>打刻：15:45</strong><br>

        </div>

          <div class="check-box"><svg class="check-mark" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg></div>

      ${checks.yukyu ? `

    </div>`;

  // テンキーバインド（退勤フィールドをメインに）

    <div class="np-btn np-empty" data-val=""></div><div class="np-btn" data-val="0">0</div><div class="np-btn np-del" data-val="del">⌫</div>`;

function bindTimeInput(id) {
  const pad = document.getElementById(`numpad-${id}`);
  if (!pad) return;
  pad.querySelectorAll('.np-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const v = btn.dataset.val;
      if (v === 'del') { timeDigits.pop(); }
      else if (v && timeDigits.length < 4) { timeDigits.push(v); }
      updateTimeDisp(id);
      const submitBtn = document.getElementById(`${id}-submit`);
      if (submitBtn) submitBtn.disabled = timeDigits.length < 4;
      // 有給チェック中＆4桁完了で自動計算
      if (checks.yukyu && timeDigits.length === 4 && id === 'syukkin') {
        autoCalcSyukkinYukyu();
      }
    });
  });
}

function updateTimeDisp(id) {
  const dv = document.getElementById(`${id}-val`);
  if (!dv) return;
  if (timeDigits.length === 0) { dv.className='time-val empty'; dv.textContent = id==='syukkin'?'出勤時刻':'退勤時刻'; }
  else {
    const s = timeDigits.join('').padEnd(4,'_');
    dv.className = 'time-val';
    dv.textContent = `${s.slice(0,2)}:${s.slice(2,4)}`;
  }
}

async function submitSyukkin() {
  const num = parseInt(timeDigits.join(''));
  const h = Math.floor(num/100), m2 = num%100;
  const errEl = document.getElementById('syukkin-error');
  if (h > 23 || m2 > 59) { errEl.innerHTML=`<div class="error-box">時刻が正しくありません（例：0830）</div>`; return; }
  const btn = document.getElementById('syukkin-submit');
  btn.disabled = true; btn.textContent='送信中…';
  try {
    const props = {
      'タイトル': { title: [{ text: { content: `${selectedDate} - ${USER.name}` } }] },
      '社員名': { select: { name: USER.name } },
      '日付': { date: { start: selectedDate } },
      '出勤': { number: num },
      '有給使用': { checkbox: checks.yukyu },
      '欠勤': { checkbox: checks.kekkin },
      '労災扱い': { checkbox: checks.rousai },
      '備考': { rich_text: memo ? [{ text: { content: memo } }] : [] },
    };
    if (checks.yukyu) {
      var sMinS = Math.floor(num / 100) * 60 + num % 100;
      var yukyuH = calcYukyuHoursFromTimes(sMinS, null);
      if (yukyuH > 0) props['有給使用時間'] = { number: yukyuH };
    }
    const res = await notionAPI('POST', '/pages', { parent: { database_id: KINTAI_DB }, properties: props });
    selectedDateRecord = res;
    showDone('出勤を記録しました', `${USER.name} · ${formatDate(selectedDate)}`);
  } catch(e) {
    errEl.innerHTML=`<div class="error-box">送信に失敗しました。<br><small>${e.message}</small></div>`;
    btn.disabled=false; btn.textContent='出勤を記録する';
  }
}

// ─── チェックボックス ─────────────────────────────────────────────────────
function toggleCheck(key) {
  checks[key] = !checks[key];
  const el = document.getElementById(`chk-${key}`);
  if (el) el.classList.toggle('on', checks[key]);
  // 有給使用の場合、時間入力欄を再描画
  if (key === 'yukyu') {
    const page = document.getElementById('page-syukkin').classList.contains('active') ? 'syukkin' : 'taikin';
    if (page === 'syukkin') { renderSyukkin(); autoCalcSyukkinYukyu(); }
    else { renderTaikin(); autoCalcTaikinYukyu(); }
  }
}

// ─── 有給プレビュー共通関数 ────────────────────────────────────────────────
// calcElId の要素に sMin / tMin から計算した有給情報を表示
function _renderYukyuPreview(calcElId, sMin, tMin) {
  var calcEl = document.getElementById(calcElId);
  if (!calcEl) return 0;
  if (sMin === null && tMin === null) {
    calcEl.innerHTML = '💡 出勤・退勤を入力すると有給時間が自動計算されます';
    return 0;
  }
  var range = calcYukyuRangeFromTimes(sMin, tMin);
  if (!range) {
    calcEl.innerHTML = '定時内勤務のため有給時間は0時間です';
    return 0;
  }
  var h = Math.floor(range.yukyuMin / 60);
  var m = range.yukyuMin % 60;
  var timeStr = h + '時間' + (m > 0 ? m + '分' : '');
  var ysStr = padTime(Math.floor(range.ysMin / 60), range.ysMin % 60);
  var yeStr = padTime(Math.floor(range.yeMin / 60), range.yeMin % 60);
  calcEl.innerHTML = '🏖 有給: <strong>' + ysStr + '〜' + yeStr + '</strong> '
    + '→ <strong style="color:var(--accent);">' + timeStr + '</strong>'
    + (range.breakDeducted ? '<br><span style="font-size:10px;">（12:01を含むため休憩1h差引）</span>' : '');
  return range.yukyuMin / 60;
}

// 退勤画面: 出勤記録＋退勤入力から有給プレビュー
function autoCalcTaikinYukyu() {
  if (!checks.yukyu) return;
  var sNum = selectedDateRecord?.properties?.['出勤']?.number;
  var sMin = (sNum !== undefined && sNum !== null) ? (Math.floor(sNum / 100) * 60 + sNum % 100) : null;
  var tMin = null;
  if (timeDigits.length === 4) {
    var tNum = parseInt(timeDigits.join(''));
    var tH = Math.floor(tNum / 100), tM = tNum % 100;
    if (tH <= 23 && tM <= 59) tMin = tH * 60 + tM;
  }
  _renderYukyuPreview('taikin-yukyu-calc', sMin, tMin);
}

// 出勤画面: 出勤入力のみから有給プレビュー
function autoCalcSyukkinYukyu() {
  if (!checks.yukyu) return;
  var sMin = null;
  if (timeDigits.length === 4) {
    var sNum = parseInt(timeDigits.join(''));
    var sH = Math.floor(sNum / 100), sM = sNum % 100;
    if (sH <= 23 && sM <= 59) sMin = sH * 60 + sM;
  }
  _renderYukyuPreview('syukkin-yukyu-calc', sMin, null);
}

// submit時の有給時間計算（hours）
function calcYukyuHoursFromTimes(sMin, tMin) {
  var range = calcYukyuRangeFromTimes(sMin, tMin);
  return range ? range.yukyuMin / 60 : 0;
}

// ─── 指定休カレンダー ─────────────────────────────────────────────────────
async function goShiteikyu() {
  showPage('shiteikyu');
  const now = new Date();
  calYear = now.getFullYear(); calMonth = now.getMonth();
  calSelectedDates = new Set(); calToDeleteDates = new Set(); calRegisteredDates = new Set();
  await fetchRegisteredShiteikyu();
  renderCalendar();
}

async function fetchRegisteredShiteikyu() {
  const el = document.getElementById('shiteikyu-content');
  el.innerHTML = `<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">登録済みの指定休を確認中…</div></div>`;
  try {
    // 7日前〜翌々月の範囲で取得
    const now7 = new Date(); now7.setDate(now7.getDate() - 7);
    const startDate = new Date(Math.min(now7.getTime(), new Date(calYear, calMonth, 1).getTime()));
    const endDate   = new Date(calYear, calMonth + 3, 0);
    const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const res = await notionAPI('POST', `/databases/${KINTAI_DB}/query`, {
      filter: {
        and: [
          { property: '社員名', select: { equals: USER.name } },
          { property: '指定休', checkbox: { equals: true } },
          { property: '日付', date: { on_or_after: fmt(startDate) } },
          { property: '日付', date: { on_or_before: fmt(endDate) } },
        ]
      },
      page_size: 100
    });
    calRegisteredDates = new Set(
      (res.results||[]).map(r => r.properties?.['日付']?.date?.start).filter(Boolean)
        .map(s => s.slice(0,10))
    );
    // ページIDも保存（削除用）
    window._shiteikyu_pages = {};
    (res.results||[]).forEach(r => {
      const d = r.properties?.['日付']?.date?.start?.slice(0,10);
      if (d) window._shiteikyu_pages[d] = r.id;
    });
  } catch(e) {
    calRegisteredDates = new Set();
    window._shiteikyu_pages = {};
  }
}

function renderCalendar() {
  showPage('shiteikyu');
  const el = document.getElementById('shiteikyu-content');
  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const today = new Date(); today.setHours(0,0,0,0);
  const todayISO = todayStr();

  // 表示できる範囲（7日前〜翌々月末）
  const minDate = new Date(today); minDate.setDate(minDate.getDate() - 7);
  const baseDate = new Date(); baseDate.setDate(1); baseDate.setHours(0,0,0,0);
  const maxDate  = new Date(baseDate); maxDate.setMonth(maxDate.getMonth()+3); maxDate.setDate(0);

  // カレンダー描画
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();

  let cells = '';
  for (let i=0; i<firstDay; i++) cells += `<div class="cal-day empty"></div>`;
  for (let d=1; d<=daysInMonth; d++) {
    const iso = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dateObj = new Date(iso); dateObj.setHours(0,0,0,0);
    const isPast = dateObj < minDate;
    const isPastOk = !isPast && dateObj < today; // 7日以内の過去（選択可能）
    const isToday = iso === todayISO;
    const isReg = calRegisteredDates.has(iso);
    const isSel = calSelectedDates.has(iso);
    const isDel = calToDeleteDates.has(iso);
    const isOver = dateObj > maxDate;

    let cls = 'cal-day';
    if (isPast || isOver) cls += ' past';
    else if (isPastOk) cls += ' past-ok';
    else if (isToday) cls += ' today';
    if (isDel) cls += ' to-delete';
    else if (isSel) cls += ' selected';
    else if (isReg) cls += ' registered';

    cells += `<div class="${cls}" onclick="calToggle('${iso}')">${d}</div>`;
  }

  // 選択状況サマリー
  const newCount = calSelectedDates.size;
  const delCount = calToDeleteDates.size;
  let summary = '日付をタップして選択・解除';
  if (newCount > 0 && delCount > 0) summary = `${newCount}日を新規登録 · ${delCount}日を削除予定`;
  else if (newCount > 0) summary = `${newCount}日を新規登録予定`;
  else if (delCount > 0) summary = `${delCount}日を削除予定`;

  // ナビゲーション制限（7日前の月〜翌々月）
  const baseCal = new Date(minDate); baseCal.setDate(1);
  const isMinMonth = calYear === baseCal.getFullYear() && calMonth === baseCal.getMonth();
  const maxCal = new Date(baseCal); maxCal.setMonth(maxCal.getMonth()+2);
  const isMaxMonth = calYear === maxCal.getFullYear() && calMonth === maxCal.getMonth();

  const btnDisabled = !(newCount > 0 || delCount > 0);

  el.innerHTML = `
    <div class="content">
      <div class="screen-label">指定休登録</div>
      <div class="screen-title">カレンダーで<span style="color:var(--accent);">日付を選択</span></div>

      <div class="cal-legend">
        <div class="leg-item"><div class="leg-dot leg-sel"></div>今回選択（新規）</div>
        <div class="leg-item"><div class="leg-dot leg-reg" style="border-radius:50%;width:10px;height:10px;border:2px solid var(--accent);display:inline-block;"></div>登録済み</div>
        <div class="leg-item"><div class="leg-dot leg-del" style="border-radius:50%;width:10px;height:10px;background:rgba(239,68,68,0.3);border:2px solid var(--red);display:inline-block;"></div>削除予定</div>
      </div>

      <div class="cal-nav-row">
        <button class="cal-nav-btn" onclick="calPrev()" ${isMinMonth?'style="opacity:0.3;pointer-events:none;"':''}>‹</button>
        <div class="cal-month">${calYear}年 ${monthNames[calMonth]}</div>
        <button class="cal-nav-btn" onclick="calNext()" ${isMaxMonth?'style="opacity:0.3;pointer-events:none;"':''}>›</button>
      </div>
      <div class="cal-grid">
        <div class="cal-dow" style="color:var(--red);">日</div>
        <div class="cal-dow">月</div><div class="cal-dow">火</div><div class="cal-dow">水</div><div class="cal-dow">木</div>
        <div class="cal-dow">金</div>
        <div class="cal-dow" style="color:var(--blue);">土</div>
        ${cells}
      </div>
      <div class="cal-summary">${summary}</div>
      <div id="shiteikyu-error"></div>
      <button class="btn-primary" onclick="submitShiteikyu()" ${btnDisabled?'disabled':''}>
        ${newCount>0&&delCount>0 ? `${newCount}日を登録 · ${delCount}日を削除する` : newCount>0 ? `${newCount}日を指定休に登録` : delCount>0 ? `${delCount}日の指定休を削除` : '日付を選択してください'}
      </button>
      <button class="btn-secondary" onclick="renderHome()">← 戻る</button>
    </div>`;
}

function calToggle(iso) {
  if (calRegisteredDates.has(iso)) {
    // 登録済み → 削除予定にトグル
    if (calToDeleteDates.has(iso)) calToDeleteDates.delete(iso);
    else calToDeleteDates.add(iso);
  } else {
    // 未登録 → 新規選択にトグル
    if (calSelectedDates.has(iso)) calSelectedDates.delete(iso);
    else calSelectedDates.add(iso);
  }
  renderCalendar();
}

function calPrev() {
  const min7 = new Date(); min7.setDate(min7.getDate() - 7);
  const base = new Date(min7); base.setDate(1);
  if (calYear === base.getFullYear() && calMonth === base.getMonth()) return;
  calMonth--; if (calMonth < 0) { calMonth=11; calYear--; }
  renderCalendar();
}

function calNext() {
  const max = new Date(); max.setDate(1); max.setMonth(max.getMonth()+2);
  if (calYear === max.getFullYear() && calMonth === max.getMonth()) return;
  calMonth++; if (calMonth > 11) { calMonth=0; calYear++; }
  renderCalendar();
}

async function submitShiteikyu() {
  const errEl = document.getElementById('shiteikyu-error');
  const btn   = document.querySelector('#page-shiteikyu .btn-primary');
  if (btn) { btn.disabled=true; btn.textContent='送信中…'; }

  try {
    // 新規登録
    for (const iso of calSelectedDates) {
      const props = {
        'タイトル': { title: [{ text: { content: `${iso} - ${USER.name}` } }] },
        '社員名': { select: { name: USER.name } },
        '日付': { date: { start: iso } },
        '指定休': { checkbox: true },
      };
      await notionAPI('POST', '/pages', { parent: { database_id: KINTAI_DB }, properties: props });
    }
    // 削除（アーカイブ）
    for (const iso of calToDeleteDates) {
      const pageId = window._shiteikyu_pages?.[iso];
      if (pageId) await notionAPI('PATCH', `/pages/${pageId}`, { archived: true });
    }

    const newCount = calSelectedDates.size;
    const delCount = calToDeleteDates.size;
    let msg = '';
    if (newCount>0 && delCount>0) msg = `${newCount}日を登録・${delCount}日を削除しました`;
    else if (newCount>0) msg = `${newCount}日の指定休を登録しました`;
    else msg = `${delCount}日の指定休を削除しました`;

    showDone(msg, `${USER.name} · Notionに反映済み`);
  } catch(e) {
    if (errEl) errEl.innerHTML=`<div class="error-box">送信に失敗しました。<br><small>${e.message}</small></div>`;
    if (btn) { btn.disabled=false; btn.textContent='もう一度試す'; }
  }
}

            <div style="font-family:var(--font-mono,monospace);font-size:12px;color:var(--muted);min-width:70px;">${dayLabel}</div>
            <div class="kr-time" style="flex:1;">${s?s:'—'} ${t?'→'+t:''}</div>
            ${badge}
          </div>`;
        }).join('');
      }
    }

    // 日付選択ボタン（日付別モード用）
    const days = getLast5Days();
    const dateChips = days.map(d =>
      `<div class="date-chip${allViewDate===d.iso?' active':''}" onclick="allSelectDate('${d.iso}')" style="font-size:11px;">
        <div class="dc-date">${d.d}</div>
        <div class="dc-day">${d.label}</div>
      </div>`
    ).join('');

    // 社員選択ボタン（社員別モード用）
    const staffBtns = ALL_STAFF.map(name =>
      `<div class="date-chip${allViewStaff===name?' active':''}" onclick="allSelectStaff('${name}')" style="font-size:11px;padding:5px 10px;">
        ${name.split(' ')[0]}
      </div>`
    ).join('');

    el.innerHTML = `
      <div class="content">
        <div class="screen-label">勤怠状況</div>
        <div class="view-tabs">
          <div class="view-tab${allViewMode==='date'?' active':''}" onclick="allSwitchMode('date')">日付別</div>
          <div class="view-tab${allViewMode==='staff'?' active':''}" onclick="allSwitchMode('staff')">社員別</div>
        </div>
        ${allViewMode==='date' ? `
          <div class="date-selector" style="margin-bottom:12px;">${dateChips}</div>
          <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;">${title}</div>
        ` : `
          <div class="date-selector" style="margin-bottom:12px;">${staffBtns}</div>
          <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;">${title}</div>
        `}
        <div>${rows}</div>
      </div>`;
  } catch(e) {
    el.innerHTML = `<div class="content"><div class="error-box">取得に失敗しました。<br><small>${e.message}</small></div></div>`;
  }
}

function allSwitchMode(mode) { allViewMode=mode; renderAll(); }
function allSelectDate(iso) { allViewDate=iso; renderAll(); }
function allSelectStaff(name) { allViewStaff=name; renderAll(); }

async function submitRequest() {
  const date   = document.getElementById('req-date')?.value;
  const syukkin = document.getElementById('req-syukkin')?.value.trim();
  const taikin  = document.getElementById('req-taikin')?.value.trim();
  const reason  = document.getElementById('req-reason')?.value.trim();
  const errEl   = document.getElementById('req-error');

  if (!date) { errEl.innerHTML=`<div class="error-box">対象日付を選択してください</div>`; return; }
  if (!reason) { errEl.innerHTML=`<div class="error-box">修正理由を入力してください</div>`; return; }
  if (!syukkin && !taikin) { errEl.innerHTML=`<div class="error-box">出勤または退勤時刻を入力してください</div>`; return; }

  const btn = document.querySelector('#page-request .btn-primary');
  btn.disabled=true; btn.textContent='送信中…';

  // GmailのAPIでメール送信
  try {
    const dayNames = ['日','月','火','水','木','金','土'];
    const d = new Date(date);
    const dateLabel = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${dayNames[d.getDay()]}）`;
    const subject = `【打刻修正依頼】${USER.name} - ${dateLabel}`;
    const body = [
      `【打刻修正依頼】`,
      ``,
      `社員名：${USER.name}`,
      `対象日：${dateLabel}`,
      ``,
      `【修正内容】`,
      `出勤時刻：${syukkin ? syukkin.slice(0,2)+':'+syukkin.slice(2,4) : '変更なし'}`,
      `退勤時刻：${taikin ? taikin.slice(0,2)+':'+taikin.slice(2,4) : '変更なし'}`,
      ``,
      `【修正理由】`,
      reason,
      ``,
      `---`,
      `f.o.o 出勤簿アプリより自動送信`,
    ].join('\n');

    // Gmail API経由でメール送信（mailto形式でフォールバック）
    const mailtoUrl = `mailto:${ADMIN_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

    // fetch で Cloudflare Worker にGmail送信リクエスト
    const res = await fetch(WORKER_URL + '/send-email', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ to: ADMIN_EMAIL, subject, body })
    }).catch(() => null);

    // Worker対応していない場合はmailtoにフォールバック
    if (!res || !res.ok) {
      // mailtoで開く（ネイティブメールアプリ）
      window.location.href = mailtoUrl;
      setTimeout(() => {
        showDone('修正依頼を送信しました', `${USER.name} → 向畑 充 宛にメールを送りました`);
      }, 1000);
      return;
    }

    showDone('修正依頼を送信しました', `${USER.name} → 向畑 充 宛にGmailを送りました`);
  } catch(e) {
    errEl.innerHTML=`<div class="error-box">送信に失敗しました。<br><small>${e.message}</small></div>`;
    btn.disabled=false; btn.textContent='社長に修正依頼を送る';
  }
}

// ─── 全員の勤怠表示 ───────────────────────────────────────────────────────
async function renderAllView() {
  showPage('all');
  if (!allViewDate) allViewDate = todayStr();
  if (!allViewStaff) allViewStaff = STAFF_NAMES[0];
  const el = document.getElementById('all-content');
  el.innerHTML = `<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">勤怠データを取得中…</div></div>`;

  try {
    // 当日の全員分を取得（日付別表示）or 直近7日の1名分（社員別）
    let filter, records = [];
    if (allViewMode === 'date') {
      filter = {
        and: [
          { property: '日付', date: { equals: allViewDate } },
          { property: '指定休', checkbox: { equals: false } }
        ]
      };
    } else {
      const from = new Date(); from.setDate(from.getDate() - 6);
      const fromStr = `${from.getFullYear()}-${String(from.getMonth()+1).padStart(2,'0')}-${String(from.getDate()).padStart(2,'0')}`;
      filter = {
        and: [
          { property: '社員名', select: { equals: allViewStaff } },
          { property: '日付', date: { on_or_after: fromStr } },
          { property: '日付', date: { on_or_before: todayStr() } }
        ]
      };
    }
    const res = await notionAPI('POST', `/databases/${KINTAI_DB}/query`, {
      filter,
      sorts: [{ property: '日付', direction: 'ascending' }],
      page_size: 100
    });
    records = res.results || [];

    // 日付別タブの日付チップ（過去7日）
    const recentDates = [];
    for (let i = 0; i <= 6; i++) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const m = d.getMonth()+1, dd = d.getDate();
      const dow = ['日','月','火','水','木','金','土'][d.getDay()];
      recentDates.push({ iso, disp: `${m}/${dd}(${dow})`, label: i===0?'今日':i===1?'昨日':'' });
    }

    const dateTabs = recentDates.map(d =>
      `<div class="filter-chip${allViewDate===d.iso&&allViewMode==='date'?' active':''}" onclick="allSetDate('${d.iso}')">${d.disp}</div>`
    ).join('');

    const staffTabs = STAFF_NAMES.map(n =>
      `<div class="filter-chip${allViewStaff===n&&allViewMode==='staff'?' active':''}" onclick="allSetStaff('${n}')">${n.split(' ')[0]}</div>`
    ).join('');

    // レコード描画
    let rowsHtml = '';
    if (records.length === 0) {
      rowsHtml = `<div style="text-align:center;padding:32px;color:var(--muted);font-size:13px;">該当するデータがありません</div>`;
    } else {
      rowsHtml = records.map(r => {
        const p = r.properties;
        const name    = p['社員名']?.select?.name || '—';
        const dateVal = p['日付']?.date?.start?.slice(0,10) || '';
        const syuk    = timeToDisp(p['出勤']?.number);
        const taik    = timeToDisp(p['退勤']?.number);
        const isYukyu   = p['有給使用']?.checkbox;
        const isKekkin  = p['欠勤']?.checkbox;
        const isShitei  = p['指定休']?.checkbox;
        return `
          <div class="kintai-row">
            <div class="kr-top">
              <div class="kr-name">${allViewMode==='date' ? name : formatDate(dateVal)}</div>
              <div style="display:flex;gap:4px;align-items:center;">
                ${isYukyu  ? '<span class="kr-badge yukyu">有給</span>' : ''}
                ${isKekkin ? '<span class="kr-badge kekkin">欠勤</span>' : ''}
                ${isShitei ? '<span class="kr-badge shiteikyu">指定休</span>' : ''}
              </div>
            </div>
            <div class="kr-times">
              <span class="kr-time-label">出勤</span>
              <span class="kr-time-val ${syuk?'done':'empty'}">${syuk||'—'}</span>
              <span style="color:var(--border2);margin:0 4px;">|</span>
              <span class="kr-time-label">退勤</span>
              <span class="kr-time-val ${taik?'done':'empty'}">${taik||'—'}</span>
            </div>
          </div>`;
      }).join('');
    }

    el.innerHTML = `
      <div class="content">
        <div class="screen-label">表示モード</div>
        <div class="filter-row" style="margin-bottom:8px;">
          <div class="filter-chip${allViewMode==='date'?' active':''}" onclick="allSetMode('date')">日付別</div>
          <div class="filter-chip${allViewMode==='staff'?' active':''}" onclick="allSetMode('staff')">社員別</div>
        </div>
        ${allViewMode === 'date' ? `
        <div class="screen-label">日付を選択</div>
        <div class="filter-row" style="overflow-x:auto;flex-wrap:nowrap;">${dateTabs}</div>` : `
        <div class="screen-label">社員を選択</div>
        <div class="filter-row">${staffTabs}</div>`}
        <div class="screen-label" style="margin-top:4px;">${allViewMode==='date' ? formatDate(allViewDate) : allViewStaff + '（直近7日）'} · ${records.length}件</div>
        ${rowsHtml}
      </div>`;
  } catch(e) {
    el.innerHTML = `<div class="content"><div class="error-box">取得に失敗しました。<br><small>${e.message}</small></div></div>`;
  }
}

function allSetMode(mode) { allViewMode = mode; renderAllView(); }
function allSetDate(iso) { allViewDate = iso; allViewMode = 'date'; renderAllView(); }
function allSetStaff(name) { allViewStaff = name; allViewMode = 'staff'; renderAllView(); }

// ─── 初期化 ───────────────────────────────────────────────────────────────
window.onload = () => {
  const session = loadSession();
  if (!session || !session.name) {
    document.getElementById('auth-error').style.display = 'flex';
    return;
  }
  USER = session;
  document.getElementById('app').style.display = 'block';
  // URLパラメータで初期タブ指定 (?mode=all で全員確認タブ)
  const params = new URLSearchParams(location.search);
  if (params.get('mode') === 'all') {
    switchKintaiTab('all');
  } else {
    renderHome();
  }
};
