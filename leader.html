/* ── トースト ── */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--s2); border:1px solid var(--border); border-radius:10px; padding:12px 16px; font-size:12px; color:var(--text); z-index:200; max-width:90%; word-break:break-word; animation:slideUpToast 0.3s ease-out; }

function checkAccess() {
  try {
    const raw = localStorage.getItem('foo_portal_session');
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (new Date(data.expires) < new Date()) return false;
    if (data.apps && data.apps.leader === true) {
      currentUserName = data.name || '';
      return true;
    }
    return false;
  } catch(e) { return false; }
}

async function notionAPI(method, path, body) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 20000);
  try {
    const res = await fetch(PROXY + path, {
      method, headers: { 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined, signal: ctrl.signal
    });
    clearTimeout(timer);
    const data = await res.json();
    if (data.object === 'error') throw new Error(data.message);
    return data;
  } catch(e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') throw new Error('タイムアウト');
    throw new Error('通信エラー: ' + e.message);
  }
}

async function queryAll(dbId, body) {
  let all = [], cursor = null;
  while (true) {
    const b = { ...body, page_size: 100 };
    if (cursor) b.start_cursor = cursor;
    const res = await notionAPI('POST', `/databases/${dbId}/query`, b);
    all = all.concat(res.results || []);
    if (!res.has_more) break;
    cursor = res.next_cursor;
  }
  return all;
}

function escapeHtml(text) {
  if (!text) return '';
  return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function getPropValue(page, prop) {
  const p = page.properties[prop];
  if (!p) return null;
  switch(p.type) {
    case 'title': return p.title.map(t => t.plain_text).join('');
    case 'rich_text': return p.rich_text.map(t => t.plain_text).join('');
    case 'select': return p.select?.name || null;
    case 'multi_select': return p.multi_select?.map(s => s.name) || [];
    case 'date': return p.date?.start || null;
    case 'checkbox': return p.checkbox;
    case 'number': return p.number;
    case 'status': return p.status?.name || null;
    default: return null;
  }
}

function showToast(msg, type = 'default') {

}

async function loadComm() {
  renderCommFilters();
  const list = document.getElementById('comm-list');
  list.innerHTML = '<div class="loading"></div>';
  try {
    const filter = {};
    if (currentFilter === '未着手') {
      filter.filter = { property: '状態', status: { equals: '未着手' } };
    } else if (currentFilter === '進行中') {
      filter.filter = { property: '状態', status: { equals: '進行中' } };
    } else {
      filter.filter = { property: '状態', status: { does_not_equal: '完了' } };
    }
    filter.sorts = [{ timestamp: 'created_time', direction: 'descending' }];
    const pages = await queryAll(DB.comm, filter);
    if (pages.length === 0) {
      list.innerHTML = '<div class="empty-state">データがありません</div>';
      return;
    }
    list.innerHTML = '';
    const seen = new Set();
    for (const p of pages) {
      if (seen.has(p.id)) continue;
      seen.add(p.id);
      const title = getPropValue(p, 'タイトル');
      const status = getPropValue(p, '状態');
      const kind = getPropValue(p, '種別');
      const importance = getPropValue(p, '重要度');
      const content = getPropValue(p, '内容');
      const rel = getPropValue(p, '関係者');
      const author = p.created_by?.name || '';
      const confirmed = getPropValue(p, '確認者') || [];
      const card = document.createElement('div');
      card.className = 'card';
      let tags = '';
      if (kind) tags += '<span class="tag tag-type">' + escapeHtml(kind) + '</span>';
      if (importance) {
        const cls = importance === '高' ? 'tag-importance' : importance === '中' ? 'tag-importance-medium' : 'tag-importance-low';
        tags += '<span class="tag ' + cls + '">' + escapeHtml(importance) + '</span>';
      }
      let relTags = '';
      if (Array.isArray(rel)) for (const r of rel) relTags += '<span class="tag tag-status">' + escapeHtml(r) + '</span>';
      let statusBadge = '';
      if (status) {
        const scs = status === '進行中' ? 'status-active' : status === '未着手' ? 'status-considering' : 'status-resolved';
        statusBadge = '<span class="status-badge ' + scs + '">' + escapeHtml(status) + '</span>';
      }
      const authorHtml = author ? '<span style="font-size:10px;color:var(--muted);">by ' + escapeHtml(author) + '</span>' : '';
      let confirmedHtml = '';
      if (confirmed.length > 0) {
        confirmedHtml = '<div style="margin-top:6px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;"><span style="font-size:10px;color:var(--green);">✓</span>';
        for (const c of confirmed) confirmedHtml += '<span style="font-size:10px;color:var(--green);font-weight:600;">' + escapeHtml(c) + '</span>';
        confirmedHtml += '</div>';
      }
      card.innerHTML = '<div class="card-header"><div><div class="card-title">' + escapeHtml(title) + '</div>' + authorHtml + '</div><div>' + statusBadge + '</div></div>' +
        '<div class="card-tags">' + tags + '</div>' +
        '<div class="card-content">' + escapeHtml(content || '') + '</div>' +
        confirmedHtml +
        '<div class="card-footer"><div>' + relTags + '</div></div>';
      card.onclick = () => showCommDetail(p);
      list.appendChild(card);
    }
  } catch(e) {
    list.innerHTML = '<div class="empty-state">' + escapeHtml(e.message) + '<br><button style="background:var(--accent);color:#fff;border:none;border-radius:6px;padding:8px 12px;margin-top:12px;cursor:pointer;font-size:12px;font-weight:600;" onclick="loadComm()">再試行</button></div>';
  }

async function confirmComm() {
  if (!detailData || !currentUserName) return;
  try {
    const existing = getPropValue(detailData, '確認者') || [];

    const updated = [...existing.map(n => ({ name: n })), { name: currentUserName }];
    await notionAPI('PATCH', `/pages/${detailData.id}`, {
      properties: { '確認者': { multi_select: updated } }
    });
    showToast('確認しました', 'success');
    closeDetail();
    loadComm();
  } catch(e) {
    showToast(e.message, 'error');
  }
}

    });

async function loadTask() {
  const list = document.getElementById('task-list');
  list.innerHTML = '<div class="loading"></div>';
  try {
    const pages = await queryAll(DB.task, {
      filter: { property: 'ステータス', status: { does_not_equal: '完了' } },
      sorts: [{ property: '期日', direction: 'ascending' }]
    });
    if (pages.length === 0) {
      list.innerHTML = '<div class="empty-state">データがありません</div>';
      return;
    }
    const groups = { '未着手': [], '進行中': [] };

      if (!groups[st]) groups[st] = [];
      groups[st].push(p);
    }
    list.innerHTML = '';
    for (const [status, items] of Object.entries(groups)) {
      if (items.length === 0) continue;
      const grp = document.createElement('div');
      grp.style.marginBottom = '20px';
      const title = document.createElement('div');
      title.style.cssText = 'font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px;padding:0 4px;';
      title.textContent = status;
      grp.appendChild(title);
      for (const p of items) {
        const name = getPropValue(p, 'タスク名');
        const priority = getPropValue(p, '優先度');
        const cat = getPropValue(p, 'カテゴリ');
        const due = getPropValue(p, '期日');
        const card = document.createElement('div');
        card.className = 'card';
        let tags = '';
        if (priority) {

          '<div class="card-tags">' + tags + '</div>';

    }
  } catch(e) {
    list.innerHTML = '<div class="empty-state">' + escapeHtml(e.message) + '<br><button style="background:var(--accent);color:#fff;border:none;border-radius:6px;padding:8px 12px;margin-top:12px;cursor:pointer;font-size:12px;font-weight:600;" onclick="loadTask()">再試行</button></div>';
  }

    '<div class="detail-section"><div class="detail-section-title">ステータス</div><div class="detail-section-content">' + escapeHtml(status || '') + '</div></div>' +
    '<div class="detail-section"><div class="detail-section-title">優先度</div><div class="detail-section-content">' + escapeHtml(priority || '') + '</div></div>' +
    '<div class="detail-section"><div class="detail-section-title">カテゴリ</div><div class="detail-tag-group">' + catHtml + '</div></div>' +
    '<div class="detail-section"><div class="detail-section-title">期日</div><div class="detail-section-content">' + dueStr + '</div></div>' +
    '<div class="detail-section"><div class="detail-section-title">説明</div><div class="detail-section-content">' + escapeHtml(desc || '') + '</div></div>' +
    '<div class="detail-section"><div class="detail-section-title">会話元</div><div class="detail-tag-group">' + convHtml + '</div></div>' +
    '<div class="detail-buttons">' +
    '<button class="detail-btn primary" onclick="updateTaskStatus(\'未着手\')">未着手</button>' +
    '<button class="detail-btn primary" onclick="updateTaskStatus(\'進行中\')">進行中</button>' +
    '<button class="detail-btn" onclick="updateTaskStatus(\'完了\')">完了</button>' +
    '</div>';
  document.getElementById('detail-overlay').classList.add('show');
  document.getElementById('detail-sheet').classList.add('show');
}

async function updateTaskStatus(status) {
  if (!detailData) return;
  try {
    await notionAPI('PATCH', `/pages/${detailData.id}`, {
      properties: { 'ステータス': { status: { name: status } } }
    });
    showToast('更新しました', 'success');
    closeDetail();
    loadTask();
  } catch(e) {
    showToast(e.message, 'error');
  }
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('show');
  document.getElementById('detail-sheet').classList.remove('show');
  detailData = null;
}

function showAddForm() {
  const frm = document.getElementById('form-content');
  const title = document.getElementById('form-title');
  if (currentTab === 'comm') {
    title.textContent = 'コミュニケーション追加';
    frm.innerHTML =
      '<div class="form-group"><label class="form-label">タイトル</label><input class="form-input" id="form-comm-title" placeholder=""></div>' +
      '<div class="form-group"><label class="form-label">種別</label><select class="form-select" id="form-comm-kind"><option value="">選択</option><option>相談</option><option>報告</option><option>その他</option></select></div>' +
      '<div class="form-group"><label class="form-label">重要度</label><select class="form-select" id="form-comm-importance"><option value="">選択</option><option>高</option><option>中</option><option>低</option></select></div>' +
      '<div class="form-group"><label class="form-label">内容</label><textarea class="form-textarea" id="form-comm-content" placeholder=""></textarea></div>' +
      '<div class="form-group"><label class="form-label">関係者</label><div style="display:flex;flex-wrap:wrap;gap:6px 12px;">' +
      ['矢島','大田','中川','平野','山根','村田','岡崎','向畑'].map(n => '<label style="display:flex;gap:6px;align-items:center;"><input type="checkbox" id="form-comm-rel-' + n + '" style="width:16px;height:16px;"> ' + n + '</label>').join('') +
      '</div></div>' +
      '<div class="form-group"><label class="form-label">フェーズ</label><select class="form-select" id="form-comm-phase"><option value="">選択</option><option>フェーズ1</option><option>フェーズ2</option><option>将来検討</option></select></div>' +
      '<button class="form-btn" onclick="submitCommForm()">追加</button>' +
      '<button class="form-btn-cancel" onclick="closeForm()">キャンセル</button>';
  } else if (currentTab === 'task') {
    title.textContent = 'タスク追加';
    frm.innerHTML =
      '<div class="form-group"><label class="form-label">タスク名</label><input class="form-input" id="form-task-name" placeholder=""></div>' +
      '<div class="form-group"><label class="form-label">カテゴリ</label><div style="display:flex;flex-wrap:wrap;gap:6px 12px;">' +
      ['作業','工場','出張','対顧客','人間関係','事務','SNS'].map(n => '<label style="display:flex;gap:6px;align-items:center;"><input type="checkbox" id="form-task-cat-' + n + '" style="width:16px;height:16px;"> ' + n + '</label>').join('') +
      '</div></div>' +
      '<div class="form-group"><label class="form-label">優先度</label><select class="form-select" id="form-task-priority"><option value="">選択</option><option>高</option><option>中</option><option>低</option></select></div>' +
      '<div class="form-group"><label class="form-label">タスクの種類</label><select class="form-select" id="form-task-type"><option value="">選択</option><option>試験的</option><option>改善</option><option>リクエスト</option><option>仕上げ</option></select></div>' +
      '<div class="form-group"><label class="form-label">期日</label><input class="form-input" id="form-task-due" type="date"></div>' +
      '<div class="form-group"><label class="form-label">説明</label><textarea class="form-textarea" id="form-task-desc" placeholder=""></textarea></div>' +
      '<div class="form-group"><label class="form-label">会話元</label><div style="display:flex;flex-wrap:wrap;gap:6px 12px;">' +
      ['矢島','大田','中川','平野','山根','村田','岡崎','向畑'].map(n => '<label style="display:flex;gap:6px;align-items:center;"><input type="checkbox" id="form-task-conv-' + n + '" style="width:16px;height:16px;"> ' + n + '</label>').join('') +
      '</div></div>' +
      '<button class="form-btn" onclick="submitTaskForm()">追加</button>' +
      '<button class="form-btn-cancel" onclick="closeForm()">キャンセル</button>';
  }
  document.getElementById('form-overlay').classList.add('show');
}

function closeForm() {
  document.getElementById('form-overlay').classList.remove('show');
}

let _submitting = false;
async function submitCommForm() {
  if (_submitting) return;
  _submitting = true;
  const btn = document.querySelector('.form-btn');
  if (btn) { btn.disabled = true; btn.textContent = '送信中...'; }
  const title = document.getElementById('form-comm-title').value.trim();
  const kind = document.getElementById('form-comm-kind').value;
  const importance = document.getElementById('form-comm-importance').value;
  const content = document.getElementById('form-comm-content').value.trim();
  const phase = document.getElementById('form-comm-phase').value.trim();
  if (!title) { showToast('タイトルを入力してください', 'error'); _submitting = false; if (btn) { btn.disabled = false; btn.textContent = '追加'; } return; }
  try {
    const rel = [];
    for (const name of ['矢島','大田','中川','平野','山根','村田','岡崎','向畑']) {
      if (document.getElementById('form-comm-rel-' + name).checked) rel.push({ name });
    }
    await notionAPI('POST', '/pages', {
      parent: { database_id: DB.comm },
      properties: {
        'タイトル': { title: [{ text: { content: title } }] },
        '種別': { select: { name: kind || 'その他' } },
        '重要度': { select: { name: importance || '中' } },
        '内容': { rich_text: [{ text: { content: content } }] },
        '関係者': { multi_select: rel },
        'フェーズ': phase ? { select: { name: phase } } : undefined,
        '状態': { status: { name: '未着手' } }
      }
    });
    showToast('追加しました', 'success');
    closeForm();
    loadComm();
  } catch(e) {
    showToast(e.message, 'error');
  } finally {
    _submitting = false;
  }
}

async function submitTaskForm() {
  const name = document.getElementById('form-task-name').value.trim();
  const priority = document.getElementById('form-task-priority').value;
  const type = document.getElementById('form-task-type').value;
  const due = document.getElementById('form-task-due').value;
  const desc = document.getElementById('form-task-desc').value.trim();
  if (!name) { showToast('タスク名を入力してください', 'error'); return; }
  try {
    const cat = [];
    for (const c of ['作業','工場','出張','対顧客','人間関係','事務','SNS']) {
      if (document.getElementById('form-task-cat-' + c).checked) cat.push({ name: c });
    }
    const conv = [];
    for (const c of ['矢島','大田','中川','平野','山根','村田','岡崎','向畑']) {
      if (document.getElementById('form-task-conv-' + c).checked) conv.push({ name: c });
    }
    await notionAPI('POST', '/pages', {
      parent: { database_id: DB.task },
      properties: {
        'タスク名': { title: [{ text: { content: name } }] },
        'カテゴリ': { multi_select: cat },
        '優先度': { select: { name: priority || '中' } },
        'タスクの種類': type ? { select: { name: type } } : undefined,
        '期日': due ? { date: { start: due } } : undefined,
        '説明': { rich_text: [{ text: { content: desc } }] },
        '会話元': { multi_select: conv },
        'ステータス': { status: { name: '未着手' } }
      }
    });
    showToast('追加しました', 'success');
    closeForm();
    loadTask();
  } catch(e) {
    showToast(e.message, 'error');
  }
}

function loadMessageList() {
  const list = document.getElementById('message-list');
  list.innerHTML = '';
  for (const pg of MSG_PAGES) {
    const card = document.createElement('div');
    card.className = 'msg-page-card';
    card.innerHTML = '<div class="msg-page-icon">' + pg.icon + '</div>' +
      '<div class="msg-page-title">' + escapeHtml(pg.title) + '</div>' +
      '<div class="msg-page-date">' + escapeHtml(pg.date) + '</div>';
    card.onclick = () => showMessagePage(pg.key);
    list.appendChild(card);
  }
}

function showMessagePage(key) {
  const list = document.getElementById('message-list');
  list.innerHTML = '<button class="msg-back-btn" onclick="loadMessageList()">← 一覧に戻る</button>' +
    '<div class="msg-body">' + MSG_CONTENT[key] + '</div>';
}

function init() {
  if (!checkAccess()) {
    document.getElementById('auth-error').classList.add('show');
    document.getElementById('app').style.display = 'none';
    return;
  }
  document.getElementById('auth-error').classList.remove('show');
  document.getElementById('app').style.display = 'block';
  updateThemeButton();
  document.getElementById('theme-toggle').onclick = toggleTheme;
  renderNav();
  document.getElementById('fab').classList.add('show');
  localStorage.setItem('foo_portal_seen_leader', new Date().toISOString());
  loadComm();
}

init();
</script>
