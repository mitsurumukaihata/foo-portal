<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #18181f; --s1: #101015; --s2: #1e1e26; --s3: #26262f;
  --border: #2c2c38; --border2: #3c3c4a; --text: #f0f0f2; --muted: #68687a;
  --accent: #f0a500; --accent2: #f5be40; --green: #22c55e; --blue: #3b82f6;
  --yellow: #f59e0b; --red: #ef4444; --purple: #a855f7;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #fdf6ee; --s1: #ffffff; --s2: #fdf0e4; --s3: #f5e6d4;
    --border: #e8d8c4; --border2: #d8c4a8; --text: #1a1208; --muted: #a08060;
    --accent: #e07000; --accent2: #c05800; --green: #1a9e4a; --blue: #2563eb;
    --yellow: #d97706; --red: #dc2626; --purple: #9333ea;
  }
}
[data-theme="dark"] {
  --bg: #18181f; --s1: #101015; --s2: #1e1e26; --s3: #26262f;
  --border: #2c2c38; --border2: #3c3c4a; --text: #f0f0f2; --muted: #68687a;
  --accent: #f0a500; --accent2: #f5be40; --green: #22c55e; --blue: #3b82f6;
  --yellow: #f59e0b; --red: #ef4444; --purple: #a855f7;
}
[data-theme="light"] {
  --bg: #fdf6ee; --s1: #ffffff; --s2: #fdf0e4; --s3: #f5e6d4;
  --border: #e8d8c4; --border2: #d8c4a8; --text: #1a1208; --muted: #a08060;
  --accent: #e07000; --accent2: #c05800; --green: #1a9e4a; --blue: #2563eb;
  --yellow: #d97706; --red: #dc2626; --purple: #9333ea;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; max-width: 480px; margin: 0 auto; }

/* ── ヘッダー ── */
.app-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px 8px; }
.portal-link { display:flex; align-items:center; gap:4px; color:var(--muted); font-size:12px; text-decoration:none; }
.portal-link svg { width:16px; height:16px; }
.portal-link:active { opacity:0.6; }
.app-title { font-size:20px; font-weight:900; letter-spacing:-0.03em; padding:0 20px 4px; }
.app-title span { color:var(--accent); }
.app-subtitle { font-size:11px; color:var(--muted); padding:0 20px 12px; }

.header-controls { display:flex; align-items:center; gap:8px; }
.theme-toggle { background:var(--s2); border:1px solid var(--border); border-radius:8px; width:36px; height:36px; color:var(--text); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.theme-toggle:active { background:var(--s3); }

/* ── ナビ ── */
.nav { display:flex; gap:2px; padding:0 20px 12px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.nav::-webkit-scrollbar { display:none; }
.nav-btn { flex-shrink:0; background:var(--s2); border:1px solid var(--border); border-radius:8px; padding:9px 14px; font-size:12px; font-weight:600; color:var(--muted); cursor:pointer; font-family:'Noto Sans JP',sans-serif; transition:all 0.15s; white-space:nowrap; position:relative; }
.nav-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.nav-badge { position:absolute; top:-6px; right:-6px; background:var(--red); color:#fff; border-radius:50%; width:18px; height:18px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; }

/* ── ページ ── */
.page { display:none; padding:0 20px 120px; }
.page.show { display:block; }

/* ── カード ── */
.card { background:var(--s2); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:10px; cursor:pointer; transition:all 0.15s; }
.card:active { background:var(--s3); }
.card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.card-title { font-size:13px; font-weight:700; color:var(--text); margin-bottom:4px; }
.card-subtitle { font-size:11px; color:var(--muted); }
.card-tags { display:flex; flex-wrap:wrap; gap:4px 6px; margin-bottom:8px; }
.tag { display:inline-block; padding:3px 8px; border-radius:8px; font-size:10px; font-weight:600; white-space:nowrap; }
.tag-type { background:rgba(59,130,246,0.15); color:var(--blue); }
.tag-importance { background:rgba(239,68,68,0.15); color:var(--red); }
.tag-importance-medium { background:rgba(245,158,11,0.15); color:var(--yellow); }
.tag-importance-low { background:rgba(34,197,94,0.15); color:var(--green); }
.tag-status { background:rgba(168,85,247,0.15); color:var(--purple); }
.tag-section { background:rgba(107,114,128,0.2); color:var(--muted); }
.card-content { font-size:12px; color:var(--muted); line-height:1.5; max-height:60px; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.card-footer { display:flex; justify-content:space-between; align-items:center; font-size:10px; color:var(--muted); margin-top:8px; }

/* ── ステータスバッジ ── */
.status-badge { display:inline-block; padding:3px 8px; border-radius:8px; font-size:10px; font-weight:600; }
.status-active { background:rgba(34,197,94,0.15); color:var(--green); }
.status-considering { background:rgba(245,158,11,0.15); color:var(--yellow); }
.status-meeting { background:rgba(59,130,246,0.15); color:var(--blue); }
.status-resolved { background:rgba(107,114,128,0.2); color:var(--muted); }

/* ── 従業員カード（面談） ── */
.employee-card { background:var(--s2); border:2px solid var(--border); border-radius:12px; padding:16px; margin-bottom:10px; cursor:pointer; transition:all 0.15s; }
.employee-card:active { background:var(--s3); }
.employee-card.accent-矢島 { border-color:rgba(59,130,246,0.4); }
.employee-card.accent-大田 { border-color:rgba(168,85,247,0.4); }
.employee-card.accent-中川 { border-color:rgba(34,197,94,0.4); }
.employee-card.accent-平野 { border-color:rgba(245,158,11,0.4); }
.employee-card.accent-山根 { border-color:rgba(239,68,68,0.4); }
.employee-card.accent-村田 { border-color:rgba(236,72,153,0.4); }
.employee-name { font-size:16px; font-weight:700; text-align:center; }

/* ── フィルターチップ ── */
.filter-chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
.chip { background:var(--s2); border:1px solid var(--border); border-radius:8px; padding:7px 12px; font-size:11px; font-weight:600; color:var(--muted); cursor:pointer; transition:all 0.15s; }
.chip.active { background:var(--accent); color:#fff; border-color:var(--accent); }

/* ── 詳細パネル ── */
.detail-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:90; }
.detail-overlay.show { display:block; }
.detail-sheet { display:none; position:fixed; bottom:0; left:0; right:0; background:var(--bg); border-radius:20px 20px 0 0; width:100%; max-width:480px; max-height:85vh; overflow-y:auto; padding:24px 20px 32px; z-index:95; animation:slideUp 0.3s ease-out; }
.detail-sheet.show { display:block; }
@keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
.detail-close-btn { position:absolute; top:12px; right:12px; background:var(--s2); border:1px solid var(--border); border-radius:8px; width:32px; height:32px; color:var(--text); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.detail-close-btn:active { background:var(--s3); }
.detail-title { font-size:18px; font-weight:700; margin-bottom:16px; padding-right:40px; }
.detail-section { margin-bottom:16px; }
.detail-section-title { font-size:11px; color:var(--muted); font-weight:600; margin-bottom:6px; }
.detail-section-content { font-size:13px; color:var(--text); line-height:1.8; word-break:break-word; }
.detail-tag-group { display:flex; flex-wrap:wrap; gap:4px 6px; }
.detail-buttons { display:flex; flex-direction:column; gap:6px; margin-top:16px; }
.detail-btn { width:100%; padding:12px; border:1.5px solid var(--border); background:var(--s2); color:var(--text); border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.15s; }
.detail-btn:active { background:var(--s3); }
.detail-btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
.detail-btn.danger { background:rgba(239,68,68,0.15); color:var(--red); }

/* ── フォーム ── */
.form-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100; justify-content:center; align-items:flex-end; }
.form-overlay.show { display:flex; }
.form-sheet { background:var(--bg); border-radius:20px 20px 0 0; width:100%; max-width:480px; max-height:85vh; overflow-y:auto; padding:20px 20px 32px; }
.form-title { font-size:16px; font-weight:700; margin-bottom:16px; }
.form-group { margin-bottom:14px; }
.form-label { font-size:11px; color:var(--muted); font-weight:600; margin-bottom:5px; }
.form-input { width:100%; background:var(--s2); border:1.5px solid var(--border); border-radius:10px; padding:12px 14px; font-size:14px; color:var(--text); outline:none; font-family:inherit; }
.form-input:focus { border-color:var(--accent); }
.form-input[inputmode="numeric"] { font-family:'DM Mono',monospace; }
.form-select { width:100%; background:var(--s2); border:1.5px solid var(--border); border-radius:10px; padding:12px 14px; font-size:14px; color:var(--text); outline:none; font-family:inherit; appearance:none; }
.form-select:focus { border-color:var(--accent); }
.form-textarea { width:100%; background:var(--s2); border:1.5px solid var(--border); border-radius:10px; padding:12px 14px; font-size:14px; color:var(--text); outline:none; font-family:inherit; resize:vertical; min-height:100px; }
.form-textarea:focus { border-color:var(--accent); }
.form-btn { width:100%; background:var(--accent); border:none; border-radius:10px; padding:14px; color:#fff; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; margin-top:8px; }
.form-btn:disabled { opacity:0.4; cursor:default; }
.form-btn-cancel { width:100%; background:var(--s3); border:1px solid var(--border2); border-radius:10px; padding:12px; color:var(--text); font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; margin-top:6px; }
.form-btn-cancel:active { opacity:0.7; }

/* ── ローディング ── */
.loading { text-align:center; padding:40px 20px; color:var(--muted); font-size:13px; }
.loading::before { content:''; display:block; width:28px; height:28px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── 空状態 ── */
.empty-state { text-align:center; padding:40px 20px; color:var(--muted); font-size:13px; line-height:1.8; }

/* ── トースト ── */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--s2); border:1px solid var(--border); border-radius:10px; padding:12px 16px; font-size:12px; color:var(--text); z-index:200; max-width:90%; word-break:break-word; animation:slideUpToast 0.3s ease-out; }
@keyframes slideUpToast { from { transform:translateX(-50%) translateY(100%); } to { transform:translateX(-50%) translateY(0); } }
.toast.error { background:rgba(239,68,68,0.15); border-color:var(--red); color:var(--red); }
.toast.success { background:rgba(34,197,94,0.15); border-color:var(--green); color:var(--green); }

/* ── FAB ── */
.fab { position:fixed; bottom:24px; right:24px; width:52px; height:52px; border-radius:50%; background:var(--accent); border:none; color:#fff; font-size:28px; font-weight:300; cursor:pointer; box-shadow:0 4px 16px rgba(0,0,0,0.4); display:none; align-items:center; justify-content:center; z-index:50; }
.fab.show { display:flex; }

/* ── エラースクリーン ── */
/* ── メッセージページ（社長の思い） ── */
.msg-page-card { background:var(--s2); border:1px solid var(--border); border-radius:14px; padding:18px; margin-bottom:14px; cursor:pointer; transition:all 0.15s; }
.msg-page-card:active { background:var(--s3); }
.msg-page-icon { font-size:28px; margin-bottom:8px; }
.msg-page-title { font-size:15px; font-weight:700; color:var(--text); margin-bottom:4px; }
.msg-page-date { font-size:11px; color:var(--muted); }
.msg-body { padding:4px 0 40px; }
.msg-body h1 { font-size:18px; font-weight:900; margin:20px 0 10px; color:var(--accent); }
.msg-body h2 { font-size:15px; font-weight:700; margin:18px 0 8px; color:var(--text); }
.msg-body h3 { font-size:13px; font-weight:700; margin:14px 0 6px; color:var(--text); }
.msg-body p { font-size:13px; line-height:1.9; color:var(--text); margin-bottom:8px; word-break:break-word; }
.msg-body hr { border:none; border-top:1px solid var(--border); margin:16px 0; }
.msg-body ul, .msg-body ol { font-size:13px; line-height:1.9; color:var(--text); margin:4px 0 8px 18px; }
.msg-body li { margin-bottom:2px; }
.msg-body .highlight-red { color:var(--red); font-weight:700; }
.msg-body .highlight-orange { color:var(--accent); font-weight:700; }
.msg-body .highlight-blue { color:var(--blue); font-weight:700; }
.msg-back-btn { display:inline-flex; align-items:center; gap:4px; background:var(--s2); border:1px solid var(--border); border-radius:8px; padding:8px 14px; font-size:12px; font-weight:600; color:var(--muted); cursor:pointer; margin-bottom:14px; font-family:inherit; }
.msg-back-btn:active { background:var(--s3); }

.auth-error { display:none; text-align:center; padding:60px 20px; }
.auth-error.show { display:block; }
.auth-error-title { font-size:18px; font-weight:700; margin-bottom:8px; }
.auth-error-msg { font-size:13px; color:var(--muted); line-height:1.8; }
</style>
</head>

<script>
(function(){
  const t = localStorage.getItem('foo_portal_theme') || 'auto';
  if (t !== 'auto') document.documentElement.setAttribute('data-theme', t);
})();

const PROXY = 'https://notion-proxy.33322666666mm.workers.dev';
const DB = {
  comm:    '2e0a695f8e888020b787db3c6c96c153',
  meeting: '233a695f8e888025a2f9fb1d7974a7c5',
  task:    '2eea695f8e8880598e50cd9c768f114f',
};
const MTG_DB = {
  '矢島': '23ca695f8e8881028bb7cdee95c6fcd0',
  '大田': '23ca695f8e88817f84b9db3f786f17a7',
  '中川': '23ca695f8e8880688a20c6bc3b804e59',
  '平野': '23ca695f8e8881518b88c3c6364075c6',
  '山根': '23ca695f8e88819cba5bd12cda06b134',
  '村田': '23da695f8e88800198f3f2ba842d960a',
};

const MSG_PAGES = [
  { key: 'omoi', icon: '📘', title: '代表としての思い', date: '2026.2.13' },
  { key: 'ninmei', icon: '📕', title: '役割任命書（現場部長）', date: '2026.1.6' },
];

let currentTab = 'comm';
let currentFilter = 'all';
let currentEmployee = null;
let detailData = null;
let currentUserName = '';

function checkAccess() {
  try {
    const raw = localStorage.getItem('foo_portal_session');
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (new Date(data.expires) < new Date()) return false;
    if (data.apps && data.apps.manager === true) {
      currentUserName = data.name || '';
      return true;
    }
    return false;
  } catch(e) { return false; }
}

async function notionAPI(method, path, body) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 20000);
  try {
    const res = await fetch(PROXY + path, {
      method, headers: { 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined, signal: ctrl.signal
    });
    clearTimeout(timer);
    const data = await res.json();
    if (data.object === 'error') throw new Error(data.message);
    return data;
  } catch(e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') throw new Error('タイムアウト');
    throw new Error('通信エラー: ' + e.message);
  }
}

async function queryAll(dbId, body) {
  let all = [], cursor = null;
  while (true) {
    const b = { ...body, page_size: 100 };
    if (cursor) b.start_cursor = cursor;
    const res = await notionAPI('POST', `/databases/${dbId}/query`, b);
    all = all.concat(res.results || []);
    if (!res.has_more) break;
    cursor = res.next_cursor;
  }
  return all;
}

function escapeHtml(text) {
  if (!text) return '';
  return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function getPropValue(page, prop) {
  const p = page.properties[prop];
  if (!p) return null;
  switch(p.type) {
    case 'title': return p.title.map(t => t.plain_text).join('');
    case 'rich_text': return p.rich_text.map(t => t.plain_text).join('');
    case 'select': return p.select?.name || null;
    case 'multi_select': return p.multi_select?.map(s => s.name) || [];
    case 'date': return p.date?.start || null;
    case 'checkbox': return p.checkbox;
    case 'number': return p.number;
    case 'status': return p.status?.name || null;
    default: return null;
  }
}

function showToast(msg, type = 'default') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

function toggleTheme() {
  const cur = localStorage.getItem('foo_portal_theme') || 'auto';
  const next = cur === 'dark' ? 'light' : 'dark';
  localStorage.setItem('foo_portal_theme', next);
  document.documentElement.setAttribute('data-theme', next);
  updateThemeButton();
}

function updateThemeButton() {
  const theme = localStorage.getItem('foo_portal_theme') || 'auto';
  const btn = document.getElementById('theme-toggle');
  if (theme === 'light') btn.textContent = '☀️';
  else btn.textContent = '🌙';
}

function renderNav() {

async function updateNavBadge() {
  const el = document.getElementById('nav-badge-comm');
  if (!el || !currentUserName) return;
  try {
    const res = await queryAll(DB.comm, {
      filter: {
        and: [
          { property: '状態', status: { does_not_equal: '解決' } },
          { property: '状態', status: { does_not_equal: 'マニュアル反映済' } },
          { property: '確認者', multi_select: { does_not_contain: currentUserName } }
        ]
      },
      page_size: 100
    });
    let count = 0;
    for (const p of res) {
      const poster = p.properties['投稿者']?.select?.name || p.created_by?.name || '';
      if (poster !== currentUserName) count++;
    }
    if (count > 0) {
      el.textContent = count > 9 ? '9+' : count;
      el.style.display = 'flex';
    } else {
      el.style.display = 'none';
    }
  } catch(e) { /* silent */ }
}

function switchTab(id) {
  currentTab = id;
  currentFilter = 'all';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
  document.getElementById('page-' + id).classList.add('show');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  closeDetail();
  const fab = document.getElementById('fab');
  if (id === 'interview' || id === 'message') fab.classList.remove('show');
  else fab.classList.add('show');
  if (id === 'comm') loadComm();
  else if (id === 'meeting') loadMeeting();
  else if (id === 'task') loadTask();
  else if (id === 'interview') loadInterview();
  else if (id === 'message') loadMessageList();
}

function renderCommFilters() {

async function loadComm() {
  renderCommFilters();
  const list = document.getElementById('comm-list');
  list.innerHTML = '<div class="loading"></div>';
  try {
    const filter = {};
    if (currentFilter === 'unconfirmed') {
      filter.filter = {
        and: [
          { property: '状態', status: { does_not_equal: '解決' } },
          { property: '状態', status: { does_not_equal: 'マニュアル反映済' } },
          { property: '確認者', multi_select: { does_not_contain: currentUserName } }
        ]
      };
    } else if (currentFilter === 'active') {
      filter.filter = { property: '状態', status: { equals: '対応中' } };
    } else if (currentFilter === 'considering') {
      filter.filter = { property: '状態', status: { equals: '検討中' } };
    } else if (currentFilter === 'meeting') {
      filter.filter = { property: '状態', status: { equals: '会議で報告' } };
    } else {
      filter.filter = {
        and: [
          { property: '状態', status: { does_not_equal: '解決' } },
          { property: '状態', status: { does_not_equal: 'マニュアル反映済' } }
        ]
      };
    }
    filter.sorts = [{ property: '作成日', direction: 'descending' }];
    const pages = await queryAll(DB.comm, filter);
    if (pages.length === 0) {
      list.innerHTML = '<div class="empty-state">データがありません</div>';
      return;
    }
    list.innerHTML = '';
    const seen = new Set();
    for (const p of pages) {
      if (seen.has(p.id)) continue;
      seen.add(p.id);
      const title = getPropValue(p, 'タイトル');
      const status = getPropValue(p, '状態');
      const kind = getPropValue(p, '種別');
      const importance = getPropValue(p, '重要度');
      const content = getPropValue(p, '内容');
      const rel = getPropValue(p, '関係者');
      const author = getPropValue(p, '投稿者') || p.created_by?.name || '';
      const confirmed = getPropValue(p, '確認者') || [];
      const isAuthor = currentUserName && author === currentUserName;
      const needConfirm = !isAuthor && currentUserName && !confirmed.includes(currentUserName);
      const card = document.createElement('div');
      card.className = 'card';
      card.style.position = 'relative';
      let tags = '';
      if (kind) tags += '<span class="tag tag-type">' + escapeHtml(kind) + '</span>';
      if (importance) {
        const cls = importance === '高' ? 'tag-importance' : importance === '中' ? 'tag-importance-medium' : 'tag-importance-low';
        tags += '<span class="tag ' + cls + '">' + escapeHtml(importance) + '</span>';
      }
      let relTags = '';
      if (Array.isArray(rel)) for (const r of rel) relTags += '<span class="tag tag-status">' + escapeHtml(r) + '</span>';
      let statusBadge = '';
      if (status) {
        const scs = status === '対応中' ? 'status-active' : status === '検討中' ? 'status-considering' : status === '会議で報告' ? 'status-meeting' : 'status-resolved';
        statusBadge = '<span class="status-badge ' + scs + '">' + escapeHtml(status) + '</span>';
      }
      const authorHtml = author ? '<span style="font-size:10px;color:var(--accent);font-weight:600;">' + escapeHtml(author) + '</span>' : '';
      const unreadDot = needConfirm ? '<span style="position:absolute;top:8px;right:8px;width:10px;height:10px;background:var(--red);border-radius:50%;"></span>' : '';
      let confirmedHtml = '';
      if (confirmed.length > 0) {
        confirmedHtml = '<div style="margin-top:6px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;"><span style="font-size:10px;color:var(--green);">✓</span>';
        for (const c of confirmed) confirmedHtml += '<span style="font-size:10px;color:var(--green);font-weight:600;">' + escapeHtml(c) + '</span>';
        confirmedHtml += '</div>';
      }
      card.innerHTML = unreadDot +
        '<div class="card-header"><div><div class="card-title">' + escapeHtml(title) + '</div>' + authorHtml + '</div><div>' + statusBadge + '</div></div>' +
        '<div class="card-tags">' + tags + '</div>' +
        '<div class="card-content">' + escapeHtml(content || '') + '</div>' +
        confirmedHtml +
        '<div class="card-footer"><div>' + relTags + '</div></div>';
      card.onclick = () => showCommDetail(p);
      list.appendChild(card);
    }
    updateNavBadge();
  } catch(e) {
    list.innerHTML = '<div class="empty-state">' + escapeHtml(e.message) + '<br><button style="background:var(--accent);color:#fff;border:none;border-radius:6px;padding:8px 12px;margin-top:12px;cursor:pointer;font-size:12px;font-weight:600;" onclick="loadComm()">再試行</button></div>';
  }
}

  document.getElementById('detail-overlay').classList.add('show');

async function confirmComm() {
  if (!detailData || !currentUserName) return;
  try {
    const existing = getPropValue(detailData, '確認者') || [];
    if (existing.includes(currentUserName)) { showToast('既に確認済みです', 'info'); return; }
    const updated = [...existing.map(n => ({ name: n })), { name: currentUserName }];
    await notionAPI('PATCH', `/pages/${detailData.id}`, {
      properties: { '確認者': { multi_select: updated } }
    });
    showToast('確認しました', 'success');
    closeDetail();
    loadComm();
  } catch(e) {
    showToast(e.message, 'error');
  }
}

async function loadTask() {
  const list = document.getElementById('task-list');
  list.innerHTML = '<div class="loading"></div>';
  try {
    const pages = await queryAll(DB.task, {
      sorts: [{ property: '期日', direction: 'descending' }]
    });
    if (pages.length === 0) {
      list.innerHTML = '<div class="empty-state">データがありません</div>';
      return;
    }
    const groups = {
      '未着手': [], '次回会議で再確認': [],
      '作成中': [], '部長管理': [], '返答待ち': [], '検討中': [], '進行中': [],
      'completed': []
    };
    for (const p of pages) {
      const status = getPropValue(p, 'ステータス') || 'その他';
      if (status === '未着手' || status === '次回会議で再確認') {
        groups['未着手'].push(p);
      } else if (status === '完了') {
        groups['completed'].push(p);
      } else {
        groups[status] = groups[status] || [];
        groups[status].push(p);
      }
    }
    list.innerHTML = '';
    const order = ['未着手', '次回会議で再確認', '作成中', '部長管理', '返答待ち', '検討中', '進行中'];
    for (const grp of order) {
      if (!groups[grp] || groups[grp].length === 0) continue;
      const hdr = document.createElement('div');
      hdr.style.cssText = 'font-size:12px;font-weight:700;color:var(--muted);padding:12px 0 8px;';
      hdr.textContent = grp;
      list.appendChild(hdr);
      for (const p of groups[grp]) {
        const taskName = getPropValue(p, 'タスク名');
        const status = getPropValue(p, 'ステータス');
        const priority = getPropValue(p, '優先度');
        const category = getPropValue(p, 'カテゴリ');
        const dueDate = getPropValue(p, '期日');
        const card = document.createElement('div');
        card.className = 'card';
        const dueDateStr = dueDate ? new Date(dueDate).toLocaleDateString('ja-JP') : '';
        let catTags = '';
        if (Array.isArray(category)) for (const c of category) catTags += '<span class="tag tag-type">' + escapeHtml(c) + '</span>';
        const priTag = priority ? '<span class="tag tag-importance">' + escapeHtml(priority) + '</span>' : '';
        card.innerHTML =
          '<div class="card-header"><div><div class="card-title">' + escapeHtml(taskName || '') + '</div></div><div><span class="status-badge status-active">' + escapeHtml(status || '') + '</span></div></div>' +
          '<div class="card-tags">' + priTag + catTags + '</div>' +
          '<div class="card-footer"><div>' + dueDateStr + '</div></div>';
        card.onclick = () => showTaskDetail(p);
        list.appendChild(card);
      }
    }
    if (groups['completed'] && groups['completed'].length > 0) {
      const hdr = document.createElement('div');
      hdr.style.cssText = 'font-size:12px;font-weight:700;color:var(--muted);padding:12px 0 8px;';
      hdr.textContent = '完了';
      list.appendChild(hdr);
      for (const p of groups['completed']) {
        const taskName = getPropValue(p, 'タスク名');
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = '<div class="card-title">' + escapeHtml(taskName || '') + '</div><div class="status-badge status-resolved">完了</div>';
        card.onclick = () => showTaskDetail(p);
        list.appendChild(card);
      }
    }
  } catch(e) {
    list.innerHTML = '<div class="empty-state">' + escapeHtml(e.message) + '<br><button style="background:var(--accent);color:#fff;border:none;border-radius:6px;padding:8px 12px;margin-top:12px;cursor:pointer;font-size:12px;font-weight:600;" onclick="loadTask()">再試行</button></div>';
  }
}

      list.innerHTML = '<div class="empty-state">データベースが見つかりません</div>';
      return;
    }
    const pages = await queryAll(dbId, {

      list.innerHTML = '<button onclick="goBackEmployees()" style="background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12px;font-weight:600;color:var(--text);cursor:pointer;margin-bottom:12px;width:100%;">← 従業員一覧に戻る</button><div class="empty-state">データがありません</div>';

    list.innerHTML = html + '<div class="loading"></div>';
    list.innerHTML = html;
    for (const p of pages) {
      const date = getPropValue(p, '日付');
      const title = getPropValue(p, '最近の状態');
      const change = getPropValue(p, '前回会議からの変化');
      const factor = getPropValue(p, '変化要因の分類');
      const card = document.createElement('div');
      card.className = 'card';
      const dateStr = date ? new Date(date).toLocaleDateString('ja-JP') : '';
      let facTags = '';
      if (Array.isArray(factor)) for (const f of factor) facTags += '<span class="tag tag-type">' + escapeHtml(f) + '</span>';
      const changeBadge = change ? '<span class="status-badge status-active">' + escapeHtml(change) + '</span>' : '';
      card.innerHTML =
        '<div class="card-header"><div><div class="card-title">' + escapeHtml(title || '') + '</div><div class="card-subtitle">' + dateStr + '</div></div><div>' + changeBadge + '</div></div>' +
        '<div class="card-tags">' + facTags + '</div>';
      card.onclick = () => showInterviewDetail(p);
      list.appendChild(card);
    }
  } catch(e) {
    list.innerHTML = '<button onclick="goBackEmployees()" style="background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12px;font-weight:600;color:var(--text);cursor:pointer;margin-bottom:12px;width:100%;">← 従業員一覧に戻る</button><div class="empty-state">' + escapeHtml(e.message) + '</div>';
  }
}

let _submitting = false;
async function submitCommForm() {
  if (_submitting) return;
  _submitting = true;
  const btn = document.querySelector('.form-btn');
  if (btn) { btn.disabled = true; btn.textContent = '送信中...'; }
  const title = document.getElementById('form-comm-title').value.trim();
  const kind = document.getElementById('form-comm-kind').value;
  const importance = document.getElementById('form-comm-importance').value;
  const content = document.getElementById('form-comm-content').value.trim();
  const relStr = document.getElementById('form-comm-rel').value.trim();
  const phase = document.getElementById('form-comm-phase').value.trim();
  if (!title) { showToast('タイトルを入力してください', 'error'); _submitting = false; if (btn) { btn.disabled = false; btn.textContent = '追加'; } return; }
  try {
    const rel = relStr ? relStr.split(',').map(s => ({ name: s.trim() })) : [];
    await notionAPI('POST', '/pages', {
      parent: { database_id: DB.comm },
      properties: {
        'タイトル': { title: [{ text: { content: title } }] },
        '種別': { select: { name: kind || 'その他' } },
        '重要度': { select: { name: importance || '中' } },
        '内容': { rich_text: [{ text: { content: content } }] },
        '関係者': { multi_select: rel },
        'フェーズ': phase ? { select: { name: phase } } : undefined,
        '状態': { status: { name: '対応中' } },
        '投稿者': currentUserName ? { select: { name: currentUserName } } : undefined
      }
    });
    showToast('追加しました', 'success');
    closeForm();
    loadComm();
  } catch(e) {
    showToast(e.message, 'error');
  } finally {
    _submitting = false;
  }
}

async function submitMeetingForm() {
  const name = document.getElementById('form-mtg-name').value.trim();
  const date = document.getElementById('form-mtg-date').value;
  const section = document.getElementById('form-mtg-section').value;
  const topic = document.getElementById('form-mtg-topic').value.trim();
  const task = document.getElementById('form-mtg-task').value.trim();
  if (!name || !date) { showToast('名前と日付を入力してください', 'error'); return; }
  try {
    const parts = [];
    for (const p of ['矢島', '大田', '中川', '平野', '山根', '村田', '全員']) {
      if (document.getElementById('form-mtg-part-' + p).checked) {
        parts.push({ name: p });
      }
    }
    await notionAPI('POST', '/pages', {
      parent: { database_id: DB.meeting },
      properties: {
        '名前': { title: [{ text: { content: name } }] },
        '日付': { date: { start: date } },
        '区分け': { select: { name: section || '一般' } },
        '参加者': { multi_select: parts },
        '議題': { rich_text: [{ text: { content: topic } }] },
        'タスク': { rich_text: [{ text: { content: task } }] }
      }
    });
    showToast('追加しました', 'success');
    closeForm();
    loadMeeting();
  } catch(e) {
    showToast(e.message, 'error');
  }
}

'<li>当日の人員配置および現場割り振りについて、<br><span class="highlight-orange"><strong>社長と相談・共有しながら判断の基準を整理する</strong></span></li>' +
'<li>出張作業の段取り・順序・進め方について、<br><span class="highlight-orange"><strong>実務を通じて最適な判断パターンを確立していく</strong></span></li>' +
'<li>作業工程・作業手順について、<br><span class="highlight-orange"><strong>判断内容を共有し、共通ルールとして整理する</strong></span></li>' +
'<li>現場で発生した課題・トラブルについて、<br><span class="highlight-orange"><strong>対応内容と判断理由を整理・共有する</strong></span></li>' +
'</ul>' +
'<p>※ フェーズ1では、<br><span class="highlight-orange"><strong>判断そのものより「判断の考え方」を社長とすり合わせていくことを重視する。</strong></span><br>※ 上記判断は、原則として <strong>事後報告</strong> とする。</p><hr>' +
'<h3>（2）新人・若手社員の教育・育成</h3>' +
'<p>本役職者は、<br><strong>新人および若手社員の教育・育成の中心的役割</strong>を担う。</p>' +
'<ul><li>タイヤ交換作業・出張作業の基本指導</li><li>作業の考え方・安全意識の共有</li><li>分からないことを相談しやすい環境づくり</li><li>一人で現場に出られるまでの段階的フォロー</li></ul>' +
'<p>教育は、命令や叱責ではなく、<br><span class="highlight-orange"><strong>理解と信頼を積み重ねる指導</strong></span>を基本とする。</p><hr>' +
'<h3>（3）相談・判断の一次窓口</h3>' +
'<ul><li>日々の現場判断に関する一次相談窓口となる</li><li>年齢・勤続年数に関係なく、<br><span class="highlight-orange"><strong>誰もが安心して相談できる存在</strong></span>であることを求める</li></ul><hr>' +
'<h3>（4）車両・機械整備に関する注文・発注権（フェーズ1）</h3>' +
'<p>本役職者は、<br><strong>現場および出張作業を止めないことを目的として、<br>以下の範囲で車両・機械整備に関する注文・発注を行うことができる。</strong></p>' +
'<h3>【単独で判断・発注してよいもの（事後報告）】</h3>' +
'<ul><li>作業車両・サービスカーの消耗品交換に伴う部品発注（オイル、フィルター、電球、ベルト類 等）</li><li>タイヤ交換作業に使用する機械・工具の消耗品、軽微な部品</li><li>故障・不具合時の応急対応としての部品手配</li><li>現場作業継続に不可欠な緊急発注</li></ul>' +
'<p>※ 発注は <span class="highlight-orange"><strong>現場を止めないための対応</strong></span> を目的とする。</p><hr>' +
'<h3>【条件付きで判断・発注できるもの】</h3>' +
'<ul><li>過去に実績のある同等内容の修理・整備</li><li>内容が明確で、常識的な範囲の少額整備</li></ul>' +
'<p>※ 発注後、<span class="highlight-orange"><strong>速やかに役員へ内容を共有・報告</strong></span>すること。</p><hr>' +
'<h3>【役員判断が必要なもの】</h3>' +
'<ul><li>高額な修理・大規模整備</li><li>新規設備・高額工具・機械の導入</li><li>車両更新・設備更新</li><li>定期契約・保守契約の締結</li><li>業務範囲・作業能力に影響する整備・投資</li></ul><hr>' +
'<h3>（5）作業工程・メンテナンスに関するマニュアル作成</h3>' +
'<p>本役職者は、<br><span class="highlight-orange"><strong>現場実務を基にした作業工程および<br>機械・車両メンテナンスに関するマニュアル作成を担当</strong></span>する。</p>' +
'<h3>【対象】</h3>' +
'<ul><li>タイヤ交換作業の基本工程</li><li>出張作業における準備・搬入・設置・撤収手順</li><li>作業車両・サービスカーの日常点検・定期点検項目</li><li>タイヤ交換機械・工具の点検方法・使用上の注意</li></ul>' +
'<h3>【作成方針】</h3>' +
'<ul><li>完成度より <span class="highlight-orange"><strong>使えること</strong></span> を優先する</li><li>「作る → 使う → 直す」を繰り返す</li><li>文章は最小限とし、写真・箇条書きを中心とする</li><li>新人が読んで動けるかを基準とする</li></ul>' +
'<h3>【役割分担】</h3>' +
'<ul><li>マニュアル叩き台作成：代表・現場部長</li><li>内容確認・最終判断：代表</li><li>運用・改善フィードバック：現場全員</li></ul><hr>' +
'<h3>（6）マニュアル運用および改善責任</h3>' +
'<ul><li>作成したマニュアルは <strong>新人教育および現場指導の基準</strong> とする</li><li>現場で不備・改善点が出た場合は随時見直す</li><li>マニュアルを守らせることだけではなく、<strong>改善し続けること</strong> を目的とする</li></ul><hr>' +
'<h2>4．本任命における制限事項（フェーズ1）</h2>' +
'<p>以下の事項については、<br><span class="highlight-orange"><strong>役員（代表取締役）の事前判断または承認を必要</strong></span><strong>とする。</strong></p>' +
'<ul><li>価格・工賃・契約条件の変更</li><li>人事評価・昇給・処遇・懲戒に関する判断</li><li>高額な設備投資・車両更新</li><li>社外に対する正式な条件提示</li><li>会社方針および事業運営に影響する判断全般</li></ul><hr>' +
'<h2>5．評価および見直し</h2>' +
'<p>試行期間中は、以下を中心に確認を行う。</p>' +
'<ul><li>現場・出張作業が滞りなく回っているか</li><li>新人・若手の理解度および定着状況</li><li>マニュアルが実際に使われているか</li><li>現場トラブルや判断の迷いが減っているか</li><li>代表の現場判断負荷が軽減されているか</li></ul>' +
'<p>試行期間終了時に、<br>役割・裁量・任命内容を総合的に見直す。</p><hr>' +
'<h2>6．役職の考え方（社内共通認識）</h2>' +
'<p>本役職は、<br>誰かを偉くするためのものではない。</p>' +
'<ul><li>現場判断を一本化するため</li><li>教育・相談の窓口を明確にするため</li><li>誰でも同じ品質で仕事ができる状態を作るため</li></ul>' +
'<p>に設ける<strong>役割</strong>である。</p>' +
'<p>当社は、<br><span class="highlight-orange"><strong>役職に人を当てるのではなく、役割に人を当てる</strong></span><br>ことを基本方針とする。</p><hr>' +
'<p><strong>代表取締役　　向畑　充</strong><br><strong>任命者　　　 大田　健</strong></p>';

function loadMessageList() {
  const list = document.getElementById('message-list');
  list.innerHTML = '';
  for (const pg of MSG_PAGES) {
    const card = document.createElement('div');
    card.className = 'msg-page-card';
    card.innerHTML = '<div class="msg-page-icon">' + pg.icon + '</div>' +
      '<div class="msg-page-title">' + escapeHtml(pg.title) + '</div>' +
      '<div class="msg-page-date">' + escapeHtml(pg.date) + '</div>';
    card.onclick = () => showMessagePage(pg.key);
    list.appendChild(card);
  }
}

function showMessagePage(key) {
  const list = document.getElementById('message-list');
  list.innerHTML = '<button class="msg-back-btn" onclick="loadMessageList()">← 一覧に戻る</button>' +
    '<div class="msg-body">' + MSG_CONTENT[key] + '</div>';
}

function init() {
  if (!checkAccess()) {
    document.getElementById('auth-error').classList.add('show');
    document.getElementById('app').style.display = 'none';
    return;
  }
  document.getElementById('auth-error').classList.remove('show');
  document.getElementById('app').style.display = 'block';
  updateThemeButton();
  document.getElementById('theme-toggle').onclick = toggleTheme;
  renderNav();
  document.getElementById('fab').classList.add('show');
  localStorage.setItem('foo_portal_seen_manager', new Date().toISOString());
  loadComm();
}

init();
</script>
