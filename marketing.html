}

}
[data-theme="dark"] {
  --bg: #18181f; --s1: #101015; --s2: #1e1e26; --s3: #26262f;
  --border: #2c2c38; --border2: #3c3c4a; --text: #f0f0f2; --muted: #68687a;
  --accent: #f0a500; --accent2: #f5be40; --green: #22c55e; --blue: #3b82f6;

}
[data-theme="light"] {
  --bg: #fdf6ee; --s1: #ffffff; --s2: #fdf0e4; --s3: #f5e6d4;
  --border: #e8d8c4; --border2: #d8c4a8; --text: #1a1208; --muted: #a08060;

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; max-width: 480px; margin: 0 auto; }

/* ── ヘッダー ── */
.app-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px 8px; }
.portal-link { display:flex; align-items:center; gap:4px; color:var(--muted); font-size:12px; text-decoration:none; }
.portal-link svg { width:16px; height:16px; }
.portal-link:active { opacity:0.6; }
.app-title { font-size:20px; font-weight:900; letter-spacing:-0.03em; padding:0 20px 4px; }
.app-title span { color:var(--accent); }
.app-subtitle { font-size:11px; color:var(--muted); padding:0 20px 12px; }

.header-controls { display:flex; align-items:center; gap:8px; }
.theme-toggle { background:var(--s2); border:1px solid var(--border); border-radius:8px; width:36px; height:36px; color:var(--text); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.theme-toggle:active { background:var(--s3); }

/* ── ナビ ── */
.nav { display:flex; gap:2px; padding:0 20px 12px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.nav::-webkit-scrollbar { display:none; }
.nav-btn { flex-shrink:0; background:var(--s2); border:1px solid var(--border); border-radius:8px; padding:9px 14px; font-size:12px; font-weight:600; color:var(--muted); cursor:pointer; font-family:'Noto Sans JP',sans-serif; transition:all 0.15s; white-space:nowrap; position:relative; }
.nav-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.nav-badge { position:absolute; top:-6px; right:-6px; background:var(--red); color:#fff; border-radius:50%; width:18px; height:18px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; }

/* ── ページ ── */
.page { display:none; padding:0 20px 120px; }
.page.show { display:block; }

/* ── カード ── */
.card { background:var(--s2); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:10px; cursor:pointer; transition:all 0.15s; }
.card:active { background:var(--s3); }
.card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.card-title { font-size:13px; font-weight:700; color:var(--text); margin-bottom:4px; }
.card-subtitle { font-size:11px; color:var(--muted); }
.card-tags { display:flex; flex-wrap:wrap; gap:4px 6px; margin-bottom:8px; }
.tag { display:inline-block; padding:3px 8px; border-radius:8px; font-size:10px; font-weight:600; white-space:nowrap; }
.tag-type { background:rgba(59,130,246,0.15); color:var(--blue); }
.tag-importance { background:rgba(239,68,68,0.15); color:var(--red); }
.tag-importance-medium { background:rgba(245,158,11,0.15); color:var(--yellow); }
.tag-importance-low { background:rgba(34,197,94,0.15); color:var(--green); }
.tag-status { background:rgba(168,85,247,0.15); color:var(--purple); }
.tag-section { background:rgba(107,114,128,0.2); color:var(--muted); }
.card-content { font-size:12px; color:var(--muted); line-height:1.5; max-height:60px; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.card-footer { display:flex; justify-content:space-between; align-items:center; font-size:10px; color:var(--muted); margin-top:8px; }

/* ── ステータスバッジ ── */
.status-badge { display:inline-block; padding:3px 8px; border-radius:8px; font-size:10px; font-weight:600; }
.status-active { background:rgba(34,197,94,0.15); color:var(--green); }
.status-considering { background:rgba(245,158,11,0.15); color:var(--yellow); }
.status-meeting { background:rgba(59,130,246,0.15); color:var(--blue); }
.status-resolved { background:rgba(107,114,128,0.2); color:var(--muted); }

/* ── フィルターチップ ── */
.filter-chips { display:flex; gap:6px; margin-bottom:8px; }
.chip { flex:1; text-align:center; background:var(--s2); border:1px solid var(--border); border-radius:8px; padding:9px 6px; font-size:11px; font-weight:600; color:var(--muted); cursor:pointer; transition:all 0.15s; white-space:nowrap; }
.chip.active { background:var(--accent); color:#fff; border-color:var(--accent); }

/* ── 詳細パネル ── */
.detail-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:90; }
.detail-overlay.show { display:block; }
.detail-sheet { display:none; position:fixed; bottom:0; left:0; right:0; background:var(--bg); border-radius:20px 20px 0 0; width:100%; max-width:480px; max-height:85vh; overflow-y:auto; padding:24px 20px 32px; z-index:95; animation:slideUp 0.3s ease-out; }
.detail-sheet.show { display:block; }
@keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
.detail-close-btn { position:absolute; top:12px; right:12px; background:var(--s2); border:1px solid var(--border); border-radius:8px; width:32px; height:32px; color:var(--text); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.detail-close-btn:active { background:var(--s3); }
.detail-title { font-size:18px; font-weight:700; margin-bottom:16px; padding-right:40px; }

.detail-tag-group { display:flex; flex-wrap:wrap; gap:4px 6px; }

.reply-section { margin-top:18px; border-top:1px solid var(--border); padding-top:14px; }

.reply-input { flex:1; background:var(--s2); border:1.5px solid var(--border); border-radius:10px; padding:10px 12px; font-size:13px; color:var(--text); outline:none; font-family:inherit; resize:none; min-height:20px; max-height:100px; overflow-y:auto; }

.detail-btn { width:100%; padding:12px; border:1.5px solid var(--border); background:var(--s2); color:var(--text); border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.15s; }
.detail-btn:active { background:var(--s3); }
.detail-btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
.detail-btn.danger { background:rgba(239,68,68,0.15); color:var(--red); }

/* ── フォーム ── */
.form-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100; justify-content:center; align-items:flex-end; }
.form-overlay.show { display:flex; }
.form-sheet { background:var(--bg); border-radius:20px 20px 0 0; width:100%; max-width:480px; max-height:85vh; overflow-y:auto; padding:20px 20px 32px; }
.form-title { font-size:16px; font-weight:700; margin-bottom:16px; }

.form-label { font-size:11px; color:var(--muted); font-weight:600; margin-bottom:5px; }
.form-input { width:100%; background:var(--s2); border:1.5px solid var(--border); border-radius:10px; padding:12px 14px; font-size:14px; color:var(--text); outline:none; font-family:inherit; }
.form-input:focus { border-color:var(--accent); }
.form-select { width:100%; background:var(--s2); border:1.5px solid var(--border); border-radius:10px; padding:12px 14px; font-size:14px; color:var(--text); outline:none; font-family:inherit; appearance:none; }
.form-select:focus { border-color:var(--accent); }
.form-textarea { width:100%; background:var(--s2); border:1.5px solid var(--border); border-radius:10px; padding:12px 14px; font-size:14px; color:var(--text); outline:none; font-family:inherit; resize:vertical; min-height:100px; }
.form-textarea:focus { border-color:var(--accent); }
.form-btn { width:100%; background:var(--accent); border:none; border-radius:10px; padding:14px; color:#fff; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; margin-top:8px; }
.form-btn:disabled { opacity:0.4; cursor:default; }
.form-btn-cancel { width:100%; background:var(--s3); border:1px solid var(--border2); border-radius:10px; padding:12px; color:var(--text); font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; margin-top:6px; }

/* ── ローディング ── */
.loading { text-align:center; padding:40px 20px; color:var(--muted); font-size:13px; }
.loading::before { content:''; display:block; width:28px; height:28px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── 空状態 ── */
.empty-state { text-align:center; padding:40px 20px; color:var(--muted); font-size:13px; line-height:1.8; }

/* ── トースト ── */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--s2); border:1px solid var(--border); border-radius:10px; padding:12px 16px; font-size:12px; color:var(--text); z-index:200; max-width:90%; word-break:break-word; animation:slideUpToast 0.3s ease-out; }

.toast.error { background:rgba(239,68,68,0.15); border-color:var(--red); color:var(--red); }

.fab { position:fixed; bottom:24px; right:24px; width:52px; height:52px; border-radius:50%; background:var(--accent); border:none; color:#fff; font-size:28px; font-weight:300; cursor:pointer; box-shadow:0 4px 16px rgba(0,0,0,0.4); display:none; align-items:center; justify-content:center; z-index:50; }

/* ── オークションカード ── */

.auth-error { display:none; text-align:center; padding:60px 20px; }

function checkAccess() {
  try {
    const raw = localStorage.getItem('foo_portal_session');
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (new Date(data.expires) < new Date()) return false;
    if (data.apps && data.apps.marketing === true) {
      currentUserName = data.name || '';
      return true;
    }
    return false;
  } catch(e) { return false; }
}

async function notionAPI(method, path, body) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 20000);
  try {
    const res = await fetch(PROXY + path, {
      method, headers: { 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined, signal: ctrl.signal
    });
    clearTimeout(timer);
    const data = await res.json();
    if (data.object === 'error') throw new Error(data.message);
    return data;
  } catch(e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') throw new Error('タイムアウト');
    throw new Error('通信エラー: ' + e.message);
  }
}

async function queryAll(dbId, body) {
  let all = [], cursor = null;
  while (true) {
    const b = { ...body, page_size: 100 };
    if (cursor) b.start_cursor = cursor;
    const res = await notionAPI('POST', `/databases/${dbId}/query`, b);
    all = all.concat(res.results || []);
    if (!res.has_more) break;
    cursor = res.next_cursor;
  }
  return all;
}

function escapeHtml(text) {
  if (!text) return '';
  return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function getPropValue(page, prop) {
  const p = page.properties[prop];
  if (!p) return null;
  switch(p.type) {
    case 'title': return p.title.map(t => t.plain_text).join('');
    case 'rich_text': return p.rich_text.map(t => t.plain_text).join('');
    case 'select': return p.select?.name || null;
    case 'multi_select': return p.multi_select?.map(s => s.name) || [];
    case 'date': return p.date?.start || null;
    case 'checkbox': return p.checkbox;
    case 'number': return p.number;
    case 'status': return p.status?.name || null;
    default: return null;
  }
}

function showToast(msg, type = 'default') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

function toggleTheme() {
  const cur = localStorage.getItem('foo_portal_theme') || 'auto';
  const next = cur === 'dark' ? 'light' : 'dark';
  localStorage.setItem('foo_portal_theme', next);
  document.documentElement.setAttribute('data-theme', next);
  updateThemeButton();
}

function updateThemeButton() {
  const theme = localStorage.getItem('foo_portal_theme') || 'auto';
  const btn = document.getElementById('theme-toggle');
  if (theme === 'light') btn.textContent = '☀️';
  else btn.textContent = '🌙';
}

function renderNav() {
  const nav = document.getElementById('nav');

function switchTab(id) {
  currentTab = id;
  currentFilter = 'all';
  snsFilter = 'all';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
  document.getElementById('page-' + id).classList.add('show');
  renderNav();
  closeDetail();
  const fab = document.getElementById('fab');
  if (id === 'auction') fab.classList.remove('show');
  else fab.classList.add('show');
  if (id === 'comm') loadComm();
  else if (id === 'auction') loadAuctionList();
  else if (id === 'sns') loadSNS();
}

async function loadComm() {
  renderCommFilters();
  const list = document.getElementById('comm-list');
  list.innerHTML = '<div class="loading"></div>';
  try {
    const filter = {};
    if (currentFilter === 'unconfirmed') {
      filter.filter = {
        and: [
          { property: 'ステータス', status: { does_not_equal: '完了' } },
          { property: '確認者', multi_select: { does_not_contain: currentUserName } }
        ]
      };
    } else if (currentFilter === 'sns') {
      filter.filter = { and: [
        { property: 'ステータス', status: { does_not_equal: '完了' } },
        { property: '選択', select: { equals: 'SNS' } }
      ]};
    } else if (currentFilter === 'auction') {
      filter.filter = { and: [
        { property: 'ステータス', status: { does_not_equal: '完了' } },
        { property: '選択', select: { equals: 'オークション' } }
      ]};
    } else if (currentFilter === 'other') {
      filter.filter = { and: [
        { property: 'ステータス', status: { does_not_equal: '完了' } },
        { property: '選択', select: { equals: 'その他' } }
      ]};
    } else if (currentFilter === '未着手') {
      filter.filter = { property: 'ステータス', status: { equals: '未着手' } };
    } else if (currentFilter === '進行中') {
      filter.filter = { property: 'ステータス', status: { equals: '進行中' } };
    } else {
      filter.filter = { property: 'ステータス', status: { does_not_equal: '完了' } };
    }
    filter.sorts = [{ timestamp: 'created_time', direction: 'descending' }];
    const pages = await queryAll(DB.comm, filter);
    if (pages.length === 0) {
      list.innerHTML = '<div class="empty-state">データがありません</div>';
      return;
    }
    const uniquePages = pages.filter((p, i, a) => a.findIndex(x => x.id === p.id) === i);
    await loadReplyCountsForBadge(uniquePages);
    list.innerHTML = '';
    const seen = new Set();
    for (const p of pages) {
      if (seen.has(p.id)) continue;
      seen.add(p.id);
      const title = getPropValue(p, '名前');
      const status = getPropValue(p, 'ステータス');
      const category = getPropValue(p, '選択');
      const content = getPropValue(p, 'テキスト') || getPropValue(p, '説明') || '';
      const author = getPropValue(p, '投稿者') || p.created_by?.name || '';
      const confirmed = getPropValue(p, '確認者') || [];
      const isAuthor = currentUserName && author === currentUserName;
      const needConfirm = !isAuthor && currentUserName && !confirmed.includes(currentUserName);
      const rc = _replyCountCache[p.id] || { total: 0, unseen: 0 };
      const card = document.createElement('div');
      card.className = 'card';
      card.style.position = 'relative';
      let tags = '';
      if (category) tags += '<span class="tag tag-type">' + escapeHtml(category) + '</span>';
      let statusBadge = '';
      if (status) {
        const scs = status === '進行中' ? 'status-active' : status === '未着手' ? 'status-considering' : 'status-resolved';
        statusBadge = '<span class="status-badge ' + scs + '">' + escapeHtml(status) + '</span>';
      }
      const authorHtml = author ? '<span style="font-size:10px;color:var(--accent);font-weight:600;">' + escapeHtml(author) + '</span>' : '';
      const unreadDot = needConfirm ? '<span style="position:absolute;top:8px;right:8px;width:10px;height:10px;background:var(--red);border-radius:50%;"></span>' : '';
      let confirmedHtml = '';
      if (confirmed.length > 0) {
        confirmedHtml = '<div style="margin-top:6px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;"><span style="font-size:10px;color:var(--green);">✓</span>';
        for (const c of confirmed) confirmedHtml += '<span style="font-size:10px;color:var(--green);font-weight:600;">' + escapeHtml(c) + '</span>';
        confirmedHtml += '</div>';
      }
      const replyBadge = rc.total > 0 ? '<span class="reply-badge' + (rc.unseen > 0 ? ' unseen' : '') + '">💬 ' + rc.total + '</span>' : '';
      card.innerHTML = unreadDot +
        '<div class="card-header"><div><div class="card-title">' + escapeHtml(title) + replyBadge + '</div>' + authorHtml + '</div><div>' + statusBadge + '</div></div>' +
        '<div class="card-tags">' + tags + '</div>' +
        '<div class="card-content">' + escapeHtml(content) + '</div>' +
        confirmedHtml +
        '<div class="card-footer"><div></div></div>';
      card.onclick = () => showCommDetail(p);
      list.appendChild(card);
    }
    updateNavBadge();
  } catch(e) {
    list.innerHTML = '<div class="empty-state">' + escapeHtml(e.message) + '<br><button style="background:var(--accent);color:#fff;border:none;border-radius:6px;padding:8px 12px;margin-top:12px;cursor:pointer;font-size:12px;font-weight:600;" onclick="loadComm()">再試行</button></div>';
  }
}

// ─── 返信機能（返信DB方式）─────────────────────────────────────────────────────
async function loadReplies(pageId) {
  const listEl = document.getElementById('reply-list');
  const countEl = document.getElementById('reply-count');
  try {
    const res = await notionAPI('POST', `/databases/${DB.reply}/query`, {
      filter: { property: '投稿ID', rich_text: { equals: pageId } },
      sorts: [{ timestamp: 'created_time', direction: 'ascending' }]
    });
    const replies = res.results || [];
    if (replies.length === 0) {
      listEl.innerHTML = '<div class="reply-empty">まだ返信はありません</div>';
      countEl.style.display = 'none';
    } else {
      countEl.textContent = replies.length;
      countEl.style.display = 'inline-block';
      listEl.innerHTML = '';
      for (const r of replies) {
        const body = (r.properties['返信内容']?.title || []).map(t => t.plain_text).join('');
        const author = (r.properties['投稿者']?.rich_text || []).map(t => t.plain_text).join('');
        const createdAt = r.created_time ? new Date(r.created_time) : null;
        const timeStr = createdAt ? `${createdAt.getMonth()+1}/${createdAt.getDate()} ${String(createdAt.getHours()).padStart(2,'0')}:${String(createdAt.getMinutes()).padStart(2,'0')}` : '';
        const isMine = currentUserName && author === currentUserName;
        const el = document.createElement('div');
        el.className = 'reply-item' + (isMine ? ' mine' : '');
        el.innerHTML =
          (author ? '<div class="reply-author" style="color:' + (isMine ? 'var(--accent)' : 'var(--blue)') + ';">' + escapeHtml(author) + '</div>' : '') +
          '<div class="reply-text">' + escapeHtml(body) + '</div>' +
          '<div class="reply-time">' + escapeHtml(timeStr) + '</div>';
        listEl.appendChild(el);
      }
      listEl.scrollTop = listEl.scrollHeight;
    }
    markRepliesSeen(pageId, replies.length);
  } catch(e) {
    listEl.innerHTML = '<div class="reply-empty">返信の読み込みに失敗しました</div>';
    console.error('loadReplies error:', e);
  }
}

async function submitReply() {
  if (!detailData || !currentUserName) { showToast('ログインが必要です', 'error'); return; }
  const input = document.getElementById('reply-input');
  const btn = document.getElementById('reply-send');
  const text = input.value.trim();
  if (!text) return;
  btn.disabled = true; btn.textContent = '送信中…';
  try {
    await notionAPI('POST', '/pages', {
      parent: { database_id: DB.reply },
      properties: {
        '返信内容': { title: [{ text: { content: text } }] },
        '投稿ID':   { rich_text: [{ text: { content: detailData.id } }] },
        '投稿者':   { rich_text: [{ text: { content: currentUserName } }] },
      }
    });
    input.value = '';
    input.style.height = 'auto';
    showToast('返信しました', 'success');
    await loadReplies(detailData.id);
  } catch(e) {
    showToast('送信エラー: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '送信';
  }
}

function getReplySeenMap() {
  try { return JSON.parse(localStorage.getItem('foo_marketing_reply_seen') || '{}'); } catch(e) { return {}; }
}
function markRepliesSeen(pageId, count) {
  const map = getReplySeenMap();
  map[pageId] = count;
  localStorage.setItem('foo_marketing_reply_seen', JSON.stringify(map));
}

let _replyCountCache = {};
async function loadReplyCountsForBadge(pages) {
  _replyCountCache = {};
  const seenMap = getReplySeenMap();
  try {
    const pageIds = pages.slice(0, 50).map(p => p.id);
    const res = await notionAPI('POST', `/databases/${DB.reply}/query`, {
      filter: { or: pageIds.map(id => ({ property: '投稿ID', rich_text: { equals: id } })) },
      page_size: 100
    });
    const replies = res.results || [];
    const countMap = {};
    for (const r of replies) {
      const pid = (r.properties['投稿ID']?.rich_text || []).map(t => t.plain_text).join('');
      if (pid) countMap[pid] = (countMap[pid] || 0) + 1;
    }
    for (const id of pageIds) {
      const total = countMap[id] || 0;
      const seen = seenMap[id] || 0;
      _replyCountCache[id] = { total, unseen: Math.max(0, total - seen) };
    }
  } catch(e) {
    console.error('loadReplyCountsForBadge error:', e);
  }
}

async function showAuctionPage(key) {
  const list = document.getElementById('auction-list');
  if (key === 'sns_req') {
    list.innerHTML = '<button class="auction-back-btn" onclick="loadAuctionList()">← 一覧に戻る</button><div class="loading"></div>';
    try {
      const data = await notionAPI('POST', '/databases/2f0a695f8e8880d8be9ac31af19a9d1c/query', { page_size: 100 });
      let html = '<h1>SNS担当に求めること</h1><hr>';
      const groups = {};
      for (const p of (data.results || [])) {
        const cat = p.properties['業務別']?.select?.name || 'その他';
        const req = p.properties['求めること']?.rich_text?.map(t=>t.plain_text).join('') || '';
        const more = p.properties['さらに求めること']?.rich_text?.map(t=>t.plain_text).join('') || '';
        if (!req) continue;
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push({ req, more });
      }
      const catColors = { 'オークション': 'var(--green)', 'SNS': 'var(--accent)', 'タイヤ関連': 'var(--blue)', '事務': 'var(--purple)', 'Notion': 'var(--yellow)', '求人': 'var(--red)' };
      for (const [cat, items] of Object.entries(groups)) {
        const color = catColors[cat] || 'var(--muted)';
        html += '<h2 style="border-left:4px solid ' + color + ';padding-left:10px;margin-top:20px;">' + escapeHtml(cat) + '</h2>';
        for (const item of items) {
          html += '<div style="background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin:8px 0;">';
          html += '<p style="font-weight:700;margin-bottom:4px;">' + escapeHtml(item.req) + '</p>';
          if (item.more) html += '<p style="font-size:12px;color:var(--muted);">' + escapeHtml(item.more) + '</p>';
          html += '</div>';
        }
      }
      list.innerHTML = '<button class="auction-back-btn" onclick="loadAuctionList()">← 一覧に戻る</button><div class="auction-body">' + html + '</div>';
    } catch(e) {
      list.innerHTML = '<button class="auction-back-btn" onclick="loadAuctionList()">← 一覧に戻る</button><div class="empty-state">' + escapeHtml(e.message) + '</div>';
    }
    return;
  }
  // Static content
  const content = AUCTION_CONTENT[key];
  if (!content) return;
  list.innerHTML = '<button class="auction-back-btn" onclick="loadAuctionList()">← 一覧に戻る</button><div class="auction-body">' + content + '</div>';
}

function renderSNSFilters() {
  const filt = document.getElementById('sns-filters');
  filt.innerHTML = '';
  const filters = [
    { id: 'all', label: '全て' },
    { id: 'unconfirmed', label: '未確認' },
    { id: '未着手', label: '未着手' },
    { id: '進行中', label: '進行中' }
  ];
  for (const f of filters) {
    const chip = document.createElement('button');
    chip.className = 'chip' + (snsFilter === f.id ? ' active' : '');
    chip.textContent = f.label;
    chip.onclick = () => { snsFilter = f.id; loadSNS(); };
    filt.appendChild(chip);
  }
}

async function loadSNS() {
  renderSNSFilters();
  const list = document.getElementById('sns-list');
  list.innerHTML = '<div class="loading"></div>';
  try {
    const filter = {};
    if (snsFilter === 'unconfirmed') {
      filter.filter = {
        and: [
          { property: 'ステータス', status: { does_not_equal: '完了' } },
          { property: '確認者', multi_select: { does_not_contain: currentUserName } }
        ]
      };
    } else if (snsFilter === '未着手') {
      filter.filter = { property: 'ステータス', status: { equals: '未着手' } };
    } else if (snsFilter === '進行中') {
      filter.filter = { property: 'ステータス', status: { equals: '進行中' } };
    } else {
      filter.filter = { property: 'ステータス', status: { does_not_equal: '完了' } };
    }
    filter.sorts = [{ timestamp: 'created_time', direction: 'descending' }];
    const pages = await queryAll(DB.sns, filter);
    if (pages.length === 0) {
      list.innerHTML = '<div class="empty-state">データがありません</div>';
      return;
    }
    list.innerHTML = '';
    const seen = new Set();
    for (const p of pages) {
      if (seen.has(p.id)) continue;
      seen.add(p.id);
      const title = getPropValue(p, '投稿内容');
      const status = getPropValue(p, 'ステータス');
      const platform = getPropValue(p, 'プラットフォーム');
      const category = getPropValue(p, 'カテゴリ');
      const postDate = getPropValue(p, '投稿日');
      const author = getPropValue(p, '投稿者') || p.created_by?.name || '';
      const confirmed = getPropValue(p, '確認者') || [];
      const assignee = getPropValue(p, '担当者');
      const isAuthor = currentUserName && author === currentUserName;
      const needConfirm = !isAuthor && currentUserName && !confirmed.includes(currentUserName);
      const card = document.createElement('div');
      card.className = 'card';
      card.style.position = 'relative';
      let tags = '';
      if (platform) {
        const platformColors = { 'Instagram': 'tag-importance', 'TikTok': 'tag-importance-medium', 'YouTube': 'tag-importance-low', 'X': 'tag-type' };
        tags += '<span class="tag ' + (platformColors[platform] || 'tag-type') + '">' + escapeHtml(platform) + '</span>';
      }
      if (category) tags += '<span class="tag tag-section">' + escapeHtml(category) + '</span>';
      let statusBadge = '';
      if (status) {
        const scs = status === '進行中' ? 'status-active' : status === '未着手' ? 'status-considering' : 'status-resolved';
        statusBadge = '<span class="status-badge ' + scs + '">' + escapeHtml(status) + '</span>';
      }
      const authorHtml = author ? '<span style="font-size:10px;color:var(--accent);font-weight:600;">' + escapeHtml(author) + '</span>' : '';
      const unreadDot = needConfirm ? '<span style="position:absolute;top:8px;right:8px;width:10px;height:10px;background:var(--red);border-radius:50%;"></span>' : '';
      let confirmedHtml = '';
      if (confirmed.length > 0) {
        confirmedHtml = '<div style="margin-top:6px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;"><span style="font-size:10px;color:var(--green);">✓</span>';
        for (const c of confirmed) confirmedHtml += '<span style="font-size:10px;color:var(--green);font-weight:600;">' + escapeHtml(c) + '</span>';
        confirmedHtml += '</div>';
      }
      const dateStr = postDate ? new Date(postDate).toLocaleDateString('ja-JP') : '';
      card.innerHTML = unreadDot +
        '<div class="card-header"><div><div class="card-title">' + escapeHtml(title) + '</div>' + authorHtml + '</div><div>' + statusBadge + '</div></div>' +
        '<div class="card-tags">' + tags + '</div>' +
        (assignee ? '<div style="font-size:10px;color:var(--muted);margin-bottom:4px;">担当: ' + escapeHtml(assignee) + '</div>' : '') +
        confirmedHtml +
        '<div class="card-footer"><div>' + dateStr + '</div></div>';
      card.onclick = () => showSNSDetail(p);
      list.appendChild(card);
    }
    updateSNSBadge();
  } catch(e) {
    list.innerHTML = '<div class="empty-state">' + escapeHtml(e.message) + '<br><button style="background:var(--accent);color:#fff;border:none;border-radius:6px;padding:8px 12px;margin-top:12px;cursor:pointer;font-size:12px;font-weight:600;" onclick="loadSNS()">再試行</button></div>';
  }
}

async function updateSNSBadge() {
  const el = document.getElementById('nav-badge-sns');
  if (!el || !currentUserName) return;
  try {
    const res = await queryAll(DB.sns, {
      filter: {
        and: [
          { property: 'ステータス', status: { does_not_equal: '完了' } },
          { property: '確認者', multi_select: { does_not_contain: currentUserName } }

      '<div class="form-group"><label class="form-label">カテゴリ</label><select class="form-select" id="form-sns-category"><option value="">選択</option><option>作業風景</option><option>商品紹介</option><option>求人</option><option>お知らせ</option><option>その他</option></select></div>' +
      '<div class="form-group"><label class="form-label">担当者</label><select class="form-select" id="form-sns-assignee"><option value="">選択</option><option>藤井</option><option>矢島</option></select></div>' +
      '<div class="form-group"><label class="form-label">投稿日</label><input class="form-input" id="form-sns-date" type="date"></div>' +
      '<div class="form-group"><label class="form-label">説明</label><textarea class="form-textarea" id="form-sns-desc" placeholder=""></textarea></div>' +
      '<button class="form-btn" onclick="submitSNSForm()">追加</button>' +
      '<button class="form-btn-cancel" onclick="closeForm()">キャンセル</button>';
  }
  document.getElementById('form-overlay').classList.add('show');
}

function closeForm() {
  document.getElementById('form-overlay').classList.remove('show');
}

let _submitting = false;
async function submitCommForm() {
  if (_submitting) return;
  _submitting = true;
  const btn = document.querySelector('.form-btn');
  if (btn) { btn.disabled = true; btn.textContent = '送信中...'; }
  const title = document.getElementById('form-comm-title').value.trim();
  const category = document.getElementById('form-comm-category').value;
  const content = document.getElementById('form-comm-content').value.trim();
  const desc = document.getElementById('form-comm-desc').value.trim();
  if (!title) { showToast('タイトルを入力してください', 'error'); _submitting = false; if (btn) { btn.disabled = false; btn.textContent = '追加'; } return; }
  try {
    const props = {
      '名前': { title: [{ text: { content: title } }] },
      '選択': category ? { select: { name: category } } : undefined,
      'テキスト': { rich_text: [{ text: { content: content } }] },
      '説明': desc ? { rich_text: [{ text: { content: desc } }] } : undefined,
      'ステータス': { status: { name: '未着手' } },
      '投稿者': currentUserName ? { select: { name: currentUserName } } : undefined
    };
    // undefinedを除去
    Object.keys(props).forEach(k => { if (props[k] === undefined) delete props[k]; });
    await notionAPI('POST', '/pages', {
      parent: { database_id: DB.comm },
      properties: props
    });
    showToast('追加しました', 'success');
    closeForm();
    loadComm();
  } catch(e) {
    showToast(e.message, 'error');
  } finally {
    _submitting = false;
  }
}

async function submitSNSForm() {
  if (_submitting) return;
  _submitting = true;
  const btn = document.querySelector('.form-btn');
  if (btn) { btn.disabled = true; btn.textContent = '送信中...'; }
  const title = document.getElementById('form-sns-title').value.trim();
  const platform = document.getElementById('form-sns-platform').value;
  const category = document.getElementById('form-sns-category').value;
  const assignee = document.getElementById('form-sns-assignee').value;
  const postDate = document.getElementById('form-sns-date').value;
  const desc = document.getElementById('form-sns-desc').value.trim();
  if (!title) { showToast('投稿内容を入力してください', 'error'); _submitting = false; if (btn) { btn.disabled = false; btn.textContent = '追加'; } return; }
  try {
    const props = {
      '投稿内容': { title: [{ text: { content: title } }] },
      'プラットフォーム': platform ? { select: { name: platform } } : undefined,
      'カテゴリ': category ? { select: { name: category } } : undefined,
      '担当者': assignee ? { select: { name: assignee } } : undefined,
      '投稿日': postDate ? { date: { start: postDate } } : undefined,
      '説明': desc ? { rich_text: [{ text: { content: desc } }] } : undefined,
      'ステータス': { status: { name: '未着手' } },
      '投稿者': currentUserName ? { select: { name: currentUserName } } : undefined
    };
    Object.keys(props).forEach(k => { if (props[k] === undefined) delete props[k]; });
    await notionAPI('POST', '/pages', {
      parent: { database_id: DB.sns },
      properties: props
    });
    showToast('追加しました', 'success');
    closeForm();
    loadSNS();
  } catch(e) {
    showToast(e.message, 'error');
  } finally {
    _submitting = false;
  }
}

// ════════════════════════════════════════════════════════════════════════════════
// 初期化
// ════════════════════════════════════════════════════════════════════════════════

function init() {
  if (!checkAccess()) {
    document.getElementById('auth-error').classList.add('show');
    document.getElementById('app').style.display = 'none';
    return;
  }
  document.getElementById('auth-error').classList.remove('show');
  document.getElementById('app').style.display = 'block';
  updateThemeButton();
  document.getElementById('theme-toggle').onclick = toggleTheme;
  renderNav();
  document.getElementById('fab').classList.add('show');
  loadComm();
  document.getElementById('detail-overlay').onclick = closeDetail;
}

init();
</script>
