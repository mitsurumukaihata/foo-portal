<style>

<body>
<h1>🔧 商品マスタ パース＆振り分けツール</h1>

<div class="controls">
  <button class="btn-primary" onclick="fetchAll()" id="btnFetch">① 全件取得＆パース</button>
  <button class="btn-secondary" onclick="showPreview()" id="btnPreview" disabled>② プレビュー確認</button>
  <button class="btn-danger" onclick="applyAll()" id="btnApply" disabled>③ Notionに書き込み</button>
</div>

<div class="stats">
  <div class="stat-card"><div class="stat-num" id="sTotal">-</div><div class="stat-label">総件数</div></div>
  <div class="stat-card"><div class="stat-num" id="sParsed">-</div><div class="stat-label">パース成功</div></div>

  <div class="stat-card"><div class="stat-num" id="sNoMatch">-</div><div class="stat-label">要確認</div></div>
  <div class="stat-card"><div class="stat-num" id="sWritten">-</div><div class="stat-label">書込完了</div></div>
</div>

<div id="log"></div>

<div class="tab-bar">
  <div class="tab active" onclick="switchTab('parsed')">パース結果</div>
  <div class="tab" onclick="switchTab('nomatch')">要確認</div>
  <div class="tab" onclick="switchTab('skip')">スキップ</div>
</div>
<div id="panel-parsed" class="panel active"><div class="tbl-wrap" id="tblParsed"></div></div>
<div id="panel-nomatch" class="panel"><div class="tbl-wrap" id="tblNoMatch"></div></div>
<div id="panel-skip" class="panel"><div class="tbl-wrap" id="tblSkip"></div></div>

const DB_ID = '21771ad9a3f0457ea97474b3499ca4a9';

  // ─── 追加パターン（みつさん確認済み） ───
  'C1S':'TOYO','G5':'TOYO','TX':'TOYO','SPORT':'TOYO','CF2':'TOYO',

  'M917':'TOYO','M810':'TOYO','M638':'TOYO','T1R':'TOYO','M666':'TOYO','M166':'TOYO',
  'LuⅡ':'TOYO','LuII':'TOYO','Lu2':'TOYO','M139':'TOYO','C1SA':'TOYO','M628':'TOYO',

  'M748':'BRIDGESTONE','R221Ⅱ':'BRIDGESTONE','R221II':'BRIDGESTONE','R02':'BRIDGESTONE',
  'W900':'BRIDGESTONE',
  'SP068':'DUNLOP',
  'Allroads D':'PIRELLI','TR01':'PIRELLI','R02PFD':'PIRELLI',
};

// ─── メーカー推定（半角カナ対応） ───
const MAKER_HINT = {
  'ﾄｰﾖｰ':'TOYO','トーヨー':'TOYO','TOYO':'TOYO',
  'ﾌﾞﾘﾁﾞｽﾄﾝ':'BRIDGESTONE','ブリヂストン':'BRIDGESTONE','BRIDGESTONE':'BRIDGESTONE','BS':'BRIDGESTONE',
  'ﾀﾞﾝﾛｯﾌﾟ':'DUNLOP','ダンロップ':'DUNLOP','DUNLOP':'DUNLOP','DL':'DUNLOP',
  'ﾐｼｭﾗﾝ':'MICHELIN','ミシュラン':'MICHELIN','MICHELIN':'MICHELIN',
  'ﾋﾟﾚﾘ':'PIRELLI','ピレリ':'PIRELLI','PIRELLI':'PIRELLI',
};

// ─── サイズ正規表現 ───
// ラジアル: 225/80R17.5, 11R22.5, 9R19.5
// バイアス: 7.00R15, 8.25R16
// プライ付き: 145R12 6P, 145R12 8P, 7.00R16 10P
// 小数スラッシュハイフン: 17.5/65-20, 12.5/80-18
// リフト/産業: 500-8, 700-12, 18*7-8, 28*9-15, 7.00-15, 8.25-15
// バン補足: 145/80R12 86/84, 88/86N
const SIZE_RX = /(\d{2,3}[\/.]\d{2}R\d{1,2}[\./]?\d{0,1}(?:[\s\u3000]*\d{1,2}P)?(?:\s*\d{2,3}\/\d{2,3})?|\d{2,3}R\d{1,2}[\./]?\d{0,1}(?:[\s\u3000]*\d{1,2}P)?|\d{1,2}[\./]\d{2}R\d{1,2}[\./]?\d{0,1}(?:[\s\u3000]*\d{1,2}P)?|\d{1,2}\.\d\/\d{2}-\d{1,2}(?:[\./]\d{1,2})?|\d{2,4}[\*x\/]?\d{0,4}-\d{1,2}(?:[\./]\d{1,2})?|\d{1,2}\.\d{1,2}-\d{1,2}(?:[\./]\d{1,2})?)/;

// パターン名をソートして長い順にマッチ（SP688ACE > SP688 > SP68）
const PATTERN_NAMES = Object.keys(MAKER_MAP).sort((a, b) => b.length - a.length);
// 特殊文字エスケープ（+, -, / 等）＆全角数字・Ⅱも考慮
const PATTERN_RX_STR = PATTERN_NAMES.map(p => p.replace(/[.*+?^${}()|[\]\\\/]/g, '\\$&')).join('|');
const PATTERN_RX = new RegExp('(?:^|[\\s　])(' + PATTERN_RX_STR + ')(?=[\\s　]|$)', 'i');
// 全角数字→半角変換後にもマッチするようフォールバック
const PATTERN_RX2 = new RegExp('(?:^|[\\s　])(' + PATTERN_RX_STR + ')(?=[\\s　]|$|\\d)', 'i');

// ─── 商品コードスキップ ───
const SKIP_CODES = ['66'];

// ─── 非タイヤ判定 ───
const SKIP_KEYWORDS = [
  'バランス','ﾊﾞﾗﾝｽ','組替','脱着','Fバランス','廃タイヤ','出張','安全点検',
  'ナット','ﾅｯﾄ','バルブ','ﾊﾞﾙﾌﾞ','プランジャー','ﾌﾟﾗﾝｼﾞｬｰ','ワックス','ﾜｯｸｽ',
  'ゲージ','ｹﾞｰｼﾞ','スプレー','ｽﾌﾟﾚｰ','テープ','ﾃｰﾌﾟ','座金','ｻﾞｶﾞﾈ',
  'ライン引','ﾗｲﾝ引','入替+','ﾁｪｰﾝﾊﾞﾝﾄﾞ','チェーンバンド','ロープ','ﾛｰﾌﾟ',
  'エアゲージ','ARMS専用','ｴｱｹﾞｰｼﾞ','TPP','ビードクリーム','ﾋﾞｰﾄﾞ','シリコン','ｼﾘｺﾝ',
];

let allPages = [];
let parsed = [];   // { page, maker, pattern, size }
let noMatch = [];   // パースできなかったタイヤ
let skipped = [];   // 非タイヤ商品

function log(msg, cls) {
  const el = document.getElementById('log');
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = msg + '\n';
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
}

async function notionQuery(cursor) {
  const body = { page_size: 100 };
  if (cursor) body.start_cursor = cursor;
  const res = await fetch(`${WORKER}/databases/${DB_ID}/query`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return res.json();
}

// ─── 半角カナ→全角カナ変換 ───
function hankakuToZenkaku(str) {
  const map = {'ｱ':'ア','ｲ':'イ','ｳ':'ウ','ｴ':'エ','ｵ':'オ','ｶ':'カ','ｷ':'キ','ｸ':'ク','ｹ':'ケ','ｺ':'コ',
    'ｻ':'サ','ｼ':'シ','ｽ':'ス','ｾ':'セ','ｿ':'ソ','ﾀ':'タ','ﾁ':'チ','ﾂ':'ツ','ﾃ':'テ','ﾄ':'ト',
    'ﾅ':'ナ','ﾆ':'ニ','ﾇ':'ヌ','ﾈ':'ネ','ﾉ':'ノ','ﾊ':'ハ','ﾋ':'ヒ','ﾌ':'フ','ﾍ':'ヘ','ﾎ':'ホ',
    'ﾏ':'マ','ﾐ':'ミ','ﾑ':'ム','ﾒ':'メ','ﾓ':'モ','ﾔ':'ヤ','ﾕ':'ユ','ﾖ':'ヨ',
    'ﾗ':'ラ','ﾘ':'リ','ﾙ':'ル','ﾚ':'レ','ﾛ':'ロ','ﾜ':'ワ','ｦ':'ヲ','ﾝ':'ン',
    'ﾞ':'゛','ﾟ':'゜','ｰ':'ー','｡':'。','｢':'「','｣':'」','､':'、','･':'・'};
  // 濁点・半濁点結合
  let result = '';
  for (let i = 0; i < str.length; i++) {
    const c = str[i];
    const next = str[i + 1];
    if (map[c]) {
      if (next === 'ﾞ') {
        const daku = {'カ':'ガ','キ':'ギ','ク':'グ','ケ':'ゲ','コ':'ゴ','サ':'ザ','シ':'ジ','ス':'ズ','セ':'ゼ','ソ':'ゾ',
          'タ':'ダ','チ':'ヂ','ツ':'ヅ','テ':'デ','ト':'ド','ハ':'バ','ヒ':'ビ','フ':'ブ','ヘ':'ベ','ホ':'ボ','ウ':'ヴ'};
        result += daku[map[c]] || map[c] + '゛';
        i++;
      } else if (next === 'ﾟ') {
        const handaku = {'ハ':'パ','ヒ':'ピ','フ':'プ','ヘ':'ペ','ホ':'ポ'};
        result += handaku[map[c]] || map[c] + '゜';
        i++;
      } else {
        result += map[c];
      }
    } else {
      result += c;
    }
  }
  return result;
}

// ─── パース1件 ───
function parseItem(title) {
  const orig = title;
  // 全角スペースを半角に統一
  let t = title.replace(/\u3000/g, ' ').trim();

  // 非タイヤチェック
  const tUpper = hankakuToZenkaku(t).toUpperCase();
  for (const kw of SKIP_KEYWORDS) {
    if (tUpper.includes(kw.toUpperCase()) || t.includes(kw)) {
      return { type: 'skip', reason: kw };
    }
  }

  // チューブ判定
  if (/^チューブ|^ﾁｭｰﾌﾞ[^ﾚ]/i.test(t)) {
    return { type: 'skip', reason: 'チューブ' };
  }

  // フラップ判定
  if (/フラップ|ﾌﾗｯﾌﾟ/i.test(t)) {
    return { type: 'skip', reason: 'フラップ' };
  }

  let maker = null;
  let pattern = null;
  let size = null;

  // 1. メーカーヒント
  for (const [hint, m] of Object.entries(MAKER_HINT)) {
    if (t.includes(hint) || hankakuToZenkaku(t).includes(hint)) {
      maker = m;
      break;
    }
  }

  // 2. パターン名マッチ（全角→半角変換後もトライ）
  // 全角数字/カナを半角に変換したバージョンも用意
  let tNorm = t.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
  tNorm = tNorm.replace(/３/g, '3').replace(/＋/g, '+').replace(/Ⅱ/g, 'II');

  let pm = t.match(PATTERN_RX) || t.match(PATTERN_RX2) || tNorm.match(PATTERN_RX) || tNorm.match(PATTERN_RX2);
  // フォールバック1: スペース含みパターン（"Allroads D"等）を文字列含有でチェック
  if (!pm) {
    for (const pn of PATTERN_NAMES) {
      if (pn.includes(' ') && (t.includes(pn) || tNorm.includes(pn) || t.toLowerCase().includes(pn.toLowerCase()))) {
        pm = [null, pn]; break;
      }
    }
  }
  // フォールバック2: スペース区切りの各トークンをMAKER_MAPで直接照合
  if (!pm) {
    const tokens = tNorm.split(/[\s　]+/);
    for (const tok of tokens) {
      const key = PATTERN_NAMES.find(p => p.toLowerCase() === tok.toLowerCase() || p === tok);
      if (key) { pm = [null, key]; break; }
    }
  }
  if (pm) {
    // 正規化: MAKER_MAPのキーで大文字小文字を揃える
    const matchedRaw = (pm[1] || '').trim();
    const normalized = PATTERN_NAMES.find(p => p.toLowerCase() === matchedRaw.toLowerCase()) || matchedRaw;
    pattern = normalized;
    if (!maker && MAKER_MAP[normalized]) maker = MAKER_MAP[normalized];
  }

  // 3. サイズマッチ
  const sm = t.match(SIZE_RX);
  if (sm) {
    size = sm[1].replace(/[\s\u3000]+/g, ' ').trim();
    // 半角数字に統一（全角数字→半角）
    size = size.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
    // 全角P→半角P
    size = size.replace(/Ｐ/g, 'P');
  }

  // 「リフト」「ﾘﾌﾄ」の場合、サイズだけ抽出してスキップしない
  if (!pattern && (/リフト|ﾘﾌﾄ/.test(t))) {
    // リフトタイヤ: パターンなし、サイズのみ
    if (size) return { type: 'parsed', maker: maker || null, pattern: null, size };
  }

  // 「更新タイヤ」「更生タイヤ」「再生タイヤ」の場合 → パターン名として設定
  if (!pattern && /更新タイヤ|更生タイヤ|再生タイヤ|更新|更生|再生/.test(t)) {
    pattern = '更生タイヤ';
    if (size) return { type: 'parsed', maker: maker || null, pattern, size };
  }

  // サイズだけの商品名（パターンなし）→タイヤとして扱う
  if (!pattern && size) {
    // サイズが取れていればタイヤ商品として振り分け（パターン空白）
    return { type: 'parsed', maker: maker || null, pattern: null, size };
  }

  // パターンもサイズも取れなかった
  if (!pattern && !size) {
    // 数字が含まれてたらタイヤっぽい→要確認
    if (/\d{2,}/.test(t)) {
      return { type: 'nomatch' };
    }
    return { type: 'skip', reason: '非タイヤ' };
  }

  return { type: 'parsed', maker, pattern, size };
}

async function fetchAll() {
  document.getElementById('btnFetch').disabled = true;
  allPages = []; parsed = []; noMatch = []; skipped = [];
  document.getElementById('log').innerHTML = '';
  log('商品マスタDB 全件取得中...', 'log-info');

  let cursor = null;
  let page = 0;
  while (true) {
    const res = await notionQuery(cursor);
    if (res.object === 'error') { log('ERROR: ' + res.message, 'log-err'); break; }
    allPages.push(...(res.results || []).filter(r => !r.archived));
    page++;
    log(`  ${page}回目: ${res.results?.length || 0}件取得 (累計 ${allPages.length})`, 'log-info');
    if (!res.has_more) break;
    cursor = res.next_cursor;
  }

  log(`\n取得完了: ${allPages.length}件`, 'log-ok');
  log('パース中...', 'log-info');

  for (const p of allPages) {
    const title = (p.properties['商品名']?.title || []).map(t => t.plain_text).join('');
    const code = (p.properties['商品コード']?.rich_text || []).map(t => t.plain_text).join('').trim();

    // 商品コードスキップ
    if (SKIP_CODES.includes(code)) {
      skipped.push({ page: p, title, reason: 'コード' + code + 'スキップ' });
      continue;
    }

    const result = parseItem(title);

    if (result.type === 'parsed') {
      parsed.push({ page: p, title, maker: result.maker, pattern: result.pattern, size: result.size });
    } else if (result.type === 'nomatch') {
      noMatch.push({ page: p, title });
    } else {
      skipped.push({ page: p, title, reason: result.reason });
    }
  }

  // メーカー・パターン未設定を上に表示
  parsed.sort((a, b) => {
    const aMissing = (!a.maker ? 2 : 0) + (!a.pattern ? 1 : 0);
    const bMissing = (!b.maker ? 2 : 0) + (!b.pattern ? 1 : 0);
    return bMissing - aMissing;
  });

  log(`パース完了:`, 'log-ok');
  log(`  ✅ パース成功: ${parsed.length}件`, 'log-ok');
  log(`  ⏭️ 非タイヤ(スキップ): ${skipped.length}件`, 'log-warn');
  log(`  ⚠️ 要確認: ${noMatch.length}件`, 'log-err');

  document.getElementById('sTotal').textContent = allPages.length;
  document.getElementById('sParsed').textContent = parsed.length;
  document.getElementById('sSkip').textContent = skipped.length;
  document.getElementById('sNoMatch').textContent = noMatch.length;

  document.getElementById('btnPreview').disabled = false;
  document.getElementById('btnApply').disabled = false;
  showPreview();
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

function showPreview() {
  // パース結果テーブル
  let html = '<table><thead><tr><th>#</th><th>元の商品名</th><th>メーカー</th><th>パターン名</th><th>サイズコード</th></tr></thead><tbody>';
  parsed.forEach((item, i) => {
    const mc = item.maker ? `maker-${item.maker === 'その他' ? 'other' : item.maker}` : 'maker-other';
    const missing = !item.maker || !item.pattern;
    const rowStyle = missing ? ' style="background:rgba(239,68,68,.12)"' : '';
    const makerCell = item.maker ? `<td class="${mc}">${item.maker}</td>` : `<td style="color:#ef4444;font-weight:700">⚠️ 未設定</td>`;
    const patternCell = item.pattern ? `<td>${esc(item.pattern)}</td>` : `<td style="color:#ef4444;font-weight:700">⚠️ 未設定</td>`;
    html += `<tr${rowStyle}><td>${i+1}</td><td>${esc(item.title)}</td>${makerCell}${patternCell}<td>${esc(item.size || '―')}</td></tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('tblParsed').innerHTML = html;

  // 要確認テーブル
  html = '<table><thead><tr><th>#</th><th>商品名</th><th>メモ</th></tr></thead><tbody>';
  noMatch.forEach((item, i) => {
    html += `<tr><td>${i+1}</td><td class="no-match">${esc(item.title)}</td><td>パターン・サイズ不明</td></tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('tblNoMatch').innerHTML = html;

  // スキップテーブル
  html = '<table><thead><tr><th>#</th><th>商品名</th><th>理由</th></tr></thead><tbody>';
  skipped.forEach((item, i) => {
    html += `<tr><td>${i+1}</td><td>${esc(item.title)}</td><td>${esc(item.reason)}</td></tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('tblSkip').innerHTML = html;
}

function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function applyAll() {
  if (!confirm(`パース成功 ${parsed.length}件 をNotionに書き込みます。よろしいですか？\n\n※ 元の商品名は変更しません`)) return;

  document.getElementById('btnApply').disabled = true;
  let written = 0;
  let errors = 0;

  log('\n=== Notion書き込み開始 ===', 'log-info');

  // 並列数制限付きで書き込み
  const CONCURRENCY = 3;
  const queue = [...parsed];

  async function worker() {
    while (queue.length > 0) {
      const item = queue.shift();
      if (!item) break;

      const props = {};
      if (item.maker) {
        props['メーカー'] = { select: { name: item.maker } };
      }
      if (item.pattern) {
        props['パターン名'] = { rich_text: [{ text: { content: item.pattern } }] };
      }
      if (item.size) {
        props['サイズコード'] = { rich_text: [{ text: { content: item.size } }] };
      }

      // プロパティが空なら skip
      if (Object.keys(props).length === 0) {
        written++;
        return;
      }

      try {
        const res = await fetch(`${WORKER}/pages/${item.page.id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ properties: props }),
        });
        const data = await res.json();
        if (data.object === 'error') throw new Error(data.message);
        written++;
        if (written % 50 === 0) {
          log(`  ${written}/${parsed.length} 完了...`, 'log-info');
        }
      } catch (e) {
        errors++;
        log(`  ERROR [${item.title}]: ${e.message}`, 'log-err');
      }

      document.getElementById('sWritten').textContent = written;
      // Rate limit対策: 少し待つ
      await new Promise(r => setTimeout(r, 350));
    }
  }

  const workers = [];
  for (let i = 0; i < CONCURRENCY; i++) workers.push(worker());
  await Promise.all(workers);

  log(`\n=== 書き込み完了 ===`, 'log-ok');
  log(`  ✅ 成功: ${written}件`, 'log-ok');
  if (errors > 0) log(`  ❌ エラー: ${errors}件`, 'log-err');

  document.getElementById('sWritten').textContent = written;
}
</script>
