  --text: #e8e8e8;
  --muted: #888;

body {

/* ────── Login Screen ────── */

.staff-grid {

.staff-btn {

.staff-btn:active { transform: scale(0.97); }

.pin-area { display: none; flex-direction: column; gap: 12px; }

.pin-display {

.pin-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 8px; }

.pin-dot.filled { background: var(--accent); border-color: var(--accent); }

.pin-btn {

/* ────── Main App ────── */

.back-btn {

}

/* ────── Main Screen ────── */

.summary-card {

.summary-card:active {

}

.summary-card:hover {

.card-header {

}

.card-warehouse {

/* ────── Progress Bar ────── */

  left: 0;
  right: 0;

  flex-direction: column;

  align-items: center;

}

}

.progress-box {

}

.progress-bar {

  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 8px;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  width: 0%;

.progress-detail {

/* ────── PDF Template (hidden) ────── */
#pdf-template {

}

.pdf-page {

}

.pdf-sys-qty {

.pdf-actual-qty {

.qty-circle {

}

@media print {
  body { padding: 0; margin: 0; }
  #pdf-template { display: block; }
  .button-area, .app-header, #login-screen { display: none; }

</style>

<body>

<div id="login-screen" style="display:none;"></div>

<!-- ════════ MAIN APP ════════ -->
<div id="app">
  <div class="app-header">

  <button class="btn btn-primary" id="collect-btn">集計する</button>
  <button class="btn btn-primary" id="pdf-btn" style="display:none;">PDF発行</button>
</div>

<!-- ════════ PDF TEMPLATE ════════ -->
<div id="pdf-template"></div>

<script src="foo-common.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
const PROXY = 'https://notion-proxy.33322666666mm.workers.dev';
const MASTER_DB = '08c5405729794337886b3565352ef96a';

// ════════ MANUFACTURER MAPPING ════════
const MAKER_MAP = {
  'M646':'TOYO', 'M676':'TOYO', 'M125':'TOYO', 'M317':'TOYO', 'M323':'TOYO', 'M319':'TOYO',
  'M320':'TOYO', 'M619':'TOYO', 'M626':'TOYO', 'M888':'TOYO', 'M899':'TOYO', 'M801':'TOYO',
  'M746':'TOYO', 'M634':'TOYO', 'M135':'TOYO', 'M134e':'TOYO', 'M131':'TOYO', 'M614':'TOYO',
  'M804':'TOYO', 'M929':'TOYO', 'M919':'TOYO', 'M966':'TOYO', 'M920':'TOYO', 'M939':'TOYO',
  'M935':'TOYO', 'M937':'TOYO', 'M934':'TOYO', 'M501':'TOYO', 'M504':'TOYO', 'M519':'TOYO',
  'M890':'TOYO', 'W910':'TOYO', 'W900S':'TOYO', 'W911':'TOYO', 'W970':'TOYO', 'W999':'TOYO',
  'W989':'TOYO',
  'R225':'BS', 'R241':'BS', 'R207':'BS', 'R710':'BS', 'K370':'BS',
  'V600':'BS', 'W300':'BS', 'V03e':'BS', 'V02e':'BS', 'G-8':'BS', 'G-8P':'BS', 'G-15':'BS',
  'SP680':'DL', 'SP122':'DL', 'SP001':'DL', 'SP081':'DL', 'SP088':'DL',
  'SPLT50':'DL', 'SPLT21':'DL', 'SPLT22':'DL', 'SP185':'DL', 'LV01':'DL', 'LT01':'DL',
  'G539':'DL', 'VL10A':'DL', 'VAN01':'DL', 'SV01':'DL',
  'XJE4':'MC', 'XDW':'MC',
  'RTM919':'RT', 'RTM810':'RT', 'RTM804':'RT', 'RTM807':'RT', 'RTM81C-170':'RT',
  'RTM890':'RT', 'RTW910':'RT', 'RTW911':'RT', 'RTW970':'RT', 'RTG610':'RT',
};

const MAKER_LABEL = { 'TOYO':'TOYO', 'BS':'BRIDGESTONE', 'DL':'DUNLOP', 'MC':'MICHELIN', 'RT':'再生' };

const DB_CATEGORIES = [
  { key: 'ltl_normal',   name: 'LTL TB ノーマル',     wField: '倉庫', season: 'ノーマル', vehicle: '大型' },
  { key: 'ltl_studless', name: 'LTL TB スタッドレス',  wField: '倉庫', season: 'スタッドレス', vehicle: '大型' },
  { key: 'lts_normal',   name: 'LTS ノーマル',        wField: '倉庫', season: 'ノーマル', vehicle: '小型' },
  { key: 'lts_studless', name: 'LTS スタッドレス',     wField: '倉庫', season: 'スタッドレス', vehicle: '小型' },
  { key: 'rt',           name: 'RT 再生',             wField: '倉庫', season: '再生', vehicle: '再生' },
  { key: 'tt',           name: 'T/T チューブタイプ',   wField: '倉庫', season: 'チューブ', vehicle: 'チューブ' },
  { key: 'van',          name: 'バン',                wField: '出庫倉庫', season: 'バン', vehicle: 'バン' },
];

let stockData = {}; // warehouse -> category -> pattern -> size -> qty
let staffList = [];
let selectedStaff = null;
let pinInput = '';

// ════════ SESSION & THEME ════════
function loadSession() {
  try { return JSON.parse(localStorage.getItem('foo_user')); } catch(e) { return null; }
}

function applyTheme() {
  const theme = localStorage.getItem('foo_theme');
  if (theme) document.documentElement.setAttribute('data-theme', theme);
}

// ════════ INIT (ログイン不要 — ポータルセッションを使う) ════════
async function initLogin() {
  const session = loadSession();
  selectedStaff = session || { name: 'ゲスト' };
  showApp();
}

// ログイン関連のJS削除済み（ポータルセッション使用）

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  const today = new Date();
  const dateStr = today.getFullYear() + '年' + (today.getMonth() + 1) + '月' + today.getDate() + '日';
  document.getElementById('app-date').textContent = dateStr;
}

// ════════ QUERY ALL RECORDS ════════
async function queryAllRecords(dbId, wField) {
  let all = [];
  let cursor = undefined;
  let page = 0;

  do {
    const body = { page_size: 100 };
    if (cursor) body.start_cursor = cursor;

    const res = await fetch(`${PROXY}/databases/${dbId}/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    all = all.concat(data.results || []);
    cursor = data.has_more ? data.next_cursor : null;
    page++;
  } while (cursor);

  return all;
}

// ════════ COLLECT DATA ════════
async function collectData() {
  document.getElementById('collect-btn').disabled = true;
  showProgress(true);

  stockData = {};
  const total = DB_CATEGORIES.length;

  try {
    for (let i = 0; i < total; i++) {
      const cat = DB_CATEGORIES[i];
      const dbInfo = FOO_DB_BY_KEY[cat.key];

      if (!dbInfo) {
        console.warn('DB not found:', cat.key);
        continue;
      }

      updateProgress(i / total, `${cat.name} を読み込み中...`);

      const records = await queryAllRecords(dbInfo.stockId, cat.wField);

      records.forEach(r => {
        const kubun = fooPropStr(r, '区分');
        const qty = parseInt(fooPropStr(r, '数量')) || 0;
        const size = fooPropStr(r, 'サイズコード');
        const pattern = fooPropStr(r, 'パターン名');
        const warehouse = fooPropStr(r, cat.wField);

        if (!kubun || !size || !pattern || !warehouse || warehouse === '未定') return;

        const sign = FOO_KUBUN_SIGN[kubun] ?? 0;
        if (sign === 0) return; // 発注中は除外

        const calcQty = qty * sign;

        if (!stockData[warehouse]) stockData[warehouse] = {};
        if (!stockData[warehouse][cat.name]) stockData[warehouse][cat.name] = {};
        if (!stockData[warehouse][cat.name][pattern]) stockData[warehouse][cat.name][pattern] = {};
        if (!stockData[warehouse][cat.name][pattern][size]) stockData[warehouse][cat.name][pattern][size] = 0;

        stockData[warehouse][cat.name][pattern][size] += calcQty;
      });
    }

    updateProgress(1, 'グラフ作成中...');
    showSummary();

  } catch (e) {
    alert('エラー: ' + e.message);
    console.error(e);
  } finally {
    showProgress(false);
    document.getElementById('collect-btn').disabled = false;
  }
}

function updateProgress(ratio, label, detail) {
  const pct = Math.round(ratio * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = label;
  if (detail) document.getElementById('progress-detail').textContent = detail;
}

function showProgress(show) {
  document.getElementById('progress-overlay').classList.toggle('visible', show);
}

// ════════ SHOW SUMMARY ════════
function showSummary() {
  const container = document.getElementById('summary-container');
  const cards = document.getElementById('summary-cards');

  cards.innerHTML = '';

  const warehouses = Object.keys(stockData).sort();

  warehouses.forEach(wh => {
    const card = document.createElement('div');
    card.className = 'summary-card';

    let totalQty = 0;
    const details = [];

    Object.entries(stockData[wh]).forEach(([catName, patterns]) => {
      let catQty = 0;
      Object.values(patterns).forEach(sizes => {
        Object.values(sizes).forEach(q => { catQty += Math.max(0, q); });
      });
      if (catQty > 0) {
        details.push({ cat: catName, qty: catQty });
        totalQty += catQty;
      }
    });

    card.innerHTML = `
      <div class="card-header">
        <span class="card-warehouse">${wh}</span>
        <span class="card-total">${totalQty}本</span>
      </div>
      <div class="card-toggle" style="color:var(--muted);font-size:11px;">クリックで詳細表示</div>
      <div class="card-details">
        ${details.map(d => `<div class="detail-row"><span class="detail-cat">${d.cat}</span><span>${d.qty}本</span></div>`).join('')}
      </div>
    `;

    card.addEventListener('click', () => {
      card.querySelector('.card-details').classList.toggle('expanded');
    });

    cards.appendChild(card);
  });

  container.style.display = 'block';
  document.getElementById('status-text').textContent = '集計完了 ✓';
  document.getElementById('pdf-btn').style.display = 'block';
}

// ════════ SIZE SORTING ════════
function sortSizes(sizes) {
  return sizes.slice().sort((a, b) => {
    const numA = parseInt(a) || 0;
    const numB = parseInt(b) || 0;
    return numA - numB;
  });
}

// ════════ GENERATE PDF ════════
async function generatePDF() {
  const pdfTemplate = document.getElementById('pdf-template');
  pdfTemplate.innerHTML = '';

  const today = new Date();
  const dateStr = today.getFullYear() + '年' + (today.getMonth() + 1) + '月' + today.getDate() + '日';

  const warehouses = Object.keys(stockData).sort();

  warehouses.forEach((wh, whIdx) => {
    const page = document.createElement('div');
    page.className = 'pdf-page';

    const header = document.createElement('div');
    header.className = 'pdf-header';

    let pageTotal = 0;
    Object.entries(stockData[wh]).forEach(([catName, patterns]) => {
      Object.values(patterns).forEach(sizes => {
        Object.values(sizes).forEach(q => { pageTotal += Math.max(0, q); });
      });
    });

    header.innerHTML = `
      <h2>棚卸表 — ${wh}</h2>
      <div>${dateStr} 合計: ${pageTotal}本</div>
    `;
    page.appendChild(header);

    const columns = document.createElement('div');
    columns.className = 'pdf-columns';

    DB_CATEGORIES.forEach(cat => {
      const catName = cat.name;
      const patterns = stockData[wh][catName];

      if (!patterns) return;

      let catTotal = 0;
      Object.values(patterns).forEach(sizes => {
        Object.values(sizes).forEach(q => { catTotal += Math.max(0, q); });
      });

      if (catTotal === 0) return;

      const block = document.createElement('div');
      block.className = 'pdf-cat-block';

      const catHeader = document.createElement('div');
      catHeader.className = 'pdf-cat-header';
      catHeader.textContent = catName + ' — ' + catTotal + '本';
      block.appendChild(catHeader);

      const makers = {};
      Object.entries(patterns).forEach(([pat, sizes]) => {
        const maker = MAKER_MAP[pat] || 'その他';
        if (!makers[maker]) makers[maker] = {};
        makers[maker][pat] = sizes;
      });

      Object.entries(makers).forEach(([makerKey, makerPatterns]) => {
        if (Object.keys(makers).length > 1) {
          const makerDiv = document.createElement('div');
          makerDiv.className = 'pdf-maker';
          makerDiv.textContent = MAKER_LABEL[makerKey] || makerKey;
          block.appendChild(makerDiv);
        }

        Object.entries(makerPatterns).forEach(([pat, sizes]) => {
          let patTotal = 0;
          Object.values(sizes).forEach(q => { patTotal += Math.max(0, q); });

          if (patTotal === 0) return;

          const patDiv = document.createElement('div');
          patDiv.className = 'pdf-pattern';
          patDiv.innerHTML = `<span class="pdf-pat-name">${pat}</span><span class="pdf-pat-total">${patTotal}</span>`;
          block.appendChild(patDiv);

          sortSizes(Object.keys(sizes)).forEach(size => {
            const q = Math.max(0, sizes[size]);
            if (q === 0) return;

            const row = document.createElement('div');
            row.className = 'pdf-size-row';
            row.innerHTML = `
              <span class="pdf-size">${size}</span>
              <span class="pdf-sys-qty"><span class="qty-circle">${q}</span></span>
              <span class="pdf-actual-qty"></span>
            `;
            block.appendChild(row);
          });
        });
      });

      columns.appendChild(block);
    });

    page.appendChild(columns);
    pdfTemplate.appendChild(page);
  });

  // 一時的に表示（display:noneだとhtml2canvasが白紙になる）
  pdfTemplate.style.display = 'block';
  pdfTemplate.style.position = 'absolute';
  pdfTemplate.style.left = '-9999px';
  pdfTemplate.style.top = '0';

  const opt = {
    margin: 0,
    filename: 'tanaoroshi_' + today.getFullYear() + (today.getMonth()+1).toString().padStart(2,'0') + today.getDate().toString().padStart(2,'0') + '.pdf',
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, logging: false },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { mode: ['css', 'legacy'], avoid: '.pdf-cat-block' },
  };

  try {
    await html2pdf().set(opt).from(pdfTemplate).save();
  } finally {
    pdfTemplate.style.display = 'none';
    pdfTemplate.style.position = '';
    pdfTemplate.style.left = '';
  }
}

// ════════ EVENT LISTENERS ════════
document.getElementById('collect-btn').addEventListener('click', collectData);
document.getElementById('pdf-btn').addEventListener('click', generatePDF);

// ════════ INIT ════════
window.addEventListener('load', initLogin);
</script>
