<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>タスク管理 | f.o.o</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #18181f; --s1: #101015; --s2: #1e1e26; --s3: #26262f;
  --border: #2c2c38; --border2: #3c3c4a; --text: #f0f0f2; --muted: #68687a;
  --accent: #f0a500; --accent2: #f5be40; --green: #22c55e; --red: #ef4444; --blue: #3b82f6; --purple: #a855f7;
}
@media (prefers-color-scheme: light) {
  :root:not([data-theme]) {
    --bg: #fdf6ee; --s1: #ffffff; --s2: #fdf0e4; --s3: #f5e6d4;
    --border: #e8d8c4; --border2: #d8c4a8; --text: #1a1208; --muted: #a08060;
    --accent: #e07000; --accent2: #c05800; --green: #1a9e4a; --red: #dc2626; --blue: #2563eb; --purple: #9333ea;
  }
}
[data-theme="dark"] {
  --bg: #18181f; --s1: #101015; --s2: #1e1e26; --s3: #26262f;
  --border: #2c2c38; --border2: #3c3c4a; --text: #f0f0f2; --muted: #68687a;
  --accent: #f0a500; --accent2: #f5be40; --green: #22c55e; --red: #ef4444; --blue: #3b82f6; --purple: #a855f7;
}
[data-theme="light"] {
  --bg: #fdf6ee; --s1: #ffffff; --s2: #fdf0e4; --s3: #f5e6d4;
  --border: #e8d8c4; --border2: #d8c4a8; --text: #1a1208; --muted: #a08060;
  --accent: #e07000; --accent2: #c05800; --green: #1a9e4a; --red: #dc2626; --blue: #2563eb; --purple: #9333ea;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans JP',sans-serif; min-height:100vh; max-width:480px; margin:0 auto; }

/* ── 認証エラー ── */
#auth-error {
  display:none; min-height:100vh; padding:40px 24px;
  flex-direction:column; justify-content:center;
}
.auth-brand { font-size:10px; color:var(--muted); letter-spacing:0.15em; text-transform:uppercase; margin-bottom:24px; }
.auth-title { font-size:24px; font-weight:900; margin-bottom:12px; letter-spacing:-0.02em; }
.auth-title span { color:var(--accent); }
.auth-sub { font-size:13px; color:var(--muted); line-height:1.7; margin-bottom:28px; }
.auth-btn { display:block; background:var(--accent); border-radius:10px; padding:15px; text-align:center; color:#fff; font-size:15px; font-weight:700; text-decoration:none; }

/* ── ヘッダー ── */
.header { background:var(--s1); border-bottom:0.5px solid var(--border); padding:14px 20px 0; position:sticky; top:0; z-index:100; }
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:2px; }
.header-brand { font-size:10px; color:var(--muted); letter-spacing:0.12em; text-transform:uppercase; }
.header-back { display:flex; align-items:center; gap:4px; color:var(--accent); font-size:14px; font-weight:700; text-decoration:none; padding:4px 0; }
.header-back svg { width:14px; height:14px; }
.header-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.header-title { font-size:17px; font-weight:900; letter-spacing:-0.02em; }
.header-title span { color:var(--accent); }
.header-actions { display:flex; gap:8px; align-items:center; }
.btn-icon { width:32px; height:32px; border-radius:8px; background:var(--s3); border:0.5px solid var(--border); color:var(--text); font-size:15px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.15s; }
.btn-icon:active { transform:scale(0.95); }
.btn-add { background:var(--accent); border:none; border-radius:20px; padding:5px 14px; color:#fff; font-size:12px; font-weight:700; font-family:'Noto Sans JP',sans-serif; cursor:pointer; transition:opacity 0.15s; }
.btn-add:active { opacity:0.8; }

/* ── タブ ── */
.nav { display:flex; background:var(--s1); border-bottom:0.5px solid var(--border); }
.nav-btn { flex:1; padding:10px 6px 8px; background:transparent; border:none; border-bottom:2px solid transparent; color:var(--muted); font-size:12px; font-weight:500; font-family:'Noto Sans JP',sans-serif; cursor:pointer; transition:all 0.15s; text-align:center; }
.nav-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
.nav-badge { display:inline-flex; align-items:center; justify-content:center; min-width:16px; height:16px; padding:0 4px; background:var(--s3); border-radius:8px; font-size:10px; font-weight:700; margin-left:3px; color:var(--muted); }
.nav-btn.active .nav-badge { background:rgba(240,165,0,0.2); color:var(--accent); }
.new-dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--red); margin-left:3px; vertical-align:top; }

/* ── サマリーバー ── */
.summary-bar { display:flex; gap:6px; padding:12px 20px; overflow-x:auto; scrollbar-width:none; }
.summary-bar::-webkit-scrollbar { display:none; }
.summary-chip { flex:none; padding:5px 10px; background:var(--s2); border:0.5px solid var(--border); border-radius:20px; font-size:11px; color:var(--muted); display:flex; align-items:center; gap:5px; }
.summary-chip .dot { width:6px; height:6px; border-radius:50%; }
.dot-red { background:var(--red); }
.dot-yellow { background:var(--accent); }
.dot-green { background:var(--green); }
.dot-blue { background:var(--blue); }

/* ── フィルター ── */
.filter-row { display:flex; gap:6px; padding:0 20px 10px; overflow-x:auto; scrollbar-width:none; }
.filter-row::-webkit-scrollbar { display:none; }
.filter-chip { flex:none; padding:5px 12px; background:var(--s2); border:1.5px solid var(--border); border-radius:20px; font-size:11px; color:var(--muted); cursor:pointer; font-family:'Noto Sans JP',sans-serif; transition:all 0.15s; }
.filter-chip:active { transform:scale(0.97); }
.filter-chip.active { background:rgba(240,165,0,0.1); border-color:var(--accent); color:var(--accent); }

/* ── グループヘッダー ── */
.group-header { padding:14px 20px 6px; font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; display:flex; align-items:center; gap:8px; }
.group-header .count { font-size:10px; font-weight:700; background:var(--s3); color:var(--muted); padding:1px 7px; border-radius:20px; }

/* ── タスクカード ── */
.task-list { padding:0 12px 100px; }
.task-card { background:var(--s2); border:1.5px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:8px; transition:all 0.15s; cursor:pointer; position:relative; }
.task-card:active { transform:scale(0.98); border-color:rgba(240,165,0,0.4); }
.task-card.new-task { border-color:rgba(240,165,0,0.4); }
.new-badge { position:absolute; top:8px; right:8px; background:var(--accent); color:#fff; font-size:9px; font-weight:700; padding:2px 6px; border-radius:20px; letter-spacing:0.05em; }
.task-top { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:8px; }
.task-name { font-size:13px; font-weight:700; line-height:1.4; flex:1; }
.task-status { flex:none; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:700; white-space:nowrap; }
.status-todo { background:var(--s3); color:var(--muted); }
.status-progress { background:rgba(59,130,246,0.12); color:var(--blue); }
.status-done { background:rgba(34,197,94,0.15); color:var(--green); }
.task-meta { display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
.tag { padding:2px 8px; border-radius:20px; font-size:10px; font-weight:700; }
.tag-high { background:rgba(239,68,68,0.12); color:var(--red); }
.tag-mid { background:rgba(240,165,0,0.12); color:var(--accent); }
.tag-low { background:rgba(34,197,94,0.1); color:var(--green); }
.tag-effort { background:rgba(168,85,247,0.1); color:var(--purple); }
.tag-type { background:var(--s3); color:var(--muted); }
.tag-area { background:rgba(59,130,246,0.08); color:var(--blue); }
.tag-season { background:rgba(240,165,0,0.1); color:var(--accent); }
.task-desc { font-size:11px; color:var(--muted); margin-top:6px; line-height:1.5; }

/* ── シーズンチェック ── */
.season-row { display:flex; gap:5px; margin-top:10px; padding-top:10px; border-top:0.5px solid var(--border); flex-wrap:wrap; }
.season-check { display:flex; align-items:center; gap:4px; padding:4px 8px; border-radius:20px; background:var(--s1); border:1px solid var(--border); font-size:10px; color:var(--muted); cursor:pointer; transition:all 0.15s; font-family:'DM Mono','Noto Sans JP',monospace; }
.season-check:active { transform:scale(0.95); }
.season-check.done { background:rgba(240,165,0,0.1); border-color:rgba(240,165,0,0.3); color:var(--accent); }
.season-check .check-icon { font-size:11px; width:13px; text-align:center; }

/* ── 詳細パネル ── */
.overlay { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); opacity:0; pointer-events:none; transition:opacity 0.25s; }
.overlay.open { opacity:1; pointer-events:all; }
.panel { position:fixed; bottom:0; left:50%; z-index:201; transform:translateX(-50%) translateY(100%); width:100%; max-width:480px; max-height:85dvh; overflow-y:auto; background:var(--s1); border-radius:16px 16px 0 0; border-top:0.5px solid var(--border); padding:16px 20px 32px; transition:transform 0.3s cubic-bezier(0.32,0.72,0,1); }
.panel.open { transform:translateX(-50%) translateY(0); }
.panel-handle { width:36px; height:4px; background:var(--s3); border-radius:2px; margin:0 auto 16px; }
.panel-title { font-size:18px; font-weight:900; margin-bottom:18px; letter-spacing:-0.02em; }
.field { margin-bottom:16px; }
.field-label { font-size:10px; font-weight:700; color:var(--muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.1em; }

/* ステータスセレクター */
.status-selector { display:flex; gap:6px; }
.status-opt { flex:1; padding:10px; border-radius:10px; text-align:center; font-size:12px; font-weight:700; border:1.5px solid var(--border); background:var(--s2); color:var(--muted); cursor:pointer; transition:all 0.15s; font-family:'Noto Sans JP',sans-serif; }
.status-opt:active { transform:scale(0.95); }
.status-opt.sel-todo { border-color:var(--muted); color:var(--text); }
.status-opt.sel-progress { border-color:var(--blue); color:var(--blue); background:rgba(59,130,246,0.08); }
.status-opt.sel-done { border-color:var(--green); color:var(--green); background:rgba(34,197,94,0.08); }

/* 詳細シーズンチェック */
.detail-seasons { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.detail-season-btn { display:flex; align-items:center; gap:8px; padding:10px 12px; border-radius:10px; background:var(--s2); border:1.5px solid var(--border); color:var(--muted); font-size:12px; font-weight:600; cursor:pointer; transition:all 0.15s; font-family:'Noto Sans JP',sans-serif; }
.detail-season-btn:active { transform:scale(0.96); }
.detail-season-btn.done { background:rgba(240,165,0,0.1); border-color:rgba(240,165,0,0.3); color:var(--accent); }

/* ── 新規追加パネル ── */
.add-input { width:100%; padding:12px 14px; background:var(--s2); border:1.5px solid var(--border); border-radius:10px; color:var(--text); font-size:14px; font-family:'Noto Sans JP',sans-serif; outline:none; transition:border-color 0.15s; }
.add-input:focus { border-color:var(--accent); }
.add-input::placeholder { color:var(--muted); }
.option-grid { display:flex; flex-wrap:wrap; gap:6px; }
.option-btn { padding:7px 14px; border-radius:20px; background:var(--s2); border:1.5px solid var(--border); color:var(--muted); font-size:12px; font-weight:600; cursor:pointer; transition:all 0.15s; font-family:'Noto Sans JP',sans-serif; }
.option-btn:active { transform:scale(0.95); }
.option-btn.selected { background:rgba(240,165,0,0.1); border-color:var(--accent); color:var(--accent); }
.btn-primary { width:100%; padding:14px; background:var(--accent); border:none; border-radius:10px; color:#fff; font-size:15px; font-weight:700; cursor:pointer; margin-top:16px; transition:opacity 0.15s; font-family:'Noto Sans JP',sans-serif; }
.btn-primary:disabled { opacity:0.4; cursor:default; }
.btn-primary:active { opacity:0.8; }

/* ── トースト ── */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); max-width:400px; width:calc(100% - 40px); background:var(--s2); border:1px solid var(--border); border-radius:10px; padding:12px 16px; font-size:13px; font-weight:500; color:var(--text); z-index:999; text-align:center; transition:transform 0.3s cubic-bezier(0.32,0.72,0,1), opacity 0.3s; opacity:0; }
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
.toast.error { border-color:rgba(239,68,68,0.4); color:var(--red); }
.toast.success { border-color:rgba(34,197,94,0.4); color:var(--green); }

/* ── ローディング ── */
.loading-wrap { text-align:center; padding:48px 20px; }
.spinner { width:28px; height:28px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { font-size:13px; color:var(--muted); }

/* ── テーマ切替 ── */
.theme-toggle { display:flex; gap:4px; background:var(--s2); border:0.5px solid var(--border); border-radius:20px; padding:2px; }
.theme-btn { padding:4px 10px; border-radius:18px; border:none; background:transparent; color:var(--muted); font-size:11px; font-weight:500; cursor:pointer; font-family:'Noto Sans JP',sans-serif; transition:all 0.15s; }
.theme-btn.active { background:var(--accent); color:#fff; }

html { scroll-behavior:smooth; }
</style>
</head>
<body>

<!-- ===== 認証エラー ===== -->
<div id="auth-error">
  <div class="auth-brand">f.o.o · タスク管理</div>
  <div class="auth-title">ログインが<span>必要です</span></div>
  <div class="auth-sub">ポータルからログインしてください。</div>
  <a class="auth-btn" href="https://mitsurumukaihata.github.io/foo-portal/">ポータルへ</a>
</div>

<!-- ===== メインアプリ ===== -->
<div id="app" style="display:none;">
  <div class="header">
    <div class="header-top">
      <div class="header-brand">f.o.o · タスク管理</div>
      <a class="header-back" href="https://mitsurumukaihata.github.io/foo-portal/">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        ポータル
      </a>
    </div>
    <div class="header-row">
      <div class="header-title">タスク<span>管理</span></div>
      <div class="header-actions">
        <div class="theme-toggle" id="themeToggle">
          <button class="theme-btn" data-t="auto" onclick="setTheme('auto')">自動</button>
          <button class="theme-btn" data-t="light" onclick="setTheme('light')">☀</button>
          <button class="theme-btn" data-t="dark" onclick="setTheme('dark')">🌙</button>
        </div>
        <button class="btn-icon" onclick="toggleFilter()" title="フィルター">⚙</button>
        <button class="btn-add" onclick="openAddPanel()">＋ 追加</button>
      </div>
    </div>
  </div>

  <!-- タブ -->
  <div class="nav" id="navTabs"></div>

  <!-- サマリーバー -->
  <div class="summary-bar" id="summaryBar"></div>

  <!-- フィルター -->
  <div class="filter-row" id="filterRow" style="display:none"></div>

  <!-- コンテンツ -->
  <div id="content"></div>
</div>

<!-- ===== 詳細パネル ===== -->
<div class="overlay" id="detailOverlay" onclick="closeDetail()"></div>
<div class="panel" id="detailPanel">
  <div class="panel-handle"></div>
  <div id="detailContent"></div>
</div>

<!-- ===== 新規追加パネル ===== -->
<div class="overlay" id="addOverlay" onclick="closeAddPanel()"></div>
<div class="panel" id="addPanel">
  <div class="panel-handle"></div>
  <div class="panel-title">新規タスク追加</div>
  <div class="field">
    <div class="field-label">タスク名 *</div>
    <input class="add-input" id="addName" placeholder="タスク名を入力">
  </div>
  <div class="field">
    <div class="field-label">シーズン指定 *</div>
    <div class="option-grid" id="addSeason">
      <button class="option-btn selected" data-v="スポット">スポット</button>
      <button class="option-btn" data-v="毎シーズン前">毎シーズン前</button>
      <button class="option-btn" data-v="定期点検">定期点検</button>
    </div>
  </div>
  <div class="field">
    <div class="field-label">タスクの種類 *（複数選択可）</div>
    <div class="option-grid" id="addTypes">
      <button class="option-btn" data-v="作業">作業</button>
      <button class="option-btn" data-v="機械">機械</button>
      <button class="option-btn" data-v="事務">事務</button>
      <button class="option-btn" data-v="車両">車両</button>
      <button class="option-btn" data-v="五日市倉庫">五日市倉庫</button>
      <button class="option-btn" data-v="志和倉庫">志和倉庫</button>
      <button class="option-btn" data-v="倉庫管理">倉庫管理</button>
    </div>
  </div>
  <div class="field">
    <div class="field-label">優先度 *</div>
    <div class="option-grid" id="addPriority">
      <button class="option-btn" data-v="高" style="color:var(--red)">高</button>
      <button class="option-btn selected" data-v="中" style="color:var(--accent)">中</button>
      <button class="option-btn" data-v="低" style="color:var(--green)">低</button>
    </div>
  </div>
  <div class="field">
    <div class="field-label">工数レベル</div>
    <div class="option-grid" id="addEffort">
      <button class="option-btn" data-v="小">小</button>
      <button class="option-btn selected" data-v="中">中</button>
      <button class="option-btn" data-v="大">大</button>
    </div>
  </div>
  <button class="btn-primary" id="addSubmitBtn" onclick="submitNewTask()">タスクを追加</button>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<script>
// ── テーマ同期 ──
(function(){
  const t = localStorage.getItem('foo_portal_theme') || 'auto';
  if (t !== 'auto') document.documentElement.setAttribute('data-theme', t);
})();

// ─── 設定 ───
const WORKER_URL = 'https://notion-proxy.33322666666mm.workers.dev';
const TASK_DB = '204a695f8e88807cbf73fb7e72caac27';
const SESSION_KEY = 'foo_portal_session';
const SESSION_DAYS = 30;
const SEASON_RE = /^20\d{2}[春冬][前後]$/;
const PORTAL_URL = 'https://mitsurumukaihata.github.io/foo-portal/';

// ─── 状態 ───
let USER = null;
let allTasks = [];
let currentTab = 'spot';
let currentFilter = '全て';
let filterVisible = false;

// タブ定義
const TABS = [
  { id: 'spot', label: 'スポット', filter: { season: 'スポット', excludeDone: true } },
  { id: 'season', label: '毎シーズン', filter: { season: '毎シーズン前', excludeDone: true } },
  { id: 'regular', label: '定期', filter: { season: '定期点検', excludeDone: true } },
  { id: 'done', label: '完了', filter: { statusEquals: '完了' } },
];

// ─── セッション ───
function loadSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    const d = JSON.parse(raw);
    if (!d || new Date(d.expires) < new Date()) { localStorage.removeItem(SESSION_KEY); return null; }
    const expires = new Date(); expires.setDate(expires.getDate() + SESSION_DAYS);
    d.expires = expires.toISOString();
    localStorage.setItem(SESSION_KEY, JSON.stringify(d));
    return d;
  } catch(e) { return null; }
}

// ─── アクセス制御 ───
function checkAccess() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (new Date(data.expires) < new Date()) return false;
    if (data.apps && data.apps.task === true) return true;
    return false;
  } catch(e) { return false; }
}

// ─── Notion API ───
async function notionAPI(method, path, body) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), 15000);
  try {
    const res = await fetch(WORKER_URL + path, {
      method, headers: { 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined,
      signal: ctrl.signal
    });
    clearTimeout(t);
    const data = await res.json();
    if (data.object === 'error') throw new Error(data.message);
    return data;
  } catch(e) {
    clearTimeout(t);
    if (e.name === 'AbortError') throw new Error('タイムアウト。通信環境を確認してください。');
    throw e;
  }
}

// ─── データ取得（全件一括・ページネーション対応） ───
async function fetchAllTasks() {
  let all = [];
  let cursor = undefined;
  do {
    const body = { page_size: 100 };
    if (cursor) body.start_cursor = cursor;
    const res = await notionAPI('POST', `/v1/databases/${TASK_DB}/query`, body);
    all = all.concat(res.results || []);
    cursor = res.has_more ? res.next_cursor : null;
  } while (cursor);
  return all.map(parseTask);
}

// ─── Notionレコード→タスクオブジェクト変換 ───
function parseTask(page) {
  const p = page.properties;
  const task = {
    id: page.id,
    name: getTitle(p['タスク名']),
    status: getStatus(p['ステータス']),
    season: getSelect(p['シーズン指定']),
    priority: getSelect(p['優先度']),
    effort: getSelect(p['工数レベル']),
    types: getMultiSelect(p['タスクの種類']),
    kind: getSelect(p['種類']),
    area: getSelect(p['担当エリア']),
    desc: getRichText(p['説明']),
    date: getDate(p['記入日']),
    seasonChecks: {},
  };
  // 季節チェック列を動的検出
  for (const key of Object.keys(p)) {
    if (SEASON_RE.test(key)) {
      const val = getSelect(p[key]);
      if (val) task.seasonChecks[key] = val;
    }
  }
  return task;
}

function getTitle(prop) { return prop?.title?.[0]?.text?.content || ''; }
function getStatus(prop) { return prop?.status?.name || '未着手'; }
function getSelect(prop) { return prop?.select?.name || ''; }
function getMultiSelect(prop) { return (prop?.multi_select || []).map(s => s.name); }
function getRichText(prop) { return (prop?.rich_text || []).map(r => r.text?.content || '').join(''); }
function getDate(prop) { return prop?.date?.start || ''; }

// ─── テーマ切替 (Phase 5) ───
function setTheme(t) {
  localStorage.setItem('foo_portal_theme', t);
  if (t === 'auto') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', t);
  updateThemeButtons();
}
function updateThemeButtons() {
  const t = localStorage.getItem('foo_portal_theme') || 'auto';
  document.querySelectorAll('#themeToggle .theme-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.t === t);
  });
}

// ─── トースト ───
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => el.className = 'toast', 2500);
}

// ─── フィルター ───
function toggleFilter() {
  filterVisible = !filterVisible;
  document.getElementById('filterRow').style.display = filterVisible ? 'flex' : 'none';
}

// ─── タブ描画 ───
function renderTabs() {
  const nav = document.getElementById('navTabs');
  const lastVisit = localStorage.getItem('task_last_visit');
  nav.innerHTML = TABS.map(tab => {
    const tasks = getTasksForTab(tab.id);
    const newCount = lastVisit ? tasks.filter(t => t.date && t.date > lastVisit.slice(0, 10)).length : 0;
    return `<button class="nav-btn${currentTab === tab.id ? ' active' : ''}" onclick="switchTab('${tab.id}')">
      ${tab.label}<span class="nav-badge">${tasks.length}</span>${newCount > 0 ? `<span class="new-dot"></span>` : ''}
    </button>`;
  }).join('');
}

// ─── フィルター描画 ───
function renderFilterRow() {
  const types = ['全て', '作業', '機械', '事務', '車両', '五日市倉庫', '志和倉庫', '倉庫管理'];
  const row = document.getElementById('filterRow');
  row.innerHTML = types.map(t => `<button class="filter-chip${currentFilter === t ? ' active' : ''}" onclick="setFilter('${t}')">${t}</button>`).join('');
}

function setFilter(f) {
  currentFilter = f;
  renderFilterRow();
  renderContent();
}

// ─── サマリー描画 ───
function renderSummary() {
  const tasks = getTasksForTab(currentTab);
  const high = tasks.filter(t => t.priority === '高').length;
  const mid = tasks.filter(t => t.priority === '中').length;
  const low = tasks.filter(t => t.priority === '低').length;
  const prog = tasks.filter(t => t.status === '進行中').length;
  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-chip"><span class="dot dot-red"></span>高 ${high}件</div>
    <div class="summary-chip"><span class="dot dot-yellow"></span>中 ${mid}件</div>
    <div class="summary-chip"><span class="dot dot-green"></span>低 ${low}件</div>
    <div class="summary-chip"><span class="dot dot-blue"></span>進行中 ${prog}件</div>
  `;
}

// ─── タスク取得 ───
function getTasksForTab(tabId) {
  const tab = TABS.find(t => t.id === tabId);
  return allTasks.filter(t => {
    if (tab.filter.statusEquals) return t.status === tab.filter.statusEquals;
    return t.season === tab.filter.season && t.status !== '完了';
  });
}

function applyFilter(tasks) {
  if (currentFilter === '全て') return tasks;
  return tasks.filter(t => t.types.includes(currentFilter));
}

// ─── タブ切替 ───
function switchTab(tabId) {
  currentTab = tabId;
  currentFilter = '全て';
  renderTabs();
  renderFilterRow();
  renderSummary();
  renderContent();
}

// ─── コンテンツ描画 ───
function renderContent() {
  const tasks = applyFilter(getTasksForTab(currentTab));
  const lastVisit = localStorage.getItem('task_last_visit');
  const container = document.getElementById('content');

  if (currentTab === 'done') {
    // 完了タブ: グループ化なし
    if (tasks.length === 0) {
      container.innerHTML = `<div class="task-list"><div style="text-align:center;padding:48px 20px;color:var(--muted)"><div style="font-size:36px;margin-bottom:12px">✅</div><div style="font-size:13px">完了したタスクはまだありません</div></div></div>`;
      return;
    }
    container.innerHTML = `<div class="task-list">${tasks.map(t => renderCard(t, lastVisit, true)).join('')}</div>`;
    return;
  }

  // グループ化
  let groupField = 'types'; // spot, season → タスクの種類
  if (currentTab === 'regular') groupField = 'area'; // 定期 → 担当エリア

  const groups = {};
  const groupOrder = [];
  tasks.forEach(t => {
    let keys;
    if (groupField === 'types') {
      keys = t.types.length ? t.types : ['その他'];
    } else {
      keys = [t.area || 'その他'];
    }
    keys.forEach(k => {
      if (!groups[k]) { groups[k] = []; groupOrder.push(k); }
      groups[k].push(t);
    });
  });

  // 優先度ソート
  const prioOrder = { '高': 0, '中': 1, '低': 2, '': 3 };
  Object.values(groups).forEach(g => g.sort((a, b) => (prioOrder[a.priority] || 3) - (prioOrder[b.priority] || 3)));

  const groupIcons = { '作業': '🔧', '機械': '⚙️', '事務': '📝', '車両': '🚛', '五日市倉庫': '🏭', '志和倉庫': '📦', '倉庫管理': '📦', '共通': '🌐', '五日市': '🏭', '志和': '📦', 'その他': '📋' };

  const showSeason = currentTab === 'season' || currentTab === 'regular';
  const showExtra = currentTab === 'regular';

  let html = '<div class="task-list">';
  const seen = new Set();
  groupOrder.forEach(k => {
    if (seen.has(k)) return;
    seen.add(k);
    html += `<div class="group-header">${groupIcons[k] || '📋'} ${k} <span class="count">${groups[k].length}</span></div>`;
    groups[k].forEach(t => {
      html += renderCard(t, lastVisit, false, showSeason, showExtra);
    });
  });

  if (tasks.length === 0) {
    html += `<div style="text-align:center;padding:48px 20px;color:var(--muted)"><div style="font-size:36px;margin-bottom:12px">📋</div><div style="font-size:13px">タスクはありません</div></div>`;
  }
  html += '</div>';
  container.innerHTML = html;
}

function renderCard(task, lastVisit, showSeasonTag, showSeason, showExtra) {
  const isNew = lastVisit && task.date && task.date > lastVisit.slice(0, 10);

  // ステータスバッジ
  const statusMap = { '未着手': 'status-todo', '進行中': 'status-progress', '完了': 'status-done' };
  const statusClass = statusMap[task.status] || 'status-todo';

  // 優先度タグ
  const prioMap = { '高': 'tag-high', '中': 'tag-mid', '低': 'tag-low' };
  const prioClass = prioMap[task.priority] || 'tag-mid';

  let tagsHtml = '';
  if (task.priority) tagsHtml += `<span class="tag ${prioClass}">優先 ${task.priority}</span>`;
  if (task.effort) tagsHtml += `<span class="tag tag-effort">工数 ${task.effort}</span>`;
  if (showExtra && task.kind) tagsHtml += `<span class="tag tag-type">${task.kind}</span>`;
  if (showExtra && task.area) tagsHtml += `<span class="tag tag-area">${task.area}</span>`;
  if (showSeasonTag && task.season) tagsHtml += `<span class="tag tag-season">${task.season}</span>`;

  let descHtml = task.desc ? `<div class="task-desc">${escH(task.desc)}</div>` : '';

  // 季節チェック行
  let seasonHtml = '';
  if (showSeason) {
    const keys = Object.keys(task.seasonChecks).sort();
    if (keys.length > 0) {
      seasonHtml = '<div class="season-row">' + keys.map(k => {
        const done = task.seasonChecks[k] === '完了';
        return `<div class="season-check${done ? ' done' : ''}" onclick="event.stopPropagation();toggleSeason('${task.id}','${k}',${done})" data-tid="${task.id}" data-sk="${k}">
          <span class="check-icon">${done ? '✓' : '▢'}</span>${k}
        </div>`;
      }).join('') + '</div>';
    }
  }

  return `<div class="task-card${isNew ? ' new-task' : ''}" onclick="openDetail('${task.id}')">
    ${isNew ? '<div class="new-badge">NEW</div>' : ''}
    <div class="task-top">
      <div class="task-name">${escH(task.name)}</div>
      <div class="task-status ${statusClass}">${task.status}</div>
    </div>
    <div class="task-meta">${tagsHtml}</div>
    ${descHtml}${seasonHtml}
  </div>`;
}

function escH(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── 詳細パネル (Phase 2) ───
function openDetail(taskId) {
  const task = allTasks.find(t => t.id === taskId);
  if (!task) return;

  const statusOpts = ['未着手', '進行中', '完了'];
  const statusClasses = { '未着手': 'sel-todo', '進行中': 'sel-progress', '完了': 'sel-done' };
  const prioMap = { '高': 'tag-high', '中': 'tag-mid', '低': 'tag-low' };

  let html = `<div class="panel-title">${escH(task.name)}</div>`;

  // ステータス変更
  html += `<div class="field"><div class="field-label">ステータス</div><div class="status-selector">`;
  statusOpts.forEach(s => {
    html += `<button class="status-opt${task.status === s ? ' ' + statusClasses[s] : ''}" onclick="updateStatus('${task.id}','${s}',this)">${s}</button>`;
  });
  html += `</div></div>`;

  // 優先度・工数
  html += `<div class="field"><div class="field-label">優先度 / 工数</div><div style="display:flex;gap:6px">`;
  if (task.priority) html += `<span class="tag ${prioMap[task.priority] || 'tag-mid'}" style="font-size:12px;padding:5px 12px">優先 ${task.priority}</span>`;
  if (task.effort) html += `<span class="tag tag-effort" style="font-size:12px;padding:5px 12px">工数 ${task.effort}</span>`;
  html += `</div></div>`;

  // タスクの種類
  if (task.types.length) {
    html += `<div class="field"><div class="field-label">タスクの種類</div><div style="display:flex;gap:6px;flex-wrap:wrap">`;
    task.types.forEach(t2 => { html += `<span class="tag tag-type" style="font-size:12px;padding:5px 12px">${t2}</span>`; });
    html += `</div></div>`;
  }

  // シーズン指定
  if (task.season) html += `<div class="field"><div class="field-label">シーズン指定</div><div style="font-size:13px;color:var(--purple);font-weight:700">${task.season}</div></div>`;

  // 種類・エリア（定期タスク）
  if (task.kind) html += `<div class="field"><div class="field-label">種類</div><div style="font-size:13px">${task.kind}</div></div>`;
  if (task.area) html += `<div class="field"><div class="field-label">担当エリア</div><div style="font-size:13px">${task.area}</div></div>`;

  // 記入日
  if (task.date) html += `<div class="field"><div class="field-label">記入日</div><div style="font-size:13px;font-family:'DM Mono',monospace">${task.date}</div></div>`;

  // 説明
  html += `<div class="field"><div class="field-label">説明</div><div style="font-size:13px;color:${task.desc ? 'var(--text)' : 'var(--muted)'}">${task.desc ? escH(task.desc) : '（なし）'}</div></div>`;

  // 季節チェック
  const sKeys = Object.keys(task.seasonChecks).sort();
  if (sKeys.length) {
    html += `<div class="field"><div class="field-label">季節チェック</div><div class="detail-seasons">`;
    sKeys.forEach(k => {
      const done = task.seasonChecks[k] === '完了';
      html += `<button class="detail-season-btn${done ? ' done' : ''}" onclick="toggleSeasonDetail('${task.id}','${k}',${done},this)">
        <span style="font-size:14px">${done ? '✓' : '▢'}</span>${k}
      </button>`;
    });
    html += `</div></div>`;
  }

  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailOverlay').classList.add('open');
  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  document.getElementById('detailPanel').classList.remove('open');
}

// ─── ステータス更新 (Phase 2) ───
async function updateStatus(taskId, newStatus, el) {
  // 楽観的UI更新
  const task = allTasks.find(t => t.id === taskId);
  if (!task) return;
  const oldStatus = task.status;
  task.status = newStatus;

  // UI即時反映
  const statusClasses = { '未着手': 'sel-todo', '進行中': 'sel-progress', '完了': 'sel-done' };
  el.parentElement.querySelectorAll('.status-opt').forEach(o => o.className = 'status-opt');
  el.classList.add(statusClasses[newStatus]);

  renderTabs();
  renderSummary();
  renderContent();

  try {
    await notionAPI('PATCH', `/v1/pages/${taskId}`, {
      properties: { 'ステータス': { status: { name: newStatus } } }
    });
    showToast(`ステータスを「${newStatus}」に変更しました`, 'success');
  } catch(e) {
    // ロールバック
    task.status = oldStatus;
    renderTabs();
    renderSummary();
    renderContent();
    showToast('更新に失敗しました: ' + e.message, 'error');
  }
}

// ─── 季節チェック切替 (Phase 2) ───
async function toggleSeason(taskId, seasonKey, wasDone) {
  const task = allTasks.find(t => t.id === taskId);
  if (!task) return;
  const newVal = wasDone ? '▢' : '完了';
  const oldVal = task.seasonChecks[seasonKey];
  task.seasonChecks[seasonKey] = newVal;

  // カード内のUI即時更新
  const el = document.querySelector(`.season-check[data-tid="${taskId}"][data-sk="${seasonKey}"]`);
  if (el) {
    el.classList.toggle('done', newVal === '完了');
    el.querySelector('.check-icon').textContent = newVal === '完了' ? '✓' : '▢';
    el.setAttribute('onclick', `event.stopPropagation();toggleSeason('${taskId}','${seasonKey}',${newVal === '完了'})`);
  }

  try {
    await notionAPI('PATCH', `/v1/pages/${taskId}`, {
      properties: { [seasonKey]: { select: { name: newVal } } }
    });
  } catch(e) {
    task.seasonChecks[seasonKey] = oldVal;
    renderContent();
    showToast('更新に失敗しました', 'error');
  }
}

async function toggleSeasonDetail(taskId, seasonKey, wasDone, btn) {
  const task = allTasks.find(t => t.id === taskId);
  if (!task) return;
  const newVal = wasDone ? '▢' : '完了';
  const oldVal = task.seasonChecks[seasonKey];
  task.seasonChecks[seasonKey] = newVal;

  btn.classList.toggle('done', newVal === '完了');
  btn.querySelector('span').textContent = newVal === '完了' ? '✓' : '▢';
  btn.setAttribute('onclick', `toggleSeasonDetail('${taskId}','${seasonKey}',${newVal === '完了'},this)`);

  renderContent();

  try {
    await notionAPI('PATCH', `/v1/pages/${taskId}`, {
      properties: { [seasonKey]: { select: { name: newVal } } }
    });
  } catch(e) {
    task.seasonChecks[seasonKey] = oldVal;
    renderContent();
    showToast('更新に失敗しました', 'error');
  }
}

// ─── 新規追加パネル (Phase 3) ───
function openAddPanel() {
  document.getElementById('addOverlay').classList.add('open');
  document.getElementById('addPanel').classList.add('open');
  document.getElementById('addName').value = '';
  // リセット
  resetOptionGrid('addSeason', 'スポット');
  resetOptionGrid('addPriority', '中');
  resetOptionGrid('addEffort', '中');
  document.querySelectorAll('#addTypes .option-btn').forEach(b => b.classList.remove('selected'));
}
function closeAddPanel() {
  document.getElementById('addOverlay').classList.remove('open');
  document.getElementById('addPanel').classList.remove('open');
}

function resetOptionGrid(id, defaultVal) {
  document.querySelectorAll(`#${id} .option-btn`).forEach(b => {
    b.classList.toggle('selected', b.dataset.v === defaultVal);
  });
}

// Option grid click handlers
['addSeason', 'addPriority', 'addEffort'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    const btn = e.target.closest('.option-btn');
    if (!btn) return;
    document.querySelectorAll(`#${id} .option-btn`).forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  });
});
document.getElementById('addTypes').addEventListener('click', e => {
  const btn = e.target.closest('.option-btn');
  if (!btn) return;
  btn.classList.toggle('selected');
});

async function submitNewTask() {
  const name = document.getElementById('addName').value.trim();
  const season = document.querySelector('#addSeason .option-btn.selected')?.dataset.v;
  const types = [...document.querySelectorAll('#addTypes .option-btn.selected')].map(b => b.dataset.v);
  const priority = document.querySelector('#addPriority .option-btn.selected')?.dataset.v;
  const effort = document.querySelector('#addEffort .option-btn.selected')?.dataset.v;

  if (!name) { showToast('タスク名を入力してください', 'error'); return; }
  if (!season) { showToast('シーズン指定を選択してください', 'error'); return; }
  if (types.length === 0) { showToast('タスクの種類を選択してください', 'error'); return; }
  if (!priority) { showToast('優先度を選択してください', 'error'); return; }

  const btn = document.getElementById('addSubmitBtn');
  btn.disabled = true;
  btn.textContent = '追加中...';

  const today = new Date();
  const dateStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

  const properties = {
    'タスク名': { title: [{ text: { content: name } }] },
    'シーズン指定': { select: { name: season } },
    'タスクの種類': { multi_select: types.map(t => ({ name: t })) },
    '優先度': { select: { name: priority } },
    'ステータス': { status: { name: '未着手' } },
    '記入日': { date: { start: dateStr } },
  };
  if (effort) properties['工数レベル'] = { select: { name: effort } };

  try {
    const res = await notionAPI('POST', '/v1/pages', {
      parent: { database_id: TASK_DB },
      properties
    });

    // ローカル追加
    allTasks.unshift(parseTask(res));
    closeAddPanel();
    renderTabs();
    renderSummary();
    renderContent();
    showToast('タスクを追加しました', 'success');
  } catch(e) {
    showToast('追加に失敗しました: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'タスクを追加';
  }
}

// ─── 初期化 ───
async function init() {
  const session = loadSession();
  if (!session || !checkAccess()) {
    document.getElementById('auth-error').style.display = 'flex';
    return;
  }
  USER = session;
  document.getElementById('app').style.display = 'block';

  updateThemeButtons();
  renderFilterRow();

  // ローディング表示
  document.getElementById('content').innerHTML = '<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">タスクを読み込み中...</div></div>';
  document.getElementById('navTabs').innerHTML = TABS.map(tab =>
    `<button class="nav-btn${tab.id === 'spot' ? ' active' : ''}">${tab.label}<span class="nav-badge">-</span></button>`
  ).join('');
  document.getElementById('summaryBar').innerHTML = '';

  try {
    allTasks = await fetchAllTasks();
    renderTabs();
    renderSummary();
    renderContent();

    // NEWバッジ: 既読化（Phase 4）
    setTimeout(() => {
      localStorage.setItem('task_last_visit', new Date().toISOString());
    }, 3000);

  } catch(e) {
    document.getElementById('content').innerHTML = `
      <div style="text-align:center;padding:48px 20px;">
        <div style="font-size:36px;margin-bottom:12px">⚠️</div>
        <div style="font-size:14px;font-weight:700;margin-bottom:8px">読み込みに失敗しました</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:16px">${escH(e.message)}</div>
        <button class="btn-primary" style="max-width:200px;margin:0 auto" onclick="location.reload()">再読み込み</button>
      </div>`;
  }
}

init();
