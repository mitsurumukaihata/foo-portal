<!DOCTYPE html>
<html lang="ja">
<head>

<title>タイヤ入出庫 | Tire Manager f.o.o</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #18181f; --s1: #101015; --s2: #1e1e26; --s3: #26262f;
  --border: #2c2c38; --border2: #3c3c4a; --text: #f0f0f2; --muted: #68687a;
  --accent: #f0a500; --accent2: #f5be40; --green: #22c55e; --blue: #3b82f6;
  --yellow: #f59e0b; --red: #ef4444; --purple: #a855f7;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #fdf6ee; --s1: #ffffff; --s2: #fdf0e4; --s3: #f5e6d4;
    --border: #e8d8c4; --border2: #d8c4a8; --text: #1a1208; --muted: #a08060;
    --accent: #e07000; --accent2: #c05800; --green: #1a9e4a; --blue: #2563eb;
    --yellow: #d97706; --red: #dc2626; --purple: #9333ea;
  }
}
[data-theme="dark"] {
  --bg: #18181f; --s1: #101015; --s2: #1e1e26; --s3: #26262f;
  --border: #2c2c38; --border2: #3c3c4a; --text: #f0f0f2; --muted: #68687a;
  --accent: #f0a500; --accent2: #f5be40; --green: #22c55e; --blue: #3b82f6;
  --yellow: #f59e0b; --red: #ef4444; --purple: #a855f7;
}
[data-theme="light"] {
  --bg: #fdf6ee; --s1: #ffffff; --s2: #fdf0e4; --s3: #f5e6d4;
  --border: #e8d8c4; --border2: #d8c4a8; --text: #1a1208; --muted: #a08060;
  --accent: #e07000; --accent2: #c05800; --green: #1a9e4a; --blue: #2563eb;
  --yellow: #d97706; --red: #dc2626; --purple: #9333ea;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; max-width: 480px; margin: 0 auto; }
#token-gate { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 32px 24px; }
.gate-logo { font-size: 11px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 32px; }
.gate-title { font-size: 28px; font-weight: 900; letter-spacing: -0.03em; margin-bottom: 8px; }
.gate-title span { color: var(--accent); }
.gate-sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; line-height: 1.6; }
.gate-input { width: 100%; background: var(--s2); border: 1.5px solid var(--border); border-radius: 10px; padding: 14px 16px; font-size: 13px; font-family: 'DM Mono', monospace; color: var(--text); outline: none; margin-bottom: 12px; transition: border-color 0.15s; }
.gate-input:focus { border-color: var(--accent); }
.gate-btn { width: 100%; background: var(--accent); border: none; border-radius: 10px; padding: 15px; color: #ffffff; font-size: 15px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; margin-top: 4px; }
.gate-note { font-size: 11px; color: var(--muted); margin-top: 16px; line-height: 1.6; }
.gate-staff-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.gate-staff-btn { background: var(--s2); border: 1.5px solid var(--border); border-radius: 10px; padding: 14px 10px; text-align: center; cursor: pointer; font-size: 14px; font-weight: 700; color: var(--text); transition: all 0.15s; }
.gate-staff-btn:active { transform: scale(0.97); }
.gate-staff-btn.selected { border-color: var(--accent); background: rgba(240,165,0,0.1); color: var(--accent); }
.prep-divider { text-align:center; color:var(--muted); font-size:12px; margin:12px 0; letter-spacing:0.05em; }
.btn-prep { width:100%; background:rgba(240,165,0,0.1); border:1.5px solid var(--accent); border-radius:10px; padding:13px; color:var(--text); font-size:14px; font-family:'Noto Sans JP',sans-serif; cursor:pointer; font-weight:700; transition:all 0.15s; }
.btn-prep:active { transform:scale(0.97); }
.prep-cat-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:4px; }
.prep-cat-btn { background:rgba(240,165,0,0.08); border:1.5px solid var(--accent); border-radius:8px; padding:10px 6px; color:var(--text); font-size:11px; font-family:'Noto Sans JP',sans-serif; cursor:pointer; font-weight:700; transition:all 0.15s; line-height:1.3; }
.prep-cat-btn:active { transform:scale(0.96); }
.btn-prep-list { width:100%; background:var(--s2); border:1.5px solid var(--border); border-radius:10px; padding:13px; color:var(--text); font-size:14px; font-family:'Noto Sans JP',sans-serif; cursor:pointer; font-weight:700; transition:all 0.15s; }
.btn-prep-list:active { transform:scale(0.97); }
.prep-list-item { background:var(--s2); border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:8px; cursor:pointer; transition:all 0.15s; }
.prep-list-item:active { transform:scale(0.98); border-color:var(--accent); }
.prep-row1 { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.prep-dest { font-size:13px; font-weight:700; color:var(--text); flex:1; }
.prep-pattern { font-size:13px; font-weight:700; color:var(--accent); }
.prep-size { font-size:12px; color:var(--muted); font-family:'DM Mono',monospace; }
.prep-row2 { display:flex; gap:12px; }
.prep-qty { font-size:12px; color:var(--green); font-weight:700; }
.prep-warehouse { font-size:12px; color:var(--muted); }
.prep-empty { text-align:center; padding:32px 20px; color:var(--muted); font-size:14px; }
.prep-wh-group { margin-bottom:20px; }
.prep-wh-header { font-size:16px; font-weight:700; color:var(--text); padding:10px 0 8px; border-bottom:2.5px solid var(--text); margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
.prep-wh-total { font-size:13px; font-weight:700; color:var(--muted); }
.prep-dest-group { margin-bottom:12px; margin-left:4px; }
.prep-dest-header { display:flex; justify-content:space-between; align-items:center; padding:6px 4px 4px; border-bottom:1.5px solid var(--accent); margin-bottom:6px; }

.prep-all-item { background:var(--s2); border:1px solid var(--border); border-radius:8px; padding:10px 12px; margin-bottom:6px; cursor:pointer; transition:all 0.12s; }
.prep-all-item:active { transform:scale(0.98); border-color:var(--accent); }
.prep-all-row1 { display:flex; justify-content:space-between; align-items:center; margin-bottom:3px; }
.prep-all-size { font-size:15px; font-weight:700; color:var(--text); font-family:'DM Mono',monospace; }
.prep-all-qty { font-size:14px; font-weight:700; color:var(--green); }
.prep-all-row2 { display:flex; gap:8px; align-items:center; }
.prep-cat-tag { font-size:10px; color:var(--muted); background:var(--s1); border:1px solid var(--border); padding:1px 6px; border-radius:4px; }
.prep-row3 { font-size:11px; color:var(--muted); margin-top:3px; }
.prep-compact-group { border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-bottom:6px; }
.prep-compact-item { display:flex; align-items:center; gap:6px; padding:7px 10px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.1s; }
.prep-compact-item:last-child { border-bottom:none; }
.prep-compact-item:active { background:var(--s3); }
.prep-compact-size { font-size:12px; font-weight:400; color:var(--text); font-family:'DM Mono',monospace; flex:1; min-width:0; }
.prep-compact-pattern { font-size:12px; font-weight:700; color:var(--text); flex-shrink:0; min-width:50px; }
.prep-compact-qty { font-size:12px; font-weight:700; color:var(--green); flex-shrink:0; min-width:30px; text-align:right; }
.prep-compact-memo { font-size:10px; color:var(--muted); flex-shrink:0; }
#app { display: none; flex-direction: column; min-height: 100vh; }
.header { background:var(--s1); border-bottom:0.5px solid var(--border); padding:14px 20px 10px; position:sticky; top:0; z-index:100; }
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:2px; }
.header-brand { font-size:10px; color:var(--muted); letter-spacing:0.12em; text-transform:uppercase; }
.header-back { font-size:11px; color:var(--muted); text-decoration:none; border:0.5px solid var(--border); border-radius:20px; padding:3px 10px; }
.header-title { font-size:17px; font-weight:900; letter-spacing:-0.02em; }
.header-title span { color:var(--accent); }
.nav { display: flex; background: var(--s1); border-bottom: 0.5px solid var(--border); }
.nav-btn { flex: 1; padding: 10px 6px 8px; background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-size: 12px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; transition: all 0.15s; }
.nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.page { display: none; flex: 1; overflow-y: auto; padding-bottom: 40px; }
.page.active { display: block; }
.step-bar { display: flex; gap: 4px; padding: 12px 20px; background: var(--s1); border-bottom: 0.5px solid var(--border); }
.step-dot { height: 2px; flex: 1; background: var(--border); border-radius: 2px; transition: background 0.3s; }
.step-dot.done { background: var(--accent); }
.step-dot.active { background: var(--accent2); }
.content { padding: 20px; }
.screen-label { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
.screen-title { font-size: 20px; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 6px; line-height: 1.2; }
.screen-sub { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 16px; }
.btn-primary { width: 100%; background: var(--accent); border: none; border-radius: 10px; padding: 14px; color: #ffffff; font-size: 14px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; margin-top: 10px; transition: opacity 0.15s; }
.btn-primary:disabled { opacity: 0.4; cursor: default; }
.btn-secondary { width: 100%; background: transparent; border: 1.5px solid var(--border2); border-radius: 10px; padding: 12px; color: var(--text); font-size: 14px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; margin-top: 6px; font-weight: 500; }
.btn-danger { width: 100%; background: transparent; border: 1px solid var(--red); border-radius: 10px; padding: 11px; color: var(--red); font-size: 13px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; margin-top: 6px; }
.search-box { background: var(--s2); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; transition: border-color 0.15s; }
.search-box:focus-within { border-color: var(--accent); }
.search-box input { background: transparent; border: none; outline: none; color: var(--text); font-size: 18px; font-family: 'DM Mono', monospace; font-weight: 500; flex: 1; width: 100%; }
.search-box input::placeholder { color: var(--muted); font-size: 14px; font-family: 'Noto Sans JP', sans-serif; }
.search-clear { background: var(--s3); border: none; border-radius: 50%; width: 20px; height: 20px; color: var(--muted); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.candidates { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.candidate { background: var(--s2); border: 1.5px solid var(--border); border-radius: 8px; padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: all 0.12s; }
.candidate:active { transform: scale(0.98); }
.candidate.sel { border-color: var(--accent); background: rgba(240,165,0,0.08); }
.candidate-text { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; }

.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.cat-card { background: var(--s2); border: 1.5px solid var(--border); border-radius: 10px; padding: 14px 12px; cursor: pointer; transition: all 0.12s; }
.cat-card:active { transform: scale(0.97); }
.cat-card.sel { border-color: var(--accent); background: rgba(240,165,0,0.08); }
.cat-card { display:flex; align-items:center; gap:10px; }
.cat-icon { font-size: 24px; line-height: 1; }
.cat-name { font-size: 14px; font-weight: 700; }
/* 価格検索 サブカテゴリchip */
.sub-chip { display:inline-flex; align-items:center; padding:7px 12px; font-size:12px; font-weight:600; border-radius:18px; border:1.2px solid var(--border); background:var(--s2); color:var(--muted); cursor:pointer; transition:all 0.12s; white-space:nowrap; }
.sub-chip.active { border-color:var(--accent); background:rgba(240,165,0,0.12); color:var(--accent); }
.sub-chip:active { transform: scale(0.97); }
.cat-icon { font-size: 18px; margin-bottom: 6px; display: block; }
.cat-name { font-size: 12px; font-weight: 700; line-height: 1.3; }
.cat-sub { font-size: 10px; color: var(--muted); margin-top: 3px; }
.pattern-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.pattern-item { background: var(--s2); border: 1.5px solid var(--border); border-radius: 8px; padding: 12px 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all 0.12s; }
.pattern-item:active { transform: scale(0.98); }
.pattern-item.sel { border-color: var(--accent); background: rgba(240,165,0,0.08); }
.pattern-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; transition: background 0.15s; }

.numpad-disp { background: var(--s2); border: 1.5px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 12px; }
.num-val { font-size: 52px; font-weight: 500; color: var(--text); font-family: 'DM Mono', monospace; line-height: 1; }
.num-val.empty { color: var(--muted); font-size: 24px; padding: 14px 0; }
.num-unit { font-size: 13px; color: var(--muted); margin-top: 4px; }
.numpad { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 10px; }
.np-btn { background: var(--s2); border: 1.5px solid var(--border); border-radius: 10px; padding: 16px; font-size: 18px; font-weight: 500; color: var(--text); cursor: pointer; text-align: center; transition: all 0.1s; font-family: 'DM Mono', monospace; }

.type-group { margin-bottom: 16px; }

.dest-wrap { margin-top: 12px; }

.dest-input { width: 100%; background: var(--s2); border: 1.5px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; color: var(--text); outline: none; transition: border-color 0.15s; }

async function _updateSnapshotRecord(catName, pattern, size, warehouse, delta) {
  if (!warehouse || warehouse === '海田倉庫' || warehouse === '未定') return;
  const searchRes = await notionAPI('POST', `/databases/${SNAPSHOT_DB}/query`, {
    filter: { and: [
      { property: 'パターン名', rich_text: { equals: pattern } },
      { property: 'サイズコード', rich_text: { equals: size } },
      { property: '倉庫', select: { equals: warehouse } },
      { property: 'カテゴリ', select: { equals: catName } },
    ]},
    page_size: 1
  });
  if (searchRes.results && searchRes.results.length > 0) {
    const page = searchRes.results[0];
    const current = page.properties['在庫数']?.number ?? 0;
    await notionAPI('PATCH', `/pages/${page.id}`, {
      properties: { '在庫数': { number: current + delta } }
    });
  } else {
    await notionAPI('POST', '/pages', {
      parent: { database_id: SNAPSHOT_DB },
      properties: {
        'Name':       { title: [{ text: { content: `${pattern}|${size}|${warehouse}` } }] },
        'パターン名': { rich_text: [{ text: { content: pattern } }] },
        'サイズコード':{ rich_text: [{ text: { content: size } }] },
        'カテゴリ':   { select: { name: catName } },
        '倉庫':       { select: { name: warehouse } },
        '在庫数':     { number: Math.max(0, delta) },
      }
    });
  }
}

async function negRescan(btn) {

    if (NEGATIVE_STOCK_ITEMS.length > 0) {
      // マイナス項目があればピンポイント再チェック（高速）
      const checks = new Set(NEGATIVE_STOCK_ITEMS.map(i => i.catKey + '||' + i.size));

      for (const key of checks) {
        const [catKey, size] = key.split('||');
        try { await refreshNegStockForSize(catKey, size); } catch(e) {}

      saveNegStock();
    } else {
      // マイナス項目がなければ全スキャン（タイムアウト30秒）
      await Promise.race([
        backgroundNegScan(),
        new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 30000))

  } catch(e) {
    console.warn('再スキャン:', e.message);

  refreshNegBanners();
}

// ログイン時バックグラウンド全スキャン（3DBずつチャンク並列で高速かつ安定）
async function backgroundNegScan() {
  const entries = Object.entries(DB_MAP);
  NEGATIVE_STOCK_ITEMS = [];
  const now = Date.now();

  // 1DBをスキャンする関数
  async function scanOne(catKey, db) {
    const kurikoshiDate = await getKurikoshiDate(db.id);
    let all = [], cursor;
    // 繰越がないDBは直近90日に限定（全件取得を防ぐ）
    const fallbackDate = new Date(Date.now() - 90 * 86400000).toISOString();
    const dateThreshold = kurikoshiDate || fallbackDate;
    // 繰越日以降のレコードを取得（発注中は発注管理DBに統合済みのため不要）
    // ※準備は繰越後のレコードに含まれるので個別取得不要（古い準備を拾うと二重マイナス）
    const filter = { timestamp: 'created_time', created_time: { on_or_after: dateThreshold } };
    while (true) {
      const body = { filter, page_size: 100 };
      if (cursor) body.start_cursor = cursor;
      const res = await notionAPI('POST', `/databases/${db.id}/query`, body);
      if (res.object === 'error') break;
      all = all.concat(res.results);
      if (!res.has_more) break;
      cursor = res.next_cursor;
    }
    // 在庫計算
    const bySize = {};
    all.forEach(rec => {
      const props = rec.properties;
      const size = props['サイズコード']?.select?.name;
      const pattern = props['パターン名']?.select?.name;
      const warehouse = props[db.warehouseField]?.select?.name;
      const qty = props['数量']?.number || 0;
      const kubun = props['区分']?.select?.name || '';
      if (!size || !pattern || !warehouse) return;
      const sign = KUBUN_SIGN[kubun] || 0;
      if (sign === 0) return;
      if (!bySize[size]) bySize[size] = {};
      if (!bySize[size][pattern]) bySize[size][pattern] = {};
      bySize[size][pattern][warehouse] = (bySize[size][pattern][warehouse] || 0) + sign * qty;
    });
    // マイナス検出
    Object.entries(bySize).forEach(([size, patterns]) => {
      Object.entries(patterns).forEach(([pattern, warehouses]) => {
        Object.entries(warehouses).forEach(([warehouse, qty]) => {
          if (qty < 0) NEGATIVE_STOCK_ITEMS.push({ catKey, size, pattern, warehouse, qty, t: now });
        });
      });
    });
  }

  // 3DBずつチャンク並列実行（API負荷を抑えつつ高速化）
  for (let i = 0; i < entries.length; i += 3) {
    const chunk = entries.slice(i, i + 3);
    await Promise.allSettled(chunk.map(([catKey, db]) => scanOne(catKey, db)));
  }
  saveNegStock();
  refreshNegBanners();
}

function digits(s) { return s.replace(/[^\d]/g, ''); }
function filterSizes(v) {
  const q = v.trim();
  const all = Object.values(DB_MAP).flatMap(db => db.sizes);
  const uniq = [...new Set(all)];
  let hits = [];
  if (q) {
    const dq = digits(q);
    hits = uniq.filter(s => {
      const ds = digits(s);
      return s.toLowerCase().includes(q.toLowerCase()) || (dq.length >= 3 && ds.startsWith(dq));
    }).slice(0, 8);
  }
  const c = document.getElementById('sz-candidates');
  if (!c) return;
  c.innerHTML = hits.map(s => `<div class="candidate${state.size === s ? ' sel' : ''}" onclick="pickSize('${s}')"><span class="candidate-text">${s}</span><span class="candidate-badge">選択</span></div>`).join('');
  const btn = document.getElementById('sz-next');
  if (btn) btn.disabled = !state.size;
}
function pickSize(s) {
  state.size = s;

const MAKER_COLOR_MAP = {'TOYO':'var(--accent)','BRIDGESTONE':'var(--blue)','DUNLOP':'var(--green)','MICHELIN':'var(--yellow)','PIRELLI':'var(--red)'};
const MAKER_PRIORITY = ['TOYO','BRIDGESTONE','DUNLOP','MICHELIN','PIRELLI'];
function renderPatternItems(patterns, query) {
  const q = query.trim().toLowerCase();
  const hits = (q ? patterns.filter(p => p.toLowerCase().includes(q)) : patterns).filter(p => !DISCONTINUED_PATTERNS.has(p));
  if (hits.length === 0) return `<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px;">該当なし</div>`;
  // 検索中はフラット表示（メーカーバッジ付き）
  if (q) {
    return hits.map(p => {
      const sel = state.pattern === p;
      const maker = getMaker(p);
      const mc = MAKER_COLOR_MAP[maker] || 'var(--muted)';
      const label = maker.replace(' TIRES','');
      return `<div class="pattern-item${sel ? ' sel' : ''}" onclick="pickPattern('${p}')"><div class="pattern-dot" style="background:${sel?'var(--accent)':mc}"></div><div class="pattern-name">${p}</div><span style="margin-left:auto;font-size:10px;font-weight:700;color:${mc};">${label}</span></div>`;
    }).join('');
  }
  // 通常はメーカー別グループ表示
  const groups = {};
  hits.forEach(p => { const m = getMaker(p); if (!groups[m]) groups[m] = []; groups[m].push(p); });
  const orderedMakers = [...MAKER_PRIORITY.filter(m => groups[m]), ...Object.keys(groups).filter(m => !MAKER_PRIORITY.includes(m))];
  return orderedMakers.map(maker => {
    const mc = MAKER_COLOR_MAP[maker] || 'var(--muted)';
    const label = maker.replace(' TIRES','');
    const header = `<div style="margin-top:10px;margin-bottom:2px;padding:3px 8px;background:var(--s2);border-left:3px solid ${mc};border-radius:0 4px 4px 0;"><span style="font-size:10px;font-weight:700;letter-spacing:0.08em;color:${mc};">${label}</span></div>`;
    const items = groups[maker].map(p => {
      const sel = state.pattern === p;
      return `<div class="pattern-item${sel?' sel':''}" onclick="pickPattern('${p}')"><div class="pattern-dot" style="background:${sel?'var(--accent)':mc}"></div><div class="pattern-name">${p}</div></div>`;
    }).join('');
    return header + items;
  }).join('');
}

function pickPattern(p) {

// ═══════ キーボードナビゲーション ═══════
(function() {
  // 汎用: コンテナ内の選択可能アイテムを↑↓←→でハイライト移動、Enterで確定
  let _kbIdx = -1; // 現在のハイライト位置

  function getSelectables() {
    const step = state.step;
    // サイズ候補
    if (step === 0) return Array.from(document.querySelectorAll('#sz-candidates .candidate'));
    // カテゴリ
    if (step === 1) return Array.from(document.querySelectorAll('.cat-card'));
    // パターン
    if (step === 2) return Array.from(document.querySelectorAll('.pattern-item'));
    // 区分（横並び）
    if (step === 4) return Array.from(document.querySelectorAll('.type-btn'));
    // 移動方向
    if (step === 5) return Array.from(document.querySelectorAll('.move-card-big, .move-card-sm'));
    // 倉庫
    if (step === 6) return Array.from(document.querySelectorAll('.soko-btn'));
    return [];
  }

  function clearHighlights(items) {
    items.forEach(el => el.style.outline = '');
  }

  function highlightItem(items, idx) {
    clearHighlights(items);
    if (idx >= 0 && idx < items.length) {
      items[idx].style.outline = '2px solid var(--accent)';
      items[idx].style.outlineOffset = '2px';
      items[idx].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  }

  document.addEventListener('keydown', function(e) {
    // テキスト入力中はShift+Enter/Escape以外をスキップ
    const tag = e.target.tagName;
    const isInput = (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT');
    const step = state.step;

    // ─── Shift + Enter: 主ボタン実行 ───
    if (e.shiftKey && e.key === 'Enter') {
      e.preventDefault();
      // 各ステップの主ボタンをクリック
      const btnIds = {
        0: 'sz-next', 1: 'cat-next', 2: 'pat-next-top', 3: 'qty-next',
        4: 'kubun-next', 5: 'move-next', 6: 'soko-next', 7: 'send-btn'
      };
      const btn = document.getElementById(btnIds[step]);
      if (btn && !btn.disabled) btn.click();
      return;
    }

    // ─── Escape: 戻る ───
    if (e.key === 'Escape' && !e.shiftKey) {
      e.preventDefault();
      if (step === 0) return;
      if (step === 7) { goStep(state.isMove ? 5 : 6); return; }
      if (step === 5) { goStep(4); return; }
      goStep(step - 1);
      return;
    }

    // テキスト入力中は矢印キーを横取りしない（サイズ入力のEnterは例外）
    if (isInput && e.target.type !== 'number') {
      // サイズ入力(step0)とパターン検索(step2)は↑↓Enterだけ横取り
      if (step === 0 || step === 2) {
        if (!['ArrowUp','ArrowDown','Enter'].includes(e.key)) return;
      } else {
        return;
      }
    }

    const items = getSelectables();

    // ─── 数量ステップ: ↑↓で±1、数字キーで直接入力 ───
    if (step === 3 && !isInput) {
      if (e.key === 'ArrowUp') { e.preventDefault(); state.qty = Math.min(999, (state.qty||0)+1); _updateQtyDisp(); return; }
      if (e.key === 'ArrowDown') { e.preventDefault(); state.qty = Math.max(0, (state.qty||0)-1); _updateQtyDisp(); return; }
      if (/^[0-9]$/.test(e.key)) { e.preventDefault(); tapNum(e.key); return; }
      if (e.key === 'Backspace') { e.preventDefault(); tapNum('⌫'); return; }
      return;
    }

    if (items.length === 0) return;

    // ─── ↑↓←→: ハイライト移動 ───
    if (['ArrowDown','ArrowRight'].includes(e.key)) {
      e.preventDefault();
      _kbIdx = _kbIdx < items.length - 1 ? _kbIdx + 1 : 0;
      highlightItem(items, _kbIdx);
      return;
    }
    if (['ArrowUp','ArrowLeft'].includes(e.key)) {
      e.preventDefault();
      _kbIdx = _kbIdx > 0 ? _kbIdx - 1 : items.length - 1;
      highlightItem(items, _kbIdx);
      return;
    }

    // ─── Enter: ハイライト中の項目を確定（なければ最初の候補） ───
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (_kbIdx >= 0 && _kbIdx < items.length) {
        items[_kbIdx].click();
      } else if (step === 0 && items.length > 0) {
        items[0].click(); // サイズ入力で候補があれば最初のものを選択
      }
      return;
    }
  });

  // renderEntry後にハイライトリセット
  const _origRE = renderEntry;
  renderEntry = function() {
    _origRE();

// カテゴリ別の準備リスト（出庫ボタンから直接）
async function loadPrepList(catKey) {
  const el = document.getElementById('entry-content');
  el.innerHTML = `<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">準備中タイヤを取得中…</div></div>`;
  const db = DB_MAP[catKey];
  try {
    let all = [], cursor;
    while (true) {
      const body = { filter: { property: '区分', select: { equals: '準備' } }, sorts: [{ property: '日付', direction: 'descending' }], page_size: 100 };
      if (cursor) body.start_cursor = cursor;
      const res = await notionAPI('POST', `/databases/${db.id}/query`, body);
      if (res.object === 'error') throw new Error(res.message);
      all = all.concat(res.results);
      if (!res.has_more) break;
      cursor = res.next_cursor;
    }
    renderPrepListByCat(catKey, all);
  } catch(e) {
    el.innerHTML = `<div class="content"><div class="error-box">データの取得に失敗しました。<br><small>${e.message}</small></div><button class="btn-secondary" onclick="renderEntry()">← 戻る</button></div>`;
  }
}

function renderPrepListByCat(catKey, records) {
  const el = document.getElementById('entry-content');
  const db = DB_MAP[catKey];

  if (records.length === 0) {
    el.innerHTML = `<div class="content"><div class="screen-label">準備中タイヤ一覧</div><div class="screen-title">${db.icon} ${db.name}</div><div class="prep-empty">準備中のタイヤはありません</div><button class="btn-secondary" style="margin-top:8px;" onclick="renderEntry()">← 戻る</button></div>`;
    return;
  }

  // 倉庫 → 出庫先 でグループ化
  const byWarehouse = {};
  records.forEach(r => {
    const p = r.properties;
    const wh = p[db.warehouseField]?.select?.name || '不明';
    const dest = p['出庫先']?.rich_text?.[0]?.plain_text || '（出庫先なし）';
    if (!byWarehouse[wh]) byWarehouse[wh] = {};
    if (!byWarehouse[wh][dest]) byWarehouse[wh][dest] = [];
    byWarehouse[wh][dest].push(r);
  });

  const whOrder = ['五日市倉庫','志和倉庫','海田倉庫'];
  const sortedWh = Object.keys(byWarehouse).sort((a, b) => {
    const ia = whOrder.indexOf(a), ib = whOrder.indexOf(b);
    if (ia >= 0 && ib >= 0) return ia - ib;
    if (ia >= 0) return -1;
    if (ib >= 0) return 1;
    return a.localeCompare(b, 'ja');
  });

  const totalQty = records.reduce((s, r) => s + (r.properties['数量']?.number || 0), 0);

  let html = '';
  sortedWh.forEach(wh => {
    const dests = byWarehouse[wh];
    const whQty = Object.values(dests).flat().reduce((s, r) => s + (r.properties['数量']?.number || 0), 0);

    html += `<div class="prep-wh-group">`;
    html += `<div class="prep-wh-header">${wh}<span class="prep-wh-total">${whQty}本</span></div>`;

    // 出庫先を五十音順（出庫先なしは末尾）
    const sortedDests = Object.keys(dests).sort((a, b) => {
      if (a === '（出庫先なし）') return 1;
      if (b === '（出庫先なし）') return -1;
      return a.localeCompare(b, 'ja');
    });

    sortedDests.forEach(dest => {
      const destRecords = dests[dest];
      const destQty = destRecords.reduce((s, r) => s + (r.properties['数量']?.number || 0), 0);

      html += `<div class="prep-dest-group">`;
      html += `<div class="prep-dest-header"><span class="prep-dest-name">${dest}</span><span class="prep-dest-total">${destQty}本</span></div>`;
      html += `<div class="prep-compact-group">`;

      destRecords.forEach(r => {
        const p = r.properties;
        const pattern = p['パターン名']?.select?.name || '―';
        const size = p['サイズコード']?.select?.name || '―';
        const qty = p['数量']?.number ?? 0;
        const memo = p['メモ']?.rich_text?.[0]?.plain_text || '';
        html += `<div class="prep-compact-item" onclick="renderPrepEdit('${r.id}','${catKey}')"><span class="prep-compact-pattern">${pattern}</span><span class="prep-compact-size">${size}</span><span class="prep-compact-qty">${qty}本</span>${memo?`<span class="prep-compact-memo">${memo}</span>`:''}</div>`;
      });

      html += `</div></div>`;
    });

    html += `</div>`;
  });

  el.innerHTML = `<div class="content"><div class="screen-label">準備中タイヤ一覧</div><div class="screen-title">${db.icon} ${db.name}</div><div style="font-size:12px;color:var(--muted);margin-bottom:12px;">${records.length}件 ／ ${totalQty}本</div>${html}<button class="btn-secondary" style="margin-top:8px;" onclick="renderEntry()">← 戻る</button></div>`;
}

function changePrepQty(delta) {
  const inp = document.getElementById('prep-qty');
  let v = parseInt(inp.value) || 1;
  v = Math.max(1, v + delta);
  inp.value = v;
  updatePrepNokori();
}
function updatePrepNokori() {
  const origQty = window._prepOrigQty || 0;
  const curQty = parseInt(document.getElementById('prep-qty')?.value) || 0;
  const nokori = origQty - curQty;
  const wrap = document.getElementById('prep-nokori-wrap');
  const numEl = document.getElementById('prep-nokori-num');
  if (!wrap || !numEl) return;
  if (nokori > 0) {
    numEl.textContent = nokori;
    wrap.style.display = 'block';
  } else {
    wrap.style.display = 'none';
    const chk = document.getElementById('prep-nokori-chk');
    if (chk) chk.checked = true;
  }
}

async function submitPrepToShukko(pageId, catKey) {
  if (!confirm('この準備タイヤを「出庫」に変更しますか？\nNotionDBのデータを更新します。')) return;
  const btn = document.getElementById('prep-send-btn');
  if (btn) { btn.disabled = true; btn.textContent = '更新中…'; }
  const dest = document.getElementById('prep-dest')?.value.trim() || '';
  const qty = parseInt(document.getElementById('prep-qty')?.value) || 0;
  const db = DB_MAP[catKey];
  const wField = db.warehouseField;
  const warehouse = document.getElementById('prep-warehouse')?.value || '';
  const nokoriChk = document.getElementById('prep-nokori-chk')?.checked || false;
  const origQty = window._prepOrigQty || qty;
  const nokori = origQty - qty;
  try {
    // ① 元レコードを出庫に変更
    const props = { '区分': { select: { name: '出庫' } }, '数量': { number: qty } };
    props[wField] = { select: { name: warehouse } };
    if (dest) props['出庫先'] = { rich_text: [{ text: { content: dest } }] };
    await notionAPI('PATCH', `/pages/${pageId}`, { properties: props });

    // スナップショット更新（準備→出庫）
    const _sp = await notionAPI('GET', `/pages/${pageId}`);
    const _spp = _sp.properties;
    updateSnapshot(catKey, _spp['パターン名']?.select?.name||'', _spp['サイズコード']?.select?.name||'', '出庫', qty, warehouse, null);

    // ② 残りを準備に残す場合、新しい準備レコードを作成
    let nokoriMsg = '';
    if (nokori > 0 && nokoriChk) {
      const pattern = _spp['パターン名']?.select?.name || '';
      const sizeCode = _spp['サイズコード']?.select?.name || '';
      const creator = (loginUser || '').replace(/ /g, '\u3000');
      const title = `${sizeCode} ${pattern} 準備 ${warehouse}`.trim();
      const newProps = {
        'タイトル': { title: [{ text: { content: title } }] },
        '区分': { select: { name: '準備' } },
        '数量': { number: nokori },
      };
      newProps[wField] = { select: { name: warehouse } };
      if (sizeCode) newProps['サイズコード'] = { select: { name: sizeCode } };
      if (pattern) newProps['パターン名'] = { select: { name: pattern } };
      if (creator) newProps['作成者'] = { select: { name: creator } };
      if (dest) newProps['出庫先'] = { rich_text: [{ text: { content: dest } }] };
      await notionAPI('POST', '/pages', { parent: { database_id: db.id }, properties: newProps });
      nokoriMsg = `（残り${nokori}本を準備に残しました）`;
    }

    // マイナス在庫キャッシュを即時更新
    const _size = _spp['サイズコード']?.select?.name || '';
    if (_size) refreshNegStockForSize(catKey, _size);

    const el = document.getElementById('entry-content');
    el.innerHTML = `<div class="content" style="text-align:center;padding:40px 20px;"><div style="font-size:48px;margin-bottom:16px;">✅</div><div class="screen-title">出庫に変更しました</div><div style="font-size:14px;color:var(--muted);margin-bottom:32px;">Notionのレコードを更新しました${nokoriMsg ? '<br>' + nokoriMsg : ''}</div><button class="btn-primary" onclick="renderEntry()">新しい入出庫を記録する</button><button class="btn-prep" style="margin-top:8px;" onclick="loadAllPrepList()">📋 準備リストに戻る</button></div>`;
  } catch(e) {
    const errEl = document.getElementById('prep-error');
    if (errEl) errEl.innerHTML = `<div class="error-box">更新に失敗しました。<br><small>${e.message}</small></div>`;
    if (btn) { btn.disabled = false; btn.textContent = '出庫に変更する'; }
  }
}

async function cancelPrep(pageId, catKey, qty) {
  if (!confirm('この準備タイヤ（' + qty + '本）を取消しますか？\n在庫に戻ります。')) return;
  const el = document.getElementById('entry-content');
  try {
    // 準備レコードをアーカイブ（削除）→ 在庫に戻る
    await notionAPI('PATCH', `/pages/${pageId}`, { archived: true });

    // マイナス在庫キャッシュを更新
    const page = await notionAPI('GET', `/pages/${pageId}`).catch(() => null);
    if (page) {
      const _size = page.properties['サイズコード']?.select?.name || '';
      if (_size) refreshNegStockForSize(catKey, _size);
    }

    el.innerHTML = `<div class="content" style="text-align:center;padding:40px 20px;"><div style="font-size:48px;margin-bottom:16px;">✅</div><div class="screen-title">準備を取消しました</div><div style="font-size:14px;color:var(--muted);margin-bottom:32px;">${qty}本が在庫に戻りました</div><button class="btn-primary" onclick="renderEntry()">入出庫に戻る</button><button class="btn-prep" style="margin-top:8px;" onclick="loadAllPrepList()">📋 準備リストに戻る</button></div>`;
  } catch(e) {
    const errEl = document.getElementById('prep-error');
    if (errEl) errEl.innerHTML = `<div class="error-box">取消に失敗しました。<br><small>${e.message}</small></div>`;
  }
}

  document.getElementById('stock-sz').addEventListener('input', e => filterStockSizes(e.target.value));

function filterStockSizes(v) {
  const q = v.trim();
  const all = Object.values(DB_MAP).flatMap(db => db.sizes);
  const uniq = [...new Set(all)];
  let hits = [];
  if (q) { const dq = digits(q); hits = uniq.filter(s => { const ds = digits(s); return s.toLowerCase().includes(q.toLowerCase()) || (dq.length >= 3 && ds.startsWith(dq)); }).slice(0, 8); }
  const c = document.getElementById('stock-sz-candidates');
  if (!c) return;
  c.innerHTML = hits.map(s => `<div class="candidate" onclick="pickStockSize('${s}')"><span class="candidate-text">${s}</span><span class="candidate-badge">選択</span></div>`).join('');
}
function pickStockSize(s) {
  stockState.size = s;
  const matching = Object.entries(DB_MAP).filter(([k, db]) => db.sizes.includes(s));
  if (matching.length === 1) { loadStockData(s, matching[0][0]); }
  else { loadStockDataAll(s, matching); }
}

// ── 繰越日を取得（DBから区分="繰越"の最新レコードを探す）──
async function getKurikoshiDate(dbId) {
  try {
    const res = await notionAPI('POST', `/databases/${dbId}/query`, {
      filter: { property: '区分', select: { equals: '繰越' } },
      sorts: [{ timestamp: 'created_time', direction: 'ascending' }],
      page_size: 1
    });
    if (res.results?.length) return res.results[0].created_time;
  } catch(e) { console.warn('繰越日取得失敗:', e); }
  return null;
}
async function loadStockData(size, catKey) {
  const el = document.getElementById('stock-content');
  el.innerHTML = `<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">在庫データを取得中…</div></div>`;
  const db = DB_MAP[catKey];

    const records = await fetchAllRecords(db.id, size, kurikoshiDate);
    // 発注管理DBから発注中データを取得

    renderStockResult(size, catKey, records, pendingOrders);
  }

}
async function fetchAllRecords(dbId, sizeFilter, kurikoshiDate) {
  let all = [], cursor;
  // 半角/全角スペース両方にマッチするORフィルター
  const sizeHalf = sizeFilter.replace(/\u3000/g, ' ');
  const sizeFull = sizeFilter.replace(/ /g, '\u3000');
  const sizeF = (sizeHalf !== sizeFull)
    ? { or: [
        { property: 'サイズコード', select: { equals: sizeHalf } },
        { property: 'サイズコード', select: { equals: sizeFull } },
      ]}
    : { property: 'サイズコード', select: { equals: sizeFilter } };
  // 繰越ベースラインには準備が含まれている（繰越時点の実在庫）。
  // 発注中は発注管理DBに統合済みのため、在庫DBからは取得しない。
  // 準備は繰越後の新規準備のみ取得（繰越以降のレコードに含まれる）。
  const filter = kurikoshiDate
    ? { and: [ sizeF, { timestamp: 'created_time', created_time: { on_or_after: kurikoshiDate } } ] }
    : sizeF;
  while (true) {
    const body = { filter, page_size: 100 };
    if (cursor) body.start_cursor = cursor;
    const res = await notionAPI('POST', `/databases/${dbId}/query`, body);
    if (res.object === 'error') throw new Error(res.message);
    all = all.concat(res.results);
    if (!res.has_more) break;
    cursor = res.next_cursor;
  }
  return all;
}
function calcStock(records, catKey) {
  const db = DB_MAP[catKey]; const wField = db.warehouseField;
  const stock = {}; const prepStock = {}; const orderStock = {};
  db.patterns.forEach(p => {
    stock[p] = {}; prepStock[p] = {}; orderStock[p] = {};
    WAREHOUSES.forEach(w => { stock[p][w] = 0; prepStock[p][w] = 0; orderStock[p][w] = 0; });
  });
  records.forEach(r => {
    const props = r.properties;
    const pattern = props['パターン名']?.select?.name;
    const warehouse = props[wField]?.select?.name;
    const qty = props['数量']?.number || 0;
    const kubun = props['区分']?.select?.name || '';
    if (!pattern) return;
    // 発注中は発注管理DBから取得するため在庫DBのレコードはスキップ
    if (kubun === '発注中') return;
    if (!warehouse) return;
    const sign = KUBUN_SIGN[kubun] || 0;
    if (!stock[pattern]) stock[pattern] = {};
    if (!stock[pattern][warehouse]) stock[pattern][warehouse] = 0;
    stock[pattern][warehouse] += sign * qty;
    if (kubun === '準備') {
      if (!prepStock[pattern]) prepStock[pattern] = {};
      if (!prepStock[pattern][warehouse]) prepStock[pattern][warehouse] = 0;
      prepStock[pattern][warehouse] += qty;
    }
  });
  return { stock, prepStock, orderStock, records, catKey };
}

        var total = WAREHOUSES.reduce(function(s,w){ return s+(calc.stock[p]?.[w]||0); },0);
        var totalPrep = WAREHOUSES.reduce(function(s,w){ return s+(calc.prepStock[p]?.[w]||0); },0);
        var totalOrd = WAREHOUSES.reduce(function(s,w){ return s+(calc.orderStock[p]?.[w]||0); },0);
        if (total > 0 || totalPrep > 0 || totalOrd > 0) {
          grpPatterns.push({ pattern: p, catKey: catKey, calc: calc });
        }
      });
    });
    if (!grpPatterns.length) return;
    hasAny = true;

    // メーカー順ソート
    grpPatterns.sort(function(a, b) {
      var oA = MAKER_ORDER.indexOf(getMaker(a.pattern)), oB = MAKER_ORDER.indexOf(getMaker(b.pattern));
      if (oA === -1) oA = 99; if (oB === -1) oB = 99;
      if (oA !== oB) return oA - oB;
      var sA = WAREHOUSES.reduce(function(s,w){ return s+(a.calc.stock[a.pattern]?.[w]||0); },0);
      var sB = WAREHOUSES.reduce(function(s,w){ return s+(b.calc.stock[b.pattern]?.[w]||0); },0);
      return sB - sA;
    });

    // グループヘッダー（pill型セクション区切り）
    var totalQty = grpPatterns.reduce(function(s, gp) {
      return s + WAREHOUSES.reduce(function(ss,w){ return ss+(gp.calc.stock[gp.pattern]?.[w]||0); },0);
    }, 0);

    html += '<div style="flex:1;height:1px;background:var(--border);"></div>';
    html += '</div>';

    // メーカー別サブグループ
    var _lastMaker = null;
    grpPatterns.forEach(function(gp) {
      var maker = getMaker(gp.pattern);
      if (maker !== _lastMaker) {
        _lastMaker = maker;
        var mc = MAKER_COLOR[maker] || 'var(--muted)';
        html += '<div style="margin-top:8px;margin-bottom:2px;padding:3px 6px;background:var(--s2);border-left:3px solid ' + mc + ';border-radius:0 4px 4px 0;"><span style="font-size:10px;font-weight:700;letter-spacing:0.08em;color:' + mc + ';">' + maker + '</span></div>';
      }
      html += renderPatternRow(gp.pattern, gp.catKey, gp.calc.stock, gp.calc.prepStock, gp.calc.orderStock);
    });
  });

  if (!hasAny) {
    html += '<div style="text-align:center;padding:32px 0;color:var(--muted);font-size:14px;">このサイズの在庫はありません</div>';
  }

  html += '</div><div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);">全 ' + totalRecords + ' 件のレコードから計算 &#183; ' + new Date().toLocaleTimeString('ja-JP') + ' 取得</div>';

// パターン → クラスキー解決 (ブランド+パターン or パターンのみ)
function patternToClass(pattern, brand) {
  if (!pattern) return null;
  const k1 = (brand ? brand + ' ' + pattern : pattern).trim();
  if (PATTERN_CLASS[k1]) return PATTERN_CLASS[k1];
  if (PATTERN_CLASS[pattern]) return PATTERN_CLASS[pattern];
  // ブランド名そのものでも解決を試みる(REGNO/POTENZA等)
  if (brand && PATTERN_CLASS[brand]) return PATTERN_CLASS[brand];
  return null;
}

// パターン名→ おすすめ情報の解決 (画像はD1パターン画像テーブルからマージ)
const PATTERN_IMAGE_FROM_D1 = {}; // { 'GRXⅢ': { image, treadImage } }
function patternToRecommend(pattern, brand) {
  if (!pattern) return null;
  const k1 = (brand ? brand + ' ' + pattern : pattern).trim();
  let base = PATTERN_RECOMMEND[k1] || PATTERN_RECOMMEND[pattern] || null;
  // D1から取得した画像を上書きマージ (recが無くても画像だけ表示できるように)
  const img = PATTERN_IMAGE_FROM_D1[pattern] || PATTERN_IMAGE_FROM_D1[k1];
  if (img && (img.image || img.treadImage)) {
    base = { ...(base || {}), ...img };
  }
  return base;
}
// D1から画像URL一覧を取得 (起動時に1回キャッシュ)
async function loadPatternImagesFromD1() {
  try {
    const res = await fetch('https://notion-proxy.33322666666mm.workers.dev/d1/sql', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ sql: 'SELECT パターン, 商品画像URL, トレッドURL FROM パターン画像' })
    });
    const j = await res.json();
    for (const r of (j.results || [])) {
      if (r.パターン) {
        PATTERN_IMAGE_FROM_D1[r.パターン] = {
          image: r.商品画像URL || null,
          treadImage: r.トレッドURL || null
        };
      }
    }
  } catch(e) { /* silent: 画像なくても動作する */ }
}
loadPatternImagesFromD1();

// メーカー別カタログ検索URLビルダー
// 1. DIRECT_CATALOG_URL に登録されている場合は直リンク
// 2. なければメーカー公式サイト内検索へ誘導
function makerCatalogUrl(maker, pattern, brand) {
  // 直リンク優先 (brand+pattern or pattern)
  const k1 = (brand ? brand + ' ' + pattern : pattern).trim();
  if (DIRECT_CATALOG_URL[k1]) return DIRECT_CATALOG_URL[k1];
  if (DIRECT_CATALOG_URL[pattern]) return DIRECT_CATALOG_URL[pattern];
  const q = [brand, pattern].filter(Boolean).join(' ').trim();
  const qe = encodeURIComponent(q);
  switch (maker) {
    case 'BRIDGESTONE': return 'https://www.google.com/search?q=' + encodeURIComponent('site:tire.bridgestone.co.jp ' + q);
    case 'TOYO': case 'TOYO TIRES': return 'https://www.google.com/search?q=' + encodeURIComponent('site:toyotires.jp ' + q);
    case 'DUNLOP': return 'https://www.google.com/search?q=' + encodeURIComponent('site:tyre.dunlop.co.jp ' + q);
    case 'MICHELIN': return 'https://www.google.com/search?q=' + encodeURIComponent('site:michelin.co.jp ' + q);
    case 'PIRELLI': return 'https://www.google.com/search?q=' + encodeURIComponent('site:pirelli.com ' + q);
    case 'YOKOHAMA': return 'https://www.google.com/search?q=' + encodeURIComponent('site:y-yokohama.com ' + q);
    default: return 'https://www.google.com/search?q=' + encodeURIComponent(maker + ' ' + q + ' タイヤ');
  }
}
function priceOpenCatalog(ev, maker, pattern, brand) {
  ev.stopPropagation();
  const url = makerCatalogUrl(maker, pattern, brand);
  // Google検索URLでも、自社おすすめがあるならプレビューモーダルを出す(検索リンク+自社情報)
  const rec = patternToRecommend(pattern, brand);
  if (url.includes('google.com/search') && !rec) {
    window.open(url, '_blank', 'noopener');
    return;
  }
  priceShowCatalogPreview(url, maker, pattern, brand);
}

function priceShowCatalogPreview(url, maker, pattern, brand) {
  let modal = document.getElementById('catalog-preview-modal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'catalog-preview-modal';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px;';
    modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
    document.body.appendChild(modal);
  }
  modal.innerHTML = '';
  const box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:12px;max-width:500px;width:100%;max-height:90vh;overflow:auto;padding:18px;box-shadow:0 10px 30px rgba(0,0,0,0.3);';
  box.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <div style="font-size:14px;font-weight:700;">🔗 ${maker} / ${pattern}</div>
      <button onclick="document.getElementById('catalog-preview-modal').remove()" style="background:none;border:0;font-size:22px;cursor:pointer;line-height:1;">×</button>
    </div>
    <div id="catalog-preview-body" style="font-size:12px;color:var(--muted);padding:20px 0;text-align:center;">読み込み中...</div>
  `;
  modal.appendChild(box);
  // ⚠️ 2026/4/26 メーカー公式の画像取得は136URL中ほぼ全滅(404 or og:image無し)のため一旦OFF。
  // 代わりに PATTERN_RECOMMEND.image (手動登録) があればそれを表示する。
  // 自社おすすめ情報を組み立て (新スキーマ: features/target/pitch/compare、旧 point/pitch も後方互換)
  const rec = patternToRecommend(pattern, brand);
  // 特徴文を読みやすく: 句点で分割→箇条書き
  const formatFeatures = (text) => {
    if (!text) return '';
    const sentences = text.split(/。/).map(s => s.trim()).filter(Boolean);
    if (sentences.length <= 1) return `<div style="font-size:13px;color:#111827;line-height:1.7;">${text}</div>`;
    return `<ul style="margin:0;padding-left:18px;font-size:13px;color:#111827;line-height:1.7;">${sentences.map(s => `<li style="margin-bottom:4px;">${s}。</li>`).join('')}</ul>`;
  };
  // 競合文をメーカー別に整理
  // 入力例: '同クラス: ADVAN dB V553 (YOKOHAMA) / VEURO VE304 (DUNLOP) / PRIMACY 4+ (MICHELIN)。下位: ALENZA LX200 (BS)。BS指定なら第一候補。'
  const MAKER_COLORS = {
    'BRIDGESTONE': '#005bac', 'BS': '#005bac',
    'TOYO': '#e60012', 'TOYO TIRES': '#e60012',
    'DUNLOP': '#ffc20e', 'YOKOHAMA': '#0066b3',
    'MICHELIN': '#fdd835', 'PIRELLI': '#000', 'SEIBERLING': '#666'
  };
  const formatCompare = (text) => {
    if (!text) return '';
    // 句点で分割
    const sections = text.split(/。/).map(s => s.trim()).filter(Boolean);
    const blocks = [];
    for (const sec of sections) {
      // 「ラベル: 内容」の形式か?
      const m = sec.match(/^([^:：]+?)[:：](.+)$/);
      if (m) {
        const label = m[1].trim();
        const body = m[2].trim();
        // メーカー別にグループ化
        // 各候補を / または 、 で分割
        const items = body.split(/[\/、]/).map(x => x.trim()).filter(Boolean);
        // 各 item から (MAKER) を抽出
        const byMaker = {};
        const noMaker = [];
        for (const it of items) {
          const mm = it.match(/^(.+?)\s*\(([^)]+)\)\s*$/);
          if (mm) {
            const product = mm[1].trim();
            const maker = mm[2].trim();
            if (!byMaker[maker]) byMaker[maker] = [];
            byMaker[maker].push(product);
          } else {
            noMaker.push(it);
          }
        }
        const makerKeys = Object.keys(byMaker);
        if (makerKeys.length === 0) {
          // ただの箇条書きとして表示
          blocks.push(`<div style="margin-bottom:8px;"><div style="font-size:11px;font-weight:700;color:#b97a00;margin-bottom:4px;">${label}</div><div style="font-size:12px;color:#1f2937;line-height:1.6;">${body}</div></div>`);
        } else {
          let html = `<div style="margin-bottom:8px;"><div style="font-size:11px;font-weight:700;color:#b97a00;margin-bottom:4px;">${label}</div>`;
          for (const mk of makerKeys) {
            const col = MAKER_COLORS[mk.toUpperCase()] || '#6b7280';
            html += `<div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px;font-size:12px;"><span style="font-size:9px;font-weight:800;padding:2px 6px;border-radius:6px;background:${col};color:#fff;flex-shrink:0;margin-top:1px;min-width:60px;text-align:center;">${mk.replace('BRIDGESTONE','BS')}</span><span style="color:#1f2937;">${byMaker[mk].join(' / ')}</span></div>`;
          }
          if (noMaker.length > 0) {
            html += `<div style="font-size:12px;color:#1f2937;margin-top:4px;">${noMaker.join(' / ')}</div>`;
          }
          html += `</div>`;
          blocks.push(html);
        }
      } else {
        // ラベルなし - そのまま注記として
        blocks.push(`<div style="font-size:12px;color:#374151;line-height:1.6;margin-bottom:6px;">${sec}。</div>`);
      }
    }
    return blocks.join('');
  };

  const buildRecHtml = (rec) => {
    if (!rec) return `
      <div style="text-align:left;background:#f9fafb;border:1px dashed #d1d5db;border-radius:8px;padding:12px 14px;margin:14px 0;font-size:12px;color:#6b7280;">
        このパターンはまだ社内情報未登録です。代表に依頼してください。
      </div>`;
    // 新スキーマ
    if (rec.features || rec.target || rec.compare) {
      return `
        <div style="background:linear-gradient(135deg,#fff8e1,#fff3c4);border-left:4px solid #f0a500;border-radius:10px;padding:14px 16px;margin:14px 0;text-align:left;">
          ${rec.features ? `
            <div style="font-size:11px;font-weight:800;color:#b97a00;letter-spacing:0.04em;margin-bottom:6px;">🔧 特徴・性能</div>
            <div style="margin-bottom:12px;">${formatFeatures(rec.features)}</div>
          ` : ''}
          ${rec.target ? `
            <div style="font-size:11px;font-weight:800;color:#b97a00;letter-spacing:0.04em;margin-bottom:6px;">🚗 想定車種・ユーザー</div>
            <div style="font-size:12px;color:#1f2937;line-height:1.7;margin-bottom:12px;">${rec.target}</div>
          ` : ''}
          ${rec.pitch ? `
            <div style="font-size:11px;font-weight:800;color:#b97a00;letter-spacing:0.04em;margin-bottom:6px;">🗣 お客様への薦め方</div>
            <div style="font-size:12px;color:#374151;line-height:1.75;font-style:italic;background:#fff;border-radius:6px;padding:10px 12px;margin-bottom:12px;">${rec.pitch}</div>
          ` : ''}
          ${rec.compare ? `
            <div style="font-size:11px;font-weight:800;color:#b97a00;letter-spacing:0.04em;margin-bottom:6px;">🔁 競合・代替候補</div>
            <div>${formatCompare(rec.compare)}</div>
          ` : ''}
        </div>`;
    }
    // 旧スキーマ後方互換
    return `
      <div style="background:linear-gradient(135deg,#fff8e1,#fff3c4);border-left:4px solid #f0a500;border-radius:8px;padding:12px 14px;margin:14px 0;text-align:left;">
        ${rec.point ? `<div style="font-size:11px;font-weight:800;color:#b97a00;letter-spacing:0.04em;margin-bottom:6px;">💡 オススメポイント</div><div style="font-size:13px;color:#1f2937;line-height:1.6;margin-bottom:10px;">${rec.point}</div>` : ''}
        ${rec.pitch ? `<div style="font-size:11px;font-weight:800;color:#b97a00;letter-spacing:0.04em;margin-bottom:6px;">🗣 お客様への薦め方</div><div style="font-size:12px;color:#374151;line-height:1.7;font-style:italic;">${rec.pitch}</div>` : ''}
      </div>`;
  };
  const recHtml = buildRecHtml(rec);
  // 手動登録された画像 (rec.image / rec.treadImage) のみ表示
  const renderManualImage = (rec) => {
    if (!rec) return '';
    const tread = rec.treadImage;
    const hero  = rec.image;
    if (tread && hero && tread !== hero) {
      return `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">
          <div><img src="${tread}" alt="${pattern} の溝パターン" style="width:100%;max-height:200px;object-fit:contain;border-radius:8px;background:#f3f4f6;"><div style="font-size:9px;color:var(--muted);text-align:center;margin-top:3px;">トレッドパターン</div></div>
          <div><img src="${hero}" alt="${pattern} のイメージ" style="width:100%;max-height:200px;object-fit:contain;border-radius:8px;background:#f3f4f6;"><div style="font-size:9px;color:var(--muted);text-align:center;margin-top:3px;">商品イメージ</div></div>
        </div>`;
    }
    const single = tread || hero;
    if (!single) return '';
    return `<img src="${single}" alt="${pattern} のイメージ" style="max-width:100%;max-height:240px;object-fit:contain;border-radius:8px;background:#f3f4f6;margin-bottom:12px;">`;
  };
  const body = document.getElementById('catalog-preview-body');
  if (body) {
    body.innerHTML = `
      ${renderManualImage(rec)}
      ${recHtml}
    `;
  }
}

function renderPricePatternStep() {
  const rows = priceState.patternRows;

  const PM_COLOR = {'TOYO':'var(--accent)','TOYO TIRES':'var(--accent)','BRIDGESTONE':'var(--blue)','DUNLOP':'var(--green)','MICHELIN':'var(--yellow)','PIRELLI':'var(--red)','YOKOHAMA':'var(--muted)'};
  // 旧モデルは既定で除外(showOldで切替)

  const rowsFiltered = showOld ? rows : rows.filter(r => !r.oldModel);
  // ブランド×パターンごとに最安値をまとめる (ブランドも表示に使う)
  const patMap = {};
  rowsFiltered.forEach(r => {
    const key = (r.brand||'?') + '|' + r.pattern + '|' + r.maker;
    if(!patMap[key]) patMap[key] = {pattern:r.pattern, brand:r.brand||'', maker:r.maker, minPrice:r.price, oldModel:r.oldModel};
    else {
      if(r.price!==null && (patMap[key].minPrice===null || r.price<patMap[key].minPrice)) patMap[key].minPrice=r.price;
      if(!r.oldModel) patMap[key].oldModel=false;

  const pats = Object.values(patMap).filter(p => !DISCONTINUED_PATTERNS.has(p.pattern));

  pats.sort((a,b) => { const ai=PM_ORDER.indexOf(a.maker),bi=PM_ORDER.indexOf(b.maker); const md=(ai===-1?99:ai)-(bi===-1?99:bi); return md!==0?md:a.pattern.localeCompare(b.pattern); });

  pats.forEach(p => { if(!groups[p.maker]) groups[p.maker]=[]; groups[p.maker].push(p); });
  const orderedMakers = [...PM_ORDER.filter(m=>groups[m]), ...Object.keys(groups).filter(m=>!PM_ORDER.includes(m))];

// 発注管理DBから発注済レコードを取得（発注中統合用）
const HACCHU_DB = '202a695f8e8880aa92f6f38d9b47b537';
async function fooGetPendingOrdersBySize(size) {
  try {
    const filter = { and: [
      { property: 'ステータス', select: { equals: '発注済' } },
      { property: 'サイズ', select: { equals: size } },
    ]};
    const results = [];
    let cursor = null;
    do {
      const body = { filter, page_size: 100 };
      if (cursor) body.start_cursor = cursor;
      const r = await notionAPI('POST', '/databases/' + HACCHU_DB + '/query', body);
      results.push(...(r.results || []));
      cursor = r.has_more ? r.next_cursor : null;
    } while (cursor);
    return results;
  } catch(e) {
    // サイズが発注管理DBのselectオプションに存在しない場合はvalidation_error → 空配列を返す
    console.log('[発注中] サイズ未登録のため0件:', size, e.message?.slice(0, 80));
    return [];
  }
}

async function notionAPI(method, path, body) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 15000);
  try {
    const res = await fetch('https://notion-proxy.33322666666mm.workers.dev' + path, {
      method, headers: { 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined, signal: controller.signal
    });
    clearTimeout(timer);
    const data = await res.json();
    if (data.object === 'error') throw new Error(data.message + ' (code: ' + data.code + ')');
    return data;
  } catch(e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') throw new Error('タイムアウト（15秒）。通信環境を確認してください。');
    throw new Error('通信エラー: ' + e.message);
  }
}


function buildTitle(s) { const db = DB_MAP[state.cat]; const k = state.isMove ? '移動' : state.kubun; const w = state.isMove ? `${state.moveDir.from}→${state.moveDir.to}` : state.warehouse; return `${s} ${state.pattern} ${k} ${w}`; }

async function createRecord(kubun, warehouse) {
  const db = DB_MAP[state.cat];
  const wField = db.warehouseField;
  const props = {
    'タイトル': { title: [{ text: { content: buildTitle(state.size) } }] },
    'サイズコード': { select: { name: (state.size || '').replace(/ /g, '\u3000') } },

    '数量': { number: state.qty },
    '区分': { select: { name: kubun } },
    '作成者': { select: { name: (USER_NAME || '').replace(/ /g, '　') } },
  };
  props[wField] = { select: { name: warehouse } };

    props['出庫先'] = { rich_text: [{ text: { content: state.dest } }] };
  }

async function submitEntry() {
  const _kubunLabel = state.isMove ? `${state.moveDir?.from}→${state.moveDir?.to} 移動` : `${state.kubun} / ${state.warehouse}`;
  if (!confirm(`NotionDBにデータを追加します。よろしいですか？\n\n${state.pattern} ${state.size} ${state.qty}本\n${_kubunLabel}`)) return;
  const btn = document.getElementById('send-btn');
  if (btn) { btn.disabled = true; btn.textContent = '送信中…'; }
  try {
    let result;
    if (state.isMove) {
      result = await createRecord('移動出庫', state.moveDir.from);
      if (result.object === 'error') throw new Error(result.message);
      result = await createRecord('移動入庫', state.moveDir.to);
      if (result.object === 'error') throw new Error(result.message);
    } else {
      result = await createRecord(state.kubun, state.warehouse);
      if (result.object === 'error') throw new Error(result.message);
    }
    // スナップショット更新（バックグラウンド）
    if (state.isMove) {
      updateSnapshot(state.cat, state.pattern, state.size, '移動出庫', state.qty, null, state.moveDir);
    } else {
      updateSnapshot(state.cat, state.pattern, state.size, state.kubun, state.qty, state.warehouse, null);
    }
    // マイナス在庫キャッシュを即時更新（バナーとの不整合を防ぐ）
    refreshNegStockForSize(state.cat, state.size);
    goStep(8);
  } catch(e) {
    const errEl = document.getElementById('confirm-error');
    if (errEl) errEl.innerHTML = `<div class="error-box">送信に失敗しました。<br><small>${e.message}</small></div>`;
    if (btn) { btn.disabled = false; btn.textContent = 'この内容で送信する'; }
  }
}
