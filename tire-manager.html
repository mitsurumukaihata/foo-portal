let historyKubunFilter = '全部'; // 区分フィルター
let historyPatternFilter = '全部'; // パターンフィルター
let historyWhFilter = '全部'; // 倉庫フィルター

async function loadHistory(forceReload) {
  const el = document.getElementById('history-content');
  if (historyLoaded && historyRecords.length && !forceReload) {
    renderHistory();
    return;
  }
  el.innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--muted);font-size:14px;">履歴を読み込み中...</div>';

  try {
    // 年月フィルターでNotion APIクエリを構築
    const startDate = historyMonth > 0
      ? `${historyYear}-${String(historyMonth).padStart(2,'0')}-01T00:00:00+09:00`
      : `${historyYear}-01-01T00:00:00+09:00`;
    const endDate = historyMonth > 0
      ? (historyMonth < 12
          ? `${historyYear}-${String(historyMonth+1).padStart(2,'0')}-01T00:00:00+09:00`
          : `${historyYear+1}-01-01T00:00:00+09:00`)
      : `${historyYear+1}-01-01T00:00:00+09:00`;

    const dateFilter = {
      and: [
        { timestamp: 'created_time', created_time: { on_or_after: startDate } },
        { timestamp: 'created_time', created_time: { before: endDate } },
      ]
    };

    const allRecords = [];
    const catKeys = Object.keys(DB_MAP);
    const fetches = catKeys.map(async (key) => {
      const db = DB_MAP[key];
      const res = await notionAPI('POST', `/databases/${db.id}/query`, {
        filter: dateFilter,
        sorts: [{ timestamp: 'created_time', direction: 'descending' }],
        page_size: 100,
      });
      (res.results || []).forEach(r => {
        // 繰越レコードはクライアント側で除外（DBにオプション未登録の場合APIエラー回避）
        if (r.properties['区分']?.select?.name === '繰越') return;
        r._catKey = key;
        r._catName = db.name;
        allRecords.push(r);
      });
    });
    await Promise.all(fetches);

    allRecords.sort((a, b) => (b.created_time || '').localeCompare(a.created_time || ''));
    historyRecords = allRecords.slice(0, 200);
    historyLoaded = true;
    renderHistory();
  } catch(e) {
    el.innerHTML = `<div class="error-box">履歴の取得に失敗しました。<br><small>${e.message}</small></div>`;
  }
}

function changeHistoryPeriod(year, month) {
  historyYear = year;
  historyMonth = month;
  historyLoaded = false;
  loadHistory(true);
}

function renderHistory() {
  const el = document.getElementById('history-content');
  if (!historyRecords.length) {
    // 年月セレクターは常に表示（月を変更できるように）
    const now = new Date();
    const curYear = now.getFullYear();
    let yOpts = '';
    for (let y = curYear; y >= 2024; y--) {
      yOpts += '<option value="' + y + '"' + (y === historyYear ? ' selected' : '') + '>' + y + '年</option>';
    }
    let mOpts = '<option value="0"' + (historyMonth === 0 ? ' selected' : '') + '>全月</option>';
    for (let mm = 1; mm <= 12; mm++) {
      mOpts += '<option value="' + mm + '"' + (mm === historyMonth ? ' selected' : '') + '>' + mm + '月</option>';
    }
    el.innerHTML = '<div style="display:flex;gap:8px;margin-bottom:10px;align-items:center;">' +
      '<select id="hist-year" onchange="changeHistoryPeriod(+this.value, +document.getElementById(\'hist-month\').value)" style="flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--border2);background:var(--s2);font-size:13px;font-family:inherit;color:var(--text);">' + yOpts + '</select>' +
      '<select id="hist-month" onchange="changeHistoryPeriod(+document.getElementById(\'hist-year\').value, +this.value)" style="flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--border2);background:var(--s2);font-size:13px;font-family:inherit;color:var(--text);">' + mOpts + '</select>' +
      '</div>' +
      '<div style="text-align:center;padding:40px 0;color:var(--muted);font-size:14px;">この期間の履歴はありません</div>';
    return;
  }

  const fmt = (s) => {
    if (!s) return '—';
    const d = new Date(s);
    return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  };

  const propStr = (r, name) => {
    const p = r.properties?.[name];
    if (!p) return '';
    if (p.type === 'title') return p.title?.[0]?.plain_text || '';
    if (p.type === 'rich_text') return p.rich_text?.[0]?.plain_text || '';
    if (p.type === 'select') return p.select?.name || '';
    if (p.type === 'number') return p.number != null ? String(p.number) : '';
    if (p.type === 'date') return p.date?.start || '';
    return '';
  };

  // サイズ候補リストを全カテゴリから生成（重複排除）
  const allSizes = [...new Set(Object.values(DB_MAP).flatMap(db => db.sizes || []))].sort();

  // パターン一覧をロード済みレコードから生成（重複排除・出現数順）
  const patternCounts = {};
  historyRecords.forEach(r => {
    const p = r.properties?.['パターン名']?.select?.name || '';
    if (p) patternCounts[p] = (patternCounts[p] || 0) + 1;
  });
  const historyPatterns = Object.entries(patternCounts).sort((a,b) => b[1]-a[1]).map(e => e[0]);

  // 年月セレクターを生成
  const now = new Date();
  const curYear = now.getFullYear();
  let yearOpts = '';
  for (let y = curYear; y >= 2024; y--) {
    yearOpts += `<option value="${y}"${y === historyYear ? ' selected' : ''}>${y}年</option>`;
  }
  let monthOpts = `<option value="0"${historyMonth === 0 ? ' selected' : ''}>全月</option>`;
  for (let m = 1; m <= 12; m++) {
    monthOpts += `<option value="${m}"${m === historyMonth ? ' selected' : ''}>${m}月</option>`;
  }

  // 区分一覧をレコードから生成（出現数順）
  const kubunCounts = {};
  historyRecords.forEach(r => {
    const k = r.properties?.['区分']?.select?.name || '';
    if (k) kubunCounts[k] = (kubunCounts[k] || 0) + 1;
  });
  const historyKubuns = Object.entries(kubunCounts).sort((a,b) => b[1]-a[1]).map(e => e[0]);

  let html = `
    <div style="display:flex;gap:8px;margin-bottom:10px;align-items:center;">
      <select id="hist-year" onchange="changeHistoryPeriod(+this.value, +document.getElementById('hist-month').value)" style="flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--border2);background:var(--s2);font-size:13px;font-family:inherit;color:var(--text);">${yearOpts}</select>
      <select id="hist-month" onchange="changeHistoryPeriod(+document.getElementById('hist-year').value, +this.value)" style="flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--border2);background:var(--s2);font-size:13px;font-family:inherit;color:var(--text);">${monthOpts}</select>
    </div>
    <div class="search-box" style="margin-bottom:8px;">
      <input id="history-search" type="text" inputmode="numeric" placeholder="例：275 または 27580" autocomplete="off">
      <button class="search-clear" onclick="window._historySelectedSize='';document.getElementById('history-search').value='';filterHistorySizes('');applyHistoryFilter('')">✕</button>
    </div>
    <div id="history-candidates" class="candidates"></div>
    <div id="pattern-tags" style="display:flex;gap:5px;overflow-x:auto;margin-bottom:8px;padding-bottom:4px;-webkit-overflow-scrolling:touch;">
      ${(() => {
        const pSel = historyPatternFilter === '全部';
        let tags = `<button onclick="filterPattern('全部')" style="flex-shrink:0;padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid var(--accent);background:${pSel ? 'var(--accent)' : 'transparent'};color:${pSel ? '#fff' : 'var(--accent)'};transition:all 0.15s;">全部</button>`;
        historyPatterns.forEach(p => {
          const s = p === historyPatternFilter;
          tags += `<button onclick="filterPattern('${p}')" style="flex-shrink:0;padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid var(--blue);background:${s ? 'var(--blue)' : 'transparent'};color:${s ? '#fff' : 'var(--blue)'};transition:all 0.15s;">${p}</button>`;
        });
        return tags;
      })()}
    </div>
    <div id="wh-tags" style="display:flex;gap:5px;overflow-x:auto;margin-bottom:8px;padding-bottom:4px;-webkit-overflow-scrolling:touch;">
      ${(() => {
        const whAll = (typeof historyWhFilter === 'undefined' ? '全部' : historyWhFilter) === '全部';
        const whColors = {'五日市':'#d97706','志和':'#2563eb'};
        let tags = `<button onclick="filterWh('全部')" style="flex-shrink:0;padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid var(--accent);background:${whAll ? 'var(--accent)' : 'transparent'};color:${whAll ? '#fff' : 'var(--accent)'};transition:all 0.15s;">全倉庫</button>`;
        ['五日市','志和'].forEach(w => {
          const sel = (typeof historyWhFilter !== 'undefined') && w === historyWhFilter;
          const col = whColors[w] || 'var(--muted)';
          tags += `<button onclick="filterWh('${w}')" style="flex-shrink:0;padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid ${col};background:${sel ? col : 'transparent'};color:${sel ? '#fff' : col};transition:all 0.15s;">📍${w}</button>`;
        });
        return tags;
      })()}
    </div>
    <div id="kubun-tags" style="display:flex;gap:5px;overflow-x:auto;margin-bottom:8px;padding-bottom:4px;-webkit-overflow-scrolling:touch;">
      ${(() => {
        const kAll = historyKubunFilter === '全部';
        let tags = `<button onclick="filterKubun('全部')" style="flex-shrink:0;padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid var(--accent);background:${kAll ? 'var(--accent)' : 'transparent'};color:${kAll ? '#fff' : 'var(--accent)'};transition:all 0.15s;">全部</button>`;
        historyKubuns.forEach(k => {
          const sel = k === historyKubunFilter;
          const col = kubunColor(k);
          tags += `<button onclick="filterKubun('${k}')" style="flex-shrink:0;padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid ${col};background:${sel ? col : 'transparent'};color:${sel ? '#fff' : col};transition:all 0.15s;">${k}</button>`;
        });
        return tags;
      })()}
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <div style="font-size:11px;color:var(--muted);" id="history-count">${historyYear}年${historyMonth > 0 ? historyMonth+'月' : ''}の履歴（${historyRecords.length}件）</div>
      <button onclick="loadHistory(true)" style="background:var(--s3);border:1px solid var(--border2);border-radius:6px;padding:4px 8px;font-size:10px;color:var(--text);cursor:pointer;font-family:inherit;">↻ 更新</button>
    </div>`;

  // サイズ候補をグローバルに保持
  window._historySizes = allSizes;
  window._historySelectedSize = '';

  // 倉庫別にグループ分け
  const warehouseGroups = {};
  historyRecords.forEach((r, idx) => {
    const wh = (r.properties?.['倉庫']?.select?.name || r.properties?.['出庫倉庫']?.select?.name || '不明').replace(/倉庫$/, '');
    if (!warehouseGroups[wh]) warehouseGroups[wh] = [];
    warehouseGroups[wh].push({ r, idx });
  });

  Object.entries(warehouseGroups).forEach(([wh, items]) => {
    html += `<div class="wh-group" data-wh="${wh}">
      <div style="font-size:11px;font-weight:700;color:var(--accent);padding:6px 0 4px;border-bottom:1px solid var(--border);margin-bottom:4px;">📦 ${wh}倉庫（${items.length}件）</div>`;
    items.forEach(({ r, idx }) => {
      const kubun = r.properties?.['区分']?.select?.name || '';
      const size = r.properties?.['サイズコード']?.select?.name || '';
      const pattern = r.properties?.['パターン名']?.select?.name || '';
      const qty = r.properties?.['数量']?.number ?? '';
      const creator = r.properties?.['作成者']?.select?.name || '';
      const shukko = r.properties?.['出庫先']?.rich_text?.[0]?.plain_text || r.properties?.['出庫先']?.select?.name || '';
      const catIcon = DB_MAP[r._catKey]?.icon || '';

      html += `
      <div onclick="openHistoryDetail(${idx})" style="background:var(--s2);border:0.5px solid var(--border);border-left:3px solid ${kubunColor(kubun)};border-radius:8px;padding:7px 10px;margin-bottom:4px;cursor:pointer;transition:background 0.15s;" id="hist-${idx}" data-size="${(size||'').toLowerCase()}" data-kubun="${kubun}" data-pattern="${pattern}" ontouchstart="this.style.background='var(--s3)'" ontouchend="this.style.background='var(--s2)'">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div style="display:flex;align-items:center;gap:5px;">
            <span style="font-size:12px;">${catIcon}</span>
            <span style="font-size:12px;font-weight:700;">${pattern || '—'}</span>
            <span style="font-size:13px;font-weight:900;font-family:'DM Mono',monospace;color:var(--text);margin-left:2px;">${size || '—'}</span>
          </div>
          <span style="font-size:9px;color:var(--muted);">${fmt(r.created_time)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:3px;">
          <span style="font-size:10px;font-weight:600;color:${kubunColor(kubun)};background:color-mix(in srgb,${kubunColor(kubun)} 12%,transparent);padding:1px 7px;border-radius:4px;">${kubun || '—'}</span>
          <span style="font-size:12px;font-weight:700;color:var(--accent);">${qty}本</span>
          ${shukko ? `<span style="font-size:10px;color:var(--text);">▸${shukko}</span>` : ''}
          ${creator ? `<span style="font-size:9px;color:var(--muted);">${creator}</span>` : ''}
        </div>
      </div>`;
    });
    html += `</div>`;
  });

  el.innerHTML = html;

  // 検索イベントリスナー設定
  const hInput = document.getElementById('history-search');
  if (hInput) {
    hInput.addEventListener('input', e => { window._historySelectedSize = ''; filterHistorySizes(e.target.value); });
  }
}

// ─── 履歴詳細モーダル ──────────────────────────────────────────────────────────
function openHistoryDetail(idx) {
  const r = historyRecords[idx];
  if (!r) return;
  const ps = (name) => {
    const p = r.properties?.[name];
    if (!p) return '—';
    if (p.type === 'title') return p.title?.[0]?.plain_text || '—';
    if (p.type === 'rich_text') return p.rich_text?.[0]?.plain_text || '—';
    if (p.type === 'select') return p.select?.name || '—';
    if (p.type === 'number') return p.number != null ? String(p.number) : '—';
    if (p.type === 'created_by') return p.created_by?.name || '—';
    return '—';
  };
  const db = DB_MAP[r._catKey];
  const kubun = ps('区分');
  const qty = ps('数量');
  const sign = KUBUN_SIGN[kubun] ?? 0;
  const signStr = sign > 0 ? '+' : sign < 0 ? '-' : '';
  const signColor = sign > 0 ? 'var(--green)' : sign < 0 ? 'var(--red)' : 'var(--muted)';
  const kubunColor = (k) => {
    if (k.includes('入庫') || k.includes('返品（倉庫')) return 'var(--green)';
    if (k === '準備') return '#f59e0b';
    if (k.includes('出庫') || k.includes('返品（メーカー')) return 'var(--red)';
    if (k === '発注中') return 'var(--blue)';
    return 'var(--muted)';
  };
  const kColor = kubunColor(kubun);
  const d = new Date(r.created_time);
  const dateStr = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  const editD = r.last_edited_time ? new Date(r.last_edited_time) : null;
  const editStr = editD ? `${editD.getFullYear()}/${editD.getMonth()+1}/${editD.getDate()} ${String(editD.getHours()).padStart(2,'0')}:${String(editD.getMinutes()).padStart(2,'0')}` : '—';

  const row = (label, value, hl) => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);">
      <span style="font-size:12px;color:var(--muted);min-width:80px;">${label}</span>
      <span style="font-size:13px;font-weight:${hl?'700':'500'};color:${hl||'var(--text)'};text-align:right;">${value}</span>
    </div>`;

  let modal = document.getElementById('hist-detail-modal');
  if (!modal) { modal = document.createElement('div'); modal.id = 'hist-detail-modal'; document.body.appendChild(modal); }
  modal.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;padding:20px;';
  modal.innerHTML = `
    <div style="background:var(--bg);width:100%;max-width:400px;border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
      <div style="background:color-mix(in srgb,${kColor} 15%,var(--bg));padding:20px;text-align:center;border-bottom:1px solid var(--border);">
        <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">${db?.icon||''} ${db?.name||''}</div>
        <span style="display:inline-block;font-size:13px;font-weight:700;color:${kColor};background:color-mix(in srgb,${kColor} 18%,transparent);padding:4px 16px;border-radius:20px;">${kubun}</span>
        <div style="font-size:28px;font-weight:800;color:${signColor};margin-top:8px;">${signStr}${qty}本</div>
      </div>
      <div style="padding:4px 20px 8px;">
        ${row('パターン', ps('パターン名'))}
        ${row('サイズ', ps('サイズコード'))}
        ${row('倉庫', ps('倉庫') !== '—' ? ps('倉庫') : ps('出庫倉庫'))}
        ${row('出庫先', ps('出庫先'), ps('出庫先') !== '—' ? '#f59e0b' : '')}
        ${row('入力者', ps('作成者'), '#3b82f6')}
        ${row('メモ', ps('メモ'))}
        ${row('登録日時', dateStr)}
        ${row('最終更新', editStr)}
      </div>
      <div style="padding:0 20px 16px;display:flex;gap:8px;">
        <button onclick="document.getElementById('hist-detail-modal').style.display='none';openHistoryEdit(${idx})" style="flex:2;padding:12px;background:var(--accent);border:none;border-radius:10px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;">編集</button>
        <button onclick="archiveHistoryRecord(${idx})" id="hist-archive-btn" style="flex:1;padding:12px;background:transparent;border:1.5px solid var(--red);border-radius:10px;font-size:12px;font-weight:600;color:var(--red);cursor:pointer;font-family:inherit;">取消</button>
        <button onclick="document.getElementById('hist-detail-modal').style.display='none'" style="flex:1;padding:12px;background:var(--s3);border:none;border-radius:10px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;font-family:inherit;">閉じる</button>
      </div>
    </div>`;
  modal.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
}

async function archiveHistoryRecord(idx) {
  const r = historyRecords[idx];
  if (!r) return;
  const ps = (name) => r.properties?.[name]?.select?.name || r.properties?.[name]?.rich_text?.[0]?.plain_text || '';
  if (!confirm(`この記録を取り消しますか？\n\n${ps('区分')} ${ps('パターン名')} ${ps('サイズコード')} ${r.properties?.['数量']?.number||0}本\n\n※Notionのゴミ箱に移動します`)) return;
  const btn = document.getElementById('hist-archive-btn');
  btn.disabled = true; btn.textContent = '処理中…';
  try {
    await notionAPI('PATCH', `/pages/${r.id}`, { archived: true });
    historyRecords.splice(idx, 1);
    document.getElementById('hist-detail-modal').style.display = 'none';
    renderHistory();
  } catch(e) {
    alert('取消エラー: ' + e.message);
    btn.disabled = false; btn.textContent = '取消';
  }
}

// ─── 履歴レコード編集 ─────────────────────────────────────────────────────────
function openHistoryEdit(idx) {
  const r = historyRecords[idx];
  if (!r) return;
  const propStr = (name) => {
    const p = r.properties?.[name];
    if (!p) return '';
    if (p.type === 'title') return p.title?.[0]?.plain_text || '';
    if (p.type === 'rich_text') return p.rich_text?.[0]?.plain_text || '';
    if (p.type === 'select') return p.select?.name || '';
    if (p.type === 'number') return p.number != null ? String(p.number) : '';
    return '';
  };

  const db = DB_MAP[r._catKey];
  const kubunList = db?.kubun || ['入庫','出庫','準備','返品（倉庫へ）','返品（メーカーへ）'];
  const currentKubun = propStr('区分');
  const currentQty = propStr('数量');
  const currentMemo = propStr('メモ') || propStr('出庫先');

  const kubunOpts = kubunList.map(k => `<option value="${k}" ${k===currentKubun?'selected':''}>${k}</option>`).join('');

  const overlay = document.createElement('div');
  overlay.id = 'history-edit-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;padding:20px;';
  overlay.innerHTML = `
    <div style="background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:20px;max-width:380px;width:100%;">
      <div style="font-size:15px;font-weight:700;margin-bottom:14px;">履歴の編集</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:12px;">${db?.icon || ''} ${propStr('パターン名')} ${propStr('サイズコード')}</div>
      <div style="margin-bottom:10px;">
        <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px;">区分</label>
        <select id="edit-kubun" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border2);background:var(--s3);color:var(--text);font-size:13px;font-family:inherit;">
          ${kubunOpts}
        </select>
      </div>
      <div style="margin-bottom:10px;">
        <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px;">数量</label>
        <input id="edit-qty" type="number" value="${currentQty}" min="1" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border2);background:var(--s3);color:var(--text);font-size:13px;font-family:inherit;box-sizing:border-box;">
      </div>
      <div style="margin-bottom:14px;">
        <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px;">メモ</label>
        <input id="edit-memo" type="text" value="${currentMemo}" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border2);background:var(--s3);color:var(--text);font-size:13px;font-family:inherit;box-sizing:border-box;">
      </div>
      <div id="edit-error" style="margin-bottom:8px;"></div>
      <div style="display:flex;gap:8px;">
        <button id="edit-save-btn" onclick="saveHistoryEdit('${r.id}',${idx})" style="flex:2;background:var(--green);border:none;border-radius:10px;padding:12px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">保存</button>
        <button onclick="closeHistoryEdit()" style="flex:1;background:transparent;border:1.5px solid var(--border2);border-radius:10px;padding:12px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">閉じる</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function closeHistoryEdit() {
  const ov = document.getElementById('history-edit-overlay');
  if (ov) ov.remove();
}

async function saveHistoryEdit(pageId, idx) {
  if (!confirm('この履歴データを修正しますか？\nNotionDBのデータを上書きします。')) return;
  const kubun = document.getElementById('edit-kubun').value;
  const qty = parseInt(document.getElementById('edit-qty').value) || 1;
  const memo = document.getElementById('edit-memo').value.trim();
  const btn = document.getElementById('edit-save-btn');
  btn.disabled = true; btn.textContent = '保存中...';

  try {
    const props = {
      '区分': { select: { name: kubun } },
      '数量': { number: qty },
    };
    // メモフィールド更新（リッチテキストの場合）
    const r = historyRecords[idx];
    if (r.properties['メモ']) {
      props['メモ'] = r.properties['メモ'].type === 'select'
        ? { select: memo ? { name: memo } : null }
        : { rich_text: [{ text: { content: memo } }] };
    }
    if (r.properties['出庫先'] && memo) {
      props['出庫先'] = { rich_text: [{ text: { content: memo } }] };
    }

    await notionAPI('PATCH', `/pages/${pageId}`, { properties: props });

    // ローカルデータも更新
    if (r.properties['区分']) r.properties['区分'] = { type:'select', select:{ name: kubun }};
    if (r.properties['数量']) r.properties['数量'] = { type:'number', number: qty };

    closeHistoryEdit();
    renderHistory();
  } catch(e) {
    document.getElementById('edit-error').innerHTML = `<div class="error-box" style="font-size:11px;">${e.message}</div>`;
    btn.disabled = false; btn.textContent = '保存';
  }
}

// ─── 履歴検索・フィルタ ──────────────────────────────────────────────────────
function filterHistorySizes(v) {
  const q = v.trim();
  const allSizes = window._historySizes || [];
  let hits = [];
  if (q) {
    const dq = digits(q);
    hits = allSizes.filter(s => {
      const ds = digits(s);
      return s.toLowerCase().includes(q.toLowerCase()) || (dq.length >= 3 && ds.startsWith(dq));
    }).slice(0, 8);
  }
  // 候補カードを描画
  const c = document.getElementById('history-candidates');
  if (c) {
    c.innerHTML = hits.map(s => `<div class="candidate${window._historySelectedSize === s ? ' sel' : ''}" onclick="pickHistorySize('${s}')"><span class="candidate-text">${s}</span><span class="candidate-badge">選択</span></div>`).join('');
  }
  // 選択済みサイズがなければカード全表示
  if (!window._historySelectedSize) {
    applyHistoryFilter(q);
  }
}

function pickHistorySize(s) {
  window._historySelectedSize = s;
  document.getElementById('history-search').value = s;
  // 候補を更新（選択状態を反映）
  filterHistorySizes(s);
  // カードをフィルタ
  applyHistoryFilter(s);
}

function applyHistoryFilter(query) {
  const q = (query || '').trim().toLowerCase();
  const kf = historyKubunFilter;
  const pf = historyPatternFilter;

  // ① サイズで絞ったレコードからパターン候補を生成
  const sizeMatchedRecords = historyRecords.filter(r => {
    const size = (r.properties?.['サイズコード']?.select?.name || '').toLowerCase();
    return !q || size.includes(q);
  });
  rebuildPatternTags(sizeMatchedRecords);

  // ② サイズ＋パターンで絞ったレコードから区分候補を生成
  const sizePtnMatchedRecords = sizeMatchedRecords.filter(r => {
    const pattern = r.properties?.['パターン名']?.select?.name || '';
    return pf === '全部' || pattern === pf;
  });
  rebuildKubunTags(sizePtnMatchedRecords);

  // ③ カードの表示/非表示
  const wf = historyWhFilter;
  const cards = document.querySelectorAll('[id^="hist-"]');
  let shown = 0;
  cards.forEach(card => {
    const size = card.getAttribute('data-size') || '';
    const kubun = card.getAttribute('data-kubun') || '';
    const pattern = card.getAttribute('data-pattern') || '';
    const cardWh = (card.closest('.wh-group')?.getAttribute('data-wh') || '');
    const sizeMatch = !q || size.includes(q);
    const patternMatch = pf === '全部' || pattern === pf;
    const kubunDisplay = (kubun === '移動入庫' || kubun === '移動出庫') ? '移動入出庫' : kubun;
    const kubunMatch = kf === '全部' || kubunDisplay === kf;
    const whMatch = wf === '全部' || cardWh === wf;
    const match = sizeMatch && patternMatch && kubunMatch && whMatch;
    card.style.display = match ? '' : 'none';
    if (match) shown++;
  });
  const countEl = document.getElementById('history-count');
  if (countEl) {
    const labels = [];
    if (wf !== '全部') labels.push(wf);
    if (pf !== '全部') labels.push(pf);
    if (kf !== '全部') labels.push(kf);
    const prefix = labels.length ? `[${labels.join('/')}] ` : '';
    countEl.textContent = (q || labels.length) ? `${prefix}${q ? '「'+q+'」' : ''} ${shown}件` : `直近の入出庫履歴（最新${historyRecords.length}件）`;
  }
  // ④ 倉庫グループヘッダーの表示/非表示（中身が全て非表示なら隠す）
  document.querySelectorAll('.wh-group').forEach(g => {
    const visibleCards = g.querySelectorAll('[id^="hist-"]');
    let hasVisible = false;
    visibleCards.forEach(c => { if (c.style.display !== 'none') hasVisible = true; });
    g.style.display = hasVisible ? '' : 'none';
  });
}

// パターンタグを動的に再構築（サイズで絞った結果から）
function rebuildPatternTags(records) {
  const el = document.getElementById('pattern-tags');
  if (!el) return;
  const counts = {};
  records.forEach(r => {
    const p = r.properties?.['パターン名']?.select?.name || '';
    if (p) counts[p] = (counts[p] || 0) + 1;
  });
  const patterns = Object.entries(counts).sort((a,b) => b[1]-a[1]).map(e => e[0]);
  // 選択中パターンが候補に無ければリセット
  if (historyPatternFilter !== '全部' && !patterns.includes(historyPatternFilter)) {
    historyPatternFilter = '全部';
  }
  const pSel = historyPatternFilter === '全部';
  let html = `<button onclick="filterPattern('全部')" style="flex-shrink:0;padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid var(--accent);background:${pSel ? 'var(--accent)' : 'transparent'};color:${pSel ? '#fff' : 'var(--accent)'};transition:all 0.15s;">全部</button>`;
  patterns.forEach(p => {
    const s = p === historyPatternFilter;
    html += `<button onclick="filterPattern('${p}')" style="flex-shrink:0;padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid var(--blue);background:${s ? 'var(--blue)' : 'transparent'};color:${s ? '#fff' : 'var(--blue)'};transition:all 0.15s;">${p}</button>`;
  });
  el.innerHTML = html;
}

// 区分タグを動的に再構築（サイズ＋パターンで絞った結果から）
function rebuildKubunTags(records) {
  const el = document.getElementById('kubun-tags');
  if (!el) return;
  const counts = {};
  records.forEach(r => {
    let k = r.properties?.['区分']?.select?.name || '';
    // 移動入庫・移動出庫 → 移動入出庫に統合
    if (k === '移動入庫' || k === '移動出庫') k = '移動入出庫';
    if (k) counts[k] = (counts[k] || 0) + 1;
  });
  const kubuns = Object.entries(counts).sort((a,b) => b[1]-a[1]).map(e => e[0]);
  // 選択中区分が候補に無ければリセット
  if (historyKubunFilter !== '全部' && !kubuns.includes(historyKubunFilter)) {
    historyKubunFilter = '全部';
  }
  const kAll = historyKubunFilter === '全部';
  let html = `<button onclick="filterKubun('全部')" style="flex-shrink:0;padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid var(--accent);background:${kAll ? 'var(--accent)' : 'transparent'};color:${kAll ? '#fff' : 'var(--accent)'};transition:all 0.15s;">全部</button>`;
  kubuns.forEach(k => {
    const sel = k === historyKubunFilter;
    const col = kubunColor(k);
    html += `<button onclick="filterKubun('${k}')" style="flex-shrink:0;padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid ${col};background:${sel ? col : 'transparent'};color:${sel ? '#fff' : col};transition:all 0.15s;">${k}</button>`;
  });
  el.innerHTML = html;
}

function filterWh(wh) {
  historyWhFilter = wh;
  // タグの色を更新
  var whTags = document.getElementById('wh-tags');
  if (whTags) {
    var whColors = {'五日市':'#d97706','志和':'#2563eb'};
    whTags.querySelectorAll('button').forEach(function(btn) {
      var t = btn.textContent.replace('📍','').trim();
      if (t === '全倉庫') t = '全部';
      var sel = t === wh;
      var col = t === '全部' ? 'var(--accent)' : (whColors[t] || 'var(--muted)');
      btn.style.background = sel ? col : 'transparent';
      btn.style.color = sel ? '#fff' : col;
    });
  }
  var searchInput = document.getElementById('history-search');
  applyHistoryFilter(searchInput ? searchInput.value : '');
}

function filterKubun(kubun) {
  historyKubunFilter = kubun;
  const searchInput = document.getElementById('history-search');
  applyHistoryFilter(searchInput ? searchInput.value : '');
}

function filterPattern(pattern) {
  historyPatternFilter = pattern;
  // パターン変更時は区分をリセット
  historyKubunFilter = '全部';
  const searchInput = document.getElementById('history-search');
  applyHistoryFilter(searchInput ? searchInput.value : '');
}
</script>
