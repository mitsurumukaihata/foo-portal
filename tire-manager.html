<!DOCTYPE html>
<html lang="ja">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>タイヤ入出庫 | Tire Manager f.o.o</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #18181f; --s1: #101015; --s2: #1e1e26; --s3: #26262f;
  --border: #2c2c38; --border2: #3c3c4a; --text: #f0f0f2; --muted: #68687a;
  --accent: #f0a500; --accent2: #f5be40; --green: #22c55e; --blue: #3b82f6;
  --yellow: #f59e0b; --red: #ef4444; --purple: #a855f7;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #fdf6ee; --s1: #ffffff; --s2: #fdf0e4; --s3: #f5e6d4;
    --border: #e8d8c4; --border2: #d8c4a8; --text: #1a1208; --muted: #a08060;
    --accent: #e07000; --accent2: #c05800; --green: #1a9e4a; --blue: #2563eb;
    --yellow: #d97706; --red: #dc2626; --purple: #9333ea;
  }
}
[data-theme="dark"] {
  --bg: #18181f; --s1: #101015; --s2: #1e1e26; --s3: #26262f;
  --border: #2c2c38; --border2: #3c3c4a; --text: #f0f0f2; --muted: #68687a;
  --accent: #f0a500; --accent2: #f5be40; --green: #22c55e; --blue: #3b82f6;
  --yellow: #f59e0b; --red: #ef4444; --purple: #a855f7;
}
[data-theme="light"] {
  --bg: #fdf6ee; --s1: #ffffff; --s2: #fdf0e4; --s3: #f5e6d4;
  --border: #e8d8c4; --border2: #d8c4a8; --text: #1a1208; --muted: #a08060;
  --accent: #e07000; --accent2: #c05800; --green: #1a9e4a; --blue: #2563eb;
  --yellow: #d97706; --red: #dc2626; --purple: #9333ea;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; max-width: 480px; margin: 0 auto; }
#token-gate { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 32px 24px; }
.gate-logo { font-size: 11px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 32px; }
.gate-title { font-size: 28px; font-weight: 900; letter-spacing: -0.03em; margin-bottom: 8px; }
.gate-title span { color: var(--accent); }
.gate-sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; line-height: 1.6; }
.gate-input { width: 100%; background: var(--s2); border: 1.5px solid var(--border); border-radius: 10px; padding: 14px 16px; font-size: 13px; font-family: 'DM Mono', monospace; color: var(--text); outline: none; margin-bottom: 12px; transition: border-color 0.15s; }
.gate-input:focus { border-color: var(--accent); }
.gate-btn { width: 100%; background: var(--accent); border: none; border-radius: 10px; padding: 15px; color: #ffffff; font-size: 15px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; margin-top: 4px; }
.gate-note { font-size: 11px; color: var(--muted); margin-top: 16px; line-height: 1.6; }
.gate-staff-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.gate-staff-btn { background: var(--s2); border: 1.5px solid var(--border); border-radius: 10px; padding: 14px 10px; text-align: center; cursor: pointer; font-size: 14px; font-weight: 700; color: var(--text); transition: all 0.15s; }
.gate-staff-btn:active { transform: scale(0.97); }
.gate-staff-btn.selected { border-color: var(--accent); background: rgba(240,165,0,0.1); color: var(--accent); }
.prep-divider { text-align:center; color:var(--muted); font-size:12px; margin:12px 0; letter-spacing:0.05em; }
.btn-prep { width:100%; background:rgba(240,165,0,0.1); border:1.5px solid var(--accent); border-radius:10px; padding:13px; color:var(--text); font-size:14px; font-family:'Noto Sans JP',sans-serif; cursor:pointer; font-weight:700; transition:all 0.15s; }
.btn-prep:active { transform:scale(0.97); }
.prep-cat-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:4px; }
.prep-cat-btn { background:rgba(240,165,0,0.08); border:1.5px solid var(--accent); border-radius:8px; padding:10px 6px; color:var(--text); font-size:11px; font-family:'Noto Sans JP',sans-serif; cursor:pointer; font-weight:700; transition:all 0.15s; line-height:1.3; }
.prep-cat-btn:active { transform:scale(0.96); }
.btn-prep-list { width:100%; background:var(--s2); border:1.5px solid var(--border); border-radius:10px; padding:13px; color:var(--text); font-size:14px; font-family:'Noto Sans JP',sans-serif; cursor:pointer; font-weight:700; transition:all 0.15s; }
.btn-prep-list:active { transform:scale(0.97); }
.prep-list-item { background:var(--s2); border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:8px; cursor:pointer; transition:all 0.15s; }
.prep-list-item:active { transform:scale(0.98); border-color:var(--accent); }
.prep-row1 { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.prep-dest { font-size:13px; font-weight:700; color:var(--text); flex:1; }
.prep-pattern { font-size:13px; font-weight:700; color:var(--accent); }
.prep-size { font-size:12px; color:var(--muted); font-family:'DM Mono',monospace; }
.prep-row2 { display:flex; gap:12px; }
.prep-qty { font-size:12px; color:var(--green); font-weight:700; }
.prep-warehouse { font-size:12px; color:var(--muted); }
.prep-empty { text-align:center; padding:32px 20px; color:var(--muted); font-size:14px; }
.prep-wh-group { margin-bottom:20px; }
.prep-wh-header { font-size:16px; font-weight:700; color:var(--text); padding:10px 0 8px; border-bottom:2.5px solid var(--text); margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
.prep-wh-total { font-size:13px; font-weight:700; color:var(--muted); }
.prep-dest-group { margin-bottom:12px; margin-left:4px; }
.prep-dest-header { display:flex; justify-content:space-between; align-items:center; padding:6px 4px 4px; border-bottom:1.5px solid var(--accent); margin-bottom:6px; }
.prep-dest-name { font-size:14px; font-weight:700; color:var(--text); }
.prep-dest-total { font-size:12px; font-weight:700; color:var(--muted); }
.prep-all-item { background:var(--s2); border:1px solid var(--border); border-radius:8px; padding:10px 12px; margin-bottom:6px; cursor:pointer; transition:all 0.12s; }
.prep-all-item:active { transform:scale(0.98); border-color:var(--accent); }
.prep-all-row1 { display:flex; justify-content:space-between; align-items:center; margin-bottom:3px; }
.prep-all-size { font-size:15px; font-weight:700; color:var(--text); font-family:'DM Mono',monospace; }
.prep-all-qty { font-size:14px; font-weight:700; color:var(--green); }
.prep-all-row2 { display:flex; gap:8px; align-items:center; }
.prep-cat-tag { font-size:10px; color:var(--muted); background:var(--s1); border:1px solid var(--border); padding:1px 6px; border-radius:4px; }
.prep-row3 { font-size:11px; color:var(--muted); margin-top:3px; }
.prep-compact-group { border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-bottom:6px; }
.prep-compact-item { display:flex; align-items:center; gap:6px; padding:7px 10px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.1s; }
.prep-compact-item:last-child { border-bottom:none; }
.prep-compact-item:active { background:var(--s3); }
.prep-compact-size { font-size:12px; font-weight:400; color:var(--text); font-family:'DM Mono',monospace; flex:1; min-width:0; }
.prep-compact-pattern { font-size:12px; font-weight:700; color:var(--text); flex-shrink:0; min-width:50px; }
.prep-compact-qty { font-size:12px; font-weight:700; color:var(--green); flex-shrink:0; min-width:30px; text-align:right; }
.prep-compact-memo { font-size:10px; color:var(--muted); flex-shrink:0; }
#app { display: none; flex-direction: column; min-height: 100vh; }
.header { background:var(--s1); border-bottom:0.5px solid var(--border); padding:14px 20px 10px; position:sticky; top:0; z-index:100; }
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:2px; }
.header-brand { font-size:10px; color:var(--muted); letter-spacing:0.12em; text-transform:uppercase; }
.header-back { font-size:11px; color:var(--muted); text-decoration:none; border:0.5px solid var(--border); border-radius:20px; padding:3px 10px; }
.header-title { font-size:17px; font-weight:900; letter-spacing:-0.02em; }
.header-title span { color:var(--accent); }
.nav { display: flex; background: var(--s1); border-bottom: 0.5px solid var(--border); }
.nav-btn { flex: 1; padding: 10px 6px 8px; background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-size: 12px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; transition: all 0.15s; }
.nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.page { display: none; flex: 1; overflow-y: auto; padding-bottom: 40px; }
.page.active { display: block; }
.step-bar { display: flex; gap: 4px; padding: 12px 20px; background: var(--s1); border-bottom: 0.5px solid var(--border); }
.step-dot { height: 2px; flex: 1; background: var(--border); border-radius: 2px; transition: background 0.3s; }
.step-dot.done { background: var(--accent); }
.step-dot.active { background: var(--accent2); }
.content { padding: 20px; }
.screen-label { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
.screen-title { font-size: 20px; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 6px; line-height: 1.2; }
.screen-sub { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 16px; }
.btn-primary { width: 100%; background: var(--accent); border: none; border-radius: 10px; padding: 14px; color: #ffffff; font-size: 14px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; margin-top: 10px; transition: opacity 0.15s; }
.btn-primary:disabled { opacity: 0.4; cursor: default; }
.btn-secondary { width: 100%; background: transparent; border: 1.5px solid var(--border2); border-radius: 10px; padding: 12px; color: var(--text); font-size: 14px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; margin-top: 6px; font-weight: 500; }
.btn-danger { width: 100%; background: transparent; border: 1px solid var(--red); border-radius: 10px; padding: 11px; color: var(--red); font-size: 13px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; margin-top: 6px; }
.search-box { background: var(--s2); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; transition: border-color 0.15s; }
.search-box:focus-within { border-color: var(--accent); }
.search-box input { background: transparent; border: none; outline: none; color: var(--text); font-size: 18px; font-family: 'DM Mono', monospace; font-weight: 500; flex: 1; width: 100%; }
.search-box input::placeholder { color: var(--muted); font-size: 14px; font-family: 'Noto Sans JP', sans-serif; }
.search-clear { background: var(--s3); border: none; border-radius: 50%; width: 20px; height: 20px; color: var(--muted); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.candidates { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.candidate { background: var(--s2); border: 1.5px solid var(--border); border-radius: 8px; padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: all 0.12s; }
.candidate:active { transform: scale(0.98); }
.candidate.sel { border-color: var(--accent); background: rgba(240,165,0,0.08); }
.candidate-text { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; }
.candidate-badge { font-size: 9px; padding: 2px 7px; border-radius: 20px; background: rgba(240,165,0,0.12); color: var(--accent2); }
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.cat-card { background: var(--s2); border: 1.5px solid var(--border); border-radius: 10px; padding: 14px 12px; cursor: pointer; transition: all 0.12s; }
.cat-card:active { transform: scale(0.97); }
.cat-card.sel { border-color: var(--accent); background: rgba(240,165,0,0.08); }
.cat-icon { font-size: 18px; margin-bottom: 6px; display: block; }
.cat-name { font-size: 12px; font-weight: 700; line-height: 1.3; }
.cat-sub { font-size: 10px; color: var(--muted); margin-top: 3px; }
.pattern-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.pattern-item { background: var(--s2); border: 1.5px solid var(--border); border-radius: 8px; padding: 12px 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all 0.12s; }
.pattern-item:active { transform: scale(0.98); }
.pattern-item.sel { border-color: var(--accent); background: rgba(240,165,0,0.08); }
.pattern-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; transition: background 0.15s; }
.pattern-item.sel .pattern-dot { background: var(--accent); }
.pattern-name { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; }
.numpad-disp { background: var(--s2); border: 1.5px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 12px; }
.num-val { font-size: 52px; font-weight: 500; color: var(--text); font-family: 'DM Mono', monospace; line-height: 1; }
.num-val.empty { color: var(--muted); font-size: 24px; padding: 14px 0; }
.num-unit { font-size: 13px; color: var(--muted); margin-top: 4px; }
.numpad { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 10px; }
.np-btn { background: var(--s2); border: 1.5px solid var(--border); border-radius: 10px; padding: 16px; font-size: 18px; font-weight: 500; color: var(--text); cursor: pointer; text-align: center; transition: all 0.1s; font-family: 'DM Mono', monospace; }
.np-btn:active { background: var(--s3); transform: scale(0.95); }
.np-del { color: var(--accent); }
.type-group { margin-bottom: 16px; }
.type-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.type-sep { height: 8px; }
.type-btn { border-radius: 8px; padding: 10px 6px; cursor: pointer; text-align: center; border: 1.5px solid transparent; transition: all 0.12s; }
.type-btn:active { transform: scale(0.96); }
.type-btn .tn { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
.type-btn .ts { font-size: 9px; opacity: 0.7; }
.t-in  { background: rgba(34,197,94,0.12);  color: var(--green); }
.t-in.sel  { border-color: var(--green); }
.t-out { background: rgba(239,68,68,0.12);  color: var(--red); }

.t-r2  { background: rgba(168,85,247,0.12); color: var(--purple); }

.dest-wrap { margin-top: 12px; }
.dest-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.dest-input { width: 100%; background: var(--s2); border: 1.5px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; color: var(--text); outline: none; transition: border-color 0.15s; }
.dest-input:focus { border-color: var(--accent); }
.dest-input::placeholder { color: var(--muted); }
.soko-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.soko-btn { background: var(--s2); border: 1.5px solid var(--border); border-radius: 10px; padding: 14px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all 0.12s; }

.soko-btn.sel { border-color: var(--accent); background: rgba(240,165,0,0.08); }

async function _updateSnapshotRecord(catName, pattern, size, warehouse, delta) {
  if (!warehouse || warehouse === '海田倉庫' || warehouse === '未定') return;
  const searchRes = await notionAPI('POST', `/databases/${SNAPSHOT_DB}/query`, {
    filter: { and: [
      { property: 'パターン名', rich_text: { equals: pattern } },
      { property: 'サイズコード', rich_text: { equals: size } },
      { property: '倉庫', select: { equals: warehouse } },
      { property: 'カテゴリ', select: { equals: catName } },
    ]},
    page_size: 1
  });
  if (searchRes.results && searchRes.results.length > 0) {
    const page = searchRes.results[0];
    const current = page.properties['在庫数']?.number ?? 0;
    await notionAPI('PATCH', `/pages/${page.id}`, {
      properties: { '在庫数': { number: current + delta } }
    });
  } else {
    await notionAPI('POST', '/pages', {
      parent: { database_id: SNAPSHOT_DB },
      properties: {
        'Name':       { title: [{ text: { content: `${pattern}|${size}|${warehouse}` } }] },
        'パターン名': { rich_text: [{ text: { content: pattern } }] },
        'サイズコード':{ rich_text: [{ text: { content: size } }] },
        'カテゴリ':   { select: { name: catName } },
        '倉庫':       { select: { name: warehouse } },
        '在庫数':     { number: Math.max(0, delta) },
      }
    });
  }
}

// ログイン時バックグラウンド全スキャン（全DBの全レコードを一括取得）
async function backgroundNegScan() {
  for (const [catKey, db] of Object.entries(DB_MAP)) {
    try {
      const kurikoshiDate = await getKurikoshiDate(db.id);
      let all = [], cursor;
      // サイズフィルターなしで全レコードを取得（繰越以降 or 準備は常時）
      const filter = kurikoshiDate ? { or: [
        { timestamp: 'created_time', created_time: { on_or_after: kurikoshiDate } },
        { property: '区分', select: { equals: '準備' } }
      ]} : undefined;
      while (true) {
        const body = { page_size: 100 };
        if (filter) body.filter = filter;
        if (cursor) body.start_cursor = cursor;
        const res = await notionAPI('POST', `/databases/${db.id}/query`, body);
        if (res.object === 'error') break;
        all = all.concat(res.results);
        if (!res.has_more) break;
        cursor = res.next_cursor;
      }
      // サイズ別に在庫計算
      const bySize = {};
      all.forEach(r => {
        const props = r.properties;
        const size = props['サイズコード']?.select?.name;
        const pattern = props['パターン名']?.select?.name;
        const warehouse = props[db.warehouseField]?.select?.name;
        const qty = props['数量']?.number || 0;
        const kubun = props['区分']?.select?.name || '';
        if (!size || !pattern || kubun === '発注中' || !warehouse) return;
        const sign = KUBUN_SIGN[kubun] || 0;
        if (sign === 0) return;
        if (!bySize[size]) bySize[size] = {};
        if (!bySize[size][pattern]) bySize[size][pattern] = {};
        bySize[size][pattern][warehouse] = (bySize[size][pattern][warehouse] || 0) + sign * qty;
      });
      // マイナス検出・キャッシュ更新（このカテゴリの全エントリをクリアしてから再登録）
      NEGATIVE_STOCK_ITEMS = NEGATIVE_STOCK_ITEMS.filter(i => i.catKey !== catKey);
      const now = Date.now();
      Object.entries(bySize).forEach(([size, patterns]) => {
        Object.entries(patterns).forEach(([pattern, warehouses]) => {
          Object.entries(warehouses).forEach(([warehouse, qty]) => {
            if (qty < 0) NEGATIVE_STOCK_ITEMS.push({ catKey, size, pattern, warehouse, qty, t: now });
          });
        });
      });
      saveNegStock();
    } catch(e) { console.warn('backgroundNegScan', catKey, e.message); }
  }
  refreshNegBanners(); // スキャン完了後にバナーを更新
}

function digits(s) { return s.replace(/[^\d]/g, ''); }
function filterSizes(v) {
  const q = v.trim();
  const all = Object.values(DB_MAP).flatMap(db => db.sizes);
  const uniq = [...new Set(all)];
  let hits = [];
  if (q) {
    const dq = digits(q);
    hits = uniq.filter(s => {
      const ds = digits(s);
      return s.toLowerCase().includes(q.toLowerCase()) || (dq.length >= 3 && ds.startsWith(dq));
    }).slice(0, 8);
  }
  const c = document.getElementById('sz-candidates');
  if (!c) return;
  c.innerHTML = hits.map(s => `<div class="candidate${state.size === s ? ' sel' : ''}" onclick="pickSize('${s}')"><span class="candidate-text">${s}</span><span class="candidate-badge">選択</span></div>`).join('');

  if (btn) btn.disabled = !state.size;
}

function renderPatternItems(patterns, query) {
  const q = query.trim().toLowerCase();
  const hits = (q ? patterns.filter(p => p.toLowerCase().includes(q)) : patterns).filter(p => !DISCONTINUED_PATTERNS.has(p));
  if (hits.length === 0) return `<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px;">該当なし</div>`;
  // 検索中はフラット表示（メーカーバッジ付き）
  if (q) {
    return hits.map(p => {
      const sel = state.pattern === p;
      const maker = getMaker(p);
      const mc = MAKER_COLOR_MAP[maker] || 'var(--muted)';
      const label = maker.replace(' TIRES','');
      return `<div class="pattern-item${sel ? ' sel' : ''}" onclick="pickPattern('${p}')"><div class="pattern-dot" style="background:${sel?'var(--accent)':mc}"></div><div class="pattern-name">${p}</div><span style="margin-left:auto;font-size:10px;font-weight:700;color:${mc};">${label}</span></div>`;
    }).join('');
  }
  // 通常はメーカー別グループ表示
  const groups = {};
  hits.forEach(p => { const m = getMaker(p); if (!groups[m]) groups[m] = []; groups[m].push(p); });
  const orderedMakers = [...MAKER_PRIORITY.filter(m => groups[m]), ...Object.keys(groups).filter(m => !MAKER_PRIORITY.includes(m))];
  return orderedMakers.map(maker => {
    const mc = MAKER_COLOR_MAP[maker] || 'var(--muted)';
    const label = maker.replace(' TIRES','');
    const header = `<div style="margin-top:10px;margin-bottom:2px;padding:3px 8px;background:var(--s2);border-left:3px solid ${mc};border-radius:0 4px 4px 0;"><span style="font-size:10px;font-weight:700;letter-spacing:0.08em;color:${mc};">${label}</span></div>`;
    const items = groups[maker].map(p => {
      const sel = state.pattern === p;
      return `<div class="pattern-item${sel?' sel':''}" onclick="pickPattern('${p}')"><div class="pattern-dot" style="background:${sel?'var(--accent)':mc}"></div><div class="pattern-name">${p}</div></div>`;
    }).join('');
    return header + items;
  }).join('');
}
function filterPatterns(q) { const db = DB_MAP[state.cat]; const list = document.getElementById('pattern-list'); if (list) list.innerHTML = renderPatternItems(db.patterns, q); }
function pickPattern(p) {
  state.pattern = p;

// カテゴリ別の準備リスト（出庫ボタンから直接）
async function loadPrepList(catKey) {
  const el = document.getElementById('entry-content');
  el.innerHTML = `<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">準備中タイヤを取得中…</div></div>`;
  const db = DB_MAP[catKey];
  try {
    let all = [], cursor;
    while (true) {
      const body = { filter: { property: '区分', select: { equals: '準備' } }, sorts: [{ property: '日付', direction: 'descending' }], page_size: 100 };
      if (cursor) body.start_cursor = cursor;
      const res = await notionAPI('POST', `/databases/${db.id}/query`, body);
      if (res.object === 'error') throw new Error(res.message);
      all = all.concat(res.results);
      if (!res.has_more) break;
      cursor = res.next_cursor;
    }
    renderPrepListByCat(catKey, all);
  } catch(e) {
    el.innerHTML = `<div class="content"><div class="error-box">データの取得に失敗しました。<br><small>${e.message}</small></div><button class="btn-secondary" onclick="renderEntry()">← 戻る</button></div>`;
  }
}

function renderPrepListByCat(catKey, records) {
  const el = document.getElementById('entry-content');
  const db = DB_MAP[catKey];

  if (records.length === 0) {
    el.innerHTML = `<div class="content"><div class="screen-label">準備中タイヤ一覧</div><div class="screen-title">${db.icon} ${db.name}</div><div class="prep-empty">準備中のタイヤはありません</div><button class="btn-secondary" style="margin-top:8px;" onclick="renderEntry()">← 戻る</button></div>`;
    return;
  }

  // 倉庫 → 出庫先 でグループ化
  const byWarehouse = {};
  records.forEach(r => {
    const p = r.properties;
    const wh = p[db.warehouseField]?.select?.name || '不明';
    const dest = p['出庫先']?.rich_text?.[0]?.plain_text || '（出庫先なし）';
    if (!byWarehouse[wh]) byWarehouse[wh] = {};
    if (!byWarehouse[wh][dest]) byWarehouse[wh][dest] = [];
    byWarehouse[wh][dest].push(r);
  });

  const whOrder = ['五日市倉庫','志和倉庫','海田倉庫'];
  const sortedWh = Object.keys(byWarehouse).sort((a, b) => {
    const ia = whOrder.indexOf(a), ib = whOrder.indexOf(b);
    if (ia >= 0 && ib >= 0) return ia - ib;
    if (ia >= 0) return -1;
    if (ib >= 0) return 1;
    return a.localeCompare(b, 'ja');
  });

  const totalQty = records.reduce((s, r) => s + (r.properties['数量']?.number || 0), 0);

  let html = '';
  sortedWh.forEach(wh => {
    const dests = byWarehouse[wh];
    const whQty = Object.values(dests).flat().reduce((s, r) => s + (r.properties['数量']?.number || 0), 0);

    html += `<div class="prep-wh-group">`;
    html += `<div class="prep-wh-header">${wh}<span class="prep-wh-total">${whQty}本</span></div>`;

    // 出庫先を五十音順（出庫先なしは末尾）
    const sortedDests = Object.keys(dests).sort((a, b) => {
      if (a === '（出庫先なし）') return 1;
      if (b === '（出庫先なし）') return -1;
      return a.localeCompare(b, 'ja');
    });

    sortedDests.forEach(dest => {
      const destRecords = dests[dest];
      const destQty = destRecords.reduce((s, r) => s + (r.properties['数量']?.number || 0), 0);

      html += `<div class="prep-dest-group">`;
      html += `<div class="prep-dest-header"><span class="prep-dest-name">${dest}</span><span class="prep-dest-total">${destQty}本</span></div>`;
      html += `<div class="prep-compact-group">`;

      destRecords.forEach(r => {
        const p = r.properties;
        const pattern = p['パターン名']?.select?.name || '―';
        const size = p['サイズコード']?.select?.name || '―';
        const qty = p['数量']?.number ?? 0;
        const memo = p['メモ']?.rich_text?.[0]?.plain_text || '';
        html += `<div class="prep-compact-item" onclick="renderPrepEdit('${r.id}','${catKey}')"><span class="prep-compact-pattern">${pattern}</span><span class="prep-compact-size">${size}</span><span class="prep-compact-qty">${qty}本</span>${memo?`<span class="prep-compact-memo">${memo}</span>`:''}</div>`;
      });

      html += `</div></div>`;
    });

    html += `</div>`;
  });

  el.innerHTML = `<div class="content"><div class="screen-label">準備中タイヤ一覧</div><div class="screen-title">${db.icon} ${db.name}</div><div style="font-size:12px;color:var(--muted);margin-bottom:12px;">${records.length}件 ／ ${totalQty}本</div>${html}<button class="btn-secondary" style="margin-top:8px;" onclick="renderEntry()">← 戻る</button></div>`;
}

// ─── 全カテゴリ横断：準備中タイヤ一覧（出庫先別） ───────────────────────────
async function loadAllPrepList() {
  const el = document.getElementById('entry-content');
  el.innerHTML = `<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">全カテゴリの準備中タイヤを取得中…</div></div>`;
  const allItems = [];
  try {
    for (const [catKey, db] of Object.entries(DB_MAP)) {
      let cursor;
      while (true) {
        const body = { filter: { property: '区分', select: { equals: '準備' } }, sorts: [{ property: '日付', direction: 'descending' }], page_size: 100 };
        if (cursor) body.start_cursor = cursor;
        const res = await notionAPI('POST', `/databases/${db.id}/query`, body);
        if (res.object === 'error') break;
        res.results.forEach(r => {
          const p = r.properties;
          allItems.push({
            id: r.id,
            catKey,
            catName: db.name,
            catIcon: db.icon,
            dest: p['出庫先']?.rich_text?.[0]?.plain_text || '',
            pattern: p['パターン名']?.select?.name || '―',
            size: p['サイズコード']?.select?.name || '―',
            qty: p['数量']?.number ?? 0,
            warehouse: p[db.warehouseField]?.select?.name || '―',
            memo: p['メモ']?.rich_text?.[0]?.plain_text || '',
          });
        });
        if (!res.has_more) break;
        cursor = res.next_cursor;
      }
    }
    renderAllPrepList(allItems);
  } catch(e) {
    el.innerHTML = `<div class="content"><div class="error-box">データの取得に失敗しました。<br><small>${e.message}</small></div><button class="btn-secondary" onclick="renderEntry()">← 戻る</button></div>`;
  }
}

    if (!byWarehouse[wh]) byWarehouse[wh] = {};
    if (!byWarehouse[wh][dest]) byWarehouse[wh][dest] = [];
    byWarehouse[wh][dest].push(item);
  });

  const whOrder = ['五日市倉庫','志和倉庫','海田倉庫'];
  const sortedWh = Object.keys(byWarehouse).sort((a, b) => {
    const ia = whOrder.indexOf(a), ib = whOrder.indexOf(b);
    if (ia >= 0 && ib >= 0) return ia - ib;
    if (ia >= 0) return -1;
    if (ib >= 0) return 1;

  });

  let html = '';
  sortedWh.forEach(wh => {

    sortedDests.forEach(dest => {

      html += `<div class="prep-dest-group">`;

        html += `<div class="prep-compact-item" onclick="renderPrepEdit('${item.id}','${item.catKey}')"><span class="prep-compact-pattern">${item.pattern}</span><span class="prep-compact-size">${item.size}</span><span class="prep-cat-tag" style="flex-shrink:0;">${item.catName}</span><span class="prep-compact-qty">${item.qty}本</span>${item.memo?`<span class="prep-compact-memo">📝${item.memo}</span>`:''}</div>`;
      });

      html += `</div></div>`;
    });

  });

}

    props[wField] = { select: { name: warehouse } };
    if (dest) props['出庫先'] = { rich_text: [{ text: { content: dest } }] };
    await notionAPI('PATCH', `/pages/${pageId}`, { properties: props });

    // スナップショット更新（準備→出庫）

let stockState = { step: 0, size: '', cat: '', records: [] };

function filterStockSizes(v) {
  const q = v.trim();
  const all = Object.values(DB_MAP).flatMap(db => db.sizes);
  const uniq = [...new Set(all)];
  let hits = [];
  if (q) { const dq = digits(q); hits = uniq.filter(s => { const ds = digits(s); return s.toLowerCase().includes(q.toLowerCase()) || (dq.length >= 3 && ds.startsWith(dq)); }).slice(0, 8); }
  const c = document.getElementById('stock-sz-candidates');
  if (!c) return;
  c.innerHTML = hits.map(s => `<div class="candidate" onclick="pickStockSize('${s}')"><span class="candidate-text">${s}</span><span class="candidate-badge">選択</span></div>`).join('');
}
function pickStockSize(s) {
  stockState.size = s;
  const matching = Object.entries(DB_MAP).filter(([k, db]) => db.sizes.includes(s));
  if (matching.length === 1) { loadStockData(s, matching[0][0]); } else { renderStockCatSelect(s, matching); }
}

// ── 繰越日を取得（DBから区分="繰越"の最新レコードを探す）──
async function getKurikoshiDate(dbId) {
  try {
    const res = await notionAPI('POST', `/databases/${dbId}/query`, {
      filter: { property: '区分', select: { equals: '繰越' } },
      sorts: [{ timestamp: 'created_time', direction: 'ascending' }],
      page_size: 1
    });
    if (res.results?.length) return res.results[0].created_time;
  } catch(e) { console.warn('繰越日取得失敗:', e); }
  return null;
}
async function loadStockData(size, catKey) {
  const el = document.getElementById('stock-content');
  el.innerHTML = `<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">在庫データを取得中…</div></div>`;
  const db = DB_MAP[catKey];
  try {
    const kurikoshiDate = await getKurikoshiDate(db.id);
    const records = await fetchAllRecords(db.id, size, kurikoshiDate);
    renderStockResult(size, catKey, records);
  }
  catch(e) { el.innerHTML = `<div class="content"><div class="error-box">データの取得に失敗しました。<br>${e.message}</div><button class="btn-secondary" onclick="renderStockHome()">← 戻る</button></div>`; }
}
async function fetchAllRecords(dbId, sizeFilter, kurikoshiDate) {
  let all = [], cursor;
  const sizeF = { property: 'サイズコード', select: { equals: sizeFilter } };
  // 繰越ベースラインには準備が含まれている（繰越時点の実在庫）。
  // 発注中は実物がないため繰越に含まれず、日付に関係なく常に取得する。
  // 準備は繰越後の新規準備のみ取得（繰越以降のレコードに含まれる）。
  const filter = kurikoshiDate
    ? { and: [ sizeF, { or: [
        { timestamp: 'created_time', created_time: { on_or_after: kurikoshiDate } },
        { property: '区分', select: { equals: '発注中' } }
      ]}]}
    : sizeF;
  while (true) {
    const body = { filter, page_size: 100 };
    if (cursor) body.start_cursor = cursor;
    const res = await notionAPI('POST', `/databases/${dbId}/query`, body);
    if (res.object === 'error') throw new Error(res.message);
    all = all.concat(res.results);
    if (!res.has_more) break;
    cursor = res.next_cursor;
  }
  return all;
}
function calcStock(records, catKey) {
  const db = DB_MAP[catKey]; const wField = db.warehouseField;
  const stock = {}; const prepStock = {}; const orderStock = {};
  db.patterns.forEach(p => {
    stock[p] = {}; prepStock[p] = {}; orderStock[p] = {};
    WAREHOUSES.forEach(w => { stock[p][w] = 0; prepStock[p][w] = 0; orderStock[p][w] = 0; });
  });
  records.forEach(r => {
    const props = r.properties;
    const pattern = props['パターン名']?.select?.name;
    const warehouse = props[wField]?.select?.name;
    const qty = props['数量']?.number || 0;
    const kubun = props['区分']?.select?.name || '';
    if (!pattern) return;
    if (kubun === '発注中') {
      var wh = warehouse || '五日市倉庫';
      if (!orderStock[pattern]) orderStock[pattern] = {};
      if (!orderStock[pattern][wh]) orderStock[pattern][wh] = 0;
      orderStock[pattern][wh] += qty;
      return;
    }
    if (!warehouse) return;
    const sign = KUBUN_SIGN[kubun] || 0;
    if (!stock[pattern]) stock[pattern] = {};
    if (!stock[pattern][warehouse]) stock[pattern][warehouse] = 0;
    stock[pattern][warehouse] += sign * qty;
    if (kubun === '準備') {
      if (!prepStock[pattern]) prepStock[pattern] = {};
      if (!prepStock[pattern][warehouse]) prepStock[pattern][warehouse] = 0;
      prepStock[pattern][warehouse] += qty;
    }
  });
  return { stock, prepStock, orderStock, records, catKey };
}

  });
  // 倉庫別カラム定義: [倉庫名, 短縮名, 準備あり, 発注中あり]
  var WH_COLS = [
    { wh: '五日市倉庫', short: '五日市', hasPrep: true, hasOrd: true },
    { wh: '志和倉庫',   short: '志和',   hasPrep: true, hasOrd: true },

  });
  colHeaderHtml += '</div>';

  var html = '<div class="content">';
  html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;"><button onclick="renderStockHome()" style="background:transparent;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:0;">&#8592;</button><div class="screen-label" style="margin:0;">在庫確認</div></div>';

  // パターンを在庫有無で分類（倉庫別の準備・発注中も含めて判定）
  function patternHasAny(p) {
    var total = WAREHOUSES.reduce(function(s,w){ return s+(stock[p]?.[w]||0); },0);
    var totalPrep = WAREHOUSES.reduce(function(s,w){ return s+(prepStock[p]?.[w]||0); },0);
    var totalOrd = WAREHOUSES.reduce(function(s,w){ return s+(orderStock[p]?.[w]||0); },0);
    return total > 0 || totalPrep > 0 || totalOrd > 0;
  }
  var hasStockPatterns = sortedPatterns.filter(function(p) { return patternHasAny(p); });
  var noStockPatterns = sortedPatterns.filter(function(p) { return !patternHasAny(p); });

  // ヘッダーを1回だけ表示（sticky固定）

    var _lastMaker = null;
    patterns.forEach(function(p) {

      if (maker !== _lastMaker) {
        _lastMaker = maker;
        var mc = MAKER_COLOR[maker] || 'var(--muted)';

      WH_COLS.forEach(function(wc, i) {

// ─── Notion API ──────────────────────────────────────────────────────────────
async function notionAPI(method, path, body) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 15000);
  try {
    const res = await fetch('https://notion-proxy.33322666666mm.workers.dev' + path, {
      method, headers: { 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined, signal: controller.signal
    });
    clearTimeout(timer);
    const data = await res.json();
    if (data.object === 'error') throw new Error(data.message + ' (code: ' + data.code + ')');
    return data;
  } catch(e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') throw new Error('タイムアウト（15秒）。通信環境を確認してください。');
    throw new Error('通信エラー: ' + e.message);
  }
}

async function submitEntry() {
  const _kubunLabel = state.isMove ? `${state.moveDir?.from}→${state.moveDir?.to} 移動` : `${state.kubun} / ${state.warehouse}`;
  if (!confirm(`NotionDBにデータを追加します。よろしいですか？\n\n${state.pattern} ${state.size} ${state.qty}本\n${_kubunLabel}`)) return;
  const btn = document.getElementById('send-btn');
  if (btn) { btn.disabled = true; btn.textContent = '送信中…'; }
  try {
    let result;
    if (state.isMove) {
      result = await createRecord('移動出庫', state.moveDir.from);
      if (result.object === 'error') throw new Error(result.message);
      result = await createRecord('移動入庫', state.moveDir.to);
      if (result.object === 'error') throw new Error(result.message);
    } else {
      result = await createRecord(state.kubun, state.warehouse);
      if (result.object === 'error') throw new Error(result.message);
    }
    // スナップショット更新（バックグラウンド）
    if (state.isMove) {
      updateSnapshot(state.cat, state.pattern, state.size, '移動出庫', state.qty, null, state.moveDir);
    } else {
      updateSnapshot(state.cat, state.pattern, state.size, state.kubun, state.qty, state.warehouse, null);
    }
    goStep(8);
  } catch(e) {
    const errEl = document.getElementById('confirm-error');
    if (errEl) errEl.innerHTML = `<div class="error-box">送信に失敗しました。<br><small>${e.message}</small></div>`;
    if (btn) { btn.disabled = false; btn.textContent = 'この内容で送信する'; }
  }
}

// ─── 入出庫履歴 ──────────────────────────────────────────────────────────────
let historyLoaded = false;
let historyRecords = [];

// ── 区分カラー（履歴・フィルターで共用）──
function kubunColor(k) {
  if (k.includes('入庫') || k.includes('返品（倉庫')) return 'var(--green)';
  if (k.includes('出庫') || k.includes('準備')) return 'var(--red)';
  if (k.includes('返品（メーカー')) return 'var(--purple)';
  if (k === '発注中') return 'var(--blue)';
  return 'var(--muted)';
}

// ── 履歴フィルター状態 ──
let historyYear = new Date().getFullYear();
let historyMonth = new Date().getMonth() + 1; // 1-12, 0=全月
let historyKubunFilter = '全部'; // 区分フィルター
let historyPatternFilter = '全部'; // パターンフィルター
let historyWhFilter = '全部'; // 倉庫フィルター

async function loadHistory(forceReload) {
  const el = document.getElementById('history-content');
  if (historyLoaded && historyRecords.length && !forceReload) {
    renderHistory();
    return;
  }
  el.innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--muted);font-size:14px;">履歴を読み込み中...</div>';

  try {
    // 年月フィルターでNotion APIクエリを構築
    const startDate = historyMonth > 0
      ? `${historyYear}-${String(historyMonth).padStart(2,'0')}-01T00:00:00+09:00`
      : `${historyYear}-01-01T00:00:00+09:00`;
    const endDate = historyMonth > 0
      ? (historyMonth < 12
          ? `${historyYear}-${String(historyMonth+1).padStart(2,'0')}-01T00:00:00+09:00`
          : `${historyYear+1}-01-01T00:00:00+09:00`)
      : `${historyYear+1}-01-01T00:00:00+09:00`;

    const dateFilter = {
      and: [
        { timestamp: 'created_time', created_time: { on_or_after: startDate } },
        { timestamp: 'created_time', created_time: { before: endDate } },
      ]
    };

    const allRecords = [];
    const catKeys = Object.keys(DB_MAP);
    const fetches = catKeys.map(async (key) => {
      const db = DB_MAP[key];
      const res = await notionAPI('POST', `/databases/${db.id}/query`, {
        filter: dateFilter,
        sorts: [{ timestamp: 'created_time', direction: 'descending' }],
        page_size: 100,
      });
      (res.results || []).forEach(r => {
        // 繰越レコードはクライアント側で除外（DBにオプション未登録の場合APIエラー回避）
        if (r.properties['区分']?.select?.name === '繰越') return;
        r._catKey = key;
        r._catName = db.name;
        allRecords.push(r);
      });
    });
    await Promise.all(fetches);

    allRecords.sort((a, b) => (b.created_time || '').localeCompare(a.created_time || ''));
    historyRecords = allRecords.slice(0, 200);
    historyLoaded = true;
    renderHistory();
  } catch(e) {
    el.innerHTML = `<div class="error-box">履歴の取得に失敗しました。<br><small>${e.message}</small></div>`;
  }
}

function changeHistoryPeriod(year, month) {
  historyYear = year;
  historyMonth = month;
  historyLoaded = false;
  loadHistory(true);
}

function renderHistory() {
  const el = document.getElementById('history-content');
  if (!historyRecords.length) {
    // 年月セレクターは常に表示（月を変更できるように）
    const now = new Date();
    const curYear = now.getFullYear();
    let yOpts = '';
    for (let y = curYear; y >= 2024; y--) {
      yOpts += '<option value="' + y + '"' + (y === historyYear ? ' selected' : '') + '>' + y + '年</option>';
    }
    let mOpts = '<option value="0"' + (historyMonth === 0 ? ' selected' : '') + '>全月</option>';
    for (let mm = 1; mm <= 12; mm++) {
      mOpts += '<option value="' + mm + '"' + (mm === historyMonth ? ' selected' : '') + '>' + mm + '月</option>';
    }
    el.innerHTML = '<div style="display:flex;gap:8px;margin-bottom:10px;align-items:center;">' +
      '<select id="hist-year" onchange="changeHistoryPeriod(+this.value, +document.getElementById(\'hist-month\').value)" style="flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--border2);background:var(--s2);font-size:13px;font-family:inherit;color:var(--text);">' + yOpts + '</select>' +
      '<select id="hist-month" onchange="changeHistoryPeriod(+document.getElementById(\'hist-year\').value, +this.value)" style="flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--border2);background:var(--s2);font-size:13px;font-family:inherit;color:var(--text);">' + mOpts + '</select>' +
      '</div>' +
      '<div style="text-align:center;padding:40px 0;color:var(--muted);font-size:14px;">この期間の履歴はありません</div>';
    return;
  }

  const fmt = (s) => {
    if (!s) return '—';
    const d = new Date(s);
    return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  };

  const propStr = (r, name) => {
    const p = r.properties?.[name];
    if (!p) return '';
    if (p.type === 'title') return p.title?.[0]?.plain_text || '';
    if (p.type === 'rich_text') return p.rich_text?.[0]?.plain_text || '';
    if (p.type === 'select') return p.select?.name || '';
    if (p.type === 'number') return p.number != null ? String(p.number) : '';
    if (p.type === 'date') return p.date?.start || '';
    return '';
  };

  // サイズ候補リストを全カテゴリから生成（重複排除）
  const allSizes = [...new Set(Object.values(DB_MAP).flatMap(db => db.sizes || []))].sort();

  // パターン一覧をロード済みレコードから生成（重複排除・出現数順）
  const patternCounts = {};
  historyRecords.forEach(r => {
    const p = r.properties?.['パターン名']?.select?.name || '';
    if (p) patternCounts[p] = (patternCounts[p] || 0) + 1;
  });
  const historyPatterns = Object.entries(patternCounts).sort((a,b) => b[1]-a[1]).map(e => e[0]);

  // 年月セレクターを生成
  const now = new Date();
  const curYear = now.getFullYear();
  let yearOpts = '';
  for (let y = curYear; y >= 2024; y--) {
    yearOpts += `<option value="${y}"${y === historyYear ? ' selected' : ''}>${y}年</option>`;
  }
  let monthOpts = `<option value="0"${historyMonth === 0 ? ' selected' : ''}>全月</option>`;
  for (let m = 1; m <= 12; m++) {
    monthOpts += `<option value="${m}"${m === historyMonth ? ' selected' : ''}>${m}月</option>`;
  }

  // 区分一覧をレコードから生成（出現数順）
  const kubunCounts = {};
  historyRecords.forEach(r => {
    const k = r.properties?.['区分']?.select?.name || '';
    if (k) kubunCounts[k] = (kubunCounts[k] || 0) + 1;
  });
  const historyKubuns = Object.entries(kubunCounts).sort((a,b) => b[1]-a[1]).map(e => e[0]);

  let html = `
    <div style="display:flex;gap:8px;margin-bottom:10px;align-items:center;">
      <select id="hist-year" onchange="changeHistoryPeriod(+this.value, +document.getElementById('hist-month').value)" style="flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--border2);background:var(--s2);font-size:13px;font-family:inherit;color:var(--text);">${yearOpts}</select>
      <select id="hist-month" onchange="changeHistoryPeriod(+document.getElementById('hist-year').value, +this.value)" style="flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--border2);background:var(--s2);font-size:13px;font-family:inherit;color:var(--text);">${monthOpts}</select>
    </div>
    <div class="search-box" style="margin-bottom:8px;">
      <input id="history-search" type="text" inputmode="numeric" placeholder="例：275 または 27580" autocomplete="off">
      <button class="search-clear" onclick="window._historySelectedSize='';document.getElementById('history-search').value='';filterHistorySizes('');applyHistoryFilter('')">✕</button>
    </div>
    <div id="history-candidates" class="candidates"></div>
    <div id="pattern-tags" style="display:flex;gap:5px;overflow-x:auto;margin-bottom:8px;padding-bottom:4px;-webkit-overflow-scrolling:touch;">
      ${(() => {
        const pSel = historyPatternFilter === '全部';
        let tags = `<button onclick="filterPattern('全部')" style="flex-shrink:0;padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid var(--accent);background:${pSel ? 'var(--accent)' : 'transparent'};color:${pSel ? '#fff' : 'var(--accent)'};transition:all 0.15s;">全部</button>`;
        historyPatterns.forEach(p => {
          const s = p === historyPatternFilter;
          tags += `<button onclick="filterPattern('${p}')" style="flex-shrink:0;padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid var(--blue);background:${s ? 'var(--blue)' : 'transparent'};color:${s ? '#fff' : 'var(--blue)'};transition:all 0.15s;">${p}</button>`;
        });
        return tags;
      })()}
    </div>
    <div id="wh-tags" style="display:flex;gap:5px;overflow-x:auto;margin-bottom:8px;padding-bottom:4px;-webkit-overflow-scrolling:touch;">
      ${(() => {
        const whAll = (typeof historyWhFilter === 'undefined' ? '全部' : historyWhFilter) === '全部';
        const whColors = {'五日市':'#d97706','志和':'#2563eb'};
        let tags = `<button onclick="filterWh('全部')" style="flex-shrink:0;padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid var(--accent);background:${whAll ? 'var(--accent)' : 'transparent'};color:${whAll ? '#fff' : 'var(--accent)'};transition:all 0.15s;">全倉庫</button>`;
        ['五日市','志和'].forEach(w => {
          const sel = (typeof historyWhFilter !== 'undefined') && w === historyWhFilter;
          const col = whColors[w] || 'var(--muted)';
          tags += `<button onclick="filterWh('${w}')" style="flex-shrink:0;padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid ${col};background:${sel ? col : 'transparent'};color:${sel ? '#fff' : col};transition:all 0.15s;">📍${w}</button>`;
        });
        return tags;
      })()}
    </div>
    <div id="kubun-tags" style="display:flex;gap:5px;overflow-x:auto;margin-bottom:8px;padding-bottom:4px;-webkit-overflow-scrolling:touch;">
      ${(() => {
        const kAll = historyKubunFilter === '全部';
        let tags = `<button onclick="filterKubun('全部')" style="flex-shrink:0;padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid var(--accent);background:${kAll ? 'var(--accent)' : 'transparent'};color:${kAll ? '#fff' : 'var(--accent)'};transition:all 0.15s;">全部</button>`;
        historyKubuns.forEach(k => {
          const sel = k === historyKubunFilter;
          const col = kubunColor(k);
          tags += `<button onclick="filterKubun('${k}')" style="flex-shrink:0;padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid ${col};background:${sel ? col : 'transparent'};color:${sel ? '#fff' : col};transition:all 0.15s;">${k}</button>`;
        });
        return tags;
      })()}
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <div style="font-size:11px;color:var(--muted);" id="history-count">${historyYear}年${historyMonth > 0 ? historyMonth+'月' : ''}の履歴（${historyRecords.length}件）</div>
      <button onclick="loadHistory(true)" style="background:var(--s3);border:1px solid var(--border2);border-radius:6px;padding:4px 8px;font-size:10px;color:var(--text);cursor:pointer;font-family:inherit;">↻ 更新</button>
    </div>`;

  // サイズ候補をグローバルに保持
  window._historySizes = allSizes;
  window._historySelectedSize = '';

  // 倉庫別にグループ分け
  const warehouseGroups = {};
  historyRecords.forEach((r, idx) => {
    const wh = (r.properties?.['倉庫']?.select?.name || r.properties?.['出庫倉庫']?.select?.name || '不明').replace(/倉庫$/, '');
    if (!warehouseGroups[wh]) warehouseGroups[wh] = [];
    warehouseGroups[wh].push({ r, idx });
  });

  Object.entries(warehouseGroups).forEach(([wh, items]) => {
    html += `<div class="wh-group" data-wh="${wh}">
      <div style="font-size:11px;font-weight:700;color:var(--accent);padding:6px 0 4px;border-bottom:1px solid var(--border);margin-bottom:4px;">📦 ${wh}倉庫（${items.length}件）</div>`;
    items.forEach(({ r, idx }) => {
      const kubun = r.properties?.['区分']?.select?.name || '';
      const size = r.properties?.['サイズコード']?.select?.name || '';
      const pattern = r.properties?.['パターン名']?.select?.name || '';
      const qty = r.properties?.['数量']?.number ?? '';
      const creator = r.properties?.['作成者']?.select?.name || '';
      const shukko = r.properties?.['出庫先']?.rich_text?.[0]?.plain_text || r.properties?.['出庫先']?.select?.name || '';
      const catIcon = DB_MAP[r._catKey]?.icon || '';

      html += `
      <div onclick="openHistoryDetail(${idx})" style="background:var(--s2);border:0.5px solid var(--border);border-left:3px solid ${kubunColor(kubun)};border-radius:8px;padding:7px 10px;margin-bottom:4px;cursor:pointer;transition:background 0.15s;" id="hist-${idx}" data-size="${(size||'').toLowerCase()}" data-kubun="${kubun}" data-pattern="${pattern}" ontouchstart="this.style.background='var(--s3)'" ontouchend="this.style.background='var(--s2)'">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div style="display:flex;align-items:center;gap:5px;">
            <span style="font-size:12px;">${catIcon}</span>
            <span style="font-size:12px;font-weight:700;">${pattern || '—'}</span>
            <span style="font-size:13px;font-weight:900;font-family:'DM Mono',monospace;color:var(--text);margin-left:2px;">${size || '—'}</span>
          </div>
          <span style="font-size:9px;color:var(--muted);">${fmt(r.created_time)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:3px;">
          <span style="font-size:10px;font-weight:600;color:${kubunColor(kubun)};background:color-mix(in srgb,${kubunColor(kubun)} 12%,transparent);padding:1px 7px;border-radius:4px;">${kubun || '—'}</span>
          <span style="font-size:12px;font-weight:700;color:var(--accent);">${qty}本</span>
          ${shukko ? `<span style="font-size:10px;color:var(--text);">▸${shukko}</span>` : ''}
          ${creator ? `<span style="font-size:9px;color:var(--muted);">${creator}</span>` : ''}
        </div>
      </div>`;
    });
    html += `</div>`;
  });

  el.innerHTML = html;

  // 検索イベントリスナー設定
  const hInput = document.getElementById('history-search');
  if (hInput) {
    hInput.addEventListener('input', e => { window._historySelectedSize = ''; filterHistorySizes(e.target.value); });
  }
}

// ─── 履歴詳細モーダル ──────────────────────────────────────────────────────────
function openHistoryDetail(idx) {
  const r = historyRecords[idx];
  if (!r) return;
  const ps = (name) => {
    const p = r.properties?.[name];
    if (!p) return '—';
    if (p.type === 'title') return p.title?.[0]?.plain_text || '—';
    if (p.type === 'rich_text') return p.rich_text?.[0]?.plain_text || '—';
    if (p.type === 'select') return p.select?.name || '—';
    if (p.type === 'number') return p.number != null ? String(p.number) : '—';
    if (p.type === 'created_by') return p.created_by?.name || '—';
    return '—';
  };
  const db = DB_MAP[r._catKey];
  const kubun = ps('区分');
  const qty = ps('数量');
  const sign = KUBUN_SIGN[kubun] ?? 0;
  const signStr = sign > 0 ? '+' : sign < 0 ? '-' : '';
  const signColor = sign > 0 ? 'var(--green)' : sign < 0 ? 'var(--red)' : 'var(--muted)';
  const kubunColor = (k) => {
    if (k.includes('入庫') || k.includes('返品（倉庫')) return 'var(--green)';
    if (k === '準備') return '#f59e0b';
    if (k.includes('出庫') || k.includes('返品（メーカー')) return 'var(--red)';
    if (k === '発注中') return 'var(--blue)';
    return 'var(--muted)';
  };
  const kColor = kubunColor(kubun);
  const d = new Date(r.created_time);
  const dateStr = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  const editD = r.last_edited_time ? new Date(r.last_edited_time) : null;
  const editStr = editD ? `${editD.getFullYear()}/${editD.getMonth()+1}/${editD.getDate()} ${String(editD.getHours()).padStart(2,'0')}:${String(editD.getMinutes()).padStart(2,'0')}` : '—';

  const row = (label, value, hl) => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);">
      <span style="font-size:12px;color:var(--muted);min-width:80px;">${label}</span>
      <span style="font-size:13px;font-weight:${hl?'700':'500'};color:${hl||'var(--text)'};text-align:right;">${value}</span>
    </div>`;

  let modal = document.getElementById('hist-detail-modal');
  if (!modal) { modal = document.createElement('div'); modal.id = 'hist-detail-modal'; document.body.appendChild(modal); }
  modal.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;padding:20px;';
  modal.innerHTML = `
    <div style="background:var(--bg);width:100%;max-width:400px;border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
      <div style="background:color-mix(in srgb,${kColor} 15%,var(--bg));padding:20px;text-align:center;border-bottom:1px solid var(--border);">
        <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">${db?.icon||''} ${db?.name||''}</div>
        <span style="display:inline-block;font-size:13px;font-weight:700;color:${kColor};background:color-mix(in srgb,${kColor} 18%,transparent);padding:4px 16px;border-radius:20px;">${kubun}</span>
        <div style="font-size:28px;font-weight:800;color:${signColor};margin-top:8px;">${signStr}${qty}本</div>
      </div>
      <div style="padding:4px 20px 8px;">
        ${row('パターン', ps('パターン名'))}
        ${row('サイズ', ps('サイズコード'))}
        ${row('倉庫', ps('倉庫') !== '—' ? ps('倉庫') : ps('出庫倉庫'))}
        ${row('出庫先', ps('出庫先'), ps('出庫先') !== '—' ? '#f59e0b' : '')}
        ${row('入力者', ps('作成者'), '#3b82f6')}
        ${row('メモ', ps('メモ'))}
        ${row('登録日時', dateStr)}
        ${row('最終更新', editStr)}
      </div>
      <div style="padding:0 20px 16px;display:flex;gap:8px;">
        <button onclick="document.getElementById('hist-detail-modal').style.display='none';openHistoryEdit(${idx})" style="flex:2;padding:12px;background:var(--accent);border:none;border-radius:10px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;">編集</button>
        <button onclick="archiveHistoryRecord(${idx})" id="hist-archive-btn" style="flex:1;padding:12px;background:transparent;border:1.5px solid var(--red);border-radius:10px;font-size:12px;font-weight:600;color:var(--red);cursor:pointer;font-family:inherit;">取消</button>
        <button onclick="document.getElementById('hist-detail-modal').style.display='none'" style="flex:1;padding:12px;background:var(--s3);border:none;border-radius:10px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;font-family:inherit;">閉じる</button>
      </div>
    </div>`;
  modal.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
}

async function archiveHistoryRecord(idx) {
  const r = historyRecords[idx];
  if (!r) return;
  const ps = (name) => r.properties?.[name]?.select?.name || r.properties?.[name]?.rich_text?.[0]?.plain_text || '';
  if (!confirm(`この記録を取り消しますか？\n\n${ps('区分')} ${ps('パターン名')} ${ps('サイズコード')} ${r.properties?.['数量']?.number||0}本\n\n※Notionのゴミ箱に移動します`)) return;
  const btn = document.getElementById('hist-archive-btn');
  btn.disabled = true; btn.textContent = '処理中…';
  try {
    await notionAPI('PATCH', `/pages/${r.id}`, { archived: true });
    historyRecords.splice(idx, 1);
    document.getElementById('hist-detail-modal').style.display = 'none';
    renderHistory();
  } catch(e) {
    alert('取消エラー: ' + e.message);
    btn.disabled = false; btn.textContent = '取消';
  }
}

// ─── 履歴レコード編集 ─────────────────────────────────────────────────────────
function openHistoryEdit(idx) {
  const r = historyRecords[idx];
  if (!r) return;
  const propStr = (name) => {
    const p = r.properties?.[name];
    if (!p) return '';
    if (p.type === 'title') return p.title?.[0]?.plain_text || '';
    if (p.type === 'rich_text') return p.rich_text?.[0]?.plain_text || '';
    if (p.type === 'select') return p.select?.name || '';
    if (p.type === 'number') return p.number != null ? String(p.number) : '';
    return '';
  };

  const db = DB_MAP[r._catKey];
  const kubunList = db?.kubun || ['入庫','出庫','準備','返品（倉庫へ）','返品（メーカーへ）'];
  const currentKubun = propStr('区分');
  const currentQty = propStr('数量');
  const currentMemo = propStr('メモ') || propStr('出庫先');

  const kubunOpts = kubunList.map(k => `<option value="${k}" ${k===currentKubun?'selected':''}>${k}</option>`).join('');

  const overlay = document.createElement('div');
  overlay.id = 'history-edit-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;padding:20px;';
  overlay.innerHTML = `
    <div style="background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:20px;max-width:380px;width:100%;">
      <div style="font-size:15px;font-weight:700;margin-bottom:14px;">履歴の編集</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:12px;">${db?.icon || ''} ${propStr('パターン名')} ${propStr('サイズコード')}</div>
      <div style="margin-bottom:10px;">
        <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px;">区分</label>
        <select id="edit-kubun" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border2);background:var(--s3);color:var(--text);font-size:13px;font-family:inherit;">
          ${kubunOpts}
        </select>
      </div>
      <div style="margin-bottom:10px;">
        <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px;">数量</label>
        <input id="edit-qty" type="number" value="${currentQty}" min="1" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border2);background:var(--s3);color:var(--text);font-size:13px;font-family:inherit;box-sizing:border-box;">
      </div>
      <div style="margin-bottom:14px;">
        <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px;">メモ</label>
        <input id="edit-memo" type="text" value="${currentMemo}" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border2);background:var(--s3);color:var(--text);font-size:13px;font-family:inherit;box-sizing:border-box;">
      </div>
      <div id="edit-error" style="margin-bottom:8px;"></div>
      <div style="display:flex;gap:8px;">
        <button id="edit-save-btn" onclick="saveHistoryEdit('${r.id}',${idx})" style="flex:2;background:var(--green);border:none;border-radius:10px;padding:12px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">保存</button>
        <button onclick="closeHistoryEdit()" style="flex:1;background:transparent;border:1.5px solid var(--border2);border-radius:10px;padding:12px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">閉じる</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function closeHistoryEdit() {
  const ov = document.getElementById('history-edit-overlay');
  if (ov) ov.remove();
}

async function saveHistoryEdit(pageId, idx) {
  if (!confirm('この履歴データを修正しますか？\nNotionDBのデータを上書きします。')) return;
  const kubun = document.getElementById('edit-kubun').value;
  const qty = parseInt(document.getElementById('edit-qty').value) || 1;
  const memo = document.getElementById('edit-memo').value.trim();
  const btn = document.getElementById('edit-save-btn');
  btn.disabled = true; btn.textContent = '保存中...';

  try {
    const props = {
      '区分': { select: { name: kubun } },
      '数量': { number: qty },
    };
    // メモフィールド更新（リッチテキストの場合）
    const r = historyRecords[idx];
    if (r.properties['メモ']) {
      props['メモ'] = r.properties['メモ'].type === 'select'
        ? { select: memo ? { name: memo } : null }
        : { rich_text: [{ text: { content: memo } }] };
    }
    if (r.properties['出庫先'] && memo) {
      props['出庫先'] = { rich_text: [{ text: { content: memo } }] };
    }

    await notionAPI('PATCH', `/pages/${pageId}`, { properties: props });

    // ローカルデータも更新
    if (r.properties['区分']) r.properties['区分'] = { type:'select', select:{ name: kubun }};
    if (r.properties['数量']) r.properties['数量'] = { type:'number', number: qty };

    closeHistoryEdit();
    renderHistory();
  } catch(e) {
    document.getElementById('edit-error').innerHTML = `<div class="error-box" style="font-size:11px;">${e.message}</div>`;
    btn.disabled = false; btn.textContent = '保存';
  }
}

// ─── 履歴検索・フィルタ ──────────────────────────────────────────────────────
function filterHistorySizes(v) {
  const q = v.trim();
  const allSizes = window._historySizes || [];
  let hits = [];
  if (q) {
    const dq = digits(q);
    hits = allSizes.filter(s => {
      const ds = digits(s);
      return s.toLowerCase().includes(q.toLowerCase()) || (dq.length >= 3 && ds.startsWith(dq));
    }).slice(0, 8);
  }
  // 候補カードを描画
  const c = document.getElementById('history-candidates');
  if (c) {
    c.innerHTML = hits.map(s => `<div class="candidate${window._historySelectedSize === s ? ' sel' : ''}" onclick="pickHistorySize('${s}')"><span class="candidate-text">${s}</span><span class="candidate-badge">選択</span></div>`).join('');
  }
  // 選択済みサイズがなければカード全表示
  if (!window._historySelectedSize) {
    applyHistoryFilter(q);
  }
}

function pickHistorySize(s) {
  window._historySelectedSize = s;
  document.getElementById('history-search').value = s;
  // 候補を更新（選択状態を反映）
  filterHistorySizes(s);
  // カードをフィルタ
  applyHistoryFilter(s);
}

function applyHistoryFilter(query) {
  const q = (query || '').trim().toLowerCase();
  const kf = historyKubunFilter;
  const pf = historyPatternFilter;

  // ① サイズで絞ったレコードからパターン候補を生成
  const sizeMatchedRecords = historyRecords.filter(r => {
    const size = (r.properties?.['サイズコード']?.select?.name || '').toLowerCase();
    return !q || size.includes(q);
  });
  rebuildPatternTags(sizeMatchedRecords);

  // ② サイズ＋パターンで絞ったレコードから区分候補を生成
  const sizePtnMatchedRecords = sizeMatchedRecords.filter(r => {
    const pattern = r.properties?.['パターン名']?.select?.name || '';
    return pf === '全部' || pattern === pf;
  });
  rebuildKubunTags(sizePtnMatchedRecords);

  // ③ カードの表示/非表示
  const wf = historyWhFilter;
  const cards = document.querySelectorAll('[id^="hist-"]');
  let shown = 0;
  cards.forEach(card => {
    const size = card.getAttribute('data-size') || '';
    const kubun = card.getAttribute('data-kubun') || '';
    const pattern = card.getAttribute('data-pattern') || '';
    const cardWh = (card.closest('.wh-group')?.getAttribute('data-wh') || '');
    const sizeMatch = !q || size.includes(q);
    const patternMatch = pf === '全部' || pattern === pf;
    const kubunDisplay = (kubun === '移動入庫' || kubun === '移動出庫') ? '移動入出庫' : kubun;
    const kubunMatch = kf === '全部' || kubunDisplay === kf;
    const whMatch = wf === '全部' || cardWh === wf;
    const match = sizeMatch && patternMatch && kubunMatch && whMatch;
    card.style.display = match ? '' : 'none';
    if (match) shown++;
  });
  const countEl = document.getElementById('history-count');
  if (countEl) {
    const labels = [];
    if (wf !== '全部') labels.push(wf);
    if (pf !== '全部') labels.push(pf);
    if (kf !== '全部') labels.push(kf);
    const prefix = labels.length ? `[${labels.join('/')}] ` : '';
    countEl.textContent = (q || labels.length) ? `${prefix}${q ? '「'+q+'」' : ''} ${shown}件` : `直近の入出庫履歴（最新${historyRecords.length}件）`;
  }
  // ④ 倉庫グループヘッダーの表示/非表示（中身が全て非表示なら隠す）
  document.querySelectorAll('.wh-group').forEach(g => {
    const visibleCards = g.querySelectorAll('[id^="hist-"]');
    let hasVisible = false;
    visibleCards.forEach(c => { if (c.style.display !== 'none') hasVisible = true; });
    g.style.display = hasVisible ? '' : 'none';
  });
}

// パターンタグを動的に再構築（サイズで絞った結果から）
function rebuildPatternTags(records) {
  const el = document.getElementById('pattern-tags');
  if (!el) return;
  const counts = {};
  records.forEach(r => {
    const p = r.properties?.['パターン名']?.select?.name || '';
    if (p) counts[p] = (counts[p] || 0) + 1;
  });
  const patterns = Object.entries(counts).sort((a,b) => b[1]-a[1]).map(e => e[0]);
  // 選択中パターンが候補に無ければリセット
  if (historyPatternFilter !== '全部' && !patterns.includes(historyPatternFilter)) {
    historyPatternFilter = '全部';
  }
  const pSel = historyPatternFilter === '全部';
  let html = `<button onclick="filterPattern('全部')" style="flex-shrink:0;padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid var(--accent);background:${pSel ? 'var(--accent)' : 'transparent'};color:${pSel ? '#fff' : 'var(--accent)'};transition:all 0.15s;">全部</button>`;
  patterns.forEach(p => {
    const s = p === historyPatternFilter;
    html += `<button onclick="filterPattern('${p}')" style="flex-shrink:0;padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid var(--blue);background:${s ? 'var(--blue)' : 'transparent'};color:${s ? '#fff' : 'var(--blue)'};transition:all 0.15s;">${p}</button>`;
  });
  el.innerHTML = html;
}

// 区分タグを動的に再構築（サイズ＋パターンで絞った結果から）
function rebuildKubunTags(records) {
  const el = document.getElementById('kubun-tags');
  if (!el) return;
  const counts = {};
  records.forEach(r => {
    let k = r.properties?.['区分']?.select?.name || '';
    // 移動入庫・移動出庫 → 移動入出庫に統合
    if (k === '移動入庫' || k === '移動出庫') k = '移動入出庫';
    if (k) counts[k] = (counts[k] || 0) + 1;
  });
  const kubuns = Object.entries(counts).sort((a,b) => b[1]-a[1]).map(e => e[0]);
  // 選択中区分が候補に無ければリセット
  if (historyKubunFilter !== '全部' && !kubuns.includes(historyKubunFilter)) {
    historyKubunFilter = '全部';
  }
  const kAll = historyKubunFilter === '全部';
  let html = `<button onclick="filterKubun('全部')" style="flex-shrink:0;padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid var(--accent);background:${kAll ? 'var(--accent)' : 'transparent'};color:${kAll ? '#fff' : 'var(--accent)'};transition:all 0.15s;">全部</button>`;
  kubuns.forEach(k => {
    const sel = k === historyKubunFilter;
    const col = kubunColor(k);
    html += `<button onclick="filterKubun('${k}')" style="flex-shrink:0;padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid ${col};background:${sel ? col : 'transparent'};color:${sel ? '#fff' : col};transition:all 0.15s;">${k}</button>`;
  });
  el.innerHTML = html;
}

function filterWh(wh) {
  historyWhFilter = wh;
  // タグの色を更新
  var whTags = document.getElementById('wh-tags');
  if (whTags) {
    var whColors = {'五日市':'#d97706','志和':'#2563eb'};
    whTags.querySelectorAll('button').forEach(function(btn) {
      var t = btn.textContent.replace('📍','').trim();
      if (t === '全倉庫') t = '全部';
      var sel = t === wh;
      var col = t === '全部' ? 'var(--accent)' : (whColors[t] || 'var(--muted)');
      btn.style.background = sel ? col : 'transparent';
      btn.style.color = sel ? '#fff' : col;
    });
  }
  var searchInput = document.getElementById('history-search');
  applyHistoryFilter(searchInput ? searchInput.value : '');
}

function filterKubun(kubun) {
  historyKubunFilter = kubun;
  const searchInput = document.getElementById('history-search');
  applyHistoryFilter(searchInput ? searchInput.value : '');
}

function filterPattern(pattern) {
  historyPatternFilter = pattern;
  // パターン変更時は区分をリセット
  historyKubunFilter = '全部';
  const searchInput = document.getElementById('history-search');
  applyHistoryFilter(searchInput ? searchInput.value : '');
}
</script>
